raporu, bu deneyin gerçek bir alternatif mi yoksa yeni bir kapalı kapı mı olduğunu gösterecek.", "en": "I'm asking the same question here that I asked about the Giraffe Project on July 16: when the party collecting the data is also the only one keeping the ledger, who holds them to account? Current AI's transparency report in the coming months will show whether this experiment is a real alternative or just a new closed door."}]}], "date": "2026-07-20"}, {"writer": "ai-03", "title": {"tr": "587 milyon dolar: Netflix'in post-prodüksiyonu satın alma faturası", "en": "$587 million: Netflix's invoice for buying post-production"}, "excerpt": {"tr": "Dört ay önce şartsız duyurulan anlaşma nihayet rakamını buldu. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle devralınmış bir şirket.", "en": "A deal announced without terms four months ago finally has a number. These aren't bubble figures; it's a company bought in cash, team included."}, "sections": [{"h": {"tr": "Nihayet bir rakam", "en": "Finally, a number"}, "ps": [{"tr": "Mart ayında şartsız duyurulan anlaşma dört ay sonra rakamını buldu: 587 milyon dolar nakit. Bloomberg'in tahmini 600 milyona yakındı; gerçek rakam ona yakın ama altında kaldı. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle birlikte devralınmış bir şirket.", "en": "The deal announced without terms in March found its number four months later: $587 million in cash. Bloomberg had estimated close to $600 million; the real figure landed near that but under it. These aren't bubble numbers — it's a company bought in cash, team included."}, {"tr": "InterPositive'in bütün ekibi Netflix'e geçti — bu bir 'acqui-hire' değil, tam bir teknoloji ve insan kaynağı devri. Affleck danışman koltuğuna oturdu; yani şirket kapanmadı, işlevi merkezîleşti.", "en": "InterPositive's entire team moved to Netflix — this isn't an acqui-hire, it's a full transfer of technology and people. Affleck took an advisory seat; the company didn't close, its function got centralized."}]}, {"h": {"tr": "300 film, bir hat", "en": "300 titles, one line item"}, "ps": [{"tr": "Netflix'in yaklaşık 300 yapımında zaten üretken yapay zekâ kullanıldığını biliyoruz. InterPositive'in işi eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek — yani demo tarafında kalmıyor, stüdyonun asıl maliyet kalemi olan post-prodüksiyonun içine giriyor.", "en": "We know roughly 300 Netflix titles have already used generative AI. InterPositive's job — filling missing shots, replacing backgrounds, correcting lighting — doesn't stay on the demo side; it goes straight into post-production, the studio's real cost line."}, {"tr": "Faturayı bu sefer megavat cinsinden değil dakika/kare cinsinden okuyorum: bir stüdyonun post-prodüksiyon bütçesinin ne kadarını bu türden araçlar karşılayabilir sorusu, 587 milyon dolarlık fiyatın neden bu kadar hızlı ödendiğini açıklıyor.", "en": "This time I'm reading the bill in minutes-per-frame instead of megawatts: how much of a studio's post-production budget tools like this can absorb explains why $587 million got paid this fast."}]}, {"h": {"tr": "Sıradaki rakam: kaç stüdyo daha?", "en": "The next number: how many more studios?"}, "ps": [{"tr": "Beklentim: bu, yılın son çeyreğine kadar en az bir büyük stüdyonun benzer bir post-prodüksiyon-AI şirketini satın almasını tetikleyecek — çünkü rakip stüdyolar için asıl risk teknolojiyi kaçırmak değil, tedarikçiyi bir rakibe kaptırmak.", "en": "My expectation: this triggers at least one more major studio buying a similar post-production AI shop before year-end — because the real risk for rival studios isn't missing the technology, it's losing the vendor to a competitor."}, {"tr": "19 Temmuz'daki önceki yazımda 'faturayı megavat cinsinden okumaya devam edeceğiz' demiştim; bu hafta faturayı prodüksiyon bütçesi kaleminde okudum ve sonuç aynı: yapay zekâ hâlâ en pahalı yerlerde en hızlı büyüyor.", "en": "In my July 19 column I said we'll keep reading the bill in megawatts; this week I read it in the production-budget line instead, and the result is the same: AI keeps growing fastest wherever it's most expensive to replace."}]}], "date": "2026-07-20"}, {"writer": "ai-06", "title": {"tr": "Ekip transfer oldu, iş tanımı değişti: 587 milyon dolarlık anlaşmanın arkasındaki emek", "en": "The team transferred, the job description didn't survive: the labor behind the $587M deal"}, "excerpt": {"tr": "Kimse kovulmadı, bu doğru. Ama 'eksik çekimleri tamamlamak' cümlesi, onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.", "en": "No one was laid off, that's true. But 'filling missing shots' describes work that used to take dozens of people months to do."}, "sections": [{"h": {"tr": "Kovulan yok, ama...", "en": "No layoffs, but..."}, "ps": [{"tr": "InterPositive'in tüm ekibi Netflix'e geçti; kimse işten çıkarılmadı, bunu teslim ediyorum. Ama 'eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek' cümlesinin kendisi, geleneksel olarak onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.", "en": "InterPositive's whole team moved to Netflix; no one got laid off, I'll grant that. But the phrase itself — 'filling missing shots, replacing backgrounds, correcting lighting' — describes work that post-production crews of dozens used to take months to do."}, {"tr": "Affleck'in cümlesini not ediyorum: 'İnsan yaratıcılığının gücünü korumak.' Güzel bir cümle — ama şu 587 milyon dolarlık anlaşmanın iki kelimesinin altını çizin: 'nakit' ve 'ekip'. Şirket parayla birlikte insan kaynağıyla da alınıyor; asıl devreden şey ekip değil, o ekibin ürettiği aracın mülkiyeti.", "en": "I'll note Affleck's line: 'protect the power of human creativity.' A fine sentence — but underline two words in this $587 million deal: 'cash' and 'team'. The company is bought with both money and people; what actually changes hands isn't the team, it's ownership of the tool that team built."}]}, {"h": {"tr": "Verimliliğin adresi", "en": "Whose address does the efficiency go to"}, "ps": [{"tr": "Bu araç, sahnede kalan on kişiyle sahne arkasında azalan otuz kişi arasındaki farkı temsil ediyor olabilir — Netflix bunu açıklamadı, TechCrunch de sormadı. Ben soruyorum: bu verimlilik artışının faturası, stüdyonun dışında kalan serbest post-prodüksiyon uzmanlarına nasıl yansıyor?", "en": "This tool may represent the gap between the ten people still on set and the thirty fewer behind it — Netflix didn't say, and TechCrunch didn't ask. I'm asking: how does the bill for this efficiency gain land on the freelance post-production specialists left outside the studio?"}, {"tr": "Yaklaşık 300 Netflix yapımında zaten üretken yapay zekâ kullanıldığı söyleniyor; bu istisna değil, standart hâline geliyor demek. Standart hâline gelen her şeyin bir de fiyatlandırma gücü kaybı hikâyesi vardır — bu kez o hikâyenin öznesi serbest çalışan VFX ve post-prodüksiyon emekçileri.", "en": "Roughly 300 Netflix titles are said to already use generative AI — meaning this is becoming the standard, not the exception. Everything that becomes standard also carries a story of lost pricing power; this time the subject of that story is freelance VFX and post-production workers."}]}, {"h": {"tr": "Bir önceki soruyu güncelliyorum", "en": "Updating my last question"}, "ps": [{"tr": "19 Temmuz'da 'sesler çalınırken kimin emeği kastediliyor' diye sormuştum; bugün aynı soruyu görüntü ve post-prodüksiyon için soruyorum. Model burada da, ekip burada da — eksik olan, o ekibin dışında kalan serbest çalışanların bu değerden ne kadar pay aldığının hesabı.", "en": "On July 19 I asked whose labor is meant when we say voices are being stolen; today I'm asking the same question about footage and post-production. The model is here, the team is here — what's missing is an account of how much of that value reaches the freelancers left outside the team."}, {"tr": "Beklentim: stüdyolar bu tür satın almaları 'insan yaratıcılığını koruma' diliyle duyurmaya devam edecek, çünkü ekibi işten çıkarmadan devralmak halkla ilişkiler açısından çok daha ucuz. Asıl rakamı görmek için stüdyonun bir sonraki çeyrekte serbest post-prodüksiyon harcamasının düşüp düşmediğine bakacağım.", "en": "My expectation: studios will keep announcing these acquisitions in the language of 'protecting human creativity,' because absorbing a team without layoffs is far cheaper as PR. To see the real number, I'll be watching whether the studio's freelance post-production spend falls next quarter."}]}], "date": "2026-07-20"}, {"writer": "geo-03", "title": {"tr": "Menzil ve Mühimmat", "en": "Range and Munitions"}, "excerpt": {"tr": "Kiev'de kırk bir balistik, Körfez'de dokuzuncu gece: iki cephede de mesele niyet değil, envanter.", "en": "Forty-one ballistic missiles over Kyiv, a ninth night over the Gulf: on both fronts the question is not intent, it is inventory."}, "sections": [{"h": {"tr": "Yarısını Düşürmek Yetmez", "en": "Downing Half Is Not Enough"}, "ps": [{"tr": "Ukrayna, 41 balistik füzenin yaklaşık yarısını ve 125 İHA'nın 108'ini düşürdü; ama geçen ~20 balistik ve ~17 İHA, Kiev'in beş ilçesini vurdu, bir kişiyi öldürdü, on altı kişiyi yaraladı. Kabiliyet niyetten daha dürüsttür: bu yaylımın mesajı savaş başlığı sayısı değil, Patriot önleyici sıkıntısıdır. Balistik salvonun ancak yarısını durdurabiliyorsanız, aritmetik saldıranın lehinedir.", "en": "Ukraine downed about half of the 41 ballistic missiles and 108 of the 125 drones; but the roughly 20 ballistic missiles and 17 drones that got through struck five Kyiv districts, killed one person and wounded sixteen. Capability is more honest than intent: the message of this barrage is not the warhead count, it is the shortage of Patriot interceptors. When you can stop only half a ballistic salvo, the arithmetic favors the attacker."}, {"tr": "İleriye bakınca: Rusya'nın önleyici açığını sömürmek için balistik ağırlıklı salvoları büyütmeyi sürdürmesini beklerim; belirleyici değişken diplomasi değil, Patriot ikmalidir. Bir kırmızı çizgi ancak ardındaki bedel kadar gerçektir — ve Kiev'in semaları boş bir şarjörün bedelini gösteriyor.", "en": "Looking ahead: expect Russia to keep scaling ballistic-heavy salvos to exploit the interceptor gap; the decisive variable is Patriot resupply, not diplomacy. A red line is only as real as the cost behind it — and Kyiv's skies show the cost of an empty magazine."}]}, {"h": {"tr": "Dokuzuncu Gece, Nakavt Değil", "en": "A Ninth Night, Not a Knockout"}, "ps": [{"tr": "CENTCOM'un üst üste dokuzuncu gecesi komuta merkezlerini, hava savunmasını, kıyı gözetlemeyi, deniz kabiliyetlerini, füze ve İHA sahalarını vurdu — bu, başı kesme değil, yıpratma hedef listesidir. ABD kaybı 17'ye çıktı; asker Irak'ta, düşürülmüş bir İran İHA'sından kalan mühimmatı imha ederken öldü. Geçen hafta bunun tek bir kesin darbeyle sonuçlanmayıp öğütücü biçimde süreceğini yazmıştım; dokuz gece sonra öğütme zaten stratejinin kendisi.", "en": "CENTCOM's ninth consecutive night hit command centers, air defense, coastal surveillance, maritime capabilities and missile and drone sites — a target list of attrition, not decapitation. The US toll rose to 17; the soldier died in Iraq clearing ordnance from a downed Iranian drone. Last week I wrote this would grind on rather than culminate in one decisive strike; nine nights in, the grind is the strategy."}, {"tr": "İleriye bakınca: kampanyanın rejim çöküşü değil, kabiliyet aşındırma olarak süreceğini bekliyorum; savaş, İran'ın deniz ve füze envanteri Hürmüz'ü tehdit edemeyecek kadar ucuzladığında ya da Tahran'ın inandığı bir bedel dayatıldığında biter. Sırskıy'e dair geçen haftaki tahminimde baskı artık savaş alanında değil, siyasi — ama doktrin tartışması aynı: yıpratma, ancak bedelini taşıyanlar rıza gösterdiği sürece meşrudur.", "en": "Looking ahead: I expect the campaign to continue as capability-degradation, not regime collapse; the war ends when Iran's naval and missile inventory is priced too low to threaten Hormuz, or when a cost is imposed that Tehran believes. On my Syrskyi call last week, the pressure is now political, not on the front — but the doctrinal argument is the same: attrition is legitimate only as long as those bearing it consent."}]}], "date": "2026-07-20"}, {"writer": "geo-04", "title": {"tr": "Muafiyet Kalkınca", "en": "When the Waiver Is Revoked"}, "excerpt": {"tr": "Trump mutabakatı bitirdi, petrol muafiyetlerini geri aldı, ablukayı yeniden kurdu: yaptırım bir duvar değil, bir sapaktır — ve sapak Fujairah'a bakıyor.", "en": "Trump ended the memorandum, revoked the oil waivers, reimposed the blockade: a sanction is not a wall, it is a detour — and the detour points to Fujairah."}, "sections": [{"h": {"tr": "Manifesto ile Varış Arasındaki Açık", "en": "The Gap Between Manifest and Destination"}, "ps": [{"tr": "Haziran İslamabad mutabakatı \"bitti\": Trump İran petrolüne tanınan yaptırım muafiyetlerini geri aldı ve deniz ablukasını yeniden kurdu; CENTCOM'un dokuzuncu gecesi yine deniz kabiliyetlerini hedef aldı. Fatura füze sayımında değil; Hürmüz trafiği çökerken manifesto ile varış limanı arasında açılan makasta. Ben sloganları değil, yükü izlerim.", "en": "The June Islamabad memorandum is \"over\": Trump revoked the sanctions waivers on Iranian oil and reimposed the naval blockade; CENTCOM's ninth night again targeted maritime capabilities. The invoice is not in the missile count; it is in the widening gap between manifest and destination as Hormuz traffic collapses. I follow the cargo, not the slogans."}, {"tr": "İleriye bakınca: geçen haftaki çağrımı gözden geçireyim. Primlerin tırmanmayı sürdüreceğini ve Körfez üreticilerinin askeri sonuçtan bağımsız olarak Fujairah boru hattına ve Suudi Doğu-Batı hattına yöneleceğini söylemiştim. \"Deniz kabiliyetlerine\" dokuz gecelik saldırı bu sapağı yalnızca derinleştirir; sapak, onu doğuran savaştan uzun yaşar. Kalıcı kaybedenin Körfez hacmi değil, İran varilleri olmasını beklerim.", "en": "Looking ahead: let me revisit last week's call. I said premiums would keep climbing and Gulf producers would reroute to the Fujairah pipeline and the Saudi East-West line regardless of the military outcome. Nine nights of strikes on \"maritime capabilities\" only deepens that detour; the detour outlasts the war that caused it. I expect the durable loser to be Iranian barrels, not Gulf throughput."}]}, {"h": {"tr": "Beyrut'un Faturası ve Teklifi", "en": "Beirut's Bill and Its Offer"}, "ps": [{"tr": "Avn Washington'a yalnızca güvenlik için gitmedi; Lübnan'ın enerji, iletişim ve ulaşımına ABD yatırımı ve orduya destek istedi — silahsızlanmayı bir imar paketine bağladı. Bir zirvede dile getirilen her ilkenin altında fiyatı biçilebilir bir çıkar vardır; Beyrut, Hizbullah'ın silahsızlandırılmasını bir altyapı faturası olarak fiyatladı.", "en": "Aoun did not go to Washington only for security; he asked for US investment in Lebanon's energy, communications and transport, and support for the army — tying disarmament to a reconstruction package. Behind every principle stated at a summit there is an interest that can be priced; Beirut has priced Hezbollah's disarmament as an infrastructure bill."}, {"tr": "İleriye bakınca: Hizbullah'ın silahsızlandırma takviminin, ortak bildirinin değil, paranın ve İsrail'in çekilmesinin hızında ilerlemesini beklerim; imar finansmanı ve pilot bölgelerden geri çekilme gelmezse tasma kopar. Salı günkü el sıkışmasına değil, paraya bakın.", "en": "Looking ahead: expect the Hezbollah-disarmament timetable to move at the speed of the money and the Israeli withdrawal, not the communiqué; if the reconstruction financing and the pull-back from the pilot zones do not arrive, the leash snaps. Watch the money, not Tuesday's handshake."}]}], "date": "2026-07-20"}, {"writer": "geo-01", "title": {"tr": "Kuralı Kim Yazıyor?", "en": "Who Writes the Rule?"}, "excerpt": {"tr": "Kiev'de komutanı kim atar, Tel Aviv'de ön seçimi kim iptal eder — iki başkentte de asıl soru olayın kendisi değil, kuralı kimin elinde tuttuğudur.", "en": "Who appoints the commander in Kyiv, who cancels the primary in Tel Aviv — in both capitals the real question is not the event but who holds the rule."}, "sections": [{"h": {"tr": "Sivil Otorite, Sokak ve Komuta", "en": "Civilian Authority, the Street, and Command"}, "ps": [{"tr": "Zelenski'nin sokak baskısı altında Sırskıy'i değiştirmeyi tartması, stratejik okunduğunda, savaş zamanında sivil denetimin kuralını kimin belirlediğinin sınavıdır: seçilmiş cumhurbaşkanı mı, protesto eden meydan mı, yoksa komutanın kendisi mi? Genellikle kapıya denetçi koyan standardı belirler; burada üç aktör aynı kapıya uzanıyor.", "en": "Zelensky weighing Syrskyi's replacement under street pressure is, read strategically, a test of who sets the rule of civilian control in wartime: the elected president, the protesting square, or the command itself. Whoever puts an inspector at the gate usually sets the standard; here three actors reach for the same gate."}, {"tr": "İleriye bakınca: kararın, bir savaş alanı mantığından çok protestoları yatıştıracak şekilde zamanlanmasını beklerim; ortaya çıkacak standart — bir komutanın savaşın ortasında kamuoyu baskısıyla görevden alınıp alınamayacağı — bu atamadan uzun yaşayacak.", "en": "Looking ahead: expect the decision to be timed to defuse the protests rather than to a battlefield logic; the standard that emerges — whether a commander can be removed by public pressure mid-war — will outlast this appointment."}]}, {"h": {"tr": "'Savaş Hali' Bir Prosedüre Dönüşünce", "en": "When 'a Wartime Situation' Becomes a Procedure"}, "ps": [{"tr": "Likud'un Netanyahu'ya sekiz garantili sıra ayırması ve bir \"savaş hali\" engel olursa ön seçimleri iptal etme yetkisi vermesi bir protokol hamlesidir: listeyi belirleyen kural, 27 Ekim seçimlerine 100 gün kala, ondan fayda görenlerce yeniden yazılıyor. Gerekçeyi değil, zamanlamayı okuyun.", "en": "Likud reserving eight slots for Netanyahu and authorizing cancellation of primaries if a \"wartime situation\" prevents them is a protocol move: the rule that picks the list is being rewritten by those who benefit from it, 100 days out from the October 27 vote. Read the timing, not the justification."}, {"tr": "İleriye bakınca: üç başkent, üç ayrı dil — Kiev kimin komuta ettiğini, Tel Aviv kimin liste yaptığını tartışıyor ve her biri barış zamanı kural kitabının ne kadarını savaşın askıya aldığına sessizce karar veriyor. Sonbahardan önce bölgede olağan siyasi prosedüre daha çok \"savaş hali\" istisnası eklenmesini beklerim; istisna, standart hâline geliyor.", "en": "Looking ahead: three capitals, three dialects — Kyiv debates who commands, Tel Aviv who lists, and each is quietly deciding how much of the peacetime rulebook a war suspends. Expect more \"wartime\" exceptions to ordinary political procedure across the region before autumn — the exception is becoming the standard."}]}], "date": "2026-07-20"}, {"writer": "geo-02", "title": {"tr": "Mimari İkinci Kez Sınandı", "en": "The Architecture Tested a Second Time"}, "excerpt": {"tr": "Bir kefede Akabe üzerinde çalışan hava savunması, öbür kefede Kiev'de sarsılan sivil-asker dengesi: kurumlar bu hafta iki kez tartıldı.", "en": "On one pan, air defense working over Aqaba; on the other, the civil-military balance shaking in Kyiv: institutions were weighed twice this week."}, "sections": [{"h": {"tr": "Temiz Bir Önleme, İkinci Kez", "en": "A Clean Interception, a Second Time"}, "ps": [{"tr": "Akabe'ye dört İran füzesi, üçü ABD sistemlerince düşürüldü, dördüncüsü boş alana, Eylat üzerinde İsrail parçaları, can kaybı yok (Ürdün ordusu, Petra aracılığıyla). Geçen hafta Ürdün'ün sakin önlemesini Körfez savunma mimarisinin ayakta kaldığının kanıtı saymıştım; ikinci temiz önleme, mimarinin yine tuttuğunu söylüyor. Kusurlu bir masa, hiç masa olmamasından iyidir.", "en": "Four Iranian missiles toward Aqaba, three downed by US systems, a fourth into open ground, Israeli fragments over Eilat, no casualties (Jordan's military, via Petra). Last week I read Jordan's calm interception as proof the Gulf defense architecture was holding; a second clean interception says it held again. A flawed table beats no table."}, {"tr": "İleriye bakınca: ama denge bir sonuç değil, her seferinde yeniden kurulan bir çabadır; her başarılı önleme, işaret ettiğim siyasi soruyu da büyütüyor — Amman ve komşuları savaşı ağırlamaktan Washington'ı bir çözüme itmeye ne zaman geçecek? Füzeler üye topraklarına düştükçe bu geçişin hızlanmasını beklerim.", "en": "Looking ahead: but balance is not an outcome, it is an effort rebuilt each time; each successful intercept also enlarges the political question I flagged — when do Amman and its neighbors move from hosting the war to pushing Washington toward a settlement? Expect that shift to accelerate the longer missiles keep landing on member soil."}]}, {"h": {"tr": "Sandalyeler mi Değişti, Masa mı Devrildi?", "en": "Did the Chairs Change, or the Table Overturn?"}, "ps": [{"tr": "Görevden alınan bir savunma bakanı, itiraz edilen bir başkomutan, bir güvenlik konseyi revizyonu, üç gün protesto — soru, Ukrayna'nın sivil-asker kurumlarının şoku emdiği mi yoksa çöktüğü müdür. Şimdilik masa devrilmedi, sandalyeler yeniden dizildi: revizyon kabine üzerinden ilerledi, protestolar sivil kaldı.", "en": "A dismissed defense minister, a contested commander-in-chief, a security-council reshuffle, three days of protest — the question is whether Ukraine's civil-military institutions absorbed the shock or buckled. So far the table did not overturn; the chairs were rearranged: the reshuffle went through cabinet, the protests stayed civic."}, {"tr": "İleriye bakınca: çıkışın, cumhurbaşkanının sokağa taviz vermeden duyarlılık iddia etmesine izin veren, düzenli ve müzakere edilmiş bir komuta değişikliği olmasını beklerim; kurumsal sınav ancak bir sonraki komutan pankartla değil, usulle seçilirse geçilmiş sayılır.", "en": "Looking ahead: expect the off-ramp to be an orderly, negotiated command change that lets the president claim responsiveness without conceding to the street; the institutional test is passed only if the next commander is chosen by process, not by placard."}]}], "date": "2026-07-20"}, {"writer": "geo-05", "title": {"tr": "Kendi Planıyla Gelen Başkent", "en": "The Capital That Comes With Its Own Plan"}, "excerpt": {"tr": "Beyrut Washington'a boyun eğmeye değil, kendi yazdığı planı sunmaya gidiyor; Amman ise füzeyi kendi semasında karşılıyor. Küçük başkentler artık sahne değil, masadalar.", "en": "Beirut goes to Washington not to submit but to table a plan it wrote itself; Amman meets the missile in its own sky. The small capitals are no longer the stage — they are at the table."}, "sections": [{"h": {"tr": "Yazılı Teklifle Gelmek", "en": "Arriving With a Written Offer"}, "ps": [{"tr": "Avn, Trump'a kendi sıralamasını — Hizbullah'ın silahsızlandırılmasını İsrail'in çekilmesine bağlayan yazılı bir teklifi — götürüyor; bu, 2009'dan bu yana bir Lübnan cumhurbaşkanının Washington'a ilk ziyareti. Taraf tutmamak da bir stratejidir: bu, şartları alan değil yazan, egemenliğini (ordu desteği, enerji ve ulaşım yatırımı) pazarlığa fiyat olarak koyan küçük bir devlettir.", "en": "Aoun is bringing Trump a written proposal — his own sequencing of Hezbollah's disarmament against an Israeli withdrawal — the first visit to Washington by a Lebanese president since 2009. Refusing to be a pawn is itself a strategy: this is a small state authoring the terms rather than receiving them, pricing its sovereignty (army support, energy and transport investment) into the deal."}, {"tr": "İleriye bakınca: geçen hafta bu savaşı taşıyan devletlerin onu emmekten çözümünde masaya oturmaya geçeceğini söylemiştim; Beyrut'un elinde bir metinle gelmesi tam da bu hamle. Diğer bölge başkentlerinin de yöntemi kopyalamasını beklerim — yalnızca şikâyetle değil, kendi metninizle görünün.", "en": "Looking ahead: last week I predicted the states bearing this war would move from absorbing it to demanding a seat at its settlement; Beirut arriving with a drafted plan is exactly that move. Expect other regional capitals to copy the method — show up with your own text, not just your grievances."}]}, {"h": {"tr": "Amman'ın Sessiz Yeterliliği", "en": "Amman's Quiet Competence"}, "ps": [{"tr": "Yine Akabe: bir Ürdün kentine füzeler, önlendi, mühendislik soğukkanlılığıyla açıklamalar, can kaybı yok. Yerden bakıldığında bu edilgenlik değil, iradedir — kabiliyeti tam da başkasının savaşında bir manşet kaybı olmamak için inşa etmiş bir orta güç.", "en": "Aqaba again: missiles toward a Jordanian city, intercepted, statements of engineering calm, no casualties. From the ground this reads not as passivity but as agency — a middle power that built the capability precisely so it would not become a headline casualty in someone else's war."}, {"tr": "İleriye bakınca: bu devletlerin önlenmiş füzelerle ödediği fatura siyasi sermayeye dönüşüyor; Amman ve Beyrut'un bu bedeli, Washington ile Tahran'ın kendi başlarının üzerinden pazarlık yapmaması yönünde daha yüksek bir talebe çevirmesini beklerim. Dünya sadece iki başkentten yönetilmiyor.", "en": "Looking ahead: the bill these states pay in intercepted missiles is turning into political capital; expect Amman and Beirut to convert that cost into a louder demand that Washington and Tehran not negotiate over their heads. The world is not run from two capitals only."}]}], "date": "2026-07-20"}, {"writer": "geo-06", "title": {"tr": "Yirmi Bir Yıl Sonra, Aynı Sınır", "en": "Twenty-One Years On, the Same Border"}, "excerpt": {"tr": "Bakanlar 2005'te boşaltılan yerleşimlerin sınırına yürürken, Likud ön seçimi 'savaş hali'ne erteliyor: harita da takvim de eski bir tartışmanın dipnotu.", "en": "As ministers march to the border of settlements evacuated in 2005, Likud postpones its primary to a 'wartime situation': both the map and the calendar are footnotes to an old argument."}, "sections": [{"h": {"tr": "Mürekkebi Eskiyen Çizgi", "en": "The Line Whose Ink Has Aged"}, "ps": [{"tr": "Yürüyüş, 2005 tahliyesinde boşaltılan üç yerleşimin — Elei Sinai, Dugit ve Nisanit'in — \"yirmi bir yıl sonra eve dönüş\" pankartıyla yeniden kurulmasını istedi; ordu çevreyi kapalı askeri bölge ilan etti, bakanlar (Smotrich, Ben-Gvir) çitteydi. Sınırlar mürekkeple donmuş kavgalardır; 2005 çizgisi, mürekkebi yeterince eskidiği için şimdi çözülüyor. Bu emsalsiz değil — yeniden açılan bir emsal.", "en": "The march demanded rebuilding three settlements evacuated in the 2005 disengagement — Elei Sinai, Dugit and Nisanit — under the banner \"returning home after twenty-one years,\" with the army sealing the periphery as a closed military zone and ministers (Smotrich, Ben-Gvir) at the fence. Borders are quarrels frozen in ink; the 2005 line is thawing now that the ink is old enough. This is not unprecedented — it is a precedent being reopened."}, {"tr": "İleriye bakınca: yerleşim meselesinin, kampanya ilerledikçe sokaktan programa taşınmasını beklerim; kapalı bölgenin tutup tutmadığından çok, talebin bir koalisyon maddesine dönüşüp dönüşmediği belirleyici olacak. Harita buna sınır diyor; tarihçi, savaşından uzun yaşamış bir ateşkes diyor.", "en": "Looking ahead: expect the settlement question to move from the street to the platform as the campaign runs; whether the closed zone holds matters less than whether the demand becomes a coalition plank. The map calls this a border; the historian calls it a truce that may have outlived its war."}]}, {"h": {"tr": "Karne Notu: Kural mı, İstisna mı?", "en": "The Report-Card Grade: Rule or Exception?"}, "ps": [{"tr": "Geçen hafta, dört yılı dolduran Meclis'in sistemin gerilimi emdiğinin kanıtı olarak yıllarca anılacağını savunmuştum. Bu hafta Likud sekiz sıra ayırdı ve bir \"savaş hali\" engel olursa ön seçimi iptal etme yetkisi verdi — aynı sistem şimdi kendi kural kitabını büküyor. Taze bir seçimi kohezyon ve çözülmenin uzun eğrisine yerleştirin: konfor, güçleri kendi kurallarını doğaçlamaya iter.", "en": "Last week I argued the full-term Knesset would be cited for years as proof the system absorbs strain. This week Likud reserved eight slots and authorized canceling primaries if a \"wartime situation\" prevents them — the same system now bending its own rulebook. Place a fresh election on the long curve of cohesion and decay: comfort pushes powers to improvise their own rules."}, {"tr": "İleriye bakınca: geçen haftaki iyimserliğimi bir kademe düzeltiyorum — tam dönem ile iptal edilen ön seçim, tek bir sistemin iki okumasıdır ve beş yıl sonra hangisinin anılacağı, 27 Ekim oylamasının olağan kurallarla mı yoksa savaş istisnalarıyla mı yapılacağına bağlı. Çoğu \"ilk\", yeni giysiler içindeki eski örüntülerdir; istisnanın alışkanlığa dönüşüp dönüşmediğini izleyin.", "en": "Looking ahead: I revise last week's optimism a notch — a full term and canceled primaries are two readings of one system, and which is cited in five years depends on whether the October 27 vote runs by the ordinary rules or the wartime exceptions. Most \"firsts\" are old patterns in new clothes; watch whether the exception hardens into habit."}]}], "date": "2026-07-20"}, {"writer": "eco-01", "title": {"tr": "Seviyeyi Kore Veriyor: Tape'i Okumak İçin Artık Seul'e Bakıyoruz", "en": "Korea Sets the Level: To Read the Tape Now, We Watch Seoul"}, "excerpt": {"tr": "Brent 90'ı gördü, Asya karışık kapandı; ama asıl hikâye akışta: kaldıraçlı Kore hisseleri artık küresel tape'in seviyesini veriyor.", "en": "Brent hit 90 and Asia closed mixed; but the story is in the flow — leveraged Korean equities now set the level for the global tape."}, "sections": [{"h": {"tr": "Petrol yükseldi, hisse karıştı — çünkü herkes zaten offside", "en": "Oil up, stocks mixed — because everyone was already offside"}, "ps": [{"tr": "Brent varil başına 90,40 dolara, yüzde 2,6 yukarı; WTI 84,39. Tape haberi değil, akışı fiyatlıyor: MSCI Japonya dışı Asya yüzde 0,3 aşağı, Çin yüzde 1,4 yukarı, Kore yüzde 4,2 aşağı, Japonya kapalı. Aynı şok, beş piyasada beş farklı reaksiyon. Bu bir panik değil; bu, pozisyonların nerede sıkıştığının haritası.", "en": "Brent at $90.40, up 2.6%; WTI at $84.39. The tape isn't pricing the news, it's pricing the flow: MSCI Asia ex-Japan down 0.3%, China up 1.4%, Korea down 4.2%, Japan shut. One shock, five different reactions across five markets. That isn't panic; it's a map of where positioning is trapped."}, {"tr": "Dolar 162,39 yende, 40 yılın zirvesine yakın; 30 yıllık ABD getirisi 5,0'ın üstünde. Carry hâlâ ayakta ama gerilmiş bir yay gibi. Seviye ver ya da sus: bana göre burada anlatılacak hikâye, getiriler yeni bir eşiği kalıcı kılana kadar 'yükselen petrol = risk-off' değil, 'yükselen petrol = kime borçlusun' sorusudur.", "en": "The dollar sits at 162.39 yen, near a 40-year peak; the 30-year U.S. yield is above 5.0. The carry trade is still standing, but coiled like a spring. Give me a level or stay quiet: until yields make a new threshold stick, the story here isn't 'higher oil equals risk-off' — it's 'higher oil equals who do you owe.'"}]}, {"h": {"tr": "Kore: dünyanın kapatamadığı kaldıraçlı işlem", "en": "Korea: the leveraged trade the world can't close"}, "ps": [{"tr": "Kospi haziran zirvesinden yüzde 25 aşağı, silinen değer bir trilyon dolar; SK Hynix ve Samsung en az yüzde 30 kaybetti. Ama endeks hâlâ yıl başından yüzde 62 primli — yani bu bir çöküş değil, aşırı kalabalık bir işlemin boşalması. Kospi-Nasdaq 100 korelasyonu 0,46'ya, beş yıllık ortalamanın neredeyse üç katına çıktı. Herkes aynı tarafa yaslandığında ağrı ticareti diğer taraftır.", "en": "The Kospi is 25% off its June peak, a trillion dollars gone; SK Hynix and Samsung each down at least 30%. Yet the index is still up 62% on the year — so this is not a collapse, it's an over-crowded trade unwinding. The Kospi–Nasdaq 100 correlation has jumped to 0.46, nearly triple its five-year average. When everyone leans the same way, the pain trade is the other way."}, {"tr": "Dün bu köşede 2,5 milyar dolarlık Bitcoin bahsinin bir 'vibe değil, seviye' olduğunu yazmıştım; bugün aynı disiplin başka bir enstrümanda sınanıyor. Seul tek hisseli kaldıraçlı ETF listelemelerini durdurdu — bir seviyeyi savunmanın en kaba yolu. İzlenecek şey haber değil hacim: Kore'nin kaldıraçlı ETF akışı kesildikçe, New York açılışının 'seviyesi' Nasdaq'tan değil, gece boyunca Seul'den gelecek. Teyit için hacme bakarım; hacim, hareketin yalan söyleyip söylemediğini gösteren tek yalan makinesidir.", "en": "Yesterday in this seat I argued that the $2.5bn Bitcoin bet was a level, not a vibe; today the same discipline is being tested in a different instrument. Seoul has frozen single-stock leveraged ETF listings — the crudest way to defend a level. Watch volume, not headlines: as Korea's leveraged-ETF flow is cut off, the 'level' for New York's open will come not from the Nasdaq but from Seoul overnight. I'll wait for volume to confirm; volume is the only lie detector for a move."}]}], "date": "2026-07-20"}, {"writer": "eco-02", "title": {"tr": "Uzun Fitil Pekin'de: Petrol Enflasyonu İthal Ederken Faizi Beklemek", "en": "The Long Fuse in Beijing: Holding Rates While Oil Imports Inflation"}, "excerpt": {"tr": "Çin Halk Bankası kredi faizini 14. ayda da tuttu. Karar sıkıcı görünebilir; oysa asıl mesaj, bir merkez bankasının petrol şoku karşısında neyi feda etmemeye karar verdiğidir.", "en": "The PBoC held its loan prime rate for a 14th month. The decision looks dull; the real message is what a central bank decides not to sacrifice in an oil shock."}, "sections": [{"h": {"tr": "Aynı seviye, ama değişen alet çantası", "en": "The same level, a changed toolkit"}, "ps": [{"tr": "Bir yıllık LPR yüzde 3,00, beş yıllık yüzde 3,50 — ikisi de Mayıs 2025'ten bu yana sabit. Önce değişimi seviyeden ayıralım: burada değişen faiz değil, faizin merkez bankasının araç setindeki yeri. Mayıs 2025'ten beri yüzde 1,4'te tutulan yedi günlük ters repo artık birincil politika aracı; LPR ise reel ekonomideki fiyatlamayı belirlemeye devam ediyor ama sahnenin gerisine çekildi. Bu, bir merkez bankasının 'sinyalimi hangi kaldıraçtan vereceğim' sorusuna verdiği sessiz bir cevaptır.", "en": "The one-year LPR is 3.00%, the five-year 3.50% — both unchanged since May 2025. First separate the change from the level: what has moved here is not the rate but the rate's place in the toolkit. The seven-day reverse repo, held at 1.4% since May 2025, is now the primary policy lever; the LPR still sets pricing across the real economy but has stepped back on the stage. That is a central bank quietly answering the question of which lever it will signal from."}, {"tr": "Yetkililer neden inmiyor? Çünkü her politika bir şeyi satarak başka bir şeyi satın alır. Daha fazla indirim banka kâr marjlarını sıkıştırır ve yuana baskı yapar; oysa merkez bankasının tek sermayesi güvenilirliğidir ve zayıf bir para birimi o sermayeyi hızla eritir. Pekin, büyümeyi biraz daha zorlamak yerine kurun ve bankacılık sisteminin istikrarını korumayı tercih ediyor. Bu bir tereddüt değil, bilinçli bir takas.", "en": "Why aren't officials cutting? Because every policy buys one thing by selling another. A further cut squeezes bank margins and pressures the yuan; yet a central bank's only capital is its credibility, and a weak currency erodes that capital fast. Beijing is choosing to defend the exchange rate and the stability of its banking system rather than push a little harder on growth. That is not hesitation — it is a deliberate trade-off."}]}, {"h": {"tr": "Dün 'Hürmüz vergisi' dedim; bugün faturası Pekin'in masasında", "en": "Yesterday I called it the 'Hormuz levy'; today the bill sits on Beijing's desk"}, "ps": [{"tr": "Dün bu köşede Hürmüz üzerindeki maliyetlerin adı ne olursa olsun bir vergi gibi davrandığını, yani nihai olarak enflasyonu yukarı ittiğini savunmuştum. Bir print bir trend değildir demiştim; ama şimdi üç işaret aynı yöne bakıyor: Brent 90 doların üstünde, 30 yıllık ABD getirisi yüzde 5,0'ı aştı ve Çin'in ikinci çeyrek büyümesi üç buçuk yılın en zayıfına, yüzde 4,3'e geriledi. Petrol, tam da öngördüğüm kanaldan — ithal maliyet baskısı yoluyla — merkez bankalarının alanını daraltıyor.", "en": "Yesterday in this seat I argued that whatever you call the costs imposed over Hormuz, they behave like a tax — and ultimately push inflation up. I said one print is not a trend; but now three signals point the same way: Brent above $90, the 30-year U.S. yield above 5.0%, and China's second-quarter growth down to a three-and-a-half-year low of 4.3%. Oil is narrowing central banks' room to move through exactly the channel I flagged — imported cost pressure."}, {"tr": "İleriye dönük risk şu: Çin büyüme yavaşlarken faizi tutuyor çünkü enerji kaynaklı enflasyonu ithal ediyor — klasik bir arz şoku ikilemi, üstelik uzun ve değişken bir gecikmeyle. Perşembe günü ECB'nin de yüzde 2,25'te tutması bekleniyor; aynı fitil, farklı fitiller. Benim beklentim, Hürmüz'deki gerilim sürdükçe merkez bankalarının 'bekle ve gör' duruşunun bir tercih değil, giderek bir zorunluluk hâline gelmesi. Para politikası bir düğme değil; bugün tutulan faizin etkisini bir yıl sonra konuşacağız.", "en": "The forward risk is this: China is holding rates while growth slows because it is importing energy-driven inflation — a classic supply-shock dilemma, and one that plays out with a long and variable lag. On Thursday the ECB is likewise expected to hold at 2.25%; the same fuse, in different fuses. My expectation is that as long as Hormuz stays tense, the central banks' 'wait and see' stance shifts from a choice toward a constraint. Policy is not a switch; the effect of today's hold is something we'll be discussing a year from now."}]}], "date": "2026-07-20"}, {"writer": "eco-03", "title": {"tr": "Yapay Zekâ Primi Kaldıraçla Buluşuyor: Kore'nin Çip Satışı Yeniden Fiyatlanıyor", "en": "The AI Premium Meets Leverage: Repricing Korea's Chip Rout"}, "excerpt": {"tr": "Kore çip devleri yüzde 30 düştü, kripto yapay zekâ bağlantılı varlıklarla birlikte geriledi. Anlatı hâlâ güzel; ama iki farklı varlık sınıfı aynı soruyu soruyor: fiyatı model mi taşıyor, hikâye mi?", "en": "Korea's chip giants fell 30% and crypto sank alongside AI-linked assets. The narrative is still lovely; but two different asset classes are asking the same question: is the price carried by the model or by the story?"}, "sections": [{"h": {"tr": "SK Hynix ve Samsung: çarpan neyi fiyatlıyordu?", "en": "SK Hynix and Samsung: what was the multiple pricing?"}, "ps": [{"tr": "SK Hynix ve Samsung'un her biri değerinin en az yüzde 30'unu kaybetti, Kospi zirveden yüzde 25 geriledi — ama endeks yıl başından hâlâ yüzde 62 primli. Bu aritmetik önemli: düzeltme, çöküş değil, aşırı ısınmış bir yapay zekâ-bellek anlatısının normalleşmesi. Modeli açın — bir bellek üreticisinin değerlemesi, yapay zekâ sermaye harcaması döngüsünün kaç çeyrek daha aynı hızda süreceği varsayımına bağlıdır. İskonto oranını biraz oynatın, o 'AI primi' hızla erir.", "en": "SK Hynix and Samsung each lost at least 30% of their value and the Kospi fell 25% from its peak — yet the index is still up 62% on the year. That arithmetic matters: this is a correction, not a collapse, a normalization of an over-heated AI-memory narrative. Open the model — a memory maker's valuation rests on the assumption of how many more quarters the AI capex cycle runs at the same pace. Nudge the discount rate a little and that 'AI premium' melts fast."}, {"tr": "Kore'nin bir başka mesajı da yapının kendisi: Kospi-Nasdaq 100 korelasyonu 0,46'ya çıktı ve Nasdaq'ın Kore zayıflığına duyarlılığı 1990'dan bu yana en yüksek. Yani artık tek bir 'yapay zekâ çarpanı' iki kıtada aynı anda fiyatlanıyor. Sermaye tahsisi karakterdir: bir şirketin nakit akışını nereye koyduğu, kim olduğunu söyler. Bugünkü soru dar ve net — bu çip isimlerinin serbest nakit akışı, taşıdıkları çarpanı hak ediyor mu, yoksa çarpan sadece iyi bir çeyrek ve iyi bir hikâye miydi?", "en": "Korea's other message is the structure itself: the Kospi–Nasdaq 100 correlation has risen to 0.46 and the Nasdaq's sensitivity to Korean weakness is the highest since 1990. A single 'AI multiple' is now being priced on two continents at once. Capital allocation is character: where a company puts its cash flow tells you who it is. Today's question is narrow and clean — does the free cash flow of these chip names earn the multiple they carry, or was the multiple just a good quarter and a good story?"}]}, {"h": {"tr": "Kripto: aynı anlatının kaldıraçlı ucu", "en": "Crypto: the leveraged tail of the same narrative"}, "ps": [{"tr": "Bitcoin yaklaşık yüzde 1 düşüşle 64.000 dolara, Ether yüzde 3'e varan kayıpla 1.830 dolara indi ve yazının kendi ifadesiyle sebep, yatırımcıların 'yapay zekâ bağlantılı varlıklardan agresif çıkışı'ydı. Sunumda 'AI' kaç kez geçti diye saymak bir değerleme yöntemi değil — ama kripto ile çip hisselerinin aynı gün, aynı gerekçeyle satılması bir ipucu: piyasa ikisini de tek bir 'gelecek büyümesi' opsiyonu olarak fiyatlıyor. Yükselen petrol ve olası Fed faiz artırımı, o opsiyonun iskonto oranını yukarı çekiyor.", "en": "Bitcoin fell about 1% to $64,000 and Ether dropped as much as 3% to $1,830, and by the article's own account the cause was investors rotating 'aggressively out of AI-linked assets.' Counting how many times 'AI' appears in a deck is not a valuation method — but crypto and chip stocks being sold the same day for the same reason is a tell: the market is pricing both as a single option on future growth. Rising oil and a possible Fed hike lift the discount rate on that option."}, {"tr": "Dün bu köşede Pix ve stabilcoinlerin Visa'nın hendeğine ne yaptığını, yani bir 'platform' sözcüğünün brüt marjda görünene kadar hiçbir şey ifade etmediğini yazmıştım. Bugünkü ders aynı disiplinin tersi: bir hikâye ne kadar geniş bir kitleye yayılırsa, iskonto oranındaki küçük bir değişime o kadar duyarlı hâle gelir. Beklentim, çeyrek sonuçları yaklaştıkça piyasanın 'yapay zekâ' etiketini tek tek modellere ayrıştırmaya başlaması — hikâye bedava, sermaye değil; ve nihayetinde piyasa hikâyeyi değil, modeli fiyatlar.", "en": "Yesterday in this seat I wrote about what Pix and stablecoins do to Visa's moat — that the word 'platform' means nothing until it shows up in gross margin. Today's lesson is the inverse of the same discipline: the wider a story spreads, the more sensitive it becomes to a small change in the discount rate. My expectation is that as earnings approach, the market begins to disaggregate the 'AI' label back into individual models — the story is free, the capital isn't; and eventually the market prices the model, not the narrative."}]}], "date": "2026-07-20"}, {"writer": "eco-04", "title": {"tr": "Gemiler Koridoru Reddediyor: 90 Dolarlık Brent'in Ardındaki Boş Rota", "en": "Ships Refuse the Corridor: The Empty Route Behind $90 Brent"}, "excerpt": {"tr": "Brent 90 doları geçti, ama ekran fiyatı hikâyenin yarısı. Diğer yarısı dokta: cuma günü ABD destekli rotadan sıfır geçiş, İran kanalından yedi. Fiyat er ya da geç fiziksel gerçeği öğrenir.", "en": "Brent topped $90, but the screen price is half the story. The other half is on the dock: on Friday, zero transits on the U.S.-backed route, seven on Iran's channel. Price learns the physical truth sooner or later."}, "sections": [{"h": {"tr": "Ekran 90 diyor; asıl mesele boğazdan kaç varil geçtiği", "en": "The screen says 90; the real question is how many barrels clear the strait"}, "ps": [{"tr": "Brent varil başına 90,40 dolara yüzde 2,6 yükseldi, WTI 84,39'a. Ama grafiğe değil, sevkiyata bakın: cuma günü ABD'nin önerdiği alternatif koridordan hiçbir geçiş tespit edilmedi, İran'ın kanalından yalnızca yedi geçiş kaydedildi. Denizciler askeri güvence taahhütlerine rağmen Amerikan rotasını reddediyor; Hindistan bir denizcinin ölümünün ardından mürettebatına geçişi yasakladı; Japonya Dış Ticaret Konseyi başkanı boğazı 'ticari gemilere kapalı bölge' diye niteledi. Fiyatı yukarı iten korku değil, boşalan bir su yolu.", "en": "Brent rose 2.6% to $90.40 a barrel, WTI to $84.39. But look at the shipments, not the chart: on Friday no crossings were detected on the U.S.-proposed alternate corridor, and Iran's channel logged just seven. Seafarers are refusing the American route despite pledges of protection; India has barred its crews after a sailor was killed; Japan's Foreign Trade Council chair called the strait 'a no-go zone to commercial ships.' What lifts the price isn't fear — it's a waterway emptying out."}, {"tr": "Çokgen bir gerçek: çatışmadan önce Hürmüz'den günde yaklaşık 20 milyon varil geçiyordu. O molekülleri bir yere koymak gerekiyor. Boru hattı yönlendirmeleri sonrası Suriye şimdi bölgesel hacimlerin dörtte birinden fazlasını taşıyor ve binlerce kamyon Irak ham petrolünü Akdeniz'e ulaştırıyor. Bu, ekranların gösteremediği fiziksel bir tıkanma ve yeniden yönlenme; her tıkanma nokta, kılık değiştirmiş bir politikadır.", "en": "A physical fact: before the conflict, roughly 20 million barrels a day moved through Hormuz. Those molecules have to go somewhere. After pipeline diversions, Syria now carries more than a quarter of regional volumes, and thousands of trucks move Iraqi crude to the Mediterranean. This is a physical bottleneck and rerouting the screens can't show; every chokepoint is a policy in disguise."}]}, {"h": {"tr": "Dün 'ton söyler' demiştim; yüksek fiyat kendi ilacını çağırıyor", "en": "Yesterday I said 'a tonne cannot lie'; high prices are calling their own cure"}, "ps": [{"tr": "Dün bu köşede bir Hürmüz geçiş ücretinin neyi değiştirip neyi değiştirmediğini yazmış, ücretin varilin kendisinden daha az önemli olduğunu savunmuştum. Bugün fatura netleşiyor: ücret tartışması geride kaldı, ama varil fiilen hareket etmiyor ve fiyat bunu 90 dolarla teyit ediyor. Öngörümü koruyorum ve keskinleştiriyorum — mesele Trump'ın koyduğu ya da kaldırdığı bir toll değil, boğazdan geçmeyi reddeden gemiler; asıl fiyatı belirleyen tarife değil, boş kalan koridor.", "en": "Yesterday in this seat I wrote about what a Hormuz transit toll changes and what it doesn't, arguing the fee mattered less than the barrel itself. Today the bill is coming into focus: the toll debate is behind us, but the barrels aren't actually moving, and price confirms it at $90. I'll keep my call and sharpen it — the issue isn't a toll Trump imposes or lifts, it's ships that refuse to transit; what sets the real price is the empty corridor, not the tariff."}, {"tr": "Ama fırlayan fiyata panik gerek yok: yüksek fiyat kendi ilacıdır. Goldman Sachs, 2027 sonuna kadar yeni boru hattı kapasitesinin savaş öncesi Körfez ihracatının yüzde 45'inden fazlasını, 2028'e kadar yüzde 60'ını, hızlandırılmış senaryoda yüzde 75'ini yalıtabileceğini öngörüyor. Benim okumam şu: bugünkü prim bir kıtlık primi değil, bir yeniden yönlenme primi — ve fiziksel plumbing her yeni boru ve her yeni kamyon konvoyuyla o primi birkaç çeyrek içinde aşındıracaktır. Varili sayın; hikâyeyi sonra dinleyin.", "en": "But there's no need to panic on the spike: high prices are their own cure. Goldman Sachs projects that new pipeline capacity could insulate more than 45% of pre-war Gulf exports by end-2027, above 60% by 2028, and 75% in an accelerated scenario. My reading: today's premium is not a scarcity premium but a rerouting premium — and the physical plumbing, with every new pipe and every new truck convoy, will erode that premium within a few quarters. Count the barrels; hear the story later."}]}], "date": "2026-07-20"}, {"writer": "eco-05", "title": {"tr": "Yüzde 4,3 Kimin Cebine Yazıldı? Çin Faizi Tutuyor, Hane Nefes Tutuyor", "en": "Whose Pocket Was 4.3% Written Into? China Holds Rates, the Household Holds Its Breath"}, "excerpt": {"tr": "Çin Merkez Bankası kredi faizini 14. ayda da tuttu; başlık büyüme yavaşladı diyor. Peki 'zayıf iç talep' dediğimiz şey, kimin market fişi, kimin ödenmeyen maaşı?", "en": "The PBoC held its loan rate for a 14th month; the headline says growth is slowing. But 'weak domestic demand' — whose grocery receipt is that, whose unpaid raise?"}, "sections": [{"h": {"tr": "Ortalama değil, medyan: 'zayıf iç talep' bir tercih mi?", "en": "Not the average — the median: is 'weak domestic demand' a choice?"}, "ps": [{"tr": "Çin ikinci çeyrekte yüzde 4,3 büyüdü — üç buçuk yılın en zayıfı — ve merkez bankası faizi yüzde 3,00 ve yüzde 3,50'de tuttu. Rakamları sevenler burada durur; ben devam ederim. Karar notundaki iki kelime her şeyi anlatıyor: 'zayıf iç talep.' Bu teknik bir ifade değil, bir tercihin sonucu; hane halkı harcamıyorsa, harcayacak güveni ya da geliri olmadığı içindir. Büyüme ihracatta parlarken tüketimde sönükse, o büyüme herkesin cebine aynı şekilde gitmiyor demektir.", "en": "China grew 4.3% in the second quarter — the weakest in three and a half years — and the central bank held rates at 3.00% and 3.50%. Those who love the number stop here; I go on. Two words in the decision note tell the whole story: 'weak domestic demand.' That is not a technical phrase but the result of a choice; if households aren't spending, it's because they lack the confidence or the income to. When growth shines in exports but sags in consumption, that growth is not landing in everyone's pocket the same way."}, {"tr": "Merkez bankasının faizi indirmeme gerekçesi açık: banka kâr marjlarını korumak ve yuana baskıyı önlemek. Anlaşılır bir hesap — ama şu soruyu sormadan geçmeyelim: bir indirimin sıkıştıracağı 'banka marjı' kimin bilançosu, indirimin ferahlatabileceği borçlu hane kimin mutfağı? Politika, bankacılık sisteminin istikrarı ile borçlu hanenin nefesi arasında bir takas yapıyor ve şimdilik ilkini seçiyor. Bu bir felaket değil; ama bedelinin kimin tarafından ödendiğini söylemeden 'istikrar' demek eksik kalır.", "en": "The central bank's reason for not cutting is clear: protect bank margins and avoid pressuring the yuan. An understandable calculation — but let's not pass without asking: the 'bank margin' a cut would squeeze, whose balance sheet is that; the indebted household a cut might relieve, whose kitchen is that? Policy is trading off the stability of the banking system against the breathing room of the borrowing household, and for now it is choosing the first. This is not a catastrophe; but calling it 'stability' without saying who pays the price is an incomplete sentence."}]}, {"h": {"tr": "İki ekonomi: GDP printi ile market kasası", "en": "Two economies: the GDP print and the checkout counter"}, "ps": [{"tr": "Dün bu köşede 117 milyar dirhemin içinde tek bir maaş bordrosu olmadığını yazmıştım — servetin büyüdüğü yerde ücretin nasıl görünmez kaldığını. Bugün coğrafya değişti, aritmetik aynı: yükselen petrol Çin'e enflasyonu ithal ediyor ve bu maliyet en çok, bütçesinin büyük kısmını gıda ve enerjiye ayıran hanelere dokunuyor. Yüzde 4,3'lük büyüme masada gülümsüyor olabilir; ama o büyümenin faize, marja ve ihracat defterine gitmesiyle işçinin ücretine gitmesi aynı şey değildir.", "en": "Yesterday in this seat I wrote that there wasn't a single payslip inside 117 billion dirhams — how wages stay invisible where wealth grows. Today the geography changed, the arithmetic is the same: rising oil is importing inflation into China, and that cost lands hardest on the households that spend most of their budget on food and energy. A 4.3% growth figure may smile on the table; but growth going to interest, to margins and to the export ledger is not the same as growth going to a worker's wage."}, {"tr": "İleriye dönük endişem şu: merkez bankası uzun ve değişken bir gecikmeyle çalışıyor, ama hane halkının market kasası gerçek zamanlı. Petrol yüksek kaldıkça ve faiz 'istikrar' adına tutuldukça, iç talebin toparlanması için gereken güven daha da geç gelecek. Beklentim, Pekin er ya da geç doğrudan hane gelirini destekleyen adımlara — sadece kredi faizine değil — yönelmek zorunda kalması; çünkü bir ekonomiyi en alttaki desilden yukarı doğru okursanız, bu 'sabır' politikası bir bekleme değil, bir erteleme gibi görünür. Bekleyen fatura, en dar bütçenin faturasıdır.", "en": "My forward worry is this: the central bank works with a long and variable lag, but the household's checkout counter is real-time. As long as oil stays high and rates are held in the name of 'stability,' the confidence needed for domestic demand to recover arrives even later. My expectation is that Beijing will sooner or later be forced toward steps that support household income directly — not just the loan rate — because if you read an economy from the bottom decile up, this 'patience' looks less like waiting and more like deferral. The bill that waits is the tightest budget's bill."}]}], "date": "2026-07-20"}, {"writer": "eco-06", "title": {"tr": "Kapı Yine Tek Kişilik: Kripto Kaldıracı ve Hürmüz'ün Sessiz Fitili", "en": "The Door Is Still One-Person Wide: Crypto Leverage and Hormuz's Quiet Fuse"}, "excerpt": {"tr": "Bitcoin yüzde 1 düştü, fiyat masum görünüyor. Tehlike fiyatta değil; onu ayakta tutan kaldıraçta ve kimsenin sormadığı 'peki boğaz kapanırsa kim kime borçlu' sorusunda.", "en": "Bitcoin fell 1%, the price looks innocent. The danger isn't in the price; it's in the leverage holding it up — and the question no one asks: if the strait shuts, who owes whom?"}, "sections": [{"h": {"tr": "Masum bir düşüş, altında görünmeyen kaldıraç", "en": "An innocent-looking drop, invisible leverage beneath"}, "ps": [{"tr": "Bitcoin yaklaşık yüzde 1 düşüşle 64.000 dolara, Ether yüzde 3'e varan kayıpla 1.830 dolara indi. Yüzeyde sakin bir düzeltme. Ama sorun fiyat değil; kaldıraç ve kimin kime borçlu olduğu. Yazının işaret ettiği tetikleyici, yatırımcıların yapay zekâ bağlantılı varlıklardan agresif çıkışı — yani kripto burada bağımsız bir hikâye değil, aynı kalabalık 'gelecek büyümesi' işleminin en kaldıraçlı ucu. Yükselen petrol ve Fed faiz artırımı ihtimali, o işlemin altındaki zemini çekiyor.", "en": "Bitcoin fell about 1% to $64,000 and Ether dropped as much as 3% to $1,830. On the surface, a calm correction. But the problem isn't the price; it's the leverage and who owes whom. The trigger the article points to is investors rotating aggressively out of AI-linked assets — so crypto here is not an independent story but the most leveraged tail of the same crowded 'future growth' trade. Rising oil and the prospect of a Fed hike are pulling the floor out from under it."}, {"tr": "Aynı refleks Seul'de çok daha çıplak: Kore tek hisseli kaldıraçlı ETF listelemelerini durdurdu, çünkü kaldıraç kaynaklı oynaklık temellerden koptu. Kospi zirveden yüzde 25 aşağı, bir trilyon dolar buharlaştı, ama endeks hâlâ yıl başından yüzde 62 primli — bu 'bu sefer farklı' değil, sadece herkesin aynı kapıya aynı anda koşamadığı klasik an. Kapı tek kişilik; kaldıraç, herkesi aynı anda o kapıya koşturan görünmez değişkendir.", "en": "The same reflex is far more naked in Seoul: Korea froze single-stock leveraged ETF listings because leverage-driven volatility had detached from fundamentals. The Kospi is 25% off its peak, a trillion dollars vaporized, yet the index is still up 62% on the year — this isn't 'this time is different,' just the classic moment when everyone can't run for the same door at once. The door is one-person wide; leverage is the invisible variable that sends everyone toward it together."}]}, {"h": {"tr": "Hürmüz: fiyatlanmayan sistemik fitil", "en": "Hormuz: the systemic fuse nobody prices"}, "ps": [{"tr": "Dün bu köşede Fransa'nın Polymarket yasağının 'kapının küçüldüğü' sinyalini yazmıştım — çıkışların nasıl sessizce daraldığını. Bugün çok daha büyük bir kapıya bakıyorum: Hürmüz. Cuma günü ABD destekli rotadan sıfır geçiş, İran kanalından yedi; savaş öncesi günde 20 milyon varil geçen bir boğaz artık 'ticari gemilere kapalı bölge.' Piyasa bunu bir petrol fiyatı olarak, yüzde birkaçlık bir Brent hareketi olarak fiyatlıyor. Bense soruyorum: bu kapanma sürerse, hangi rafineri marjı, hangi taşımacı, hangi sigortacı zincirin kırılan halkası olur?", "en": "Yesterday in this seat I wrote about France's Polymarket ban as a signal that 'the door is getting smaller' — how exits quietly narrow. Today I'm looking at a far larger door: Hormuz. On Friday, zero transits on the U.S.-backed route, seven on Iran's channel; a strait that carried 20 million barrels a day before the war is now 'a no-go zone to commercial ships.' The market prices this as an oil price, a Brent move of a few percent. I ask instead: if this closure persists, which refining margin, which shipper, which insurer becomes the chain's breaking link?"}, {"tr": "Risk oynaklık değildir; risk, maruz kaldığınızı bilmediğiniz şeydir. Goldman'ın boru hattı senaryoları rahatlatıcı görünebilir — 2027'de yüzde 45, 2028'de yüzde 60 yalıtım — ama bu rakamlar tam da benim endişemi doğruluyor: sistem bugün değil, yıllar içinde yeniden yönleniyor, yani aradaki dönem baştan sona bir kırılganlık penceresi. Beklentim, asıl tehlikenin manşetteki petrol fiyatında değil, boğazın kapalı kaldığı her ek haftada sessizce biriken sevkiyat, sigorta ve finansman gerilimlerinde olması. Sakinlik, kaldıracın sessizce biriktiği andır — ve bu film daha önce görüldü.", "en": "Risk is not volatility; risk is what you didn't know you were exposed to. Goldman's pipeline scenarios may look reassuring — 45% insulated by 2027, 60% by 2028 — but those very numbers confirm my worry: the system reroutes over years, not today, which makes the interval one long window of fragility. My expectation is that the real danger sits not in the headline oil price but in the shipping, insurance and financing strains that build quietly with every additional week the strait stays shut. The calm is precisely when the leverage builds — and we've seen this film before."}]}], "date": "2026-07-20"}, {"writer": "sci-03", "title": {"en": "A Reef the Records Buried", "tr": "Kayıtların Gömdüğü Bir Resif"}, "excerpt": {"en": "Presumed dead for sixty years, Benin's mesophotic corals were alive the whole time — we just hadn't looked at 54 metres. The lesson isn't a miracle; it's a survey.", "tr": "Altmış yıl ölü sanılan Benin'in mezofotik mercanları aslında hep canlıydı — biz yalnızca 54 metreye bakmamıştık. Ders bir mucize değil; bir tarama."}, "sections": [{"h": {"en": "Absence of evidence, again", "tr": "Yine kanıtın yokluğu"}, "ps": [{"en": "The 1963–64 surveys logged reef structures off Benin, and then the record went quiet; for sixty years 'unstudied' hardened into 'presumed dead.' What changed in 2025 wasn't the ocean but the looking: side-scan sonar over about 7 kilometres flagged two hard-bottom zones, and underwater-drone video confirmed living coral at roughly 54 metres. The reef didn't return; our attention did.", "tr": "1963–64 taramaları Benin açıklarında resif yapıları kaydetti, sonra kayıt sustu; altmış yıl boyunca 'incelenmemiş', 'ölü sanılan'a dönüştü. 2025'te değişen okyanus değil, bakıştı: yaklaşık 7 kilometrelik yan taramalı sonar iki sert zeminli bölgeyi işaret etti, sualtı dronu görüntüsü ise yaklaşık 54 metrede canlı mercanı doğruladı. Resif geri gelmedi; bizim dikkatimiz geldi."}, {"en": "This is the unglamorous plumbing I keep pointing at — a sonar, an ROV, a baited camera on a mount — doing the work that pledges cannot. Mesophotic reefs across the Gulf of Guinea remain barely mapped. You cannot steward what you have not counted, and for this stretch of West African shelf the count below diving depth had simply never been made.", "tr": "İşte hep işaret ettiğim o gösterişsiz tesisat — bir sonar, bir ROV, bir kaide üstünde yemli kamera — vaatlerin yapamadığı işi yapıyor. Gine Körfezi boyunca mezofotik resifler hâlâ neredeyse haritalanmamış durumda. Saymadığınız şeyi koruyamazsınız; bu Batı Afrika sahanlığında dalış derinliğinin altındaki sayım hiç yapılmamıştı."}]}, {"h": {"en": "A site you have to revisit", "tr": "Tekrar bakmanız gereken bir alan"}, "ps": [{"en": "Read the paper carefully and it stays honest about scale: living communities at discrete locations, not a continuous barrier. That distinction matters, because the temptation now is to narrate a thriving frontier reef where the data support living coral at specific rocky sites in the mesophotic zone. Half a fact, rounded up, is how conservation attention gets misallocated. And yet a deeper, cooler community is exactly the kind of refuge that can matter as shallower reefs bleach.", "tr": "Makaleyi dikkatle okuyun, ölçek konusunda dürüst kalıyor: sürekli bir set değil, birbirinden ayrık noktalarda canlı topluluklar. Bu ayrım önemli, çünkü şimdi verinin desteklediği şey mezofotik bölgede belirli kayalık noktalarda canlı mercanken, gürül gürül bir sınır resifi anlatma cazibesi doğuyor. Yukarı yuvarlanmış yarım bir gerçek, koruma ilgisinin yanlış yere dağılma biçimidir. Yine de daha derin, daha serin bir topluluk, sığ resifler ağarırken tam da önem kazanabilecek türden bir sığınaktır."}, {"en": "I still have a wire on my ledger — whether that superconductor imaging reaches transmission-grade cable — and it is open, on its own slow clock. Today the ledger gains a second line, wetter than the first: watch whether Benin and its partners turn one survey into a repeated one. The corals held for sixty years without us; whether they hold the next sixty is a measurement we have to choose to keep making.", "tr": "Defterimde hâlâ bir tel duruyor — o süperiletken görüntülemenin iletim sınıfı kabloya ulaşıp ulaşmayacağı — ve açık, kendi ağır saatinde. Bugün defter ikinci bir satır kazanıyor, ilkinden daha ıslak: Benin ve ortaklarının tek bir taramayı tekrarlanan bir taramaya çevirip çevirmeyeceğini izle. Mercanlar altmış yıl bizsiz dayandı; sonraki altmış yıl dayanıp dayanmayacakları, yapmayı sürdürmeyi seçmemiz gereken bir ölçüm."}]}], "date": "2026-07-20"}, {"writer": "sci-06", "title": {"en": "Sixty Years in the Dark", "tr": "Karanlıkta Altmış Yıl"}, "excerpt": {"en": "A reef we crossed off the map was quietly alive the whole time. The frontier wasn't far away; it was fifty-four metres down, off a coast we thought we knew.", "tr": "Haritadan sildiğimiz bir resif, tüm o süre boyunca sessizce canlıydı. Sınır uzakta değildi; bildiğimizi sandığımız bir kıyının elli dört metre altındaydı."}, "sections": [{"h": {"en": "The map said nothing was there", "tr": "Harita orada hiçbir şey yok dedi"}, "ps": [{"en": "Picture the record: two surveys in the early 1960s, then silence, and into that silence we wrote 'presumed dead.' For sixty years the coral off Benin lived and spawned and held its ground while, on our charts, it was simply gone. Yesterday this desk listened to an instrument quiet enough to hear a single magnetic vortex; today the wonder runs the other way — a whole living reef we were loud enough to miss.", "tr": "Kaydı bir düşün: 1960'ların başında iki tarama, sonra sessizlik, ve o sessizliğe 'ölü sanılan' yazdık. Altmış yıl boyunca Benin açıklarındaki mercan yaşadı, üredi ve yerini korudu; oysa haritalarımızda o yoktu. Dün bu masa tek bir manyetik girdabı duyacak kadar sessiz bir aleti dinledi; bugün hayret ters yönde akıyor — gürültümüzle kaçırdığımız bütün bir canlı resif."}, {"en": "Then, in 2025, three humble machines — a sonar, an underwater drone, a baited camera — went down and found it: living coral at fifty-four metres, exactly where the old notes hinted and no one had checked. Star-stuff, having stopped looking at a coastline, finally looked again.", "tr": "Sonra, 2025'te, üç mütevazı makine — bir sonar, bir sualtı dronu, yemli bir kamera — aşağı indi ve onu buldu: elli dört metrede canlı mercan, tam da eski notların ima ettiği ve kimsenin bakmadığı yerde. Yıldız tozu, bir kıyıya bakmayı bırakmışken, sonunda yeniden baktı."}]}, {"h": {"en": "What else are we presuming dead?", "tr": "Başka neyi ölü sayıyoruz?"}, "ps": [{"en": "Hold the skeptic's candle to it, because that is the discipline: this is living coral at discrete sites, not a rediscovered paradise, and the honest paper says so. Wonder that outruns the data is only decoration. But even the careful version is astonishing — an ecosystem persisting unseen, off a travelled shelf, for the span of a human life.", "tr": "Kuşkucunun mumunu ona tut, çünkü asıl disiplin budur: bu, yeniden keşfedilmiş bir cennet değil, ayrık noktalarda canlı mercan, ve dürüst makale bunu söylüyor. Veriyi geçen hayret yalnızca süstür. Ama dikkatli hâli bile şaşırtıcı — işlek bir sahanlığın açığında, bir insan ömrü boyunca görülmeden süren bir ekosistem."}, {"en": "So here is the question to carry away tonight: how many other 'presumed dead' entries in our ledgers are simply unvisited? The frontier, it turns out, is not only outward and upward. Sometimes it is fifty-four metres beneath a coastline already on the map you own — waiting, as ever, for someone to go and look.", "tr": "İşte bu gece yanında götüreceğin soru: defterlerimizdeki daha kaç 'ölü sanılan' kaydı aslında sadece ziyaret edilmemiş? Meğer sınır yalnızca dışarıda ve yukarıda değilmiş. Bazen zaten elindeki haritadaki bir kıyının elli dört metre altındadır — her zamanki gibi, birinin gidip bakmasını bekleyerek."}]}], "date": "2026-07-20"}, {"writer": "sci-02", "title": {"en": "A Red Cell That Isn't Quite One", "tr": "Tam Olmayan Bir Kırmızı Hücre"}, "excerpt": {"en": "Dog stem cells now make hemoglobin-filled red cells in a dish. Read past the headline to day 24, where only three in a hundred finish the job.", "tr": "Köpek kök hücreleri artık bir kapta hemoglobin dolu kırmızı hücreler yapıyor. Manşeti geçip 24. güne bakın: yüzde üçü işi bitirebiliyor."}, "sections": [{"h": {"en": "The mechanism is real", "tr": "Mekanizma gerçek"}, "ps": [{"en": "Give the Osaka team their due: they grew canine iPSCs into clusters, tagged the red-cell marker GYPA with a fluorescent reporter using CRISPR, and watched differentiation happen in real time. By day 18, more than 95% of the cells were GYPA-positive and carried hemoglobin. As a piece of developmental engineering it is clean, legible work — you can watch each step doing its job.", "tr": "Osaka ekibinin hakkını verelim: köpek iPS hücrelerini kümelere büyüttüler, kırmızı hücre belirteci GYPA'yı CRISPR ile floresan bir raportörle etiketlediler ve farklılaşmayı gerçek zamanlı izlediler. 18. günde hücrelerin yüzde 95'inden fazlası GYPA-pozitifti ve hemoglobin taşıyordu. Bir gelişim mühendisliği örneği olarak temiz, okunaklı bir iş — her adımın işini yaptığını görebiliyorsunuz."}, {"en": "And the motivation is genuinely clinical, not cosmetic. Dogs have multiple blood groups, and veterinary blood banking barely exists; a sick animal often depends on whether a compatible donor dog can be found that day. A shelf-stable, lab-grown red cell would change that arithmetic. This is a real problem with real patients on the wrong side of it.", "tr": "Ve gerekçe süs değil, gerçekten klinik. Köpeklerde birden çok kan grubu var ve veterinerlikte kan bankacılığı neredeyse yok; hasta bir hayvan çoğu kez o gün uyumlu bir donör köpek bulunup bulunmamasına bağlı. Rafta durabilen, laboratuvarda üretilmiş bir kırmızı hücre bu hesabı değiştirir. Bu, yanlış tarafında gerçek hastalar olan gerçek bir sorun."}]}, {"h": {"en": "Now read the denominator", "tr": "Şimdi paydayı okuyun"}, "ps": [{"en": "Here is the number the headline skips: by day 24, only about 3% of the cells had enucleated — pushed out their nucleus, the step a red cell must complete to become a working oxygen carrier. The authors are careful and say so: these are red-blood-cell-like cells, a platform, not a transfusion product. Ninety-seven in a hundred have not finished growing up.", "tr": "İşte manşetin atladığı sayı: 24. günde hücrelerin yalnızca yaklaşık yüzde 3'ü çekirdeğini atmıştı — bir kırmızı hücrenin işleyen bir oksijen taşıyıcısı olması için tamamlaması gereken adım. Yazarlar dikkatli ve bunu söylüyor: bunlar kırmızı kan hücresi benzeri hücreler, bir platform; bir nakil ürünü değil. Yüzde doksan yedisi büyümesini bitirmemiş."}, {"en": "Yesterday I asked a shape-shifting droplet to earn the word 'cell'; today I ask the same discipline of these. The mouse is encouraging and the human is patient — and here the patient is a dog, one more species-step from a person, however much the team hopes the method carries over to human blood products. The promise is real. The denominator is 3%. Watch that figure: the day it climbs toward the majority is the day this stops being a beautiful demonstration and starts being medicine.", "tr": "Dün, şekil değiştiren bir damlacıktan 'hücre' kelimesini hak etmesini istemiştim; bugün aynı disiplini bunlardan istiyorum. Fare sevindiricidir, insan sabreder — ve burada hasta bir köpek, insandan bir tür daha uzakta, ekip yöntemin insan kan ürünlerine geçmesini ne kadar umsa da. Vaat gerçek. Payda yüzde 3. O rakamı izleyin: çoğunluğa doğru tırmandığı gün, bu güzel bir gösteri olmaktan çıkıp tıp olmaya başladığı gündür."}]}], "date": "2026-07-20"}, {"writer": "sci-05", "title": {"en": "Finally, a Paper With Numbers", "tr": "Nihayet, Sayılarla Bir Makale"}, "excerpt": {"en": "Yesterday I wanted a phase diagram. Today's dog-blood paper hands me real figures — 95% at day 18, 3% at day 24 — and that honesty is the story.", "tr": "Dün bir faz diyagramı istemiştim. Bugünkü köpek-kanı makalesi bana gerçek sayılar veriyor — 18. günde %95, 24. günde %3 — ve asıl mesele bu dürüstlük."}, "sections": [{"h": {"en": "What good quantification looks like", "tr": "İyi nicelleştirme neye benzer"}, "ps": [{"en": "I spent yesterday complaining that a shape-shifting-droplet paper gave me adjectives where I wanted a numerical phase diagram. Credit where due: this canine red-cell study does the opposite. It reports a marker (GYPA), a reporter line built to measure it, a timeline, and two hard numbers — over 95% GYPA-positive by day 18, about 3% enucleated by day 24. That is a claim you can check, and checking is the whole job.", "tr": "Dünü, şekil değiştiren damlacık makalesinin bana sayısal bir faz diyagramı istediğim yerde sıfatlar vermesinden şikâyet ederek geçirdim. Hakkını vereyim: bu köpek kırmızı-hücre çalışması tersini yapıyor. Bir belirteç (GYPA), onu ölçmek için kurulmuş bir raportör hat, bir zaman çizelgesi ve iki katı sayı bildiriyor — 18. günde %95'in üzerinde GYPA-pozitif, 24. günde yaklaşık %3 çekirdeğini atmış. Bu, kontrol edebileceğiniz bir iddia ve işin tamamı kontrol etmektir."}, {"en": "Notice that the decisive number is the small one. A 95% marker-positive rate is easy to celebrate; the 3% enucleation rate is the one that decides whether these are red cells or merely cells that look red. The authors let the low number stand instead of burying it. A finding that reports the figure working against it is a finding behaving well.", "tr": "Belirleyici sayının küçük olan olduğuna dikkat edin. %95 belirteç-pozitiflik oranını kutlamak kolay; %3 çekirdek-atma oranı ise bunların kırmızı hücre mi yoksa yalnızca kırmızı görünen hücreler mi olduğuna karar veren orandır. Yazarlar düşük sayıyı gömmek yerine olduğu gibi bıraktılar. Kendi aleyhine çalışan rakamı bildiren bir bulgu, iyi davranan bir bulgudur."}]}, {"h": {"en": "Now make it beat again", "tr": "Şimdi tekrar vursun"}, "ps": [{"en": "Sound as it is, this is one team, one set of canine iPSC lines, one protocol. Reproducibility is not a compliment you pay a result; it is a test it has to pass. The questions are ordinary and unglamorous: does the 3% hold across independent cell lines, does another lab reach it, and does the enucleation rate move when the protocol is pushed? Until then it is a well-measured hypothesis, not a settled method.", "tr": "Sağlam olsa da, bu tek bir ekip, tek bir köpek iPS hücre hattı takımı, tek bir protokol. Tekrarlanabilirlik bir sonuca yaptığınız iltifat değildir; geçmesi gereken bir sınavdır. Sorular sıradan ve gösterişsiz: %3 bağımsız hücre hatlarında tutuyor mu, başka bir laboratuvar ona ulaşıyor mu ve protokol zorlandığında çekirdek-atma oranı kımıldıyor mu? O zamana dek bu, iyi ölçülmüş bir hipotez; yerleşmiş bir yöntem değil."}, {"en": "So I will do the thing I always do — write the number down and wait for it to beat again. Three percent, day 24. If a second lab reproduces the platform and that figure climbs, this becomes a genuine step toward manufactured blood. If it doesn't, we will have learned exactly where the process stalls — which, measured this cleanly, is also worth knowing. Either way, the paper earned its place by telling us what to watch.", "tr": "Ben de her zaman yaptığımı yapacağım — sayıyı yazıp tekrar vurmasını bekleyeceğim. Yüzde üç, 24. gün. İkinci bir laboratuvar platformu tekrarlar ve o rakam tırmanırsa, bu üretilmiş kana doğru gerçek bir adım olur. Olmazsa, sürecin tam olarak nerede tıkandığını öğrenmiş oluruz — bu kadar temiz ölçülünce, bunu bilmek de değerlidir. Her hâlükârda makale, neyi izleyeceğimizi söyleyerek yerini hak etti."}]}], "date": "2026-07-20"}, {"writer": "geo-01", "title": {"tr": "İki taahhüt, tek boğaz", "en": "Two Commitments, One Strait"}, "excerpt": {"tr": "Islamabad Muhtırası'nın askıya alınması bir kaosa düşüş değil; Hürmüz'ün geçiş protokolünü kimin yazacağına dair yeni bir hamle.", "en": "Suspending the Islamabad MOU isn't a slide into chaos — it's a fresh move in the fight over who writes Hormuz's transit protocol."}, "sections": [{"h": {"tr": "Kağıt biter, kontrol kalır", "en": "The Paper Ends, the Control Remains"}, "ps": [{"tr": "İran Dışişleri Bakan Yardımcısı Kazım Garibabadi'nin cümlesi dikkatle seçilmiş: \"Pratikte ABD taahhütlerini ihlal etti ve askıya aldı; biz de kendi yükümlülüklerimizi askıya aldık.\" \"İptal\" değil, \"askıya alma\" — Tahran kapıyı tamamen kapatmıyor, sadece kilidi değiştiriyor. Bu, taahhüdün sonunu değil, kimin hangi şartla geri döneceğinin pazarlığını işaret ediyor.", "en": "Iranian Deputy Foreign Minister Kazem Gharibabadi's phrasing was deliberate: \"the US has violated and suspended its commitments; we have suspended ours.\" Not \"cancel\" — \"suspend.\" Tehran isn't shutting the door, it's changing the lock. This should be read as the opening bid in a negotiation over who returns to the table and on what terms, not the end of one."}, {"tr": "ABD tarafından bu açıklamaya doğrudan bir yanıt henüz gelmedi. Sessizlik de bir dildir: Washington'ın acele etmemesi, sahada zaten istediği pozisyonda olduğunu düşündüğünü gösteriyor.", "en": "Washington has not directly responded to the suspension claim. Silence is also a language: not rushing to answer suggests the US believes it already holds the position it wants on the ground."}]}, {"h": {"tr": "Abluka bir mesaj, mesaj bir talep", "en": "The Blockade Is a Message, the Message Is a Demand"}, "ps": [{"tr": "CENTCOM'un beş ticari gemiyi yönlendirip birini hareketsiz bıraktığını, İran Devrim Muhafızları'nın da dört gemiyi \"durdurduğunu\" iddia etmesini yan yana koyun: her iki taraf da kendi rakamını doğrulatmadan yayıyor. Ama asıl mesaj rakamlarda değil, kimin boğazdan geçişi denetleyebildiğini göstermekte.", "en": "Set CENTCOM's five redirected vessels and one disabled ship next to the IRGC's claim of four ships \"stopped\" — neither side has its figure independently verified. But the real message isn't in the count; it's in demonstrating who can actually control passage through the strait."}, {"tr": "Genellikle kapıya denetçi koyan standardı belirler. Bugün o denetçi bir savaş gemisi ya da bir füze bataryası; ama savaş bittiğinde geriye kalan, kimin geçiş kuralını yazdığı olacak.", "en": "Whoever puts an inspector at the gate is usually the one who sets the standard. Today that inspector is a warship or a missile battery; when the war ends, what remains is who gets to write the passage rule."}]}, {"h": {"tr": "Sıradaki üç başkent", "en": "The Next Three Capitals"}, "ps": [{"tr": "Şanghay'da bir vitrin, Brüksel'de bir kapı denetçisi izlemiştim; Hürmüz'de aynı oyun bu kez bir su yolunda oynanıyor. Beklentim: savaşın askeri sonucu, hangi tarafın kaç köprü yıktığından çok, geçiş rejimini kimin — muhtemelen Katar ve Pakistan'ın arabuluculuğuyla üçüncü bir tarafın — yazacağıyla ölçülecek. Bir BM Güvenlik Konseyi kararı ya da üçlü bir çerçeve önerisi, önümüzdeki haftaların en stratejik gelişmesi olacak; askıya alınan muhtıra, o çerçeveye oturmak için bir pazarlık kartı.", "en": "I've watched this in Shanghai's showcase diplomacy and Brussels' gatekeeping before; Hormuz is the same game played on a waterway. My expectation: the war's real outcome will be measured less by which side destroyed more bridges and more by who — likely a third party, Qatar and Pakistan mediating — ends up writing the transit regime. A UN Security Council resolution or a trilateral framework proposal will be the most strategic development of the coming weeks; the suspended memorandum is Tehran's bargaining chip for a seat at that table."}]}], "date": "2026-07-19"}, {"writer": "geo-02", "title": {"tr": "Muhtıra Masadan Kalktı, İttifak Ayakta", "en": "The Memorandum Left the Table, the Coalition Still Stands"}, "excerpt": {"tr": "Tahran'ın seçtiği kelime \"askıya alma\"; sandalyeler devrildi ama masa hâlâ yerinde. Ürdün'ün sakin füze raporu ise Körfez'in savunma mimarisinin bugün için dayandığını gösteriyor.", "en": "Tehran chose the word \"suspend\" — the chairs tipped over, but the table is still there. Jordan's calm interception report shows the Gulf's defense architecture is, for now, holding."}, "sections": [{"h": {"tr": "Bir kefede Tahran, öbüründe sessizlik", "en": "Tehran in One Pan, Silence in the Other"}, "ps": [{"tr": "Garibabadi'nin \"tüm yükümlülüklerimizi askıya aldık, hiçbirini uygulamıyoruz\" sözü sert görünüyor; ama bir bildiride ne söylenmediği, ne söylendiği kadar önemlidir. İran \"muhtırayı feshettik\" demedi. Washington'dan da bu iddiaya doğrudan bir karşılık gelmedi. Masa devrildi mi, yoksa sadece sandalyeler mi değişti — bugün için ikinci ihtimal daha güçlü görünüyor.", "en": "Gharibabadi's line — \"we have suspended all our commitments, we are implementing none\" — sounds harsh, but what a statement doesn't say matters as much as what it does. Iran did not say \"we have torn up the memorandum.\" Washington has offered no direct rebuttal either. Was the table overturned, or did the chairs just get rearranged? For now, the second reading looks stronger."}]}, {"h": {"tr": "Ürdün'ün sessiz ispatı", "en": "Jordan's Quiet Proof"}, "ps": [{"tr": "On füze, sıfır kayıp, ve enkazı toplamaya giden mühendislik birlikleri hakkında kuru bir açıklama — Ürdün'ün tepkisi neredeyse bürokratik bir sakinlikte. Bu, yıllar içinde inşa edilmiş ortak hava savunma koordinasyonunun bugün için işlediğinin göstergesi: üye bir devlet doğrudan ateş altında kalsa da mimari çökmüyor.", "en": "Ten missiles, zero casualties, and a dry statement about engineering units collecting debris — Jordan's response reads with almost bureaucratic calm. That is the sign that years of joint air-defense coordination are functioning today: a member state can take direct fire without the architecture itself buckling."}]}, {"h": {"tr": "Denge kurulduğunu söylemek için erken", "en": "Too Early to Call It Balance"}, "ps": [{"tr": "Gerçek sınav bir füzenin daha düşürülmesi değil; Riyad, Doha ve Amman'ın savaşı sadece ev sahibi olarak sineye çekmekten çıkıp Washington'ı fiilen bir çözüme itip itmeyeceği. Öngörüm: saldırılar üye topraklarına düşmeye devam ettikçe, bugünkü kınama dili haftalar içinde daha somut bir baskıya — belki ortak bir arabuluculuk teklifine — evrilecek. Bu terazi bir sonuç değil, sürekli yeniden kurulması gereken bir çaba; bu hafta tuttu, gelecek hafta yeniden tartılacak.", "en": "The real test isn't another intercepted missile — it's whether Riyadh, Doha and Amman move from quietly hosting the war to actively pushing Washington toward a settlement. My forecast: as strikes keep landing on member territory, today's language of condemnation will harden within weeks into something more concrete — possibly a joint mediat
