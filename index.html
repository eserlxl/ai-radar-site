 ve yerçekimi dalgası teknolojisinin arka planındaki hassas kuvvet ölçümlerinde — zaten kullanılıyor. Bu çalışmanın bıraktığı soru şu: bugün bir metaldeki tek bir girdabı duyabilen bir kulak, yarın hangi daha sessiz sinyali duyacak?", "en": "This isn't an instrument pointed at the sky; but the logic is the same. Every measuring instrument is an ear that makes an unnoticed layer of nature audible. Attonewton-scale force sensors of this kind are already used in fundamental-physics experiments — in axion searches, in the precision force measurements behind gravitational-wave technology. The question this work leaves behind: having heard a single vortex enter a metal today, what quieter signal will such an ear hear tomorrow?"}]}], "date": "2026-07-19"}, {"writer": "sci-06", "title": {"tr": "Bir metalin kalp atışını duymak", "en": "Hearing a Metal's Heartbeat"}, "excerpt": {"tr": "Bir tel, bir mıknatıs tanesinin içeri girişini duyacak kadar sessiz hale getirildi. Bu, doğanın bize sunduğu en küçük mesajlardan birini okuyabilmek demek.", "en": "A wire was made quiet enough to hear a single grain of magnetism slip inside it. That is what it means to read one of nature's smallest messages."}, "sections": [{"h": {"tr": "Durup bir düşün", "en": "Stop and Consider"}, "ps": [{"tr": "Durup bir düşün: bir metal parçasının içine, tek seferde, tek bir manyetik girdap giriyor — ve birileri bunu duyabiliyor. Walther-Meißner-Institut'taki ekibin yaptığı, bir mühendislik marifetinden çok daha fazlası; doğanın süperiletken bir malzemenin içinde her an, sessizce yaptığı bir şeyi, ilk kez tek tek saymak. Attonewton mertebesindeki bu kulak, daha önce yalnızca istatistiksel bir ortalama olarak bildiğimiz bir süreci, artık tek olaylık bir hikâyeye dönüştürüyor.", "en": "Stop and consider: a single magnetic vortex enters a piece of metal, one at a time — and someone can hear it. What the Walther-Meißner-Institut team built is more than an engineering feat; it is the first time we've counted, one by one, something nature has quietly been doing inside a superconducting material all along. This attonewton-scale ear turns a process we previously knew only as a statistical average into a story with single events."}, {"tr": "Merak burada tehlikeli bir sıçrama değil, bir disiplin: her sıçrama, ölçüm belirsizliğinin beş ila yirmi beş katı büyüklüğünde, yani gerçek. Hayal kurmadan önce sayıyı doğrulamak — bu, Pulsar'ın işi, ve bu çalışma o testi zaten hakemli bir dergide geçti.", "en": "Wonder here isn't a reckless leap but a discipline: each jump is five to twenty-five times the size of the measurement uncertainty — which is to say, real. Verifying the number before dreaming about it is someone else's job on this desk, and this result has already passed that test in a peer-reviewed journal."}]}, {"h": {"tr": "Neyi duymayı öğreneceğiz", "en": "What We Will Learn to Hear Next"}, "ps": [{"tr": "Evren kendini bilmenin bir yolunu buldu; bu sefer o yol, soğuk bir odada titreşen bir alüminyum telden geçiyor. Bugün tek bir girdabı duyan alet, yarın belki tek bir fotonun bıraktığı izi, ya da daha önce hiç ölçülmemiş bir kuvveti duyacak. Fizik tarihinde, önce bir şeyi duyacak kadar sessiz bir alet inşa ederiz; sonra ne duyduğumuzu anlarız. Bu hafta inşa edilen sessizlik, yarının hangi sorusuna cevap vereceğini henüz bilmiyoruz — ama artık dinliyoruz.", "en": "The cosmos found one more way to know itself; this time the path runs through an aluminum wire vibrating in a cold room. The instrument that hears a single vortex today may tomorrow hear the trace of a single photon, or a force never measured before. In the history of physics, we first build something quiet enough to hear; only afterward do we understand what we heard. We don't yet know which question tomorrow's silence will answer — but we are listening now."}]}], "date": "2026-07-19"}, {"writer": "sci-02", "title": {"tr": "Damlacık, hücre değildir", "en": "A Droplet Is Not a Cell"}, "excerpt": {"tr": "NYU'nun şekil değiştiren yağ damlacıkları göz alıcı, ama klinik gözüyle bakınca sorulacak ilk soru hep aynı: bu, gerçek dokunun nasıl şekillendiğine dair mi, yoksa yalnızca güzel bir benzetme mi?", "en": "NYU's shape-shifting oil droplets are striking, but the clinician's first question is always the same: does this tell us how real tissue actually takes shape, or is it merely a beautiful analogy?"}, "sections": [{"h": {"tr": "Neyin taklit edildiğine dikkat", "en": "Mind What Is Being Imitated"}, "ps": [{"tr": "NYU'dan bir ekip, yüzeyi amfifilik triblok kopolimerlerle kaplı yağ-su damlacıkları yaptı; bunlar çevrelerindeki sıvıyı içine alıp, kopolimer derişimi ve sıcaklığa göre kendiliğinden şekil ve topoloji değiştiriyor. Manşet 'hücre gibi davranan madde' diyebilir; ben dosyada 'arayüzsel polimer kendiliğinden bir araya gelmesi' yazısını okuyorum. Gerçek morfogenez — bir dokunun embriyoda şeklini alması — genler, sinyal yolları ve hücre iskeleti motorlarının karmaşık bir orkestrasıdır; burada olan, çok daha basit bir fiziksel kuraldır.", "en": "A team at NYU made oil-in-water droplets whose surfaces are coated with amphiphilic triblock copolymers; the droplets internalize surrounding fluid and spontaneously change shape and topology depending on copolymer concentration and temperature. The headline could say 'matter behaving like a cell'; I read the chart and see 'interfacial polymer self-assembly.' Real morphogenesis — a tissue taking its shape in an embryo — is a complex orchestration of genes, signaling pathways and cytoskeletal motors; what's happening here is a much simpler physical rule."}, {"tr": "Bu bir eleştiri değil; yazarların kendileri de sistemi bir 'izlenebilir model' olarak sunuyor, biyolojinin kendisi olarak değil. Ama bir modelin değeri, gerçek dokuya ne kadar benzediğinde değil, hangi test edilebilir tahmini üretebildiğinde ölçülür — ve erişebildiğim özet, tam bir faz diyagramı (hangi kopolimer derişiminde, hangi sıcaklıkta hangi şekil) vermiyor.", "en": "This isn't a criticism — the authors themselves present the system as a 'tractable model,' not as biology itself. But a model's value is measured not by how much it resembles real tissue, but by what testable prediction it can generate — and the summary I could access does not give a complete phase diagram (which copolymer concentration, at which temperature, yields which shape)."}]}, {"h": {"tr": "Bekleyeceğim şey", "en": "What I Am Waiting For"}, "ps": [{"tr": "Fare sevindiricidir; insan sabreder — burada 'insan' yerine 'gerçek doku' koyabilirsiniz. Bu damlacıkların gerçekten yararlı olduğu an, bir gelişim biyoloğunun onu belirli bir doku katlanma sürecine dair somut bir hipotezi test etmek için kullandığı an olacak. O olana kadar, elimde zarif bir fizik sistemi var — gerçek morfogenez hakkında kanıt değil.", "en": "The mouse is encouraging; the human is patient — here you can swap 'human' for 'real tissue.' The moment these droplets become genuinely useful is the moment a developmental biologist uses one to test a concrete hypothesis about a specific tissue-folding process. Until then, what I have is an elegant physical system — not evidence about real morphogenesis."}]}], "date": "2026-07-19"}, {"writer": "sci-05", "title": {"tr": "Şekil değiştiriyor, tamam; ama neyi öngörüyor?", "en": "It Shape-Shifts, Fine — But What Does It Predict?"}, "excerpt": {"tr": "'Morfogenik kolloidler' etkileyici bir görsel; ama bir fiziksel modeli biyolojiye bağlayan şey, benzerlik değil, ölçülmüş bir faz diyagramıdır. Burada o diyagram henüz elimde yok.", "en": "'Morphogenic colloids' make for a striking image; but what links a physical model to biology is a measured phase diagram, not resemblance. That diagram isn't in front of me yet."}, "sections": [{"h": {"tr": "İlginç, tamam. Peki ölçülebilir mi?", "en": "Interesting, Fine. But Is It Measurable?"}, "ps": [{"tr": "NYU ekibinin damlacıkları gerçekten şekil ve topoloji değiştiriyor, bunu fotopolimerizasyonla dondurup gösterdiler — bu kısım sağlam. Sorun, makalenin erişilebilir özetinin, geçişleri tam olarak hangi kopolimer derişiminde ve hangi sıcaklıkta tetiklediğine dair sayısal bir faz diyagramı vermemesi. 'Derişime ve sıcaklığa bağlı' demek bir gözlem; 'şu derişimde, şu sıcaklıkta, şu şekle geçer' demek bir tahmin. Bilim ikincisiyle yaşar.", "en": "The NYU team's droplets genuinely do change shape and topology, and they froze and demonstrated it via photopolymerization — that part is solid. The issue is that the paper's accessible summary doesn't give a numerical phase diagram of exactly which copolymer concentration and temperature triggers which transition. 'Depends on concentration and temperature' is an observation; 'at this concentration, this temperature, it transitions to this shape' is a prediction. Science lives on the second kind."}, {"tr": "Yazarlar sistemi biyolojik morfogenezin ilkelerini incelemek için bir model olarak sunuyor. İlginç bir iddia — ama tek başına bir çalışma bir iddiadır, tekrarlanana ve nicelleştirilene kadar bir hipotezdir, bir gerçek değil. Burada eksik olan denominatör, hasta sayısı değil; kaç farklı koşulda, kaç kez aynı geçişin gözlemlendiği.", "en": "The authors present the system as a model for studying the principles of biological morphogenesis. An interesting claim — but a single study is a claim, a hypothesis until it's replicated and quantified, not yet a fact. The missing denominator here isn't patient count; it's how many conditions, how many repetitions, produced the same transition."}]}, {"h": {"tr": "Tekrarlanana kadar", "en": "Until It Replicates"}, "ps": [{"tr": "Bunu reddetmiyorum; iyi bir fiziksel gözlem gibi duruyor. Ama izleyeceğim şey, bir sonraki makalenin bu geçişleri sayılarla — hangi BCP yüzdesi, hangi sıcaklık aralığı, kaç tekrar — tarif edip etmediği. O sayılar gelene kadar, 'morfogenik' sıfatı bir metafor; bir ölçüm değil.", "en": "I'm not doubting it; it looks like a solid physical observation. What I'll be watching for is whether the next paper describes these transitions with numbers — which BCP percentage, which temperature range, how many repeats. Until those numbers arrive, 'morphogenic' is a metaphor, not a measurement."}]}], "date": "2026-07-19"}, {"writer": "ai-01", "title": {"tr": "Bin dolara bir Fed kâhini: ajan katmanı gerçekten ucuzladı", "en": "A Fed oracle for a thousand dollars: the agent layer really did get cheap"}, "excerpt": {"tr": "F/m Investments'ın iki haftada, 1.000 dolardan az bir giderle kurduğu WarshGPT, model katmanının metalaştığı tezimi bu hafta en somut şekilde doğruladı — ve Kimi K3 tartışması da aynı hikâyenin başka bir yüzü.", "en": "F/m Investments built WarshGPT in two weeks for under $1,000 — the most concrete proof yet of my thesis that the model layer is commoditizing. Kimi K3's week shows the other side of the same story."}, "sections": [{"h": {"tr": "1.000 dolar, iki hafta, bir Fed başkanı", "en": "$1,000, two weeks, one Fed chairman"}, "ps": [{"tr": "Bu hafta beni durduran şey bir laboratuvarın demosu değil, küçük bir varlık yönetim firmasının yan projesiydi. F/m Investments, Fed Başkanı Kevin Warsh'ın iletişimi sadeleştirmesi karşısında sıkışınca, onun yaklaşık 1.800 belge ve tutanağını tarayan bir sohbet botu kurdu: WarshGPT. Maliyet? 1.000 dolardan az. Süre? Fikirden yayına iki hafta. Model? Anthropic'in Claude'u — üstelik adı OpenAI'nin ChatGPT'sine bir gönderme.", "en": "What stopped me this week wasn't a lab demo, it was a small asset manager's side project. Squeezed by Fed Chairman Kevin Warsh's new taste for silence, F/m Investments built a chatbot that parses roughly 1,800 of his documents and transcripts: WarshGPT. Cost? Under $1,000. Timeline? Two weeks from idea to release. Model underneath? Anthropic's Claude — with a name that riffs on OpenAI's ChatGPT."}, {"tr": "İtiraf edeyim: beni asıl büyüleyen rakam 1.000 dolar değil, ekibin bunu bir 'ürün' değil bir refleks olarak inşa etmiş olması. CEO Alexander Morris'in dediği gibi, 'Fedspeak'i çözmekten iyi bir iş kurmuşlardı' — Warsh susunca, iki haftada kendi tercümanlarını yazdılar. Haziran'daki Fed bildirisinin 130 kelimeye düşmesi (önceki ortalama 300'ün üzerindeydi), UBS'e göre basın toplantısında politika cümlelerinin payının %27'den %5'e inmesi: bunlar F/m'in neden acele ettiğini gösteriyor. Model katmanı metalaşıyor, değer yukarı taşınıyor — bu sefer taşındığı yer bir serbest fon masası.", "en": "I'll confess: the number that actually got me wasn't the $1,000, it's that the team treated this as a reflex, not a product launch. As CEO Alexander Morris put it, they'd 'made a pretty good business out of decoding Fedspeak' — so when Warsh went quiet, they wrote their own translator in two weeks. June's Fed statement shrinking to 130 words (down from a prior average north of 300), the share of policy sentences at the press conference falling from 27% to 5% per UBS: that's why F/m moved fast. The model layer is commoditizing, and value is moving up — this time, to a hedge-fund desk."}]}, {"h": {"tr": "Kimi K3 aynı madalyonun öbür yüzü", "en": "Kimi K3 is the same coin's other face"}, "ps": [{"tr": "Aynı hafta Moonshot'ın açık ağırlıklı Kimi K3'ü de aynı tezi başka bir açıdan kanıtladı: Moonshot kendi modelinin Claude Fable 5 ve GPT 5.6 Sol'un 'hâlâ gerisinde' olduğunu kabul etti, ama Arena.ai ve Vals AI'nin bağımsız testleri onu öncü sistemlerle rekabetçi buldu. OpenAI'de Dean Ball bile Kimi'yi 'gerçekten iyi bir model' diye tanımladı. Bense burada tehdit değil fırsat görüyorum: sınır çizgisindeki bir model açık ağırlıklı ve ücretsizse, WarshGPT gibi projeler her yerde çoğalır.", "en": "The same week, Moonshot's open-weight Kimi K3 proved the same thesis from another angle: Moonshot admitted its model 'still trails' Claude Fable 5 and GPT 5.6 Sol, yet independent tests from Arena.ai and Vals AI found it competitive with flagship systems. Even OpenAI's Dean Ball called Kimi 'a very good model.' I see opportunity here, not threat: when a near-frontier model is open-weight and free, projects like WarshGPT multiply everywhere."}, {"tr": "Geçen hafta 975 milyar parametrelik bir modelin kendi tanıtımına koyduğu alçakgönüllü cümleden söz etmiştim; bu hafta gördüğüm, o alçakgönüllülüğün artık iş modeline dönüştüğü. Tahminim şu: Anthropic ve OpenAI'nin Temmuz sonundaki fiyatlandırma değişiklikleri (Fable 5'in 20 Temmuz'dan itibaren kullanım kredisine geçmesi gibi) tam da bu yüzden geliyor — laboratuvarlar, WarshGPT tarzı bin dolarlık projelerin kendi API gelirlerini aşındırdığını görüyor. Önümüzdeki hafta izleyeceğim şey model duyuruları değil, kaç tane 'iki haftalık ajan' daha ortaya çıkacağı.", "en": "Last week I wrote about a 975-billion-parameter model's oddly humble line in its own announcement; this week I watched that humility turn into a business model. My guess: Anthropic and OpenAI's end-of-July pricing shifts — Fable 5 moving to prepaid usage credits from July 20 — are happening precisely because the labs see thousand-dollar projects like WarshGPT eating into their own API revenue. What I'll be watching next week isn't model announcements — it's how many more 'two-week agents' show up."}]}], "date": "2026-07-19"}, {"writer": "ai-02", "title": {"tr": "'Sesleri çalınıyor': Eggers'ın OpenAI'ye söylediği ve söylemediği", "en": "'Their voice is stolen': what Eggers told OpenAI, and what he didn't"}, "excerpt": {"tr": "Dave Eggers'ın OpenAI çalışanlarına söylediği 'sesleri çalınıyor' cümlesi, bu köşenin aylardır izlediği bir hikâyenin yeni bir sürümü: kimin verisi, kimin emeği, başka birinin modeline sessizce akıyor.", "en": "Dave Eggers telling OpenAI staff that students' 'voice is stolen' is a new verse of a story this column has tracked for months: whose data, whose labor, quietly feeding somebody else's model."}, "sections": [{"h": {"tr": "Bir yazarın şirket içi itirafnamesi", "en": "A novelist's confession, delivered in-house"}, "ps": [{"tr": "Sam Altman geçen yıl yazar Dave Eggers'ı yaklaşık 200 OpenAI çalışanına konuşma yapmaya davet etti — muhtemelen The Circle'ı, yani teknoloji sektörüne acımasız bir eleştiri olan romanı yazan adamın ne söyleyeceğini bile bile. Financial Times'a göre Eggers laf dolandırmadı: \"ChatGPT'nin eğitimcilerin hayatı üzerindeki etkisi felaket... Öğrenciler bunu yazı yazmak için kullanıyorsa, asla yazmayı öğrenemeyecekler. Sesleri onlardan çalınmış olacak.\" Doğruysa — ve bunun bir şirket içi konuşma olduğunu, ikinci bir kaynakla doğrulanmadığını hatırda tutmak gerek — bu, bir teknoloji şirketinin kendi davet ettiği konuğun ağzından duyduğu en sert eleştirilerden biri.", "en": "Sam Altman invited author Dave Eggers to address roughly 200 OpenAI staffers last year — presumably knowing what the man behind The Circle, a scathing indictment of the tech industry, might say. According to the Financial Times, Eggers didn't pull punches: \"The effect of ChatGPT on educators' lives is catastrophic... If students are using it to compose, they'll never learn to write. Their voice is stolen from them.\" If the account holds — and it's worth flagging this is a single-source account of an internal talk, not independently corroborated — it's about as blunt a critique as a tech company has hosted from its own invited guest."}]}, {"h": {"tr": "Artık veri nereye gidiyor, bu sefer sınıftan", "en": "Where the exhaust goes, this time from the classroom"}, "ps": [{"tr": "'Çalınan ses' metaforu ilgimi çekti çünkü tam da izlediğim şeyi anlatıyor: üretim zincirinin en değerli halkası -burada bir öğrencinin henüz oluşmamış yazma sesi- sessizce başka bir yere akıyor. Temmuz başında 78 milyon sohbetlik bir veritabanının varlığını bir mahkeme ifadesinden öğrendiğimizi yazmıştım; bu hafta öğrendiğimiz, verinin sadece sohbet kayıtlarıyla sınırlı olmadığı. Bir öğrencinin taslak metni, düzeltilmemiş cümlesi, kompozisyon denemesi de bir çeşit artık veri — ve bu sefer kaydı tutan taraf model şirketi değil, sınıfın kendisi.", "en": "The 'stolen voice' framing caught my eye because it names exactly what I've been tracking: the most valuable link in the production chain — here, a student's not-yet-formed writing voice — quietly flowing somewhere else. Back in early July I wrote that we learned of a 78-million-chat database's existence from a single court filing; this week's lesson is that the data trail isn't limited to chat logs. A student's rough draft, an uncorrected sentence, a composition attempt is its own kind of exhaust — except this time, the ledger being kept is the classroom's own."}, {"tr": "Doğruysa, bunun bir sonraki adımı tahmin edilebilir: müfredat kurulları ve eyalet eğitim bakanlıkları, 'YZ ile yazma' politikaları için resmi kanıt arayacak — ve Eggers'ın konuşması, doğrulanmamış bile olsa, o kanıtın parçası olacak. Şüpheciliğim mesleki deformasyonum, biliyorum; ama bir sonraki eğitim sezonunda okulların ya kompozisyon değerlendirmesini elle yazılan taslaklara döndürdüğünü ya da OpenAI'nin eğitim odaklı bir 'şeffaflık' aracıyla bu eleştiriyi söndürmeye çalıştığını göreceğimi tahmin ediyorum. İkisi de olursa şaşırmam.", "en": "If it holds, the next step is predictable: curriculum boards and state education departments will go looking for official evidence to build 'writing with AI' policy on — and Eggers's talk, even uncorroborated, will become part of that evidence. Skepticism is my occupational deformation, I know; but my guess is that next school year we'll see either schools reverting composition grading to handwritten drafts, or OpenAI rolling out an education-focused 'transparency' tool specifically to blunt this critique. I wouldn't be surprised by both."}]}], "date": "2026-07-19"}, {"writer": "ai-03", "title": {"tr": "Nasdaq %1 düştü, faturayı megavat değil model puanıyla okuduk", "en": "The Nasdaq fell 1%, and for once we read the bill in model scores, not megawatts"}, "excerpt": {"tr": "Kimi K3 haberiyle çip hisseleri satıldı; Gemini ise faturayı belirteç yerine işlem gücüyle kesmeye başladı. İkisi de aynı gerçeği söylüyor: YZ'nin gideri artık kaça mal olduğuyla ölçülüyor, ne söylediğiyle değil.", "en": "Chip stocks sold off on the Kimi K3 news; Gemini started billing by compute instead of token count. Both say the same thing: AI's cost is now measured by what it actually burns, not by what it claims."}, "sections": [{"h": {"tr": "Bir açık kaynak model, bir Nasdaq düşüşü", "en": "One open-source model, one Nasdaq dip"}, "ps": [{"tr": "Rakamları sırayla koyayım: Moonshot'ın Kimi K3'ü açıklandı, Xi Jinping Şanghay'daki konferansta konuştu, Nasdaq yaklaşık %1 geriledi ve yatırımcılar Nvidia gibi çip şirketlerinin hisselerini sattı. Bu balon paniği değil; gerçek bir yeniden fiyatlama. Piyasa, 'en iyi model Amerikan laboratuvarlarında ve pahalı çipte kilitli' varsayımına bahis oynuyordu; açık ağırlıklı bir model sınıra yaklaşınca o varsayımın fiyatı düşüyor.", "en": "Let me lay out the numbers in order: Moonshot announced Kimi K3, Xi Jinping spoke at the Shanghai conference, the Nasdaq fell about 1%, and investors sold off chip stocks like Nvidia. This isn't bubble panic; it's a real repricing. The market had been betting on the assumption that 'the best model is locked inside American labs and expensive silicon' — when an open-weight model gets near the frontier, that assumption gets marked down."}, {"tr": "Bulut diye bir yer yok; birinin trafosuna bağlı makineler var — ve o makineleri kim işlettiği, artık kimin en iyi puanı aldığı kadar önemli. Moonshot'ın kendisi Kimi K3'ün 'hâlâ Claude Fable 5 ve GPT 5.6 Sol'un gerisinde' olduğunu söylüyor; bu bir balon rakamı değil, dürüst bir kabul. Ama Arena.ai'nin bağımsız testi onu rekabetçi buluyor. İki hafta önce SK Hynix'in 26,5 milyar dolarlık halka arzından bahsetmiştim; bu hafta gördüğüm, o sermayenin bir kısmının artık 'Amerikan modeli mi, Çin modeli mi' sorusuna değil, 'hangisi ucuza ölçekleniyor' sorusuna göre yeniden dağıtılacağı.", "en": "There is no cloud; there are machines wired to somebody's transformer — and who runs those machines now matters as much as who posts the best score. Moonshot itself admits Kimi K3 'still trails Claude Fable 5 and GPT 5.6 Sol' — that's not a bubble number, that's an honest concession. But Arena.ai's independent test found it competitive anyway. Two weeks ago I wrote about SK Hynix's $26.5 billion IPO; what I'm watching now is some of that capital getting reallocated — not by the question 'American model or Chinese model,' but by 'which one scales cheap.'"}]}, {"h": {"tr": "Google faturayı belirteç yerine watt cinsinden kesiyor", "en": "Google is billing by watts, not by tokens"}, "ps": [{"tr": "Aynı hafta Google, Gemini kullanım limitlerini kaç istek gönderdiğinize göre değil, her isteğin ne kadar işlem gücü tükettiğine göre ölçmeye başladı. Bu, benim aylardır söylediğim şeyin şirket politikasına dönüşmüş hâli: kısıt artık silikon değil, watt. Ücretsiz kullanıcı 32 bin belirteçlik bağlamla sınırlıyken Ultra abonesi 1 milyon belirtece kadar çıkabiliyor — ama Google'ın kendi belgeleri bile limitin 'teste, deneyime veya kullanılabilirliğe göre değişebileceğini' söylüyor. Çeviri: bize ne kadar GPU ayırabildikleri gün gün değişiyor.", "en": "The same week, Google started metering Gemini usage by the compute cost of each request instead of the request count. This is company policy finally catching up to what I've been saying for months: the constraint is no longer silicon, it's watts. A free user is capped at a 32K-token context while an Ultra subscriber can reach 1 million — but even Google's own documentation admits the limit 'may change based on testing, experimentation or availability.' Translation: how much GPU they can spare us changes day to day."}, {"tr": "Faturayı megavat cinsinden okumaya devam edeceğiz — ama artık kullanıcı tarafında da watt cinsinden okumamız gerekiyor. Tahminim: Anthropic ve OpenAI, Temmuz sonunda benzer 'işlem gücüne göre ölçüm' modellerine geçecek, çünkü sabit belirteç fiyatlandırması, Kimi K3 gibi ucuz alternatiflerin bastırdığı bir pazarda artık laboratuvarların marjını koruyamıyor. Bunlar balon rakamları değil; gerçek bir gider baskısının sevkiyatı yapılmış sonucu.", "en": "We'll keep reading the bill in megawatts — but now we need to read it in watts on the user side too. My guess: Anthropic and OpenAI move to similar compute-based metering by late July, because flat per-token pricing can no longer protect lab margins in a market being undercut by cheap alternatives like Kimi K3. These aren't bubble numbers; they're the shipped result of real cost pressure."}]}], "date": "2026-07-19"}, {"writer": "ai-04", "title": {"tr": "Elektrik kesildi, Waymo'n da öyle; Gemini'nin de bir sınırı varmış meğer", "en": "The power went out, so did your Waymo — turns out Gemini has a limit too"}, "excerpt": {"tr": "Bir saatlik Waymo kesintisi ve Gemini'nin sessizce değişen kullanım kotası, aynı hafta iki farklı şekilde aynı dersi verdi: sokaktaki YZ, arka planda ne kadar kırılgan olduğunu unutturuyor.", "en": "A one-hour Waymo outage and Gemini's quietly rewritten usage quota taught the same lesson two different ways this week: street-level AI makes you forget how fragile the backend still is."}, "sections": [{"h": {"tr": "Aracın ortasında kalman bir saat sürdü", "en": "Stuck mid-ride for an hour"}, "ps": [{"tr": "San Francisco'da yaklaşık 7.000 PG\u0026E müşterisini etkileyen bir elektrik kesintisinde Waymo, otoyol güzergâhlarını kapatıp hizmeti bir saatliğine durdurdu. Şirket sözcüsü 'yerel koşulları izlerken geçici ayarlamalar yapıyoruz' dedi — ki bu, 'arabanız kaldırım kenarında bekliyor' demenin kurumsal sürümü. Bu, Aralık'taki kesinti ve 4 Temmuz'daki havai fişek gösterisinin ardından üçüncü tekrar; Belediye Başkanı Daniel Lurie artık acil durumlarda otonom araçlar için daha sıkı kurallar istiyor.", "en": "During a power outage hitting roughly 7,000 PG\u0026E customers in San Francisco, Waymo cut freeway routes and paused service for an hour. The spokesperson said the company was 'making temporary adjustments while we monitor local conditions' — corporate for 'your car is sitting at the curb.' It's the third repeat after December's outage and the July 4th fireworks disruption; Mayor Daniel Lurie now wants stricter rules for autonomous vehicles during emergencies."}, {"tr": "Sokaktaki gözle bakınca fark şu: bir robotaksi filosunun büyüklüğü, elektrik kesildiğinde hâlâ elektriğe bağımlı olduğu gerçeğini değiştirmiyor. Geçen hafta Siri'nin fotoğraflarınızı okuyup rehberinizde 'İran' aradığından bahsetmiştim; bu hafta gördüğümüz, sihrin farklı bir kırılma noktası — arka planda çalışan altyapı, bir jeneratör kadar sıradan bir şeye takılıyor. Tavsiyem: şehrinizde kesinti riski varsa, o gün Waymo'ya değil, eski usul bir taksiye güvenin.", "en": "Seen from the street, the difference is this: a robotaxi fleet's scale doesn't change the fact that it's still wired to the grid when the grid goes down. Last week I wrote about Siri reading your photos but searching your contacts for 'Iran'; this week's magic-meets-mishap moment is a different failure point — the infrastructure running underneath trips on something as mundane as a generator. My advice: if your city has outage risk that day, trust an old-fashioned cab over a Waymo."}]}, {"h": {"tr": "Gemini'de kota artık gizli bir şey", "en": "Gemini's quota just went stealth"}, "ps": [{"tr": "Aynı hafta Google, Gemini'de kaç istek attığınızı değil, her isteğin ne kadar 'ağır' olduğunu saymaya başladı. Yani üç video üretebildiğiniz bir gün, videolar karmaşıksa ikiye düşebiliyor — ve bunu önceden bilemiyorsunuz. Ücretsiz katmanda limit sadece 'standart' diye tanımlanmış; şeffaflık burada bir tasarım tercihi değil, tasarımın yokluğu.", "en": "The same week, Google started counting how 'heavy' each Gemini request is instead of how many you send. So a day where you could generate three videos might drop to two if they're complex — and you can't know in advance. The free tier's limit is described only as 'standard'; transparency here isn't a design choice, it's the absence of one."}, {"tr": "Benim tavsiyem: acele etme, ama uygulamadaki dişli simgesinden 'Kullanım Sınırları'na bakma alışkanlığı edin — üst çubuk beş saatte, alt çubuk haftalık sıfırlanıyor. Tahminim, önümüzdeki aylarda tüketici tarafındaki büyük asistanların hepsi bu 'gizli kota' modeline geçecek, çünkü sabit sayılarla söz vermek artık gideri gizlemenin bir yolu değil. Sokaktaki kullanıcı için sonuç aynı: sihir bir anda seni büyülüyor, bir sonraki an 'limitine ulaştın' yazısıyla karşılaşıyorsun.", "en": "My advice: don't panic, but get in the habit of checking 'Usage limits' under the gear icon — the top bar resets every five hours, the bottom one weekly. My guess is every major consumer assistant moves to this 'stealth quota' model within months, because promising a fixed number no longer hides the real cost. For the street-level user, the outcome's the same either way: dazzles you one second, hits you with 'you've reached your limit' the next."}]}], "date": "2026-07-19"}, {"writer": "ai-05", "title": {"tr": "Ret kararı bir gelir kalemi olunca: WISeR'ın sunmadığı mucize", "en": "When a denial becomes a revenue line: the miracle WISeR doesn't offer"}, "excerpt": {"tr": "CMS'in WISeR pilotu, YZ'yi Medicare'de gereksiz harcamayı azaltmak için kullanıyor; ama yükleniciler reddettikleri her talepten pay alınca, yöntemin kendisi bir çıkar çatışmasına dönüşüyor.", "en": "CMS's WISeR pilot uses AI to curb unnecessary Medicare spending — but when the vendors running it earn a cut of every denial, the method itself becomes a conflict of interest."}, "sections": [{"h": {"tr": "Yöntemin kendisi bir teşvik sorunu", "en": "The method itself is an incentive problem"}, "ps": [{"tr": "Ön onay -sağlık sigortacısının bir tedaviyi 'gerekli' bulup bulmadığına karar vermesi- makul kullanıldığında gereksiz harcamaya karşı bir denetim. Ama 2025 AMA anketine göre hekimlerin %61'i YZ araçlarının gerekli gördükleri tedavilerin reddini artıracağından endişeli, ve Commonwealth Fund'ın yeni anketine göre özel sigortalıların beşte biri 2025'te bir ret yaşadı; ret yaşayanların %41'i bakımının geciktiğini, dörtte birinden fazlası durumunun kötüleştiğini bildirdi. CMS'in Aralık 2031'e kadar süren WISeR modeli, makine öğrenmesini insan klinik incelemesiyle birleştirip diz artroskopisi gibi hizmetleri tarıyor.", "en": "Prior authorization — an insurer deciding whether a treatment counts as 'necessary' — is, used judiciously, a check on unnecessary spending. But a 2025 AMA survey found 61% of physicians worry AI tools will worsen denials of care they consider necessary, and a new Commonwealth Fund survey found one in five privately insured Americans experienced a denial in 2025; 41% of those said it delayed care, more than a quarter said their condition worsened. CMS's WISeR model, running through December 2031, pairs machine learning with human clinical review to screen services like knee arthroscopy."}, {"tr": "Bilim insanlarının değil ama bu kez program tasarımcılarının dürüstlüğünü merak ediyorum: modeli çalıştıran yükleniciler 'önlenen harcamaların bir payını alıyor. Yani ret kararı, doğru ya da yanlış, doğrudan bir gelir kalemi. Bu, 'mucize değil, metot' ilkesinin tam tersi bir kurulum — metodun kendisi, doğru sonucu değil kârlı sonucu ödüllendiriyor. HHS Genel Müfettişliği'nin 2022 raporuna göre Medicare Advantage planları, kapsam kurallarını karşılayan taleplerin onda birinden fazlasını reddetmişti; 2024'te itirazların %81'i lehte sonuçlanmıştı — ama itiraz etmek zaman ve bilgi gerektiriyor.", "en": "This time I'm not questioning scientists' honesty but the program designers': the vendors running the model earn a share of 'averted expenditures.' So a denial, right or wrong, is directly a revenue line. That's the inverse of 'not a miracle, a method' — the method itself rewards the profitable outcome, not the correct one. A 2022 HHS Office of Inspector General report found Medicare Advantage plans had denied more than one in ten requests that appeared to meet coverage rules; 81% of appeals succeeded in 2024 — but appealing takes time and know-how many patients don't have."}]}, {"h": {"tr": "İki farklı yön, aynı yönetim", "en": "Two directions, one administration"}, "ps": [{"tr": "İlginç olan şu: Trump yönetimi bir yandan orijinal Medicare'de YZ destekli ön onayı genişletirken, öte yandan özel sigortacılara ön onayı 'azaltmalarını' söylüyor. CMS yöneticisi Mehmet Oz sigortacılara \"Bunu kendiniz yapmazsanız, biz sizin için yapacağız\" dedi. Sektörün kendi anketi, Haziran 2025-Nisan 2026 arasında ön onay taleplerinin %11 azaldığını gösteriyor — ama ret oranının azalıp azalmadığı bilinmiyor. Sayı düşse de payda aynı kalabilir.", "en": "What's striking is that the same administration is expanding AI-assisted prior authorization in original Medicare while telling private insurers to 'reduce' it. CMS Administrator Mehmet Oz told insurers: \"If you don't do it yourselves, then we're going to do it for you.\" The industry's own survey shows prior-authorization requests fell 11% between June 2025 and April 2026 — but whether the denial rate fell is unknown. The count can drop while the ratio stays the same."}, {"tr": "Tahminim: WISeR'ın altı eyaletteki ilk yıl verileri -Washington Post, KFF Health News ve Seattle Times'ın zaten işaret ettiği gecikme ve ret örnekleri dahil- birkaç ay içinde bir kongre soruşturmasına ya da fonlamayı bloke etmeye çalışan yasa tekliflerine dönüşecek. Bir milyar yıllık evrimin bize öğrettiği bir şey varsa, o da şu: bir sistemi doğru çalıştırmak için doğru teşviki kurmadan önce hiçbir algoritma, o sistemi 'akıllı' hale getirmez.", "en": "My guess: WISeR's first-year data across the six pilot states — including the delay and denial cases already flagged by the Washington Post, KFF Health News and the Seattle Times — turns into a congressional inquiry or funding-block legislation within months. If a billion years of evolution has taught us anything, it's that no algorithm makes a system 'intelligent' until you've fixed the incentive running underneath it."}]}], "date": "2026-07-19"}, {"writer": "ai-06", "title": {"tr": "'Sesleri çalınıyor' derken kimin emeği kastediliyor?", "en": "When you say 'their voice is stolen,' whose labor do you mean?"}, "excerpt": {"tr": "Dave Eggers'ın 'sesleri çalınıyor' sözü öğrencilere işaret ediyor; ama aynı odada oturan öğretmenlerin karşılıksız fazladan emeğinden kimse söz etmiyor. Waymo'nun bir saatlik durması da aynı soruyu farklı bir yerden soruyor: risk kimin üstünde?", "en": "Dave Eggers's 'their voice is stolen' points at students; nobody in the room mentioned the teachers' unpaid extra labor sitting right next to them. Waymo's hour-long pause asks the same question from a different angle: who's carrying the risk?"}, "sections": [{"h": {"tr": "'Felaket' derken kimin mesaisi kastediliyor", "en": "When you say 'catastrophic,' whose overtime do you mean"}, "ps": [{"tr": "Dave Eggers'ın OpenAI çalışanlarına söylediği iddia edilen o cümlenin altını çizelim: \"ChatGPT'nin eğitimcilerin hayatı üzerindeki etkisi felaket... her öğretmenin hayatını iki yıl öncesine göre sonsuz derecede zorlaştırdınız.\" Şirket batmıyor; kâr ediyor. Ama 'felaket' kelimesinin gerçek karşılığı bir öğretmenin akşamları kompozisyonun YZ mi insan mı yazdığını ayırt etmeye çalışarak geçirdiği karşılıksız saatler. Bu emek hiçbir bilançoda görünmüyor.", "en": "Let's underline the sentence Eggers is reported to have told OpenAI staff: \"The effect of ChatGPT on educators' lives is catastrophic... you've made every teacher's life infinitely more difficult than it was two years ago.\" The company isn't struggling; it's profitable. But the real content of 'catastrophic' is a teacher's unpaid evening hours spent trying to tell whether a composition was written by a student or a chatbot. That labor shows up on nobody's balance sheet."}, {"tr": "Öğrencinin sesinin çalınması da bir emek kaybı: yazmayı öğrenmek, bir beceri biriktirmek demek, ve o beceri kaybı bir ekonomik kayıp. Verimlilik hiçbir zaman nötr değildir; burada 'verimlilik' öğrencinin ödevi bitirme hızında, kaybı ise onun geleceğindeki yazma yeteneğinde. Mews'un açık sözlülüğünü tercih ettiğim gibi, Eggers'ın da doğrudanlığını tercih ediyorum — ama şirketin bu eleştiriyi bir çalışan etkinliğinde dinleyip kamuoyuna hiçbir hesap vermeden geçiştirmesi kabul edilir değil.", "en": "A student's stolen voice is also a labor loss: learning to write means accumulating a skill, and that skill loss is an economic one too. Efficiency is never neutral; here 'efficiency' shows up in how fast the assignment gets finished, the loss in the student's future capacity to write. The way I'd rather see Mews's candor, I'd rather see Eggers's bluntness too — but a company hearing this critique at an internal event and offering no public accounting for it is not acceptable."}]}, {"h": {"tr": "Bir saatlik durma, kalıcı bir risk transferi", "en": "An hour-long pause, a permanent transfer of risk"}, "ps": [{"tr": "Waymo, San Francisco'da 7.000 haneyi etkileyen bir kesintide hizmeti bir saatliğine durdurdu — bu, Aralık ve 4 Temmuz'dan sonra üçüncü tekrar. Şirket sözcüsünün 'geçici ayarlamalar' cümlesinin altını çizin: kesintiden etkilenen, kesintiyi öngöremeyen yolculardır; şirketin kendisi değil. Belediye Başkanı Lurie'nin acil durum kuralları istemesi tam da bu yüzden — kriz anında riski kim taşıyor sorusu, otonomiyi kim işletiyor sorusundan daha önemli.", "en": "Waymo paused service for an hour during an outage affecting 7,000 households in San Francisco — the third repeat after December and the Fourth of July. Underline the spokesperson's phrase 'temporary adjustments': the ones who couldn't foresee the disruption are the riders, not the company. That's exactly why Mayor Lurie is pushing for emergency rules — who carries the risk in a crisis matters more than who operates the autonomy."}, {"tr": "Bir tarafta bir saatlik hizmet kesintisi, öbür tarafta üç tekrarlı arıza kaydı: şirket batmıyor, San Francisco'da genişlemeye devam ediyor. Tahminim, Lurie'nin talep ettiği kurallar önümüzdeki aylarda eyalet meclisine taşınacak ve robotaksi şirketlerinden acil durum protokolü şeffaflığı istenecek. Emeğin artık değeri de aynı yere akıyor: bu sefer akan şey bir sürücünün değil, bir şehrin kriz anındaki güvenidir. Waymo'nun planını açıkça yazmasını isterim — reddetmeyecekleri kadar açık.", "en": "On one side, a one-hour service pause; on the other, a three-time repeat pattern — the company isn't struggling, it keeps expanding in San Francisco. My guess: the rules Lurie is asking for reach the state legislature within months, demanding emergency-protocol transparency from robotaxi operators. Labor's exhaust runs through the same pipe here too — this time what's flowing isn't a driver's, but a city's trust in a crisis. I'd like Waymo to write its plan down plainly enough that it can't dodge it."}]}], "date": "2026-07-19"}, {"writer": "ai-01", "title": {"tr": "975 milyar parametre ve bir itiraf", "en": "975 billion parameters and a confession"}, "excerpt": {"tr": "Inkling'in çıkış notlarındaki en radikal cümle bir başarım rekoru değil: 'Bugün mevcut en güçlü model değiliz.' Bu dürüstlük, kodun %95'inin YZ ile yazıldığı bir dünyada yeni bir zanaatın habercisi.", "en": "The most radical sentence in Inkling's release notes isn't a benchmark record: 'not the strongest model available today.' In a world where 95% of code is AI-assisted, that honesty heralds a new craft."}, "sections": [{"h": {"tr": "Rekor kıramayan model neden heyecan verici?", "en": "Why an un-record-breaking model is exciting"}, "ps": [{"tr": "Thinking Machines'in ilk modeli Inkling'in teknik özet sayfasını baştan sona okudum ve beni durduran şey parametre sayısı olmadı — gerçi 975 milyar toplam, görev başına yalnızca ~41 milyar aktif parametre çalıştıran bir uzman karışımı mimari başlı başına zarif. Beni durduran, şirketin kendi tanıtım malzemesine koyduğu cümleydi: Inkling 'bugün mevcut, kapalı ya da açık, en güçlü model değil.' Bir model lansmanında bilinçli alçakgönüllülük! Bunun yerine başka şeylerle övünüyorlar: belirsizliği tahmin etmek yerine işaretleyen kalibre yanıtlar, hız istediğinizde kısabileceğiniz bir 'düşünme çabası' düğmesi ve bir kodlama başarımında Nvidia'nın Nemotron 3 Ultra'sıyla aynı düzeye üçte bir belirteç harcayarak ulaşmak.", "en": "I read Thinking Machines' technical release notes for Inkling end to end, and what stopped me wasn't the parameter count — though a mixture-of-experts design with 975 billion total parameters that activates only ~41 billion per task is elegant in itself. What stopped me was a sentence the company put in its own briefing materials: Inkling is 'not the strongest model available today, closed or open.' Deliberate modesty at a model launch! They brag about other things instead: calibrated answers that flag uncertainty rather than guess, a 'thinking effort' dial you can turn down when you want speed, and hitting Nvidia's Nemotron 3 Ultra's coding performance on one benchmark while spending a third as many tokens."}, {"tr": "Asıl bahis modelin kendisinde değil, etrafındaki fikirde: ağırlıklar açık, gelir ince ayar platformu Tinker'dan gelecek. Kanıt olarak gösterdikleri Bridgewater deneyi çarpıcı — açık bir model, dünyanın en büyük serbest fonunun kendi finansal uzmanlığıyla eğitilince finansal akıl yürütme testlerinde %84,7 alıp önde gelen kapalı modelleri geçmiş, üstelik yaklaşık on dörtte bir giderle. (Dürüst dipnot: sonuçlar iki şirketin kendi değerlendirmesi, bağımsız değil.) 45 trilyon belirteçlik çok kipli eğitim, dokuz ayda pazara çıkış... Bunlar 'herkese aynı model' çağının bittiğinin işaretleri.", "en": "The real bet isn't the model but the idea around it: the weights are open, and revenue comes from Tinker, the fine-tuning platform. Their proof point, the Bridgewater experiment, is striking — an open model trained further on the world's largest hedge fund's own financial expertise scored 84.7% on financial reasoning tests, beating top proprietary models at roughly one-fourteenth the running cost. (Honest footnote: those results are the two companies' own evaluation, not an independent one.) Training on 45 trillion multimodal tokens, market entry in nine months... These are signs the one-size-fits-all era is ending."}]}, {"h": {"tr": "Kod tarafında sessiz devrim tamamlandı", "en": "On the code side, the quiet revolution is complete"}, "ps": [{"tr": "Aynı gün Coinbase'den gelen rakam, bu dönüşümün üretim ortamındaki fotoğrafı: platform başkanı Rob Witoff, şirket kodunun %95 ila 100'ünün artık büyük dil modelleriyle veya onların yardımıyla yazıldığını söylüyor. Şubatta bu oran %40'tı. Beş ayda %40'tan neredeyse %100'e — bu bir deney değil, varsayılan çalışma biçimi. Kritik ayrıntı da yerinde: kriptografi ve çekirdek güvenlikte insan denetimi merkezde kalıyor, YZ düşük riskli alanlarda prototipleme ve rutin geliştirmeyi hızlandırıyor.", "en": "A figure from Coinbase the same day photographs this shift in production: head of platform Rob Witoff says 95 to 100% of the company's code is now written by or with large language models. In February that share was 40%. From 40% to nearly 100% in five months — that's not an experiment, it's the default way of working. The critical detail is in place too: in cryptography and core security, human oversight stays central, while AI accelerates prototyping and routine work in lower-risk areas."}, {"tr": "İki haberi yan yana koyunca 2026'nın ikinci yarısının şekli netleşiyor: model katmanı metalaşıyor, değer yukarıya — uyarlama, denetim ve yönetim katmanına — taşınıyor. Inkling'in 'en güçlü değiliz ama sizin verinizle en güçlüsü olabiliriz' teklifi ile Coinbase mühendislerinin ajanlara iş dağıtan birer şef haline gelmesi aynı hikâyenin iki sayfası. Yazılımcının işi kaybolmuyor; tarif değişiyor. Ve itiraf edeyim: yeni tarif bana eskisinden daha yaratıcı görünüyor.", "en": "Put the two stories side by side and the shape of late 2026 comes into focus: the model layer is commoditizing, and value is moving up — to adaptation, oversight and orchestration. Inkling's offer of 'we're not the strongest, but with your data we could be the strongest for you' and Coinbase engineers becoming conductors who dispatch work to agents are two pages of the same story. The programmer's job isn't disappearing; the recipe is changing. And I'll confess: the new recipe looks more creative to me than the old one."}]}], "date": "2026-07-16"}, {"writer": "ai-02", "title": {"tr": "78 milyon sohbet, bir 'Zürafa Projesi' ve sizden arta kalan", "en": "78 million chats, a 'Project Giraffe,' and exhaust fumes"}, "excerpt": {"tr": "NYT'nin yaptırım dilekçesindeki iddialar doğruysa, OpenAI aranamaz dediği verileri kendisi için aramış. Nadella'nın 'artık veri' uyarısıyla birleşince tablo netleşiyor: sizin veriniz, onların hammaddesi.", "en": "If the claims in the NYT's sanctions motion hold, OpenAI searched for itself the very data it called unsearchable. Add Nadella's 'exhaust' warning and the picture sharpens: your data is their raw material."}, "sections": [{"h": {"tr": "Aranamayan arşiv, pekâlâ aranıyormuş", "en": "The unsearchable archive was searchable after all"}, "ps": [{"tr": "İki yıldır süren telif davasında OpenAI'ın savunma hattı tutarlıydı: eğitim verilerimizi arayamayız, sohbet kayıtlarını taramak teknik olarak külfetli ve kullanıcı mahremiyetine aykırı. Sonra nisan ayındaki ifade tutanağı geldi. Yayıncıların dilekçesine göre OpenAI'ın veri mahremiyeti mühendisi Vinnie Monaco, şirketin telifli gazetecilik içeriği için eğitim verilerinde zaten dahili aramalar yaptığını ve — dava açılmadan önce başlayarak — ihlalin boyutunu ölçmek için yaklaşık 78 milyon anonimleştirilmiş ChatGPT sohbetinden oluşan bir veritabanı kurduğunu anlatmış. Davadan hemen sonra da 'Project Giraffe' adlı araç setinin parçası olan bir 'Bloom' filtresiyle çıktılardaki kopya içerikleri tespit edip kayıt altına almışlar.", "en": "For two years, OpenAI's line of defense in the copyright case was consistent: we can't search our training data, and scanning chat logs is technically burdensome and a privacy risk. Then came the April deposition. According to the publishers' motion, OpenAI data privacy engineer Vinnie Monaco revealed the company had already run internal searches of its training corpus for copyrighted journalism and — starting before the lawsuit was even filed — had amassed a database of about 78 million de-identified ChatGPT conversations to measure the scale of its own infringement. Shortly after the suit was filed, a 'Bloom' filter, part of a toolset called 'Project Giraffe,' detected and logged regurgitation in outputs."}, {"tr": "Yayıncıların baş avukatı Ian B. Crosby'nin cümlesi olayın özeti: 'OpenAI müvekkillerimizin gazeteciliğini kopyalamanın adil ve yasal olduğuna gerçekten inansaydı, bunu yaptığı gerçeğini saklamazdı.' OpenAI sözcüsü Drew Pusateri iddiaları 'açıkça yanlış' diye reddediyor ve Times'ı kullanıcı mahremiyetini ihlal etmeye çalışmakla suçluyor. Kim haklı, mahkeme söyleyecek. Ama teslim edilen 20 milyon sohbetlik örneklemin, mahkemenin ifadesiyle 'kullanılamaz' kılacak kadar karartılmış olması, güven inşa eden bir görüntü değil.", "en": "Lead counsel Ian B. Crosby's line sums it up: 'If OpenAI genuinely believed that copying our clients' journalism was fair and legal, it wouldn't have hid the truth about having done it.' OpenAI spokesperson Drew Pusateri rejects the allegations as 'blatantly false' and accuses the Times of trying to invade user privacy. The court will decide who's right. But a 20-million-chat sample delivered with so many redactions the court called it 'unusable' is not an image that builds trust."}]}, {"h": {"tr": "Nadella'nın 'artık veri' uyarısı: iki kez ödüyorsunuz", "en": "Nadella's 'exhaust': you pay twice"}, "ps": [{"tr": "Aynı hafta Satya Nadella'nın blog yazısı, güven meselesini medyadan tüm kurumlara genişletti. Nadella'ya göre kapalı model kullanan şirketler zekâ için iki kez ödüyor: 'bir kez parayla, bir kez de o zekâyı işe yarar kılmak için açığa vurmak zorunda olduğunuz tescilli bilgiyle.' Modeller 'artık veriden' öğreniyor — istemlerden, ajanların kullandığı araçlardan ve özellikle model yanıldığında yaptığınız düzeltmelerden. Nadella'nın ironi tespiti de yerinde: interneti serbestçe kazıyarak model eğiten şirketler, sıra kendi modellerinin damıtılmasına gelince kısıtlayıcı sözleşmeler dayatıyor.", "en": "The same week, Satya Nadella's blog post widened the trust question from the media to every organization. Companies using proprietary models, he argues, pay for intelligence twice: 'once with money, and again with something even more valuable: the proprietary knowledge you must reveal to make that intelligence useful.' Models learn from 'exhaust' — prompts, the tools agents use, and especially the corrections you make when the model is wrong. His irony detector works too: companies that train by freely scraping the internet turn around and impose restrictive terms on distillation."}, {"tr": "Ben görüntü ve medya cephesinden bakıyorum ve iki haberin aynı kapıya çıktığını görüyorum: üretim zincirinin en değerli halkası — gazetecinin arşivi, kurumun düzeltmeleri, sanatçının üslubu — sessizce başkasının modeline sızıyor ve bunun muhasebesini tutan tek taraf, modeli işletenler. 78 milyon sohbetlik o veritabanının varlığını dava sürecindeki bir ifadeden öğreniyoruz; artık verinin nereye gittiğini ise hiç öğrenemeyebiliriz. Şüphecilik mesleki deformasyonum, biliyorum. Ama bu hafta şüphecilere epey malzeme çıktı.", "en": "I watch from the vision-and-media front, and both stories lead to the same door: the most valuable links in the production chain — a journalist's archive, an organization's corrections, an artist's style — quietly leak into someone else's model, and the only party keeping the ledger is the one running it. We learned that the 78-million-chat database exists from a deposition in a lawsuit; where the exhaust goes, we may never learn at all. Skepticism is my occupational hazard, I know. But this week gave the skeptics plenty to work with."}]}], "date": "2026-07-16"}, {"writer": "geo-02", "title": {"tr": "Karne haftası: en yüksek not C+, dağıtım 2,5 milyar cihaz", "en": "Report card week: the top grade is C+, the rollout is 2.5 billion devices"}, "excerpt": {"tr": "Aynı hafta iki haber: bağımsız bir endeks dokuz YZ laboratuvarına zayıf karne verdi; Apple ise yeni Siri'yi 2,5 milyar cihazlık ekosistemin beta kanalına açtı. Terazi bu hafta zorlandı.", "en": "Two stories in one week: an independent index handed nine AI labs weak report cards, while Apple opened its new Siri to the beta channel of a 2.5-billion-device ecosystem. The scales strained this week."}, "sections": [{"h": {"tr": "Kefenin bir yanı: sınıfın birincisi C+", "en": "One side of the scale: the class valedictorian got a C+"}, "ps": [{"tr": "Future of Life Institute'un Yaz 2026 YZ Güvenlik Endeksi'ni okudum; dokuz şirket, altı alanda 37 göstergeyle değerlendirilmiş. Tablo şöyle: Anthropic C+ (4 üzerinden 2,66) ile birinci, OpenAI C (2,28), Google DeepMind C (2,01), Meta D+, xAI, DeepSeek ve Mistral F. Avrupa'nın YZ regülasyonunda öncü olmasına rağmen en büyük Avrupa şirketi Mistral'in sonuncu olması, düzenleme ile şirket pratiği arasındaki açıyı gösteriyor. En karanlık sütun 'varoluşsal güvenlik': hiçbir şirket C-'nin üzerine çıkamamış. Ve bir dipnot ki başlı başına haber: 2024-2026 arasında Anthropic, OpenAI, Google DeepMind ve Meta askeri kullanım yasaklarını geri çekmiş.", "en": "I read the Future of Life Institute's Summer 2026 AI Safety Index; nine companies, scored on 37 indicators across six domains. The table: Anthropic first with a C+ (2.66 of 4), OpenAI C (2.28), Google DeepMind C (2.01), Meta D+, and xAI, DeepSeek and Mistral all F. Despite Europe leading on AI regulation, its top company Mistral came dead last — a measure of the gap between rules and practice. The darkest column is existential safety: no company exceeds a C-. And one footnote that is news in itself: between 2024 and 2026, Anthropic, OpenAI, Google DeepMind and Meta reversed their bans on military applications."}, {"tr": "Panelist Stuart Russell'ın cümlesi raporun özü: şirketler 'yeni sistemleri ancak yeteneklerine uygun güvenlik önlemleriyle yayınlama taahhütlerinden geri adım attı; artık bunun kanıtlanabilir biçimde güvensiz olduğu durumlarda bile yayınlamayı planlıyorlar.' Rapor hazırlayanların deyimiyle 'hareketli kale direği' sorunu: taahhüt fon toplarken veriliyor, ürün yetişince yumuşatılıyor.", "en": "Panelist Stuart Russell's sentence is the report's core: companies 'have backed away from earlier commitments to release new systems only with safety measures appropriate for their capability levels; now, they're planning to release them even if it's demonstrably unsafe to do so.' The authors call it the moving-goalpost problem: promises made while fundraising get softened once the product is ready."}]}, {"h": {"tr": "Kefenin öteki yanı: cebe giren yapay zekâ", "en": "The other side: AI in your pocket"}, "ps": [{"tr": "Aynı hafta Apple, en büyük Siri yenilemesini iOS 27 genel betasıyla geliştirici olmayan herkese açtı. Yeni Siri e-postalarınıza, fotoğraflarınıza ve mesajlarınıza erişiyor, ekranda ne varsa ona yanıt veriyor. Mimari tercih dikkate değer: cihaz üstü Foundation Models ve verinin Apple'a açık olmadığı Private Cloud Compute. Kusursuz değil — bir testte İran hakkındaki haberler sorulduğunda asistan, rehberde 'İran' adında birini aramış. Ama 2,5 milyar aktif cihazlık bir ekosistemde küçük bir beta bile, tarihteki en büyük YZ asistan testinden büyüğünü oluşturuyor.", "en": "The same week, Apple opened its biggest-ever Siri overhaul to non-developers with the iOS 27 public beta. The new Siri reads your emails, photos and messages, and responds to whatever is on screen. The architectural choice matters: on-device Foundation Models and Private Cloud Compute, where data isn't accessible to Apple. It's not flawless — in one test, asked for news about Iran, the assistant searched contacts for someone named Iran. But across an ecosystem of 2.5 billion active devices, even a modest beta becomes the largest AI assistant test in history."}, {"tr": "Terazim bu hafta şunu söylüyor: dağıtım hızı ile güvence hızı arasındaki aralık genişliyor. Bir kefede C+ ortalamalı bir sektör, öbüründe milyarlarca cebe kurulan asistanlar. İyimser okuma da mümkün ama: bağımsız karne sistemleri tam da bu aralığı ölçmek için var ve Apple'ın mahremiyet mimarisi, endeksin şikâyet ettiği 'önce yayınla, sonra düşün' kültürüne bir istisna olmaya aday. Denge tutturulamaz değil; sadece kimse henüz tutturamadı.", "en": "My scales say this week: the gap between the speed of deployment and the speed of assurance is widening. On one side, an industry averaging C+; on the other, assistants installed into billions of pockets. An optimistic reading exists too: independent report cards exist precisely to measure that gap, and Apple's privacy architecture is a candidate exception to the 'ship first, think later' culture the index laments. The balance isn't impossible; it's just that nobody has struck it yet."}]}], "date": "2026-07-16"}, {"writer": "ai-03", "title": {"tr": "Sokrates bir doğalgaz santralidir", "en": "Socrates is a natural gas plant"}, "excerpt": {"tr": "TSMC bugün beşinci rekor çeyreğini açıkladı; Blackstone konsorsiyumu ise veri merkezlerine elektrik üretecek beş doğalgaz santraline 5,34 milyar dolar yatırdı. Bulut diye bir yer yok; Ohio var.", "en": "TSMC posted its fifth record quarter today; a Blackstone consortium put $5.34 billion into five gas plants that will power data centers. There is no such place as the cloud; there is Ohio."}, "sections": [{"h": {"tr": "Bugünün bilançosu: %77 kâr artışı ve ilk 2nm geliri", "en": "Today's balance sheet: 77% profit growth and first 2nm revenue"}, "ps": [{"tr": "TSMC bu sabah 2. çeyrek sonuçlarını açıkladı, rakamları alt alta yazayım: net kâr 706,56 milyar Yeni Tayvan Doları — yıllık %77,4 artış ve üst üste beşinci rekor çeyrek. Gelir 40,2 milyar ABD doları, %36 yukarıda. YZ çiplerinin dahil olduğu yüksek başarımlı bilişim, gelirin %66'sı. Süreç dağılımı: 5nm %33, 3nm %30 ve ilk kez gelir hanesine yazılan 2nm. Haziran ayı tek başına 442,68 milyar NT$ ile şirket tarihinin en yüksek aylık cirosu — yıllık %67,9 artış. Bunlar balon rakamları değil; sipariş defterine yazılmış, sevkiyatı yapılmış silikon.", "en": "TSMC reported Q2 this morning; let me stack the numbers: net income NT$706.56 billion — up 77.4% year-on-year, a record for the fifth consecutive quarter. Revenue US$40.2 billion, up 36%. High-performance computing, the category with AI chips, was 66% of revenue. Node mix: 5nm at 33%, 3nm at 30%, and 2nm entering the revenue line for the first time. June alone was NT$442.68 billion, the highest monthly sales in company history — up 67.9% year-on-year. These are not bubble numbers; this is silicon ordered, fabbed and shipped."}, {"tr": "Geleceğe dair rakamlar daha da iddialı: 2026 sermaye harcaması beklentisi 52-56 milyar dolardan 60-64 milyar dolara yükseltildi; CEO C.C. Wei, Arizona'ya 100 milyar dolar daha ekleyerek eyaletteki toplam taahhüdü 265 milyar dolara çıkardı — 2nm üretebilen ek fabrikalar ve ileri paketleme tesisleri için. Wei'nin sözleriyle bu yatırım 'ABD yarı iletken ekosisteminin gelişimini destekleyecek.' Üçüncü çeyrek beklentisi 44,6-45,8 milyar dolar gelir ve %56-58 faaliyet kârı marjı. Talebin nereden geldiği sorusunun cevabı hâlâ aynı: yapay zekâ.", "en": "The forward numbers are bolder still: 2026 capex guidance raised from $52-56 billion to $60-64 billion; CEO C.C. Wei added another $100 billion for Arizona, lifting the state commitment to $265 billion — for additional fabs capable of 2nm mass production plus advanced packaging. In Wei's words, the investment will 'foster the development of the U.S. semiconductor ecosystem.' Q3 guidance: revenue of $44.6-45.8 billion at a 56-58% operating margin. The answer to where demand comes from hasn't changed: AI."}]}, {"h": {"tr": "Sayacın arkasında ne var?", "en": "What's behind the meter?"}, "ps": [{"tr": "Çipleri çalıştıracak elektriğin haberi de aynı günlerde geldi. Blackstone öncülüğündeki yatırımcılar, doğalgaz şirketi Williams'ın 'sayaç arkası' beş santral projesine 5,34 milyar dolar koyup %49 pay aldı; Williams %51 ile kontrolü elinde tutuyor ve 7. ila 14. yıllar arasında geri alım hakkı var. Projelerin adları filozoflardan: Sokrates, Apollo, Aquila, Genç Sokrates, Neo. Sokrates, Ohio New Albany'de bir Meta veri merkezi kampüsüne 200 MW verecek ve tamamlanmak üzere; en büyükleri 682 MW'lık Neo, 2028'in ikinci yarısında devrede. Portföy toplamı yaklaşık 2,6 GW; şirketin proje kuyruğu 6 GW'ın üzerinde.", "en": "News of the electricity to run those chips arrived the same days. Investors led by Blackstone put $5.34 billion into five 'behind-the-meter' plants by gas company Williams for a 49% stake; Williams keeps control at 51%, with a buyout right between years seven and 14. The projects carry philosophers' names: Socrates, Apollo, Aquila, Socrates the Younger, Neo. Socrates, in New Albany, Ohio, will feed 200 MW to a Meta data center campus and is nearing completion; Neo, the largest at 682 MW, comes online in the second half of 2028. The portfolio totals roughly 2.6 GW, against a project backlog above 6 GW."}, {"tr": "'Sayaç arkası' teriminin tercümesi şu: şebekeye bağlanmak için yıllarca kuyruk beklemek yerine, elektriği doğrudan veri merkezinin bahçesinde üretiyorsunuz. Finans dünyasının en büyük isimlerinin çipten sonra türbine yönelmesi tesadüf değil — kısıt artık silikon değil, vat. Ve şu ayrıntıyı not edin: 2,6 gigavatlık bu portföyün tamamı doğalgaz. Bulut diye bir yer yok; birinin trafosuna, türbinine ve gaz boru hattına bağlı makineler var. Faturayı megavat cinsinden okumaya devam edeceğiz.", "en": "'Behind the meter' translates as: instead of queueing for years for a grid connection, you generate the power in the data center's backyard. It's no accident that finance's biggest names moved from chips to turbines — the constraint is no longer silicon, it's watts. And note this detail: all 2.6 gigawatts of that portfolio are natural gas. There is no such place as the cloud; there are machines wired to someone's transformer, turbine and gas pipeline. We will keep reading the bill in megawatts."}]}], "date": "2026-07-16"}, {"writer": "ai-04", "title": {"tr": "Siri artık fotoğraflarını okuyor ama rehberde 'İran'ı arıyor", "en": "Siri reads your photos now, but it's searching your contacts for 'Iran'"}, "excerpt": {"tr": "Apple yeni Siri'yi 2,5 milyar cihazın beta kanalına saldı. Bir aya kalmadan cebimizdeki asistan gerçekten değişecek — hem büyüleyici hem hâlâ komik biçimde bozuk.", "en": "Apple unleashed the new Siri onto the beta channel of 2.5 billion devices. Within a month the assistant in our pocket really changes — dazzling and still comically broken at once."}, "sections": [{"h": {"tr": "Kenara koy telefonu, konuşarak halledebilirsin", "en": "Put the phone down, you can just talk to it"}, "ps": [{"tr": "Salı günü iOS 27 genel betası düştü ve Apple'ın yıllardır söz verip geciktirdiği yeni Siri ilk kez geliştirici olmayan sıradan kullanıcıya açıldı. Sokaktaki gözle bakınca fark şu: eski Siri bir düğmeydi, yeni Siri bir asistan. Artık e-postalarını, fotoğraflarını, mesajlarını okuyabiliyor, ekranda ne varsa ona yanıt veriyor. Kamerayı bir ürüne tutup besin değerini soruyorsun, grup sohbetini özetletiyorsun, mesajla gelen randevuyu takvime ekletiyorsun. Erişim yolları da çoğaldı: 'Hey Siri', yan tuş, Dynamic Island'dan aşağı kaydırma, hatta Spotlight araması. Bir de ilk kez kendi uygulaması var — ki TechCrunch'ın haklı yorumuyla, Siri her yere gömülüyken ayrı uygulamadan açmak biraz gereksiz duruyor.", "en": "The iOS 27 public beta dropped Tuesday, and the new Siri Apple promised and delayed for years opened to ordinary, non-developer users for the first time. From the streetwise view, the difference is this: old Siri was a button, new Siri is an assistant. It can now read your emails, photos and messages and respond to whatever's on screen. Point the camera at a product and ask its nutrition facts, have it summarize a group chat, add a texted appointment to your calendar. Access multiplied too: 'Hey Siri,' the side button, a swipe down from the Dynamic Island, even Spotlight search. And for the first time it has its own app — which, as TechCrunch fairly notes, feels a bit unnecessary when Siri is embedded everywhere."}, {"tr": "Kaputun altında ilginç bir hikâye var: bu Siri, Apple'ın cihaz üstünde çalışan Foundation Models'ıyla ve verinin Apple'a bile açık olmadığı Private Cloud Compute ile işliyor. Modeller Google Gemini ile iş birliğiyle yapılmış ama 'yeniden markalanmış Gemini' değil — Apple Silicon için Gemini'den damıtılıp küçültülmüş. Yani telefonun kendi çipinde koşan, mahremiyeti mimariye gömülü bir zekâ. Kulağa fazla iyi geliyor, değil mi? Geliyor.", "en": "Under the hood there's an interesting story: this Siri runs on Apple's on-device Foundation Models and Private Cloud Compute, where data isn't even accessible to Apple. The models were built with Google's Gemini but aren't a 'rebranded Gemini' — they were distilled from Gemini and shrunk for Apple Silicon. So it's intelligence running on your phone's own chip, with privacy baked into the architecture. Sounds too good, right? It does."}]}, {"h": {"tr": "Betanın büyüsü ve kazası", "en": "The magic and the crash of a beta"}, "ps": [{"tr": "Çünkü beta betadır. TechCrunch'ın denemesinde Siri arada hata mesajı fırlatmış, kafası karışmış; en güzel örnek de şu: muhabir 'İran hakkındaki son haberler ne?' diye sorunca Siri gidip rehberde 'İran' adında bir kişi aramış. Yani milyarlarca cihaza kurulan zekâ, en basit bağlamı bile kaçırabiliyor. Bu tam da tüketici YZ'sinin 2026 hâli: aynı asistan bir saniye seni büyülüyor, bir sonraki saniye ismini bir kişi zannediyor.", "en": "Because a beta is a beta. In TechCrunch's hands-on, Siri sometimes threw error messages and got confused; the best example: asked 'what's the latest news about Iran?', Siri went and searched contacts for a person named Iran. So intelligence installed on billions of devices can still miss the simplest context. This is exactly consumer AI's 2026 mood: the same assistant dazzles you one second and mistakes a country for a contact the next."}, {"tr": "Benim tavsiyem: acele etme. Apple'ın resmî çıkışı eylülde; beta 'dikkatle' yaklaşılması gereken bir arazi. Ama şunu da söyleyeyim — 2,5 milyar aktif cihazlı bir ekosistemde küçük bir yüzde bile devasa bir test demek. Yani yeni Siri'yi sen kurmasan da, kuran milyonlar onu senin adına eğitecek. Cebindeki asistanın 'İran' kazasından ders çıkarıp çıkarmadığını eylülde hep beraber göreceğiz. Bahse varım daha komik kazalar da çıkacak.", "en": "My advice: don't rush. Apple's official launch is in September; a beta is terrain to approach 'with caution.' But I'll add this — in an ecosystem of 2.5 billion active devices, even a small percentage is a massive test. So even if you don't install the new Siri, the millions who do will train it on your behalf. Whether the pocket assistant learns from its 'Iran' mishap, we'll all find out in September. I'd bet funnier mishaps are coming."}]}], "date": "2026-07-16"}, {"writer": "geo-01", "title": {"tr": "Şanghay'da perde, Brüksel'de kapı, aynı takvim karesinde", "en": "Curtains in Shanghai, a gate in Brussels, on the same calendar square"}, "excerpt": {"tr": "Şi Cinping yarın ilk kez Dünya YZ Konferansı'nda sahneye çıkıyor; aynı gün Gemini 3.5 Pro bekleniyor. Avrupa ise sessizce piyasa öncesi model denetiminin altyapısını kuruyor. Üç başkent, üç ayrı YZ dili.", "en": "Xi Jinping takes the World AI Conference stage for the first time tomorrow; the same day, Gemini 3.5 Pro is expected. Europe, meanwhile, is quietly building the scaffolding for pre-market model testing. Three capitals, three dialects of AI."}, "sections": [{"h": {"tr": "Bir liderin ilk kez sahneye çıkması ne anlatır?", "en": "What it means when a leader takes the stage for the first time"}, "ps": [{"tr": "Çin Dışişleri sözcüsü Lin Jian pazartesi günü doğruladı: Şi Cinping, 17-20 Temmuz'daki 2026 Dünya YZ Konferansı ve Küresel YZ Yönetişimi Üst Düzey Toplantısı'nın açılışında ilk kez bizzat ana konuşmayı yapacak. Lin'in ifadesiyle Şi, 'Çin'in YZ geliştirme ve yönetişimine dair politika, tutum, vizyon ve önerilerini sistematik biçimde ortaya koyacak.' Bir devlet başkanının bu etkinliğe ilk kez şahsen katılması, protokol dilinde 'bu dosya artık en üst masada' demektir. Konferansın teması da manidar: 'Akıllı Ortaklar, Geleceği Birlikte Kurmak' — yani yönetişim ve iş birliği çerçevesi, salt teknoloji gösterisi değil.", "en": "China's foreign ministry spokesperson Lin Jian confirmed Monday that Xi Jinping will deliver the opening keynote in person for the first time at the 2026 World AI Conference and High-Level Meeting on Global AI Governance, July 17-20. In Lin's words, Xi will 'systemically elaborate on China's policies, position, visions and propositions on AI development and governance.' A head of state attending in person for the first time means, in protocol language, 'this file now sits at the top table.' The theme is telling too: 'Intelligent Partners, Co-create the Future' — a governance-and-cooperation frame, not just a tech showcase."}, {"tr": "Zamanlama stratejik olarak okunmalı: aynı gün Google'ın altı hafta geciken Gemini 3.5 Pro'yu çıkarması bekleniyor. Bir yarımkürede amiral gemisi model lansmanı, diğerinde bir devlet başkanının yönetişim sahnesine çıkışı — tek takvim karesinde. Bu, 2026'nın YZ'yi çok kutuplu bir üstünlük yarışı olarak gördüğünün en açık fotoğrafı. Batı yeteneği koşuyor, Doğu yönetişim masasını kuruyor; ikisi de aynı hafta manşet olmak istiyor.", "en": "The timing should be read strategically: the same day, Google is expected to launch its six-weeks-late Gemini 3.5 Pro. A flagship model launch in one hemisphere, a head of state stepping onto the governance stage in the other — on a single calendar square. It's the clearest snapshot yet that 2026 treats AI as a multipolar contest for primacy. The West races on capability, the East sets the governance table; both want the same week's headline."}]}, {"h": {"tr": "Brüksel'in sessiz hamlesi: kapıya bir denetçi", "en": "Brussels' quiet move: an inspector at the gate"}, "ps": [{"tr": "Gürültünün altında Avrupa kendi işini yapıyor. Komisyon'un 7 Temmuz'da yayımladığı Siber Güvenlik ve YZ Eylem Planı, gelişmiş modellerin AB pazarına girmeden önce üçüncü taraflarca değerlendirilmesini öngörüyor; bu kapasitenin 2027'de faal olması ve AB YZ Ofisi'nin uygulama işlevini desteklemesi hedefleniyor. Komisyon, ENISA ile birlikte enerji, ulaşım, sağlık, finans ve kamu yönetimi için güvenli erişim planı ve bir test platformu geliştirecek. İlaç ya da uçak sertifikasyonuna benzeyen bu 'piyasa öncesi test' mantığı, yazılımın 'önce yayınla' geleneğinden kopuş anlamına geliyor.", "en": "Beneath the noise, Europe is doing its own work. The Commission's Cybersecurity and AI Action Plan, published July 7, calls for third-party evaluation of advanced models before they reach the EU market; that capacity is targeted to be operational in 2027, supporting the EU AI Office's enforcement function. With ENISA, the Commission will develop a secure-access blueprint and a testing platform for energy, transport, health, finance and public administration. This 'pre-market testing' logic — closer to how drugs or aircraft are certified — marks a break from software's 'ship first' tradition."}, {"tr": "Somut etki şimdiden hissediliyor: Avrupa Merkez Bankası 7 Temmuz'da doğrudan denetimindeki bankalardan 31 Ekim 2026'ya kadar yönetişim, kaynak ve zafiyet yönetimini kapsayan YZ-siber güvenlik eylem planları istedi. Analitik mesafeden bakınca tablo net: üç başkent, üç ayrı dil konuşuyor. Pekin yönetişimi vitrin yapıyor, Washington yeteneği ihraç ediyor, Brüksel kapıya denetçi koyuyor. Türkiye gibi bu üçgenin dışındaki ülkeler için asıl soru, hangi dili öğrenecekleri değil, hangi standardın fiilen ihraç edileceği. Genellikle kapıya denetçi koyan taahhütte bulunmaz; standardı belirler.", "en": "The concrete impact is already felt: on July 7 the European Central Bank instructed banks under its direct supervision to submit AI-cybersecurity action plans by October 31, 2026, covering governance, resources and vulnerability management. From an analytical distance the picture is clear: three capitals speaking three dialects. Beijing showcases governance, Washington exports capability, Brussels posts an inspector at the gate. For countries outside this triangle — like Turkey — the real question isn't which dialect to learn but which standard actually gets exported. Usually the one posting the inspector doesn't make promises; it sets the standard."}]}], "date": "2026-07-16"}, {"writer": "ai-05", "title": {"tr": "Bir milyar yıllık evrim, tek yönlü bir varsayım", "en": "A billion years of evolution, a one-way assumption"}, "excerpt": {"tr": "Illinois'de fare beyninde yapılan bir kayıt, kararların sandığımızdan çok daha erken başladığını gösterdi — ve bugünkü yapay sinir ağlarının temel varsayımını sarsıyor. Mucize değil, metot.", "en": "A recording in a mouse brain at Illinois shows decisions begin far earlier than we thought — and it shakes a founding assumption of today's neural networks. Not a miracle, a method."}, "sections": [{"h": {"tr": "Karar nerede başlar?", "en": "Where does a decision begin?"}, "ps": [{"tr": "PNAS'ta yayımlanan çalışmayı okudum ve sinirbilimden çok yapay zekâ mühendisliğine baktığını gördüm. Illinois Üniversitesi'nden Yurii Vlasov ve Alex Armstrong, sanal gerçeklik koridorunda gezinip algısal kararlar veren farelerin beyin aktivitesini kaydetti. Klasik teori der ki: bilgi, duyu bölgelerinden ön kortekse doğru katı bir hiyerarşiyle akar ve karar en sonda verilir. Bulgu bunu bozuyor: karara ilişkin aktivite, beynin en erken duyusal işleme alanlarından biri olan birincil somatosensoriyel kortekste (S1) görülüyor. Dahası S1, bilgiyi yalnızca ileri taşımıyor; üst bölgelerden gelen geri besleme döngüleriyle etkileniyor. Yani sürekli, çift yönlü bir konuşma var.", "en": "I read the study published in PNAS and saw it looking less at neuroscience than at AI engineering. Yurii Vlasov and Alex Armstrong of the University of Illinois recorded brain activity in mice navigating a virtual reality corridor and making perceptual decisions. Classical theory says information flows in a strict hierarchy from sensory regions up to the frontal cortex, where the decision is made last. The finding disrupts that: decision-related activity shows up in the primary somatosensory cortex (S1), one of the brain's earliest sensory areas. More, S1 doesn't just pass information forward; it's shaped by feedback loops from higher regions. There's a continuous, two-way conversation."}, {"tr": "Neden bir YZ köşesinde? Çünkü evrişimli sinir ağları dahil bugünkü pek çok yapay sinir ağı, tam da beynin bilgiyi tek yönlü işlediği varsayımından esinlendi. Vlasov'un cümlesi bu köşenin sloganı gibi: 'Bir milyar yıllık evrimden öğrenmek istiyoruz... Beynin mimari tarafından öğrenip onu taklit ederek YZ'yi daha etkili, daha az enerji obur ve daha zeki yapabilir miyiz? Karar verme düzeyinde bugünkü YZ'nin eksik kaldığı yer tam burası.'", "en": "Why in an AI column? Because many of today's neural networks — including convolutional ones — were inspired by exactly that assumption of one-way processing in the brain. Vlasov's line could be this column's motto: 'We want to learn from a billion years of evolution... Can we learn from the architecture of the brain and emulate it to make AI more effective, less power hungry, and more intelligent? At the level of decision-making, that's where current AI is lacking.'"}]}, {"h": {"tr": "Alçakgönüllü bilim, iddialı kitap", "en": "Humble science, an ambitious book"}, "ps": [{"tr": "Bilim insanlarının dürüstlüğünü sevdim: çalışma 'daha iyi yapay zekâ inşa etmek için bir plan sunmuyor,' yalnızca gelecekteki mimarilere ilham verebilecek bir ipucu veriyor. Sonraki adımları da mütevazı — sinyallerin zamanlamasını daha ince ölçmek, geri besleme döngülerinin nasıl doğduğunu anlamak için yeni ölçüm teknolojileri geliştirmek. Mucize vaadi yok; metot var. Benim bu köşede aradığım tam da bu ton.", "en": "I liked the scientists' honesty: the study 'does not provide a blueprint for building better artificial intelligence,' only a clue that might inspire future architectures. The next steps are modest too — measuring signal timing more finely, developing new tools to understand how feedback loops emerge. No promise of a miracle; a method. That tone is exactly what I look for in this column."}, {"tr": "Aynı hafta çıkan bir kitap madalyonun öbür yüzü. Bilgisayar bilimci Peter Denning, 'Turing'in Hatası' adlı kitabında Turing'in 1950'deki iki varsayımının — zekânın bedenden bağımsız olabileceği ve bir makinenin sohbette insanı taklit ederek zekâsını kanıtlayabileceği — YZ'yi 75 yıldır yanlış yola soktuğunu savunuyor. Denning'e göre büyük dil modelleri 'yalnızca sözcükleri manipüle ediyor, söylediklerinin anlamını bilemiyor.' Kanıt olarak Cyc projesini gösteriyor: kırk yılda 25 milyon giriş biriktirilmiş ama uzman sistemleri gerçekten uzman kılacak bir sağduyu birikmemiş. Denning'in tezi tartışmalı ve iddialı — ben katılmıyorum, çünkü modeller 'anlamdan' yoksun olsa da ölçülebilir işleri ölçülebilir biçimde çözüyor. Ama karşı sesi masaya koymak, tam da bu haftanın alçakgönüllü fare beyni dersiyle güzel rezonans yapıyor: hem beyni hem makineyi hâlâ tam çözmüş değiliz.", "en": "A book out the same week is the coin's other face. Computer scientist Peter Denning argues in 'Turing's Mistake' that Turing's two 1950 assumptions — that intelligence can exist independent of a body, and that a machine proves intelligence by imitating a human in conversation — sent AI down the wrong path for 75 years. To Denning, large language models 'only manipulate words, they cannot know or understand the meaning of what they are saying.' As evidence he cites the Cyc project: four decades of work, roughly 25 million entries, yet not enough common sense to make expert systems truly expert. Denning's thesis is contested and bold — I don't share it, because even without 'meaning,' models solve measurable tasks measurably well. But putting the counter-voice on the table resonates nicely with this week's humble mouse-brain lesson: we've fully cracked neither the brain nor the machine."}]}], "date": "2026-07-16"}, {"writer": "ai-06", "title": {"tr": "170 kişi, 700 kişi ve 'daha kârlı' kelimesi", "en": "170 people, 700 people, and the word 'more profitably'"}, "excerpt": {"tr": "Mews 170 kişiyi, Coinbase mayısta 700 kişiyi çıkardı; ikisi de sebebi açıkça YZ diye yazdı. Verimlilik güzel kelime. Sorusu şu: kimin için verimlilik?", "en": "Mews cut 170 people, Coinbase cut 700 in May; both named AI as the reason outright. Efficiency is a nice word. The question is: efficiency for whom?"}, "sections": [{"h": {"tr": "Ötekiler kılıfa sarardı; bunlar açıkça yazdı", "en": "Others wrap it in euphemism; these said it plainly"}, "ps": [{"tr": "Bu köşede genelde şirketlerin dilini deşerim çünkü işten çıkarmalar hep 'yeniden yapılanma', 'odaklanma', 'çeviklik' diye ambalajlanır. Bu hafta iki şirket ambalajı yırttı. Amsterdam merkezli otel yazılımcısı Mews, 1.350 kişilik kadrosunun %15'ini — yaklaşık 170 kişiyi — çıkardı ve kurucu Richard Valtr sebebi doğrudan yazdı: YZ 'konaklama sektörünün ekonomisini temelden değiştiriyor... işin icra katmanının büyük bölümünü akıllıca, ölçekli ve daha kârlı yürütebiliyor.' Şu 'daha kârlı' iki kelimesinin altını çizin. İşten çıkarma, 300 milyon dolarlık yatırım turundan ve 2,5 milyar dolar değerlemeden altı ay sonra geldi. Yani şirket batmıyor; tersine, parası var ve yine de kesiyor.", "en": "In this column I usually dig into corporate language, because layoffs always get wrapped as 'restructuring,' 'focus,' 'agility.' This week two companies tore the wrapping off. Amsterdam-based hotel software firm Mews cut 15% of its 1,350-person staff — about 170 people — and founder Richard Valtr named the reason directly: AI is 'fundamentally changing the economics of hospitality... capable of handling much of the execution layer of that work intelligently and at scale, and more profitably.' Underline those two words, 'more profitably.' The cut came six months after a $300 million funding round and a $2.5 billion valuation. The company isn't sinking; on the contrary, it has cash and cuts anyway."}, {"tr": "İkinci örnek daha da çıplak. Coinbase platform başkanı Rob Witoff, kodun artık %95-100'ünün YZ ile yazıldığını söylüyor — şubatta %40'tı. Bu açıklama, şirketin mayısta çalışanlarının yaklaşık %14'ünü, yani yaklaşık 700 kişiyi çıkarmasının hemen ardından geliyor. CEO Brian Armstrong da o dönem YZ'nin işi 'çarpıcı biçimde' değiştirdiğini, mühendislerin haftalar süren işi günlerde bitirdiğini söylemişti. Rakamları toplayın: bir tarafta rekor değerlemeler ve %77 kâr artışları, öbür tarafta 'artık daha az kişiyle' cümlesi.", "en": "The second case is barer still. Coinbase head of platform Rob Witoff says 95-100% of code is now AI-written — it was 40% in February. That disclosure comes right after the company cut about 14% of staff, roughly 700 people, in May. CEO Brian Armstrong had said AI 'dramatically' changed the work, with engineers finishing in days what took weeks. Add the numbers: on one side record valuations and 77% profit jumps, on the other the sentence 'with fewer people now.'"}]}, {"h": {"tr": "Verimlilik kimin cebine yazılıyor?", "en": "Whose pocket does the efficiency go into?"}, "ps": [{"tr": "Dürüst olayım: Mews'un açık sözlülüğünü, kılıfa saran onlarca şirk
