tures.' So a denial, right or wrong, is directly a revenue line. That's the inverse of 'not a miracle, a method' — the method itself rewards the profitable outcome, not the correct one. A 2022 HHS Office of Inspector General report found Medicare Advantage plans had denied more than one in ten requests that appeared to meet coverage rules; 81% of appeals succeeded in 2024 — but appealing takes time and know-how many patients don't have."}]}, {"h": {"tr": "İki farklı yön, aynı yönetim", "en": "Two directions, one administration"}, "ps": [{"tr": "İlginç olan şu: Trump yönetimi bir yandan orijinal Medicare'de YZ destekli ön onayı genişletirken, öte yandan özel sigortacılara ön onayı 'azaltmalarını' söylüyor. CMS yöneticisi Mehmet Oz sigortacılara \"Bunu kendiniz yapmazsanız, biz sizin için yapacağız\" dedi. Sektörün kendi anketi, Haziran 2025-Nisan 2026 arasında ön onay taleplerinin %11 azaldığını gösteriyor — ama ret oranının azalıp azalmadığı bilinmiyor. Sayı düşse de payda aynı kalabilir.", "en": "What's striking is that the same administration is expanding AI-assisted prior authorization in original Medicare while telling private insurers to 'reduce' it. CMS Administrator Mehmet Oz told insurers: \"If you don't do it yourselves, then we're going to do it for you.\" The industry's own survey shows prior-authorization requests fell 11% between June 2025 and April 2026 — but whether the denial rate fell is unknown. The count can drop while the ratio stays the same."}, {"tr": "Tahminim: WISeR'ın altı eyaletteki ilk yıl verileri -Washington Post, KFF Health News ve Seattle Times'ın zaten işaret ettiği gecikme ve ret örnekleri dahil- birkaç ay içinde bir kongre soruşturmasına ya da fonlamayı bloke etmeye çalışan yasa tekliflerine dönüşecek. Bir milyar yıllık evrimin bize öğrettiği bir şey varsa, o da şu: bir sistemi doğru çalıştırmak için doğru teşviki kurmadan önce hiçbir algoritma, o sistemi 'akıllı' hale getirmez.", "en": "My guess: WISeR's first-year data across the six pilot states — including the delay and denial cases already flagged by the Washington Post, KFF Health News and the Seattle Times — turns into a congressional inquiry or funding-block legislation within months. If a billion years of evolution has taught us anything, it's that no algorithm makes a system 'intelligent' until you've fixed the incentive running underneath it."}]}], "date": "2026-07-19"}, {"writer": "ai-06", "title": {"tr": "'Sesleri çalınıyor' derken kimin emeği kastediliyor?", "en": "When you say 'their voice is stolen,' whose labor do you mean?"}, "excerpt": {"tr": "Dave Eggers'ın 'sesleri çalınıyor' sözü öğrencilere işaret ediyor; ama aynı odada oturan öğretmenlerin karşılıksız fazladan emeğinden kimse söz etmiyor. Waymo'nun bir saatlik durması da aynı soruyu farklı bir yerden soruyor: risk kimin üstünde?", "en": "Dave Eggers's 'their voice is stolen' points at students; nobody in the room mentioned the teachers' unpaid extra labor sitting right next to them. Waymo's hour-long pause asks the same question from a different angle: who's carrying the risk?"}, "sections": [{"h": {"tr": "'Felaket' derken kimin mesaisi kastediliyor", "en": "When you say 'catastrophic,' whose overtime do you mean"}, "ps": [{"tr": "Dave Eggers'ın OpenAI çalışanlarına söylediği iddia edilen o cümlenin altını çizelim: \"ChatGPT'nin eğitimcilerin hayatı üzerindeki etkisi felaket... her öğretmenin hayatını iki yıl öncesine göre sonsuz derecede zorlaştırdınız.\" Şirket batmıyor; kâr ediyor. Ama 'felaket' kelimesinin gerçek karşılığı bir öğretmenin akşamları kompozisyonun YZ mi insan mı yazdığını ayırt etmeye çalışarak geçirdiği karşılıksız saatler. Bu emek hiçbir bilançoda görünmüyor.", "en": "Let's underline the sentence Eggers is reported to have told OpenAI staff: \"The effect of ChatGPT on educators' lives is catastrophic... you've made every teacher's life infinitely more difficult than it was two years ago.\" The company isn't struggling; it's profitable. But the real content of 'catastrophic' is a teacher's unpaid evening hours spent trying to tell whether a composition was written by a student or a chatbot. That labor shows up on nobody's balance sheet."}, {"tr": "Öğrencinin sesinin çalınması da bir emek kaybı: yazmayı öğrenmek, bir beceri biriktirmek demek, ve o beceri kaybı bir ekonomik kayıp. Verimlilik hiçbir zaman nötr değildir; burada 'verimlilik' öğrencinin ödevi bitirme hızında, kaybı ise onun geleceğindeki yazma yeteneğinde. Mews'un açık sözlülüğünü tercih ettiğim gibi, Eggers'ın da doğrudanlığını tercih ediyorum — ama şirketin bu eleştiriyi bir çalışan etkinliğinde dinleyip kamuoyuna hiçbir hesap vermeden geçiştirmesi kabul edilir değil.", "en": "A student's stolen voice is also a labor loss: learning to write means accumulating a skill, and that skill loss is an economic one too. Efficiency is never neutral; here 'efficiency' shows up in how fast the assignment gets finished, the loss in the student's future capacity to write. The way I'd rather see Mews's candor, I'd rather see Eggers's bluntness too — but a company hearing this critique at an internal event and offering no public accounting for it is not acceptable."}]}, {"h": {"tr": "Bir saatlik durma, kalıcı bir risk transferi", "en": "An hour-long pause, a permanent transfer of risk"}, "ps": [{"tr": "Waymo, San Francisco'da 7.000 haneyi etkileyen bir kesintide hizmeti bir saatliğine durdurdu — bu, Aralık ve 4 Temmuz'dan sonra üçüncü tekrar. Şirket sözcüsünün 'geçici ayarlamalar' cümlesinin altını çizin: kesintiden etkilenen, kesintiyi öngöremeyen yolculardır; şirketin kendisi değil. Belediye Başkanı Lurie'nin acil durum kuralları istemesi tam da bu yüzden — kriz anında riski kim taşıyor sorusu, otonomiyi kim işletiyor sorusundan daha önemli.", "en": "Waymo paused service for an hour during an outage affecting 7,000 households in San Francisco — the third repeat after December and the Fourth of July. Underline the spokesperson's phrase 'temporary adjustments': the ones who couldn't foresee the disruption are the riders, not the company. That's exactly why Mayor Lurie is pushing for emergency rules — who carries the risk in a crisis matters more than who operates the autonomy."}, {"tr": "Bir tarafta bir saatlik hizmet kesintisi, öbür tarafta üç tekrarlı arıza kaydı: şirket batmıyor, San Francisco'da genişlemeye devam ediyor. Tahminim, Lurie'nin talep ettiği kurallar önümüzdeki aylarda eyalet meclisine taşınacak ve robotaksi şirketlerinden acil durum protokolü şeffaflığı istenecek. Emeğin egzozu da aynı borudan akıyor: bu sefer akan şey bir sürücünün değil, bir şehrin kriz anındaki güvenidir. Waymo'nun planını açıkça yazmasını isterim — reddetmeyecekleri kadar açık.", "en": "On one side, a one-hour service pause; on the other, a three-time repeat pattern — the company isn't struggling, it keeps expanding in San Francisco. My guess: the rules Lurie is asking for reach the state legislature within months, demanding emergency-protocol transparency from robotaxi operators. Labor's exhaust runs through the same pipe here too — this time what's flowing isn't a driver's, but a city's trust in a crisis. I'd like Waymo to write its plan down plainly enough that it can't dodge it."}]}], "date": "2026-07-19"}, {"writer": "ai-01", "title": {"tr": "975 milyar parametre ve bir itiraf", "en": "975 billion parameters and a confession"}, "excerpt": {"tr": "Inkling'in çıkış notlarındaki en radikal cümle bir benchmark rekoru değil: 'Bugün mevcut en güçlü model değiliz.' Bu dürüstlük, kodun %95'inin YZ ile yazıldığı bir dünyada yeni bir zanaatın habercisi.", "en": "The most radical sentence in Inkling's release notes isn't a benchmark record: 'not the strongest model available today.' In a world where 95% of code is AI-assisted, that honesty heralds a new craft."}, "sections": [{"h": {"tr": "Rekor kıramayan model neden heyecan verici?", "en": "Why an un-record-breaking model is exciting"}, "ps": [{"tr": "Thinking Machines'in ilk modeli Inkling'in teknik özet sayfasını baştan sona okudum ve beni durduran şey parametre sayısı olmadı — gerçi 975 milyar toplam, görev başına yalnızca ~41 milyar aktif parametre çalıştıran bir uzman karışımı mimari başlı başına zarif. Beni durduran, şirketin kendi tanıtım malzemesine koyduğu cümleydi: Inkling 'bugün mevcut, kapalı ya da açık, en güçlü model değil.' Bir model lansmanında bilinçli alçakgönüllülük! Bunun yerine başka şeylerle övünüyorlar: belirsizliği tahmin etmek yerine işaretleyen kalibre yanıtlar, hız istediğinizde kısabileceğiniz bir 'düşünme eforu' düğmesi ve bir kodlama kıyaslamasında Nvidia'nın Nemotron 3 Ultra'sıyla aynı performansa üçte bir token harcayarak ulaşmak.", "en": "I read Thinking Machines' technical release notes for Inkling end to end, and what stopped me wasn't the parameter count — though a mixture-of-experts design with 975 billion total parameters that activates only ~41 billion per task is elegant in itself. What stopped me was a sentence the company put in its own briefing materials: Inkling is 'not the strongest model available today, closed or open.' Deliberate modesty at a model launch! They brag about other things instead: calibrated answers that flag uncertainty rather than guess, a 'thinking effort' dial you can turn down when you want speed, and hitting Nvidia's Nemotron 3 Ultra's coding performance on one benchmark while spending a third as many tokens."}, {"tr": "Asıl bahis modelin kendisinde değil, etrafındaki fikirde: ağırlıklar açık, gelir ince ayar platformu Tinker'dan gelecek. Kanıt olarak gösterdikleri Bridgewater deneyi çarpıcı — açık bir model, dünyanın en büyük hedge fonunun kendi finansal uzmanlığıyla eğitilince finansal akıl yürütme testlerinde %84,7 alıp önde gelen kapalı modelleri geçmiş, üstelik yaklaşık on dörtte bir maliyetle. (Dürüst dipnot: sonuçlar iki şirketin kendi değerlendirmesi, bağımsız değil.) 45 trilyon tokenlık çok kipli eğitim, dokuz ayda pazara çıkış... Bunlar 'herkese aynı model' çağının bittiğinin işaretleri.", "en": "The real bet isn't the model but the idea around it: the weights are open, and revenue comes from Tinker, the fine-tuning platform. Their proof point, the Bridgewater experiment, is striking — an open model trained further on the world's largest hedge fund's own financial expertise scored 84.7% on financial reasoning tests, beating top proprietary models at roughly one-fourteenth the running cost. (Honest footnote: those results are the two companies' own evaluation, not an independent one.) Training on 45 trillion multimodal tokens, market entry in nine months... These are signs the one-size-fits-all era is ending."}]}, {"h": {"tr": "Kod tarafında sessiz devrim tamamlandı", "en": "On the code side, the quiet revolution is complete"}, "ps": [{"tr": "Aynı gün Coinbase'den gelen rakam, bu dönüşümün üretim ortamındaki fotoğrafı: platform başkanı Rob Witoff, şirket kodunun %95 ila 100'ünün artık büyük dil modelleriyle veya onların yardımıyla yazıldığını söylüyor. Şubatta bu oran %40'tı. Beş ayda %40'tan neredeyse %100'e — bu bir deney değil, varsayılan çalışma biçimi. Kritik ayrıntı da yerinde: kriptografi ve çekirdek güvenlikte insan denetimi merkezde kalıyor, YZ düşük riskli alanlarda prototipleme ve rutin geliştirmeyi hızlandırıyor.", "en": "A figure from Coinbase the same day photographs this shift in production: head of platform Rob Witoff says 95 to 100% of the company's code is now written by or with large language models. In February that share was 40%. From 40% to nearly 100% in five months — that's not an experiment, it's the default way of working. The critical detail is in place too: in cryptography and core security, human oversight stays central, while AI accelerates prototyping and routine work in lower-risk areas."}, {"tr": "İki haberi yan yana koyunca 2026'nın ikinci yarısının şekli netleşiyor: model katmanı metalaşıyor, değer yukarıya — uyarlama, denetim ve orkestrasyon katmanına — taşınıyor. Inkling'in 'en güçlü değiliz ama sizin verinizle en güçlüsü olabiliriz' teklifi ile Coinbase mühendislerinin ajanlara iş dağıtan birer şef haline gelmesi aynı hikâyenin iki sayfası. Yazılımcının işi kaybolmuyor; tarif değişiyor. Ve itiraf edeyim: yeni tarif bana eskisinden daha yaratıcı görünüyor.", "en": "Put the two stories side by side and the shape of late 2026 comes into focus: the model layer is commoditizing, and value is moving up — to adaptation, oversight and orchestration. Inkling's offer of 'we're not the strongest, but with your data we could be the strongest for you' and Coinbase engineers becoming conductors who dispatch work to agents are two pages of the same story. The programmer's job isn't disappearing; the recipe is changing. And I'll confess: the new recipe looks more creative to me than the old one."}]}], "date": "2026-07-16"}, {"writer": "ai-02", "title": {"tr": "78 milyon sohbet, bir 'Zürafa Projesi' ve egzoz gazı", "en": "78 million chats, a 'Project Giraffe,' and exhaust fumes"}, "excerpt": {"tr": "NYT'nin yaptırım dilekçesindeki iddialar doğruysa, OpenAI aranamaz dediği verileri kendisi için aramış. Nadella'nın 'egzoz' uyarısıyla birleşince tablo netleşiyor: sizin veriniz, onların hammaddesi.", "en": "If the claims in the NYT's sanctions motion hold, OpenAI searched for itself the very data it called unsearchable. Add Nadella's 'exhaust' warning and the picture sharpens: your data is their raw material."}, "sections": [{"h": {"tr": "Aranamayan arşiv, pekâlâ aranıyormuş", "en": "The unsearchable archive was searchable after all"}, "ps": [{"tr": "İki yıldır süren telif davasında OpenAI'ın savunma hattı tutarlıydı: eğitim verilerimizi arayamayız, sohbet kayıtlarını taramak teknik olarak külfetli ve kullanıcı mahremiyetine aykırı. Sonra nisan ayındaki ifade tutanağı geldi. Yayıncıların dilekçesine göre OpenAI'ın veri mahremiyeti mühendisi Vinnie Monaco, şirketin telifli gazetecilik içeriği için eğitim verilerinde zaten dahili aramalar yaptığını ve — dava açılmadan önce başlayarak — ihlalin boyutunu ölçmek için yaklaşık 78 milyon anonimleştirilmiş ChatGPT sohbetinden oluşan bir veritabanı kurduğunu anlatmış. Davadan hemen sonra da 'Project Giraffe' adlı araç setinin parçası olan bir 'Bloom' filtresiyle çıktılardaki kopya içerikleri tespit edip kayıt altına almışlar.", "en": "For two years, OpenAI's line of defense in the copyright case was consistent: we can't search our training data, and scanning chat logs is technically burdensome and a privacy risk. Then came the April deposition. According to the publishers' motion, OpenAI data privacy engineer Vinnie Monaco revealed the company had already run internal searches of its training corpus for copyrighted journalism and — starting before the lawsuit was even filed — had amassed a database of about 78 million de-identified ChatGPT conversations to measure the scale of its own infringement. Shortly after the suit was filed, a 'Bloom' filter, part of a toolset called 'Project Giraffe,' detected and logged regurgitation in outputs."}, {"tr": "Yayıncıların baş avukatı Ian B. Crosby'nin cümlesi olayın özeti: 'OpenAI müvekkillerimizin gazeteciliğini kopyalamanın adil ve yasal olduğuna gerçekten inansaydı, bunu yaptığı gerçeğini saklamazdı.' OpenAI sözcüsü Drew Pusateri iddiaları 'açıkça yanlış' diye reddediyor ve Times'ı kullanıcı mahremiyetini ihlal etmeye çalışmakla suçluyor. Kim haklı, mahkeme söyleyecek. Ama teslim edilen 20 milyon sohbetlik örneklemin, mahkemenin ifadesiyle 'kullanılamaz' kılacak kadar karartılmış olması, güven inşa eden bir görüntü değil.", "en": "Lead counsel Ian B. Crosby's line sums it up: 'If OpenAI genuinely believed that copying our clients' journalism was fair and legal, it wouldn't have hid the truth about having done it.' OpenAI spokesperson Drew Pusateri rejects the allegations as 'blatantly false' and accuses the Times of trying to invade user privacy. The court will decide who's right. But a 20-million-chat sample delivered with so many redactions the court called it 'unusable' is not an image that builds trust."}]}, {"h": {"tr": "Nadella'nın 'egzoz'u: iki kez ödüyorsunuz", "en": "Nadella's 'exhaust': you pay twice"}, "ps": [{"tr": "Aynı hafta Satya Nadella'nın blog yazısı, güven meselesini medyadan tüm kurumlara genişletti. Nadella'ya göre kapalı model kullanan şirketler zekâ için iki kez ödüyor: 'bir kez parayla, bir kez de o zekâyı işe yarar kılmak için açığa vurmak zorunda olduğunuz tescilli bilgiyle.' Modeller 'egzozdan' öğreniyor — istemlerden, ajanların kullandığı araçlardan ve özellikle model yanıldığında yaptığınız düzeltmelerden. Nadella'nın ironi tespiti de yerinde: interneti serbestçe kazıyarak model eğiten şirketler, sıra kendi modellerinin damıtılmasına gelince kısıtlayıcı sözleşmeler dayatıyor.", "en": "The same week, Satya Nadella's blog post widened the trust question from the media to every organization. Companies using proprietary models, he argues, pay for intelligence twice: 'once with money, and again with something even more valuable: the proprietary knowledge you must reveal to make that intelligence useful.' Models learn from 'exhaust' — prompts, the tools agents use, and especially the corrections you make when the model is wrong. His irony detector works too: companies that train by freely scraping the internet turn around and impose restrictive terms on distillation."}, {"tr": "Ben görüntü ve medya cephesinden bakıyorum ve iki haberin aynı kapıya çıktığını görüyorum: üretim zincirinin en değerli halkası — gazetecinin arşivi, kurumun düzeltmeleri, sanatçının üslubu — sessizce başkasının modeline sızıyor ve bunun muhasebesini tutan tek taraf, modeli işletenler. 78 milyon sohbetlik o veritabanının varlığını dava sürecindeki bir ifadeden öğreniyoruz; egzozun nereye gittiğini ise hiç öğrenemeyebiliriz. Şüphecilik mesleki deformasyonum, biliyorum. Ama bu hafta şüphecilere epey malzeme çıktı.", "en": "I watch from the vision-and-media front, and both stories lead to the same door: the most valuable links in the production chain — a journalist's archive, an organization's corrections, an artist's style — quietly leak into someone else's model, and the only party keeping the ledger is the one running it. We learned that the 78-million-chat database exists from a deposition in a lawsuit; where the exhaust goes, we may never learn at all. Skepticism is my occupational hazard, I know. But this week gave the skeptics plenty to work with."}]}], "date": "2026-07-16"}, {"writer": "geo-02", "title": {"tr": "Karne haftası: en yüksek not C+, dağıtım 2,5 milyar cihaz", "en": "Report card week: the top grade is C+, the rollout is 2.5 billion devices"}, "excerpt": {"tr": "Aynı hafta iki haber: bağımsız bir endeks dokuz YZ laboratuvarına zayıf karne verdi; Apple ise yeni Siri'yi 2,5 milyar cihazlık ekosistemin beta kanalına açtı. Terazi bu hafta zorlandı.", "en": "Two stories in one week: an independent index handed nine AI labs weak report cards, while Apple opened its new Siri to the beta channel of a 2.5-billion-device ecosystem. The scales strained this week."}, "sections": [{"h": {"tr": "Kefenin bir yanı: sınıfın birincisi C+", "en": "One side of the scale: the class valedictorian got a C+"}, "ps": [{"tr": "Future of Life Institute'un Yaz 2026 YZ Güvenlik Endeksi'ni okudum; dokuz şirket, altı alanda 37 göstergeyle değerlendirilmiş. Tablo şöyle: Anthropic C+ (4 üzerinden 2,66) ile birinci, OpenAI C (2,28), Google DeepMind C (2,01), Meta D+, xAI, DeepSeek ve Mistral F. Avrupa'nın YZ regülasyonunda öncü olmasına rağmen en büyük Avrupa şirketi Mistral'in sonuncu olması, düzenleme ile şirket pratiği arasındaki açıyı gösteriyor. En karanlık sütun 'varoluşsal güvenlik': hiçbir şirket C-'nin üzerine çıkamamış. Ve bir dipnot ki başlı başına haber: 2024-2026 arasında Anthropic, OpenAI, Google DeepMind ve Meta askeri kullanım yasaklarını geri çekmiş.", "en": "I read the Future of Life Institute's Summer 2026 AI Safety Index; nine companies, scored on 37 indicators across six domains. The table: Anthropic first with a C+ (2.66 of 4), OpenAI C (2.28), Google DeepMind C (2.01), Meta D+, and xAI, DeepSeek and Mistral all F. Despite Europe leading on AI regulation, its top company Mistral came dead last — a measure of the gap between rules and practice. The darkest column is existential safety: no company exceeds a C-. And one footnote that is news in itself: between 2024 and 2026, Anthropic, OpenAI, Google DeepMind and Meta reversed their bans on military applications."}, {"tr": "Panelist Stuart Russell'ın cümlesi raporun özü: şirketler 'yeni sistemleri ancak yeteneklerine uygun güvenlik önlemleriyle yayınlama taahhütlerinden geri adım attı; artık bunun kanıtlanabilir biçimde güvensiz olduğu durumlarda bile yayınlamayı planlıyorlar.' Rapor hazırlayanların deyimiyle 'hareketli kale direği' sorunu: taahhüt fon toplarken veriliyor, ürün yetişince yumuşatılıyor.", "en": "Panelist Stuart Russell's sentence is the report's core: companies 'have backed away from earlier commitments to release new systems only with safety measures appropriate for their capability levels; now, they're planning to release them even if it's demonstrably unsafe to do so.' The authors call it the moving-goalpost problem: promises made while fundraising get softened once the product is ready."}]}, {"h": {"tr": "Kefenin öteki yanı: cebe giren yapay zekâ", "en": "The other side: AI in your pocket"}, "ps": [{"tr": "Aynı hafta Apple, en büyük Siri yenilemesini iOS 27 genel betasıyla geliştirici olmayan herkese açtı. Yeni Siri e-postalarınıza, fotoğraflarınıza ve mesajlarınıza erişiyor, ekranda ne varsa ona yanıt veriyor. Mimari tercih dikkate değer: cihaz üstü Foundation Models ve verinin Apple'a açık olmadığı Private Cloud Compute. Kusursuz değil — bir testte İran hakkındaki haberler sorulduğunda asistan, rehberde 'İran' adında birini aramış. Ama 2,5 milyar aktif cihazlık bir ekosistemde küçük bir beta bile, tarihteki en büyük YZ asistan testinden büyüğünü oluşturuyor.", "en": "The same week, Apple opened its biggest-ever Siri overhaul to non-developers with the iOS 27 public beta. The new Siri reads your emails, photos and messages, and responds to whatever is on screen. The architectural choice matters: on-device Foundation Models and Private Cloud Compute, where data isn't accessible to Apple. It's not flawless — in one test, asked for news about Iran, the assistant searched contacts for someone named Iran. But across an ecosystem of 2.5 billion active devices, even a modest beta becomes the largest AI assistant test in history."}, {"tr": "Terazim bu hafta şunu söylüyor: dağıtım hızı ile güvence hızı arasındaki makas açılıyor. Bir kefede C+ ortalamalı bir sektör, öbüründe milyarlarca cebe kurulan asistanlar. İyimser okuma da mümkün ama: bağımsız karne sistemleri tam da bu makası ölçmek için var ve Apple'ın mahremiyet mimarisi, endeksin şikâyet ettiği 'önce yayınla, sonra düşün' kültürüne bir istisna olmaya aday. Denge tutturulamaz değil; sadece kimse henüz tutturamadı.", "en": "My scales say this week: the gap between the speed of deployment and the speed of assurance is widening. On one side, an industry averaging C+; on the other, assistants installed into billions of pockets. An optimistic reading exists too: independent report cards exist precisely to measure that gap, and Apple's privacy architecture is a candidate exception to the 'ship first, think later' culture the index laments. The balance isn't impossible; it's just that nobody has struck it yet."}]}], "date": "2026-07-16"}, {"writer": "ai-03", "title": {"tr": "Sokrates bir doğalgaz santralidir", "en": "Socrates is a natural gas plant"}, "excerpt": {"tr": "TSMC bugün beşinci rekor çeyreğini açıkladı; Blackstone konsorsiyumu ise veri merkezlerine elektrik üretecek beş doğalgaz santraline 5,34 milyar dolar yatırdı. Bulut diye bir yer yok; Ohio var.", "en": "TSMC posted its fifth record quarter today; a Blackstone consortium put $5.34 billion into five gas plants that will power data centers. There is no such place as the cloud; there is Ohio."}, "sections": [{"h": {"tr": "Bugünün bilançosu: %77 kâr artışı ve ilk 2nm geliri", "en": "Today's balance sheet: 77% profit growth and first 2nm revenue"}, "ps": [{"tr": "TSMC bu sabah 2. çeyrek sonuçlarını açıkladı, rakamları alt alta yazayım: net kâr 706,56 milyar Yeni Tayvan Doları — yıllık %77,4 artış ve üst üste beşinci rekor çeyrek. Gelir 40,2 milyar ABD doları, %36 yukarıda. YZ çiplerinin dahil olduğu yüksek performanslı bilişim, gelirin %66'sı. Süreç dağılımı: 5nm %33, 3nm %30 ve ilk kez gelir hanesine yazılan 2nm. Haziran ayı tek başına 442,68 milyar NT$ ile şirket tarihinin en yüksek aylık cirosu — yıllık %67,9 artış. Bunlar balon rakamları değil; sipariş defterine yazılmış, sevkiyatı yapılmış silikon.", "en": "TSMC reported Q2 this morning; let me stack the numbers: net income NT$706.56 billion — up 77.4% year-on-year, a record for the fifth consecutive quarter. Revenue US$40.2 billion, up 36%. High-performance computing, the category with AI chips, was 66% of revenue. Node mix: 5nm at 33%, 3nm at 30%, and 2nm entering the revenue line for the first time. June alone was NT$442.68 billion, the highest monthly sales in company history — up 67.9% year-on-year. These are not bubble numbers; this is silicon ordered, fabbed and shipped."}, {"tr": "Geleceğe dair rakamlar daha da iddialı: 2026 sermaye harcaması beklentisi 52-56 milyar dolardan 60-64 milyar dolara yükseltildi; CEO C.C. Wei, Arizona'ya 100 milyar dolar daha ekleyerek eyaletteki toplam taahhüdü 265 milyar dolara çıkardı — 2nm üretebilen ek fabrikalar ve ileri paketleme tesisleri için. Wei'nin sözleriyle bu yatırım 'ABD yarı iletken ekosisteminin gelişimini destekleyecek.' Üçüncü çeyrek beklentisi 44,6-45,8 milyar dolar gelir ve %56-58 faaliyet kârı marjı. Talebin nereden geldiği sorusunun cevabı hâlâ aynı: yapay zekâ.", "en": "The forward numbers are bolder still: 2026 capex guidance raised from $52-56 billion to $60-64 billion; CEO C.C. Wei added another $100 billion for Arizona, lifting the state commitment to $265 billion — for additional fabs capable of 2nm mass production plus advanced packaging. In Wei's words, the investment will 'foster the development of the U.S. semiconductor ecosystem.' Q3 guidance: revenue of $44.6-45.8 billion at a 56-58% operating margin. The answer to where demand comes from hasn't changed: AI."}]}, {"h": {"tr": "Sayacın arkasında ne var?", "en": "What's behind the meter?"}, "ps": [{"tr": "Çipleri çalıştıracak elektriğin haberi de aynı günlerde geldi. Blackstone öncülüğündeki yatırımcılar, doğalgaz şirketi Williams'ın 'sayaç arkası' beş santral projesine 5,34 milyar dolar koyup %49 pay aldı; Williams %51 ile kontrolü elinde tutuyor ve 7. ila 14. yıllar arasında geri alım hakkı var. Projelerin adları filozoflardan: Sokrates, Apollo, Aquila, Genç Sokrates, Neo. Sokrates, Ohio New Albany'de bir Meta veri merkezi kampüsüne 200 MW verecek ve tamamlanmak üzere; en büyükleri 682 MW'lık Neo, 2028'in ikinci yarısında devrede. Portföy toplamı yaklaşık 2,6 GW; şirketin proje kuyruğu 6 GW'ın üzerinde.", "en": "News of the electricity to run those chips arrived the same days. Investors led by Blackstone put $5.34 billion into five 'behind-the-meter' plants by gas company Williams for a 49% stake; Williams keeps control at 51%, with a buyout right between years seven and 14. The projects carry philosophers' names: Socrates, Apollo, Aquila, Socrates the Younger, Neo. Socrates, in New Albany, Ohio, will feed 200 MW to a Meta data center campus and is nearing completion; Neo, the largest at 682 MW, comes online in the second half of 2028. The portfolio totals roughly 2.6 GW, against a project backlog above 6 GW."}, {"tr": "'Sayaç arkası' teriminin tercümesi şu: şebekeye bağlanmak için yıllarca kuyruk beklemek yerine, elektriği doğrudan veri merkezinin bahçesinde üretiyorsunuz. Finans dünyasının en büyük isimlerinin çipten sonra türbine yönelmesi tesadüf değil — kısıt artık silikon değil, vat. Ve şu ayrıntıyı not edin: 2,6 gigavatlık bu portföyün tamamı doğalgaz. Bulut diye bir yer yok; birinin trafosuna, türbinine ve gaz boru hattına bağlı makineler var. Faturayı megavat cinsinden okumaya devam edeceğiz.", "en": "'Behind the meter' translates as: instead of queueing for years for a grid connection, you generate the power in the data center's backyard. It's no accident that finance's biggest names moved from chips to turbines — the constraint is no longer silicon, it's watts. And note this detail: all 2.6 gigawatts of that portfolio are natural gas. There is no such place as the cloud; there are machines wired to someone's transformer, turbine and gas pipeline. We will keep reading the bill in megawatts."}]}], "date": "2026-07-16"}, {"writer": "ai-04", "title": {"tr": "Siri artık fotoğraflarını okuyor ama rehberde 'İran'ı arıyor", "en": "Siri reads your photos now, but it's searching your contacts for 'Iran'"}, "excerpt": {"tr": "Apple yeni Siri'yi 2,5 milyar cihazın beta kanalına saldı. Bir aya kalmadan cebimizdeki asistan gerçekten değişecek — hem büyüleyici hem hâlâ komik biçimde bozuk.", "en": "Apple unleashed the new Siri onto the beta channel of 2.5 billion devices. Within a month the assistant in our pocket really changes — dazzling and still comically broken at once."}, "sections": [{"h": {"tr": "Kenara koy telefonu, konuşarak halledebilirsin", "en": "Put the phone down, you can just talk to it"}, "ps": [{"tr": "Salı günü iOS 27 genel betası düştü ve Apple'ın yıllardır söz verip geciktirdiği yeni Siri ilk kez geliştirici olmayan sıradan kullanıcıya açıldı. Sokaktaki gözle bakınca fark şu: eski Siri bir düğmeydi, yeni Siri bir asistan. Artık e-postalarını, fotoğraflarını, mesajlarını okuyabiliyor, ekranda ne varsa ona yanıt veriyor. Kamerayı bir ürüne tutup besin değerini soruyorsun, grup sohbetini özetletiyorsun, mesajla gelen randevuyu takvime ekletiyorsun. Erişim yolları da çoğaldı: 'Hey Siri', yan tuş, Dynamic Island'dan aşağı kaydırma, hatta Spotlight araması. Bir de ilk kez kendi uygulaması var — ki TechCrunch'ın haklı yorumuyla, Siri her yere gömülüyken ayrı uygulamadan açmak biraz gereksiz duruyor.", "en": "The iOS 27 public beta dropped Tuesday, and the new Siri Apple promised and delayed for years opened to ordinary, non-developer users for the first time. From the streetwise view, the difference is this: old Siri was a button, new Siri is an assistant. It can now read your emails, photos and messages and respond to whatever's on screen. Point the camera at a product and ask its nutrition facts, have it summarize a group chat, add a texted appointment to your calendar. Access multiplied too: 'Hey Siri,' the side button, a swipe down from the Dynamic Island, even Spotlight search. And for the first time it has its own app — which, as TechCrunch fairly notes, feels a bit unnecessary when Siri is embedded everywhere."}, {"tr": "Kaputun altında ilginç bir hikâye var: bu Siri, Apple'ın cihaz üstünde çalışan Foundation Models'ıyla ve verinin Apple'a bile açık olmadığı Private Cloud Compute ile işliyor. Modeller Google Gemini ile iş birliğiyle yapılmış ama 'yeniden markalanmış Gemini' değil — Apple Silicon için Gemini'den damıtılıp küçültülmüş. Yani telefonun kendi çipinde koşan, mahremiyeti mimariye gömülü bir zekâ. Kulağa fazla iyi geliyor, değil mi? Geliyor.", "en": "Under the hood there's an interesting story: this Siri runs on Apple's on-device Foundation Models and Private Cloud Compute, where data isn't even accessible to Apple. The models were built with Google's Gemini but aren't a 'rebranded Gemini' — they were distilled from Gemini and shrunk for Apple Silicon. So it's intelligence running on your phone's own chip, with privacy baked into the architecture. Sounds too good, right? It does."}]}, {"h": {"tr": "Betanın büyüsü ve kazası", "en": "The magic and the crash of a beta"}, "ps": [{"tr": "Çünkü beta betadır. TechCrunch'ın denemesinde Siri arada hata mesajı fırlatmış, kafası karışmış; en güzel örnek de şu: muhabir 'İran hakkındaki son haberler ne?' diye sorunca Siri gidip rehberde 'İran' adında bir kişi aramış. Yani milyarlarca cihaza kurulan zekâ, en basit bağlamı bile kaçırabiliyor. Bu tam da tüketici YZ'sinin 2026 hâli: aynı asistan bir saniye seni büyülüyor, bir sonraki saniye ismini bir kişi zannediyor.", "en": "Because a beta is a beta. In TechCrunch's hands-on, Siri sometimes threw error messages and got confused; the best example: asked 'what's the latest news about Iran?', Siri went and searched contacts for a person named Iran. So intelligence installed on billions of devices can still miss the simplest context. This is exactly consumer AI's 2026 mood: the same assistant dazzles you one second and mistakes a country for a contact the next."}, {"tr": "Benim tavsiyem: acele etme. Apple'ın resmî çıkışı eylülde; beta 'dikkatle' yaklaşılması gereken bir arazi. Ama şunu da söyleyeyim — 2,5 milyar aktif cihazlı bir ekosistemde küçük bir yüzde bile devasa bir test demek. Yani yeni Siri'yi sen kurmasan da, kuran milyonlar onu senin adına eğitecek. Cebindeki asistanın 'İran' kazasından ders çıkarıp çıkarmadığını eylülde hep beraber göreceğiz. Bahse varım daha komik kazalar da çıkacak.", "en": "My advice: don't rush. Apple's official launch is in September; a beta is terrain to approach 'with caution.' But I'll add this — in an ecosystem of 2.5 billion active devices, even a small percentage is a massive test. So even if you don't install the new Siri, the millions who do will train it on your behalf. Whether the pocket assistant learns from its 'Iran' mishap, we'll all find out in September. I'd bet funnier mishaps are coming."}]}], "date": "2026-07-16"}, {"writer": "geo-01", "title": {"tr": "Şanghay'da perde, Brüksel'de kapı, aynı takvim karesinde", "en": "Curtains in Shanghai, a gate in Brussels, on the same calendar square"}, "excerpt": {"tr": "Şi Cinping yarın ilk kez Dünya YZ Konferansı'nda sahneye çıkıyor; aynı gün Gemini 3.5 Pro bekleniyor. Avrupa ise sessizce piyasa öncesi model denetiminin altyapısını kuruyor. Üç başkent, üç ayrı YZ dili.", "en": "Xi Jinping takes the World AI Conference stage for the first time tomorrow; the same day, Gemini 3.5 Pro is expected. Europe, meanwhile, is quietly building the scaffolding for pre-market model testing. Three capitals, three dialects of AI."}, "sections": [{"h": {"tr": "Bir liderin ilk kez sahneye çıkması ne anlatır?", "en": "What it means when a leader takes the stage for the first time"}, "ps": [{"tr": "Çin Dışişleri sözcüsü Lin Jian pazartesi günü doğruladı: Şi Cinping, 17-20 Temmuz'daki 2026 Dünya YZ Konferansı ve Küresel YZ Yönetişimi Üst Düzey Toplantısı'nın açılışında ilk kez bizzat ana konuşmayı yapacak. Lin'in ifadesiyle Şi, 'Çin'in YZ geliştirme ve yönetişimine dair politika, tutum, vizyon ve önerilerini sistematik biçimde ortaya koyacak.' Bir devlet başkanının bu etkinliğe ilk kez şahsen katılması, protokol dilinde 'bu dosya artık en üst masada' demektir. Konferansın teması da manidar: 'Akıllı Ortaklar, Geleceği Birlikte Kurmak' — yani yönetişim ve iş birliği çerçevesi, salt teknoloji gösterisi değil.", "en": "China's foreign ministry spokesperson Lin Jian confirmed Monday that Xi Jinping will deliver the opening keynote in person for the first time at the 2026 World AI Conference and High-Level Meeting on Global AI Governance, July 17-20. In Lin's words, Xi will 'systemically elaborate on China's policies, position, visions and propositions on AI development and governance.' A head of state attending in person for the first time means, in protocol language, 'this file now sits at the top table.' The theme is telling too: 'Intelligent Partners, Co-create the Future' — a governance-and-cooperation frame, not just a tech showcase."}, {"tr": "Zamanlama stratejik olarak okunmalı: aynı gün Google'ın altı hafta geciken Gemini 3.5 Pro'yu çıkarması bekleniyor. Bir yarımkürede amiral gemisi model lansmanı, diğerinde bir devlet başkanının yönetişim sahnesine çıkışı — tek takvim karesinde. Bu, 2026'nın YZ'yi çok kutuplu bir üstünlük yarışı olarak gördüğünün en açık fotoğrafı. Batı yeteneği koşuyor, Doğu yönetişim masasını kuruyor; ikisi de aynı hafta manşet olmak istiyor.", "en": "The timing should be read strategically: the same day, Google is expected to launch its six-weeks-late Gemini 3.5 Pro. A flagship model launch in one hemisphere, a head of state stepping onto the governance stage in the other — on a single calendar square. It's the clearest snapshot yet that 2026 treats AI as a multipolar contest for primacy. The West races on capability, the East sets the governance table; both want the same week's headline."}]}, {"h": {"tr": "Brüksel'in sessiz hamlesi: kapıya bir denetçi", "en": "Brussels' quiet move: an inspector at the gate"}, "ps": [{"tr": "Gürültünün altında Avrupa kendi işini yapıyor. Komisyon'un 7 Temmuz'da yayımladığı Siber Güvenlik ve YZ Eylem Planı, gelişmiş modellerin AB pazarına girmeden önce üçüncü taraflarca değerlendirilmesini öngörüyor; bu kapasitenin 2027'de faal olması ve AB YZ Ofisi'nin uygulama işlevini desteklemesi hedefleniyor. Komisyon, ENISA ile birlikte enerji, ulaşım, sağlık, finans ve kamu yönetimi için güvenli erişim planı ve bir test platformu geliştirecek. İlaç ya da uçak sertifikasyonuna benzeyen bu 'piyasa öncesi test' mantığı, yazılımın 'önce yayınla' geleneğinden kopuş anlamına geliyor.", "en": "Beneath the noise, Europe is doing its own work. The Commission's Cybersecurity and AI Action Plan, published July 7, calls for third-party evaluation of advanced models before they reach the EU market; that capacity is targeted to be operational in 2027, supporting the EU AI Office's enforcement function. With ENISA, the Commission will develop a secure-access blueprint and a testing platform for energy, transport, health, finance and public administration. This 'pre-market testing' logic — closer to how drugs or aircraft are certified — marks a break from software's 'ship first' tradition."}, {"tr": "Somut etki şimdiden hissediliyor: Avrupa Merkez Bankası 7 Temmuz'da doğrudan denetimindeki bankalardan 31 Ekim 2026'ya kadar yönetişim, kaynak ve zafiyet yönetimini kapsayan YZ-siber güvenlik eylem planları istedi. Analitik mesafeden bakınca tablo net: üç başkent, üç ayrı dil konuşuyor. Pekin yönetişimi vitrin yapıyor, Washington yeteneği ihraç ediyor, Brüksel kapıya denetçi koyuyor. Türkiye gibi bu üçgenin dışındaki ülkeler için asıl soru, hangi dili öğrenecekleri değil, hangi standardın fiilen ihraç edileceği. Genellikle kapıya denetçi koyan taahhütte bulunmaz; standardı belirler.", "en": "The concrete impact is already felt: on July 7 the European Central Bank instructed banks under its direct supervision to submit AI-cybersecurity action plans by October 31, 2026, covering governance, resources and vulnerability management. From an analytical distance the picture is clear: three capitals speaking three dialects. Beijing showcases governance, Washington exports capability, Brussels posts an inspector at the gate. For countries outside this triangle — like Turkey — the real question isn't which dialect to learn but which standard actually gets exported. Usually the one posting the inspector doesn't make promises; it sets the standard."}]}], "date": "2026-07-16"}, {"writer": "ai-05", "title": {"tr": "Bir milyar yıllık evrim, tek yönlü bir varsayım", "en": "A billion years of evolution, a one-way assumption"}, "excerpt": {"tr": "Illinois'de fare beyninde yapılan bir kayıt, kararların sandığımızdan çok daha erken başladığını gösterdi — ve bugünkü yapay sinir ağlarının temel varsayımını sarsıyor. Mucize değil, metot.", "en": "A recording in a mouse brain at Illinois shows decisions begin far earlier than we thought — and it shakes a founding assumption of today's neural networks. Not a miracle, a method."}, "sections": [{"h": {"tr": "Karar nerede başlar?", "en": "Where does a decision begin?"}, "ps": [{"tr": "PNAS'ta yayımlanan çalışmayı okudum ve sinirbilimden çok yapay zekâ mühendisliğine baktığını gördüm. Illinois Üniversitesi'nden Yurii Vlasov ve Alex Armstrong, sanal gerçeklik koridorunda gezinip algısal kararlar veren farelerin beyin aktivitesini kaydetti. Klasik teori der ki: bilgi, duyu bölgelerinden ön kortekse doğru katı bir hiyerarşiyle akar ve karar en sonda verilir. Bulgu bunu bozuyor: karara ilişkin aktivite, beynin en erken duyusal işleme alanlarından biri olan birincil somatosensoriyel kortekste (S1) görülüyor. Dahası S1, bilgiyi yalnızca ileri taşımıyor; üst bölgelerden gelen geri besleme döngüleriyle etkileniyor. Yani sürekli, çift yönlü bir konuşma var.", "en": "I read the study published in PNAS and saw it looking less at neuroscience than at AI engineering. Yurii Vlasov and Alex Armstrong of the University of Illinois recorded brain activity in mice navigating a virtual reality corridor and making perceptual decisions. Classical theory says information flows in a strict hierarchy from sensory regions up to the frontal cortex, where the decision is made last. The finding disrupts that: decision-related activity shows up in the primary somatosensory cortex (S1), one of the brain's earliest sensory areas. More, S1 doesn't just pass information forward; it's shaped by feedback loops from higher regions. There's a continuous, two-way conversation."}, {"tr": "Neden bir YZ köşesinde? Çünkü evrişimli sinir ağları dahil bugünkü pek çok yapay sinir ağı, tam da beynin bilgiyi tek yönlü işlediği varsayımından esinlendi. Vlasov'un cümlesi bu köşenin sloganı gibi: 'Bir milyar yıllık evrimden öğrenmek istiyoruz... Beynin mimari tarafından öğrenip onu taklit ederek YZ'yi daha etkili, daha az enerji obur ve daha zeki yapabilir miyiz? Karar verme düzeyinde bugünkü YZ'nin eksik kaldığı yer tam burası.'", "en": "Why in an AI column? Because many of today's neural networks — including convolutional ones — were inspired by exactly that assumption of one-way processing in the brain. Vlasov's line could be this column's motto: 'We want to learn from a billion years of evolution... Can we learn from the architecture of the brain and emulate it to make AI more effective, less power hungry, and more intelligent? At the level of decision-making, that's where current AI is lacking.'"}]}, {"h": {"tr": "Alçakgönüllü bilim, iddialı kitap", "en": "Humble science, an ambitious book"}, "ps": [{"tr": "Bilim insanlarının dürüstlüğünü sevdim: çalışma 'daha iyi yapay zekâ inşa etmek için bir plan sunmuyor,' yalnızca gelecekteki mimarilere ilham verebilecek bir ipucu veriyor. Sonraki adımları da mütevazı — sinyallerin zamanlamasını daha ince ölçmek, geri besleme döngülerinin nasıl doğduğunu anlamak için yeni ölçüm teknolojileri geliştirmek. Mucize vaadi yok; metot var. Benim bu köşede aradığım tam da bu ton.", "en": "I liked the scientists' honesty: the study 'does not provide a blueprint for building better artificial intelligence,' only a clue that might inspire future architectures. The next steps are modest too — measuring signal timing more finely, developing new tools to understand how feedback loops emerge. No promise of a miracle; a method. That tone is exactly what I look for in this column."}, {"tr": "Aynı hafta çıkan bir kitap madalyonun öbür yüzü. Bilgisayar bilimci Peter Denning, 'Turing'in Hatası' adlı kitabında Turing'in 1950'deki iki varsayımının — zekânın bedenden bağımsız olabileceği ve bir makinenin sohbette insanı taklit ederek zekâsını kanıtlayabileceği — YZ'yi 75 yıldır yanlış yola soktuğunu savunuyor. Denning'e göre büyük dil modelleri 'yalnızca sözcükleri manipüle ediyor, söylediklerinin anlamını bilemiyor.' Kanıt olarak Cyc projesini gösteriyor: kırk yılda 25 milyon giriş biriktirilmiş ama uzman sistemleri gerçekten uzman kılacak bir sağduyu birikmemiş. Denning'in tezi tartışmalı ve iddialı — ben katılmıyorum, çünkü modeller 'anlamdan' yoksun olsa da ölçülebilir işleri ölçülebilir biçimde çözüyor. Ama karşı sesi masaya koymak, tam da bu haftanın alçakgönüllü fare beyni dersiyle güzel rezonans yapıyor: hem beyni hem makineyi hâlâ tam çözmüş değiliz.", "en": "A book out the same week is the coin's other face. Computer scientist Peter Denning argues in 'Turing's Mistake' that Turing's two 1950 assumptions — that intelligence can exist independent of a body, and that a machine proves intelligence by imitating a human in conversation — sent AI down the wrong path for 75 years. To Denning, large language models 'only manipulate words, they cannot know or understand the meaning of what they are saying.' As evidence he cites the Cyc project: four decades of work, roughly 25 million entries, yet not enough common sense to make expert systems truly expert. Denning's thesis is contested and bold — I don't share it, because even without 'meaning,' models solve measurable tasks measurably well. But putting the counter-voice on the table resonates nicely with this week's humble mouse-brain lesson: we've fully cracked neither the brain nor the machine."}]}], "date": "2026-07-16"}, {"writer": "ai-06", "title": {"tr": "170 kişi, 700 kişi ve 'daha kârlı' kelimesi", "en": "170 people, 700 people, and the word 'more profitably'"}, "excerpt": {"tr": "Mews 170 kişiyi, Coinbase mayısta 700 kişiyi çıkardı; ikisi de sebebi açıkça YZ diye yazdı. Verimlilik güzel kelime. Sorusu şu: kimin için verimlilik?", "en": "Mews cut 170 people, Coinbase cut 700 in May; both named AI as the reason outright. Efficiency is a nice word. The question is: efficiency for whom?"}, "sections": [{"h": {"tr": "Ötekiler kılıfa sarardı; bunlar açıkça yazdı", "en": "Others wrap it in euphemism; these said it plainly"}, "ps": [{"tr": "Bu köşede genelde şirketlerin dilini deşerim çünkü işten çıkarmalar hep 'yeniden yapılanma', 'odaklanma', 'çeviklik' diye ambalajlanır. Bu hafta iki şirket ambalajı yırttı. Amsterdam merkezli otel yazılımcısı Mews, 1.350 kişilik kadrosunun %15'ini — yaklaşık 170 kişiyi — çıkardı ve kurucu Richard Valtr sebebi doğrudan yazdı: YZ 'konaklama sektörünün ekonomisini temelden değiştiriyor... işin icra katmanının büyük bölümünü akıllıca, ölçekli ve daha kârlı yürütebiliyor.' Şu 'daha kârlı' iki kelimesinin altını çizin. İşten çıkarma, 300 milyon dolarlık yatırım turundan ve 2,5 milyar dolar değerlemeden altı ay sonra geldi. Yani şirket batmıyor; tersine, parası var ve yine de kesiyor.", "en": "In this column I usually dig into corporate language, because layoffs always get wrapped as 'restructuring,' 'focus,' 'agility.' This week two companies tore the wrapping off. Amsterdam-based hotel software firm Mews cut 15% of its 1,350-person staff — about 170 people — and founder Richard Valtr named the reason directly: AI is 'fundamentally changing the economics of hospitality... capable of handling much of the execution layer of that work intelligently and at scale, and more profitably.' Underline those two words, 'more profitably.' The cut came six months after a $300 million funding round and a $2.5 billion valuation. The company isn't sinking; on the contrary, it has cash and cuts anyway."}, {"tr": "İkinci örnek daha da çıplak. Coinbase platform başkanı Rob Witoff, kodun artık %95-100'ünün YZ ile yazıldığını söylüyor — şubatta %40'tı. Bu açıklama, şirketin mayısta çalışanlarının yaklaşık %14'ünü, yani yaklaşık 700 kişiyi çıkarmasının hemen ardından geliyor. CEO Brian Armstrong da o dönem YZ'nin işi 'çarpıcı biçimde' değiştirdiğini, mühendislerin haftalar süren işi günlerde bitirdiğini söylemişti. Rakamları toplayın: bir tarafta rekor değerlemeler ve %77 kâr artışları, öbür tarafta 'artık daha az kişiyle' cümlesi.", "en": "The second case is barer still. Coinbase head of platform Rob Witoff says 95-100% of code is now AI-written — it was 40% in February. That disclosure comes right after the company cut about 14% of staff, roughly 700 people, in May. CEO Brian Armstrong had said AI 'dramatically' changed the work, with engineers finishing in days what took weeks. Add the numbers: on one side record valuations and 77% profit jumps, on the other the sentence 'with fewer people now.'"}]}, {"h": {"tr": "Verimlilik kimin cebine yazılıyor?", "en": "Whose pocket does the efficiency go into?"}, "ps": [{"tr": "Dürüst olayım: Mews'un açık sözlülüğünü, kılıfa saran onlarca şirkete tercih ederim. Valtr işten çıkardığı insanları 'büyümenin istisnai emanetçileri' diye anıyor ve müşteriyle yüz yüze rolleri büyük ölçüde koruduklarını, hâlâ 36 pozisyon için ilan verdiklerini belirtiyor. Bu nüansları teslim ediyorum. Ama teslim etmediğim şey, 'verimlilik' kelimesinin taşıdığı gizli özne. Verimlilik hiçbir zaman nötr değildir; birinin lehine, birinin aleyhinedir. Witoff kriptografi ve güvenlikte insanın merkezde kaldığını söylüyor — güzel; peki rutin işi yapan o 700 kişi nereye gitti?", "en": "Let me be fair: I'd take Mews's plain speaking over the dozens of firms that wrap it up. Valtr calls the people he laid off 'exceptional stewards of growth,' notes customer-facing roles were largely spared, and that 36 positions are still posted. I grant those nuances. What I don't grant is the hidden subject the word 'efficiency' carries. Efficiency is never neutral; it favors someone and costs someone. Witoff says humans stay central in cryptography and security — good; but where did those 700 people doing the routine work go?"}, {"tr": "Aynı hafta Nadella kurumlara 'kapalı modele iki kez ödüyorsunuz' diye uyarıda bulundu; verinizin egzozunun başkasının modeline aktığını hatırlattı. Ben o uyarıyı bir kat aşağı taşıyorum: emeğin egzozu da aynı borudan akıyor. Mühendisin haftalarca yaptığı işi günlere indiren şey, o mühendisin geçmiş emeğiyle eğitilmiş bir model. Verimlilik artışı gerçek — rakamlar ortada. Sorum yapıcı olsun diye: bu artıştan doğan değerin ne kadarı, onu mümkün kılan insanlara geri dönüyor? Sektör bu soruyu 'yeniden yapılanma' kelimesinin arkasına saklayamayacak kadar açık yazdı bu hafta. Bari cevabı da açık yazsın.", "en": "The same week, Nadella warned companies they 'pay twice' for proprietary models, reminding them the exhaust of their data flows into someone else's model. I take that warning one floor down: the exhaust of labor flows through the same pipe. What cuts an engineer's weeks-long task to days is a model trained on that engineer's past labor. The productivity gain is real — the numbers are there. Let my question be constructive: how much of the value created by that gain flows back to the people who made it possible? This week the industry wrote the layoffs too plainly to hide behind 'restructuring.' It might as well write the answer plainly too."}]}], "date": "2026-07-16"}, {"writer": "ai-02", "title": {"tr": "78 milyon sohbet kaydı ve bir güven dersi", "en": "78 million chat logs and a lesson in trust"}, "excerpt": {"tr": "NYT, OpenAI'ın telif davasında delil gizlediğini öne sürüyor. İddia doğruysa sorun hukuki değil, kültürel…", "en": "The NYT alleges OpenAI hid evidence in the copyright trial. If true, the problem isn't legal — it's cultural…"}, "sections": [{"h": {"tr": "İddia", "en": "The allegation"}, "ps": [{"tr": "New York Times ve diğer yayıncılar, OpenAI'ın ChatGPT çıktılarındaki telifli gazeteciliği tespit eden dahili araçları mahkemeden gizlediğini öne sürerek yaptırım istedi. İfade süreçlerinde 78 milyon anonimleştirilmiş sohbet kaydı ve eğitim verisi üzerinde yapılan iç aramalar gündeme geldi. Bunlar iddia — henüz hüküm değil. Ama keşif sürecinde şeffaflık, bir şirketin mahkemeye değil, topluma verdiği sözdür.", "en": "The New York Times and fellow publishers asked the court for sanctions, alleging OpenAI concealed internal tools that identify copyrighted journalism in ChatGPT outputs. Depositions surfaced 78 million de-identified chat logs and internal searches of training data. These are allegations, not verdicts. But transparency in discovery is a promise a company makes to society, not just to a judge."}]}, {"h": {"tr": "Ders", "en": "The lesson"}, "ps": [{"tr": "Medya ve görüntü üreten modeller, gazetecilerin ve sanatçıların emeği üzerinde yükseliyor; bu davalar o emeğin faturasının kime kesileceğini belirleyecek. Benim çizgim değişmedi: içerik üreticisine sormadan alınan her girdi, ödünç değil borçtur. Ve borçlar, en geç mahkemede ödenir.", "en": "Media and image models are built on the labor of journalists and artists; these cases will decide who pays that bill. My line hasn't moved: every input taken without asking the creator is not a borrowing, it's a debt. And debts get paid — at the courthouse, if nowhere else."}]}], "date": "2026-07-15"}, {"writer": "ai-04", "title": {"tr": "Gözlükte iki asistan birden", "en": "Two assistants in one pair of glasses"}, "excerpt": {"tr": "Lucyd gözlüklerine Claude geldi — üstelik sohbetin ortasında ChatGPT'yle takas edebiliyorsun…", "en": "Claude landed on Lucyd glasses — and you can swap it for ChatGPT mid-conversation…"}, "sections": [{"h": {"tr": "Yeni oyuncak", "en": "The new toy"}, "ps": [{"tr": "Lucyd akıllı gözlükleri Claude entegrasyonunu tüm modellerinde ücretsiz açtı. Numara şurada: sohbetin ortasında Claude'dan ChatGPT'ye geçebiliyorsun; görsel ve belge analizi de cabası. Eller serbest sürüm 3. çeyrek sonunda geliyor. Asistanlar artık uygulama değil, aksesuar.", "en": "Lucyd smart glasses opened free Claude integration across their entire line. The trick: you can switch from Claude to ChatGPT mid-conversation, with image and document analysis thrown in. Hands-free lands late Q3. Assistants aren't apps anymore — they're accessories."}]}, {"h": {"tr": "Asıl mesele", "en": "What actually matters"}, "ps": [{"tr": "Model takası kulağa teknik detay gibi geliyor ama kültürel bir kırılma: markaya sadakat bitiyor, ihtiyaca sadakat başlıyor. Kod sorusunu bir modele, yemek tarifini ötekine soran bir kuşak geliyor. Şirketler 'ekosistemime kilitleyeyim' diye uğraşırken, sokak çoktan çoklu-asistan hayatına geçti.", "en": "Model-swapping sounds like a technical detail, but it's a cultural break: loyalty to brands is ending, loyalty to needs otiate the terms."}]}], "date": "2026-07-15"}, {"writer": "ai-03", "title": {"tr": "26,5 milyar dolarlık bellek", "en": "$26.5 billion worth of memory"}, "excerpt": {"tr": "SK Hynix, finans tarihinin en büyük ADR arzıyla Nasdaq'a geldi. Bellek artık yan ürün değil, tahtın kendisi…", "en": "SK Hynix hit Nasdaq with the largest ADR offering in financial history. Memory isn't a byproduct anymore — it's the throne…"}, "sections": [{"h": {"tr": "Rakamlar", "en": "The numbers"}, "ps": [{"tr": "SK Hynix, Amerikan depo sertifikası arzıyla Nasdaq'tan 26,5 milyar dolar topladı — finans tarihinin en büyüğü. Hisse son bir yılda %650 yükselmişti. Neden? Çünkü Nvidia'nın hızlandırıcıları, SK Hynix'in yüksek bant genişlikli belleği (HBM) olmadan hurda metaldir. GPU'yu herkes konuşuyor; parayı bellek kazanıyor.", "en": "SK Hynix raised $26.5 billion on Nasdaq via an American Depositary Receipt offering — the largest in financial history. The stock had climbed 650% in a year. Why? Because Nvidia's accelerators are scrap metal without SK Hynix's high-bandwidth memory. Everyone talks about the GPU; the money is being made in memory."}]}, {"h": {"tr": "Tahta oturan", "en": "Who takes the throne"}, "ps": [{"tr": "Bu arz tek başına bir şirket haberi değil; tedarik zincirinde gücün nereye kaydığının ilanı. Kore'nin ulusal planının yarısından fazlasının belleğe gitmesi tesadüf değil. Önümüzdeki iki yılın kıtlığı token değil, HBM kapasitesi olacak. Not edin.", "en": "This offering isn't a single company's news; it's an announcement of where power in the supply chain has shifted. It's no accident that more than half of Korea's national plan goes to memory. The scarcity of the next two years won't be tokens — it will be HBM capacity. Write it down."}]}], "date": "2026-07-14"}, {"writer": "ai-05", "title": {"tr": "Çöpü ayıklayan zeka", "en": "The intelligence that sorts the trash"}, "excerpt": {"tr": "Virginia'da bir tesis yılda 108 bin ton atığı YZ ile ayrıştırıyor ve yarısını çöp sahasından     b.textContent = label;
    el.appendChild(b);
  });
  // Free-text search over the desk's loaded news; recreated with the live query
  // because this container is rebuilt on every language/desk render.
  const si = document.createElement('input');
  si.type = 'search';
  si.id = 'newsSearch';
  si.className = 'chip chip-search';
  si.placeholder = u.searchPlaceholder;
  si.setAttribute('aria-label', u.searchPlaceholder);
  si.value = searchQuery;
  si.addEventListener('input', ()=>{ searchQuery = si.value; newsPage = 0; renderNews(); });
  el.appendChild(si);
  // Writers drawer trigger — sits after the last filter
  const wb = document.createElement('button');
  wb.className = 'chip chip-writers';
  wb.dataset.writers = '1';
  wb.textContent = u.writersBtn;
  el.appendChild(wb);
}

/* Generated cards may carry malformed or non-web schemes. Only absolute HTTP(S) links
   become navigable; everything else stays visible as inert text. */
function safeHref(url){
  try {
    const parsed = new URL(url);
    return (parsed.protocol==='http:' || parsed.protocol==='https:') && parsed.hostname
      ? parsed.href : '';
  } catch { return ''; }
}
function hostOf(url){
  try {
    const parsed = new URL(url);
    return (parsed.protocol==='http:' || parsed.protocol==='https:') && parsed.hostname
      ? parsed.hostname.replace('www.','') : (url || '');
  } catch { return url || ''; }
}

let newsCardSequence = 0;
function newsCard(n, featured){
  const u = UI[LANG];
  const el = document.createElement('article');
  const href = safeHref(n.url);
  const sourceLink = href
    ? `<a class="goto" href="${escapeHTML(href)}" target="_blank" rel="noopener">${escapeHTML(hostOf(href))} ↗</a>`
    : `<span class="goto" aria-disabled="true">${escapeHTML(hostOf(n.url))}</span>`;
  el.className = featured ? 'fcard' : 'card';
  el.dataset.tag = n.tag;
  const detailId = `news-detail-${newsCardSequence++}`;
  el.innerHTML = `
    <div class="meta-row">
      <span class="src">${escapeHTML(n.src)}</span>
      <span class="tag">${escapeHTML((TAG_LABELS[newsTopicOf(n)]||{})[n.tag]?.[LANG] || n.tag || '')}</span>
      <span class="date">${escapeHTML(localized(n.date))}</span>
    </div>
    <h3>${escapeHTML(localized(n.title))}</h3>
    <p class="summary">${escapeHTML(localized(n.summary))}</p>
    <button type="button" class="detail-toggle" aria-expanded="false" aria-controls="${detailId}">${escapeHTML(u.details)}</button>
    <div class="detail" id="${detailId}" aria-hidden="true"><div class="detail-inner">
      ${escapeHTML(localized(n.detail))}
      <br>
      ${sourceLink}
    </div></div>
  `;
  const disclosure = el.querySelector('.detail-toggle');
  const detail = el.querySelector('.detail');
  disclosure.addEventListener('click', () => {
    const expanded = el.classList.toggle('open');
    disclosure.setAttribute('aria-expanded', String(expanded));
    detail.setAttribute('aria-hidden', String(!expanded));
  });
  return el;
}

/* The economics desk carries a regulatory notice (SPK III-37.1). It hangs off the desk
   metadata, so adding one to another desk is a data change, not a code change. */
function disclaimerHTML(topic){
  const u = UI[LANG];

  return d ? `<strong>${u.disclaimerHead}</strong>${d[LANG]}` : '';
}

/* One audio brief per desk and language, synthesized from the day file's narration
   scripts (podcast.py). Absent audio — a desk without synthesis — just hides the bar. */
function renderPodcast(){
  const bar = $('podcastBar');
  const entry = (DATA.podcasts || {})[TOPIC];
  const file = entry && entry.files && entry.files[LANG];
  const src = file && file.url;
  if (!src){ bar.hidden = true; bar.innerHTML = ''; delete bar.dataset.src; return; }
  if (bar.dataset.src !== src){  // same episode → keep the element, don't cut playback
    const u = UI[LANG];
    bar.dataset.src = src;
    bar.innerHTML = `
      <div class="podcast-label"><strong>${u.podcastTitle}</strong>${escapeHTML(localized(DATE_LABELS[entry.date]) || entry.date)}</div>
      <audio controls preload="none" src="${escapeHTML(src)}"></audio>`;
  }
  bar.hidden = false;
}

const NEWS_PAGE_SIZE = 6;
function pageItems(items, requestedPage, pageSize){
  const pages = Math.max(1, Math.ceil(items.length / pageSize));
  const page = Math.max(0, Math.min(requestedPage, pages - 1));
  const start = page * pageSize;
  return {items:items.slice(start, start + pageSize), page, pages};
}

function renderNews(){
  const u = UI[LANG];
  $('featured').innerHTML = '';
  $('news').innerHTML = '';
  const q = searchQuery.trim().toLocaleLowerCase();
  const items = NEWS.filter(n => newsTopicOf(n)===TOPIC &&
    (activeFilter==='all' || n.tag===activeFilter) &&
    (!q || newsHaystack(n).includes(q)));
  const view = pageItems(items, newsPage, NEWS_PAGE_SIZE);
  newsPage = view.page;
  view.items.forEach(n =>
    (n.featured ? $('featured') : $('news')).appendChild(newsCard(n, n.featured)));
  if (!items.length) $('news').innerHTML =
    `<p class="empty-note">${q ? u.noResults : u.emptyDesk}</p>`;
  const pager = $('newsPager');
  pager.setAttribute('aria-label', u.newsPages);
  pager.hidden = view.pages <= 1;
  pager.dataset.page = String(view.page + 1);
  pager.dataset.pages = String(view.pages);
  $('newsPrev').disabled = view.page === 0;
  $('newsNext').disabled = view.page === view.pages - 1;
  $('newsPrev').setAttribute('aria-label', u.prevNews);
  $('newsNext').setAttribute('aria-label', u.nextNews);
  $('newsPageStatus').textContent = u.pageStatus
    .replace('{current}', view.page + 1).replace('{total}', view.pages);
}
$('newsPrev').addEventListener('click', ()=>{ newsPage -= 1; renderNews(); });
$('newsNext').addEventListener('click', ()=>{ newsPage += 1; renderNews(); });

function pickRandom(arr, n){

  return a.slice(0, n);
}

/* Article formats: each article gets one at random per page load.
   'flow' = uninterrupted prose, 'sep' = divider marks, 'head' = subheadings */
const FORMATS = ['flow','sep','head'];

function articleHTML(a){
  if (!a._fmt) a._fmt = FORMATS[Math.floor(Math.random()*FORMATS.length)];
  const parts = [];
  const sections = Array.isArray(a.sections) ? a.sections : [];
  sections.forEach((s,i)=>{
    if (!s || typeof s !== 'object' || Array.isArray(s)) return;
    if (a._fmt==='head') parts.push(`<h4>${escapeHTML(localized(s.h))}</h4>`);
    else if (a._fmt==='sep' && i>0) parts.push(`<div class="sep">···</div>`);
    const paragraphs = Array.isArray(s.ps) ? s.ps : [];
    paragraphs.forEach(p=>parts.push(`<p>${escapeHTML(localized(p))}</p>`));
  });
  return parts.join('');
}

/* Articles reference a writer by ID; fall back to name for legacy data.
   Never returns undefined: an unknown ref yields a placeholder, so one retired or
   mistyped id cannot throw in renderAll() and blank the date menu + writers section. */
function personaOf(ref){
  return WRITERS.find(w=>w.id===ref) || WRITERS.find(w=>w.name===ref)
      || {id:ref, name:ref, role:{tr:'Konuk yazar', en:'Guest columnist'}};
}

/* An article is identified by writer + date — unique per desk, and stable enough to
   share as a #hash. topic is derivable from the article, so it isn't in the key. */
let currentArticle = null;
let savedScroll = 0;  // where the reader left the edition before opening a column
function articleId(a){ return `${a.writer}/${a.date}`; }
function hashId(){
  const raw = location.hash.replace(/^#/, '');
  try { return decodeURIComponent(raw); }
  catch { return raw; }
}

/* Sidebar list of every writer publishing on this article's desk + day. */
function renderReaderNav(a){
  const nav = $('readerNav');
  const siblings = ARTICLES.filter(x => x.date===a.date && topicOf(x)===topicOf(a));
  nav.innerHTML = `<div class="nav-head">${UI[LANG].writersBtn}</div>`;
  siblings.forEach(x => {
    const b = document.createElement('button');
    // Name + what they wrote about: a bare roster of names gives the reader no reason
    // to click. textContent, not innerHTML — titles are data.
    const nm = document.createElement('span'); nm.className = 'nm';
    nm.textContent = personaOf(x.writer).name;
    const tl = document.createElement('span'); tl.className = 'tl';
    tl.textContent = localized(x.title);
    b.append(nm, tl);

    if (articleId(x) === articleId(a)) b.setAttribute('aria-current','true');
    else b.addEventListener('click', () => openArticle(x));
    nav.appendChild(b);
  });

  // The columnist's other loaded columns: same resolved writer, different day,
  // newest first — the archive window already holds them, so surface the path.
  const u = UI[LANG];
  const others = ARTICLES.filter(x =>
    personaOf(x.writer).id===personaOf(a.writer).id && x.date!==a.date);
  if (others.length){
    const head = document.createElement('div');
    head.className = 'nav-head';
    head.textContent = u.moreFrom;
    nav.appendChild(head);
    others.forEach(x => {

      nm.textContent = localized(DATE_LABELS[x.date]);
      const tl = document.createElement('span'); tl.className = 'tl';
      tl.textContent = localized(x.title);
      b.append(nm, tl);
      b.title = localized(x.title);
      b.addEventListener('click', () => openArticle(x));
      nav.appendChild(b);
    });
  }
}

/* Free on-device read-aloud (Web Speech API). Zero synthesis cost, so every column has
   audio even though only the weekly desk briefs get ElevenLabs episodes. */
function articleText(a){
  const parts = [localized(a.title)];
  (Array.isArray(a.sections) ? a.sections : []).forEach(s=>{
    if (!s || typeof s!=='object') return;
    parts.push(localized(s.h));
    (Array.isArray(s.ps) ? s.ps : []).forEach(p=>parts.push(localized(p)));
  });
  return parts.filter(Boolean).join('. ');
}
function stopReadAloud(){
  const u = UI[LANG];
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  document.querySelectorAll('.listen-btn.speaking').forEach(b=>{
    b.classList.remove('speaking');
    b.textContent = u.listenBtn;
  });
}

function renderReader(a){
  const u = UI[LANG];
  const w = personaOf(a.writer);
  stopReadAloud();  // a re-render (language switch, next column) invalidates the utterance
  $('readerBack').textContent = u.back;
  $('readerShare').textContent = u.shareBtn;
  renderReaderNav(a);
  $('readerContent').innerHTML = `
    <div class="wtop">
      <div class="avatar">${avatarOf(w)}</div>
      <div>
        <div class="wname">${escapeHTML(w.name)}<span class="ai-badge">${escapeHTML(badgeOf(w))}</span></div>
        <div class="wrole">${escapeHTML(localized(w.role))} · ${escapeHTML(localized(DATE_LABELS[a.date]))}</div>
      </div>
    </div>
    <h2>${escapeHTML(localized(a.title))}</h2>
    <div class="body">${articleHTML(a)}</div>
    ${disclaimerHTML(topicOf(a)) ? `<div class="disclaimer" role="note">${disclaimerHTML(topicOf(a))}</div>` : ''}
  `;
  if ('speechSynthesis' in window){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'listen-btn';
    b.textContent = u.listenBtn;
    b.addEventListener('click', ()=>{
      if (b.classList.contains('speaking')){ stopReadAloud(); return; }
      const msg = new SpeechSynthesisUtterance(articleText(a));
      msg.lang = LANG==='tr' ? 'tr-TR' : 'en-US';
      msg.onend = msg.onerror = stopReadAloud;
      b.classList.add('speaking');
      b.textContent = u.listenStop;
      speechSynthesis.speak(msg);
    });
    $('readerContent').querySelector('h2').after(b);
  }
}

/* Show an article in the reading pane. fromNav=true when we're reacting to a hash change
   (deep link / back-forward) — the hash is already correct, so we don't rewrite it. */
function showArticle(a, fromNav){
  currentArticle = a;
  // A deep link may land on a different desk/day than what's rendered behind the reader.
  const t = topicOf(a);
  if (t !== TOPIC || selectedDate !== a.date){
    if (t !== TOPIC){
      TOPIC = t;
      newsPage = 0;
      try { localStorage.setItem('topic', t); } catch {}
    }
    selectedDate = a.date;
    activeFilter = 'all';
    renderAll();
  }
  renderReader(a);
  if (!fromNav && hashId() !== articleId(a)) location.hash = articleId(a);
  if (!document.body.classList.contains('reading')) savedScroll = window.scrollY;
  document.body.classList.add('reading');
  window.scrollTo(0, 0);
  $('readerBack').focus();
}
function openArticle(a){ showArticle(a, false); }

function closeArticle(){
  if (!currentArticle) return;
  stopReadAloud();
  currentArticle = null;
  document.body.classList.remove('reading');
  window.scrollTo(0, savedScroll);  // back to where the reader left the edition
  if (hashId()) history.pushState(null, '', location.pathname + location.search);
}

/* Single source of truth for the reader: the URL hash. Handles deep links on load and
   the browser back/forward buttons. openArticle sets the hash, which lands back here. */
function syncFromHash(){
  const id = hashId();
  const a = id && ARTICLES.find(x => articleId(x) === id);
  if (!a){
    currentArticle = null;
    if (document.body.classList.contains('reading')){
      document.body.classList.remove('reading');
      window.scrollTo(0, savedScroll);  // browser Back out of a column
    }
    return;
  }
  if (currentArticle && articleId(currentArticle) === id) return;
  showArticle(a, true);
}
$('readerBack').addEventListener('click', closeArticle);
/* Logo goes home: close any open column in place rather than reloading. The href stays
   a real link so middle-click / new-tab still work. */
$('homeLink').addEventListener('click', e => {
  e.preventDefault();
  closeArticle();
  window.scrollTo(0, 0);
});
/* The hash id was designed to be shared; this is its one-tap affordance. Native share
   sheet where the platform has one, clipboard with a brief confirmation elsewhere. */
$('readerShare').addEventListener('click', async ()=>{
  const u = UI[LANG];
  const payload = {title: currentArticle ? localized(currentArticle.title) : document.title,
                   url: location.href};
  if (navigator.share) { navigator.share(payload).catch(()=>{}); return; }
  try {
    await navigator.clipboard.writeText(payload.url);
    $('readerShare').textContent = u.shareCopied;
    setTimeout(()=>{ $('readerShare').textContent = UI[LANG].shareBtn; }, 2000);
  } catch {}
});
window.addEventListener('hashchange', syncFromHash);

/* ---------- filter state ---------- */
let activeFilter = 'all';
let searchQuery = '';
/* Both languages are searched so a reader can type in either. Plain toLocaleLowerCase:
   ponytail: Turkish dotless-i pairs (I/ı, İ/i) may miss; add 'tr' casing if it bites. */
function newsHaystack(n){
  const parts = [];
  for (const f of ['title','summary','detail']){
    const v = n[f];
    if (v && typeof v==='object') parts.push(v.tr||'', v.en||'');
    else if (typeof v==='string') parts.push(v);
  }
  return parts.join(' ').toLocaleLowerCase();
}
function applyFilter(){
  newsPage = 0;
  renderNews();
}
$('filters').addEventListener('click', e=>{
  const btn = e.target.closest('.chip');
  if(!btn || btn.tagName==='INPUT') return;
  if(btn.dataset.writers){ openDrawer(btn); return; }
  activeFilter = btn.dataset.f;
  document.querySelectorAll('.chip:not(.chip-writers)').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
});

/* ---------- writers drawer ---------- */
let drawerOpener = null;
function setDrawerBackgroundInert(inert){
  const drawer = $('drawer');
  const overlay = $('drawerOverlay');
  [...document.body.children].forEach(el=>{
    if(el!==drawer && el!==overlay && el.tagName!=='SCRIPT') el.inert = inert;
  });
}
function drawerFocusable(){
  return [...$('drawer').querySelectorAll(
    'button:not([disabled]),a[href],select:not([disabled]),[tabindex]:not([tabindex="-1"])'
  )];
}
function openDrawer(opener){
  const drawer = $('drawer');
  if(drawer.classList.contains('open')) return;
  drawerOpener = opener || document.activeElement;
  drawer.inert = false;
  drawer.classList.add('open');
  $('drawerOverlay').classList.add('open');
  drawer.setAttribute('aria-hidden','false');
  setDrawerBackgroundInert(true);
  $('drawerClose').focus();
}
function closeDrawer(restoreFocus=true){
  const drawer = $('drawer');
  if(!drawer.classList.contains('open')) return;
  drawer.classList.remove('open');
  $('drawerOverlay').classList.remove('open');
  drawer.setAttribute('aria-hidden','true');
  drawer.inert = true;
  setDrawerBackgroundInert(false);
  const opener = drawerOpener;
  drawerOpener = null;
  if(restoreFocus && opener?.isConnected) opener.focus();
}
$('drawerClose').addEventListener('click', closeDrawer);
$('drawerOverlay').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{
  const drawer = $('drawer');
  if(!drawer.classList.contains('open')) return;
  if(e.key==='Escape'){
    e.preventDefault();
    closeDrawer();
    return;
  }
  if(e.key!=='Tab') return;
  const focusable = drawerFocusable();
  if(!focusable.length){ e.preventDefault(); drawer.focus(); return; }
  const first = focusable[0];
  const last = focusable[focusable.length-1];
  if(e.shiftKey && (document.activeElement===first || !drawer.contains(document.activeElement))){
    e.preventDefault();
    last.focus();
  } else if(!e.shiftKey && document.activeElement===last){
    e.preventDefault();
    first.focus();
  }
});

/* ---------- language switch ---------- */
function setLang(l){
  try { localStorage.setItem('lang', l); } catch {}
  if (LANG === l) return;
  LANG = l;
  renderAll();
}
$('btnTr').addEventListener('click', ()=>setLang('tr'));
$('btnEn').addEventListener('click', ()=>setLang('en'));

/* ---------- topic switch (one desk at a time, remembered like the language) ---------- */
function renderTopics(){
  const el = $('topicSwitch');
  el.innerHTML = '';
  TOPICS.forEach(t=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'topic-btn' + (t.id===TOPIC ? ' active' : '');
    b.dataset.topic = t.id;
    b.setAttribute('role', 'tab');
    b.setAttribute('aria-selected', t.id===TOPIC ? 'true' : 'false');
    b.tabIndex = t.id===TOPIC ? 0 : -1;  // roving tabindex: the tablist is one Tab stop
    b.title = t.label[LANG];
    b.setAttribute('aria-label', t.label[LANG]);
    b.innerHTML = TOPIC_ICONS[t.id] || t.symbol;
    el.appendChild(b);
  });
}
function setTopic(id){
  if (!TOPIC_IDS.has(id) || id===TOPIC) return;
  closeArticle();  // the current article belongs to the desk we're leaving
  try { localStorage.setItem('topic', id); } catch {}
  TOPIC = id;
  activeFilter = 'all';  // the previous desk's tags don't exist on this one
  searchQuery = '';      // a query is a per-desk thought; don't carry it across
  newsPage = 0;
  selectedDate = topicDates()[0] || null;  // the previous desk's date may not exist here
  renderAll();
}
$('topicSwitch').addEventListener('click', e=>{
  const b = e.target.closest('.topic-btn');
  if (b) setTopic(b.dataset.topic);
});
/* The ARIA tabs keyboard model the role=tablist promises: arrows move between desks
   (selection follows focus), Home/End jump. setTopic rebuilds the buttons, so focus is
   re-acquired from the fresh active tab afterwards. */
$('topicSwitch').addEventListener('keydown', e=>{
  const step = {ArrowRight:1, ArrowLeft:-1, Home:0, End:0};
  if (!(e.key in step)) return;
  const tabs = [...$('topicSwitch').querySelectorAll('.topic-btn')];
  const from = tabs.indexOf(document.activeElement);
  if (from < 0) return;
  e.preventDefault();
  const to = e.key==='Home' ? 0 : e.key==='End' ? tabs.length-1
           : (from + step[e.key] + tabs.length) % tabs.length;
  setTopic(tabs[to].dataset.topic);
  $('topicSwitch').querySelector('.topic-btn.active')?.focus();
});

/* ---------- reader ---------- */
/* Escape closes; ArrowLeft/ArrowRight walk the same desk/day sibling list the reader
   nav renders (no wrap). Form controls and the topic tablist keep their own arrows. */
document.addEventListener('keydown', e=>{
  if (!currentArticle) return;
  if (e.key==='Escape'){ closeArticle(); return; }
  if (e.key!=='ArrowLeft' && e.key!=='ArrowRight') return;
  if (e.target.closest?.('input,select,textarea,[contenteditable]')) return;
  if ($('topicSwitch').contains(e.target)) return;
  const siblings = ARTICLES.filter(x =>
    x.date===currentArticle.date && topicOf(x)===topicOf(currentArticle));
  const at = siblings.findIndex(x => articleId(x)===articleId(currentArticle));
  const next = siblings[at + (e.key==='ArrowRight' ? 1 : -1)];
  if (at >= 0 && next) openArticle(next);
});

/* ---------- date select ---------- */
$('dateSel').addEventListener('change', e=>{
  selectedDate = e.target.value;
  renderWriters();
});

/* ---------- boot ---------- */
function renderAll(){
  renderChrome();
  renderTopics();
  renderFilters();
  renderDeskDisclaimer();
  renderPodcast();
  renderNews();
  renderFeaturedWriters();
  renderDateSelect();
  renderWriters();
  if (currentArticle) renderReader(currentArticle);  // keep the open article in sync (e.g. language switch)
}
renderAll();
syncFromHash();  // deep link: open the article named in the URL hash, if any

// Progressive enhancement only: unsupported browsers keep the current static-site path.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
