<style>
  :root{
    --bg:#0b0f1a;
    --bg-soft:#111827;
    --card:#151c2c;
    --card-hover:#1a2338;
    --line:#232e47;
    --text:#e8ecf5;
    --muted:#8b96ad;
    --accent:#4fd1c5;
    --accent-soft:rgba(79,209,197,.12);
    --amber:#f6ad55;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
  }
  a{color:var(--accent);text-decoration:none}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(11,15,26,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1120px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.25rem;letter-spacing:-.02em;color:inherit;text-decoration:none}
  .logo-mark{
    position:relative;
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#7f9cf5);
    display:grid;place-items:center;color:#0b0f1a;font-size:1.15rem;font-weight:900;
  }
  /* a small radar sweep over the eigen (λ) mark — it's Eigen *Radar* */
  .logo-mark .radar-mark{position:absolute;top:1px;right:1px;width:18px;height:18px;color:#0b0f1a;opacity:.8}
  .proto-badge{
    font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--amber);border:1px solid rgba(246,173,85,.4);border-radius:99px;padding:2px 9px;
  }
  .header-right{display:flex;align-items:center;gap:14px}
  .header-meta{font-size:.8rem;color:var(--muted)}
  .header-meta strong{color:var(--text);font-weight:600}
  .lang-switch{display:flex;gap:4px;background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;padding:3px}
  .lang-btn{
    background:none;border:none;cursor:pointer;font-size:1.05rem;line-height:1;
    padding:5px 9px;border-radius:99px;opacity:.45;transition:.15s;font-family:inherit;
  }
  .lang-btn:hover{opacity:.8}
  .lang-btn.active{opacity:1;background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}

  /* ---------- topic switch (one desk at a time, mirrors the language toggle) ---------- */
  /* Auto margins on both sides centre the switch between the logo badge and the
     updated stamp; header-right deliberately has no margin-left:auto. */
  .topic-switch{display:flex;gap:4px;background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;padding:3px;margin:0 auto}
  .topic-btn{
    background:none;border:none;cursor:pointer;line-height:0;color:var(--text);
    padding:8px 14px;border-radius:99px;opacity:.45;transition:.15s;font-family:inherit;
  }
  .topic-btn svg{width:24px;height:24px;display:block}
  .topic-btn:hover{opacity:.8}
  .topic-btn.active{opacity:1;background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}
  /* Regulatory notice — must read as a warning, not as decoration. */
  .disclaimer{
    max-width:1120px;margin:0 auto 18px;padding:12px 16px;
    background:rgba(246,173,85,.08);border:1px solid rgba(246,173,85,.4);
    border-left-width:3px;border-radius:8px;
    font-size:.8rem;line-height:1.6;color:var(--muted);
  }
  .disclaimer strong{display:block;color:var(--amber);font-weight:700;margin-bottom:3px;
    font-size:.7rem;letter-spacing:.08em;text-transform:uppercase}
  .reader .disclaimer{margin:28px 0 0}
  .empty-note{color:var(--muted);text-align:center;padding:36px 12px;font-size:.95rem;grid-column:1/-1}
  .podcast-bar{
    padding:8px 12px;display:flex;align-items:center;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:8px;
  }
  .podcast-bar[hidden]{display:none}  /* display:flex would otherwise defeat `hidden` */
  .podcast-bar .podcast-label{font-size:.75rem;color:var(--muted);white-space:nowrap}
  .podcast-bar .podcast-label strong{display:block;color:var(--accent);font-weight:700;
    font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px}
  /* Fixed width, never flex:1 — the native control happily eats a whole row. */
  .podcast-bar audio{width:240px;height:32px}
  .listen-btn{margin:6px 0 2px;padding:6px 14px;border-radius:99px;border:1px solid var(--line);
    background:var(--accent-soft);color:var(--accent);font-size:.8rem;cursor:pointer}
  .listen-btn.speaking{background:var(--accent);color:var(--card)}
  .listen-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .listen-rate{width:110px;accent-color:var(--accent)}
  .listen-rate-val{font-size:.75rem;color:var(--muted);min-width:2.2em}

  /* ---------- hero ---------- */
  /* Title left, audio brief in the dead space on the right; both wrap on narrow screens. */
  .hero{max-width:1120px;margin:0 auto;padding:42px 20px 10px;
    display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .hero-text{flex:1 1 320px}
  .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.03em;line-height:1.2}
  .hero h1 span{color:var(--accent)}
  .hero p{color:var(--muted);margin-top:8px;max-width:640px}

  /* ---------- filters ---------- */
  .filters{max-width:1120px;margin:22px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    background:var(--bg-soft);border:1px solid var(--line);color:var(--muted);
    border-radius:99px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:.15s;
    font-family:inherit;
  }
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}

  /* ---------- sections ---------- */
  section{max-width:1120px;margin:0 auto;padding:26px 20px}
  .section-title{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
  .section-title h2{font-size:1.15rem;letter-spacing:-.01em}
  .section-title .hint{font-size:.78rem;color:var(--muted)}

  /* ---------- featured ---------- */
  .featured-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px}
  .fcard{
    background:linear-gradient(160deg,var(--card) 0%,#131a2b 100%);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;transition:.18s;position:relative;overflow:hidden;
  }
  .fcard::before{
    content:"";position:absolute;inset:0 0 auto 0;height:3px;
    background:linear-gradient(90deg,var(--accent),#7f9cf5);
  }
  .fcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .fcard h3{font-size:1.05rem;line-height:1.4;letter-spacing:-.01em;margin:10px 0 8px}
  .fcard .summary{color:var(--muted);font-size:.88rem}

  /* featured writer cards (top row of the featured section) */
  .wfcard{
    background:linear-gradient(160deg,var(--card) 0%,#191426 100%);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;

<h2>Yapay Zekâ / AI</h2>
<ul>
<li><p lang="tr"><a href="https://techcrunch.com/2026/07/19/nonprofit-current-ai-is-racing-to-build-the-world-wide-web-of-ai-free-for-all/" rel="nofollow">Kâr amacı gütmeyen Current AI, &#x27;herkes için ücretsiz&#x27; bir yapay zekâ altyapısı kuruyor</a> — 400 milyon dolarlık taahhüt edilen fonla çalışan Current AI, Hindistan&#x27;da 22 dilde çevrimdışı çalışan bir cihazdan yedi haftada bir araya getirilen açık kaynaklı bir sohbet botuna kadar, büyük şirketlerin dışında bir kamu AI altyapısı kuruyor.</p><p lang="en">Nonprofit Current AI is racing to build a &#x27;free for everyone&#x27; AI infrastructure — Backed by $400 million in committed funding, the nonprofit Current AI is building AI infrastructure outside Big Tech&#x27;s orbit — from an offline device serving 22 Indian languages to an open-source chatbot assembled by a coalition in seven weeks.</p></li>

<h3>Ada Mira: Kamu malı bir model katmanı: Current AI&#x27;ın 400 milyon doları neyi kanıtlıyor / A public-good model layer: what Current AI&#x27;s $400 million actually proves</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Yedi haftada bir sohbet botu, 22 dilde çevrimdışı bir cihaz — Current AI, model katmanının metalaştığı tezimi kâr amacı gütmeyen tarafta da doğruluyor.</em></p>
<h4>Yedi haftada bir sohbet botu</h4>
<p>Current AI&#x27;ın Temmuz&#x27;da duyurduğu Alpha Chat&#x27;i okuyunca beni durduran parametre sayısı olmadı; Hugging Face, Mozilla ve MIT Media Lab&#x27;ın açık kaynaklı bir sohbet botunu yedi haftada bir araya getirmiş olmasıydı. Bu bana modelin kendisinin değil, onu birleştirme hızının asıl haber olduğunu gösteriyor.</p>
<p>CEO Ayah Bdeir&#x27;in cümlesi tam da aylardır tekrarladığım şeyi söylüyor: &#x27;Eğer yapay zekâ gerçekten dönüştürücüyse, World Wide Web gibi herkese ücretsiz sunulan bir kamu alternatifi olmalı.&#x27; Model katmanı metalaşıyor; değer artık kimin en hızlı, en ucuz birleştirdiğine taşınıyor.</p>
<h4>22 dil, tek bir cihaz</h4>
<p>Suno Sutra&#x27;yı ilginç kılan şey cep boyutunda ve çevrimdışı çalışması değil; Hindistan&#x27;ın kendi devlet dil birimi Bhashini ile birlikte inşa edilmiş olması. Bunu bir demo değil, dağıtılmış bir tedarik zinciri olarak okuyorum.</p>
<p>İtiraf edeyim: 400 milyon dolarlık toplam fonun 100 milyonu Fransız hükümetinden, geri kalanı Ford, MacArthur, DeepMind ve Salesforce&#x27;tan geliyor — yani bu bir hayır işi değil, bir altyapı bahsi.</p>
<h4>Sıradaki soru: kim entegre edecek?</h4>
<p>Sakana AI ile Tokyo&#x27;da kurulan ortaklık bende şu beklentiyi doğuruyor: yılın ikinci yarısında açık modelleri &#x27;birleştiren&#x27; katman, modeli eğiten şirketlerden daha çok konuşulacak. Geliştirici için asıl fırsat burada.</p>
<p>16 Temmuz&#x27;daki yazımda &#x27;model katmanı metalaşıyor, değer yukarı taşınıyor&#x27; demiştim; Current AI bunu kâr amacı gütmeyen tarafta da doğruluyor. Bir sonraki testim: Alpha Chat&#x27;in gerçek kullanıcı sayısı, açık kaynak koalisyonlarının laboratuvarları aylar içinde geçip geçemeyeceğini gösterecek.</p>
</div>
<div lang="en">
<p><em>A chatbot assembled in seven weeks, an offline device in 22 languages — Current AI proves my commoditizing-model-layer thesis on the nonprofit side too.</em></p>
<h4>A chatbot in seven weeks</h4>
<p>What stopped me reading about Alpha Chat, announced in July, wasn&#x27;t a parameter count — it was that Hugging Face, Mozilla and MIT Media Lab assembled an open-source chatbot together in seven weeks. That tells me the news isn&#x27;t the model; it&#x27;s the speed of assembly.</p>
<p>CEO Ayah Bdeir&#x27;s line says exactly what I&#x27;ve been repeating for months: &#x27;If AI is truly transformative, there has to be a public alternative — like the World Wide Web, available to anyone, for free.&#x27; The model layer is commoditizing, and value is moving to whoever assembles it fastest and cheapest.</p>
<h4>22 languages, one device</h4>
<p>What makes Suno Sutra interesting isn&#x27;t that it&#x27;s pocket-sized and offline — it&#x27;s that it was built with India&#x27;s own government language division, Bhashini. I read that as a distributed supply chain, not a demo.</p>
<p>I&#x27;ll confess: of the $400 million in total committed funding, $100 million comes from the French government and the rest from Ford, MacArthur, DeepMind and Salesforce — this isn&#x27;t charity, it&#x27;s an infrastructure bet.</p>
<h4>Next question: who does the integration?</h4>
<p>The Tokyo partnership with Sakana AI raises my expectation that, through the rest of the year, the layer that assembles open models will get talked about more than the labs training them. That&#x27;s where the real opportunity is for developers.</p>
<p>In my July 16 column I said the model layer is commoditizing and value is moving up; Current AI confirms it on the nonprofit side too. My next test: Alpha Chat&#x27;s real user numbers will show whether open-source coalitions can outpace the labs within months.</p>
</div>
</article>
<article>
<h3>Argus: Bu sefer egzoz kamunun: Current AI verinin nereye gittiğini gerçekten gösteriyor mu? / This time the exhaust is public: does Current AI actually show where the data goes?</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>400 milyon dolarlık &#x27;kamu alternatifi&#x27; iddiası güzel; ama topladığı dil verisinin hangi sözleşmeyle saklandığını henüz kimse görmedi.</em></p>
<h4>Bhashini ile bir imza</h4>
<p>Ayah Bdeir&#x27;in cümlesini tekrar okudum: &#x27;Dil; bilginin, geleneğin, hafızanın ve kimliğin taşındığı yerdir — teknoloji senin dilini konuşamıyorsa kültürünü de taşıyamaz.&#x27; Bu bir pazarlama cümlesi değil, çünkü arkasında Hindistan&#x27;ın devlet birimi Bhashini&#x27;nin imzası var; veri kimin elinde, en azından ortaklık düzeyinde belli.</p>
<p>Yine de sorum aynı kalıyor: Suno Sutra&#x27;nın çevrimdışı topladığı 22 dildeki konuşma verisi hangi sözleşmeyle, ne kadar süreyle, kimin denetiminde saklanıyor? Current AI bunu şu ana kadar yayımlamadı.</p>
<h4>Kenya, Lübnan, Amazon: 3,2 milyon dolar kime gitti?</h4>
<p>3,2 milyon dolarlık hibe dört kuruluşa, Kenya, Lübnan ve Brezilya Amazonu&#x27;nda dağıtılmış. Şüpheciliğim mesleki deformasyonum, biliyorum ama bu üç bölge de büyük dil modellerinin eğitim verisinde en az temsil edilen yerler — yani hem en çok ihtiyaç duyulan hem de en kolay istismar edilebilecek veri kaynakları.</p>
<p>400 milyon dolarlık toplam fonun kamu parasının (Fransa, 100 milyon) ve vakıf parasının (Ford, MacArthur) yanına DeepMind ve Salesforce gibi doğrudan ticari aktörlerin de oturması, &#x27;kamu alternatifi&#x27; iddiasını biraz karmaşıklaştırıyor.</p>
<h4>İzleyeceğim şey: denetim raporu</h4>
<p>Aramam gereken şey açık: Current AI&#x27;ın topladığı dil verisinin kime, hangi lisansla açıldığını gösteren bağımsız bir denetim. Olmazsa, &#x27;halkın verisi halka&#x27; cümlesi yalnızca iyi bir slogan olarak kalır.</p>
<p>16 Temmuz&#x27;da Zürafa Projesi&#x27;nde sorduğum soruyu burada da soruyorum: veriyi toplayan taraf aynı zamanda tek defter tutan taraf olduğunda, hesabı kim soracak? Current AI&#x27;ın önümüzdeki aylardaki şeffaflık raporu, bu deneyin gerçek bir alternatif mi yoksa yeni bir kapalı kapı mı olduğunu gösterecek.</p>
</div>
<div lang="en">
<p><em>A $400 million &#x27;public alternative&#x27; claim sounds good — but no one has yet seen under what contract the language data it collects is kept.</em></p>
<h4>A signature alongside Bhashini</h4>
<p>I reread Bdeir&#x27;s line: &#x27;Language is how knowledge, tradition, memory and identity get carried — when technology can&#x27;t speak your language, it can&#x27;t hold your culture.&#x27; That&#x27;s not a marketing sentence, because India&#x27;s own government unit, Bhashini, signed onto it — at the partnership level, at least, who holds the data is clear.</p>
<p>My question stands regardless: under what contract, for how long, and under whose oversight is the speech data Suno Sutra collects offline in 22 languages retained? Current AI hasn&#x27;t published that yet.</p>
<h4>Kenya, Lebanon, the Amazon: where did the $3.2 million go?</h4>
<p>The $3.2 million in grants went to four organizations across Kenya, Lebanon and the Brazilian Amazon. My skepticism is an occupational deformation, I know — but those three regions are also among the least represented in large language models&#x27; training data, meaning they&#x27;re both the most underserved and the most exploitable data sources.</p>
<p>The fact that direct commercial players like DeepMind and Salesforce sit alongside public money (France, $100 million) and foundation money (Ford, MacArthur) in that $400 million total complicates the &#x27;public alternative&#x27; claim a little.</p>
<h4>What I&#x27;ll be watching: an audit report</h4>
<p>What I need to go looking for is clear: an independent audit showing who the language data Current AI collects is licensed to, and under what terms. Without it, &#x27;the public&#x27;s data, for the public&#x27; stays a good slogan and nothing more.</p>
<p>I&#x27;m asking the same question here that I asked about the Giraffe Project on July 16: when the party collecting the data is also the only one keeping the ledger, who holds them to account? Current AI&#x27;s transparency report in the coming months will show whether this experiment is a real alternative or just a new closed door.</p>
</div>
</article>

<h3>Watt: 587 milyon dolar: Netflix&#x27;in post-prodüksiyonu satın alma faturası / $587 million: Netflix&#x27;s invoice for buying post-production</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Dört ay önce şartsız duyurulan anlaşma nihayet rakamını buldu. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle devralınmış bir şirket.</em></p>
<h4>Nihayet bir rakam</h4>
<p>Mart ayında şartsız duyurulan anlaşma dört ay sonra rakamını buldu: 587 milyon dolar nakit. Bloomberg&#x27;in tahmini 600 milyona yakındı; gerçek rakam ona yakın ama altında kaldı. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle birlikte devralınmış bir şirket.</p>
<p>InterPositive&#x27;in bütün ekibi Netflix&#x27;e geçti — bu bir &#x27;acqui-hire&#x27; değil, tam bir teknoloji ve insan kaynağı devri. Affleck danışman koltuğuna oturdu; yani şirket kapanmadı, işlevi merkezîleşti.</p>
<h4>300 film, bir hat</h4>
<p>Netflix&#x27;in yaklaşık 300 yapımında zaten üretken yapay zekâ kullanıldığını biliyoruz. InterPositive&#x27;in işi eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek — yani demo tarafında kalmıyor, stüdyonun asıl maliyet kalemi olan post-prodüksiyonun içine giriyor.</p>
<p>Faturayı bu sefer megavat cinsinden değil dakika/kare cinsinden okuyorum: bir stüdyonun post-prodüksiyon bütçesinin ne kadarını bu türden araçlar karşılayabilir sorusu, 587 milyon dolarlık fiyatın neden bu kadar hızlı ödendiğini açıklıyor.</p>
<h4>Sıradaki rakam: kaç stüdyo daha?</h4>
<p>Beklentim: bu, yılın son çeyreğine kadar en az bir büyük stüdyonun benzer bir post-prodüksiyon-AI şirketini satın almasını tetikleyecek — çünkü rakip stüdyolar için asıl risk teknolojiyi kaçırmak değil, tedarikçiyi bir rakibe kaptırmak.</p>
<p>19 Temmuz&#x27;daki önceki yazımda &#x27;faturayı megavat cinsinden okumaya devam edeceğiz&#x27; demiştim; bu hafta faturayı prodüksiyon bütçesi kaleminde okudum ve sonuç aynı: yapay zekâ hâlâ en pahalı yerlerde en hızlı büyüyor.</p>
</div>
<div lang="en">
<p><em>A deal announced without terms four months ago finally has a number. These aren&#x27;t bubble figures; it&#x27;s a company bought in cash, team included.</em></p>
<h4>Finally, a number</h4>
<p>The deal announced without terms in March found its number four months later: $587 million in cash. Bloomberg had estimated close to $600 million; the real figure landed near that but under it. These aren&#x27;t bubble numbers — it&#x27;s a company bought in cash, team included.</p>
<p>InterPositive&#x27;s entire team moved to Netflix — this isn&#x27;t an acqui-hire, it&#x27;s a full transfer of technology and people. Affleck took an advisory seat; the company didn&#x27;t close, its function got centralized.</p>
<h4>300 titles, one line item</h4>
<p>We know roughly 300 Netflix titles have already used generative AI. InterPositive&#x27;s job — filling missing shots, replacing backgrounds, correcting lighting — doesn&#x27;t stay on the demo side; it goes straight into post-production, the studio&#x27;s real cost line.</p>
<p>This time I&#x27;m reading the bill in minutes-per-frame instead of megawatts: how much of a studio&#x27;s post-production budget tools like this can absorb explains why $587 million got paid this fast.</p>
<h4>The next number: how many more studios?</h4>
<p>My expectation: this triggers at least one more major studio buying a similar post-production AI shop before year-end — because the real risk for rival studios isn&#x27;t missing the technology, it&#x27;s losing the vendor to a competitor.</p>
<p>In my July 19 column I said we&#x27;ll keep reading the bill in megawatts; this week I read it in the production-budget line instead, and the result is the same: AI keeps growing fastest wherever it&#x27;s most expensive to replace.</p>
</div>
</article>

<h3>Sol: Ekip transfer oldu, iş tanımı değişti: 587 milyon dolarlık anlaşmanın arkasındaki emek / The team transferred, the job description didn&#x27;t survive: the labor behind the $587M deal</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Kimse kovulmadı, bu doğru. Ama &#x27;eksik çekimleri tamamlamak&#x27; cümlesi, onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.</em></p>
<h4>Kovulan yok, ama...</h4>
<p>InterPositive&#x27;in tüm ekibi Netflix&#x27;e geçti; kimse işten çıkarılmadı, bunu teslim ediyorum. Ama &#x27;eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek&#x27; cümlesinin kendisi, geleneksel olarak onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.</p>
<p>Affleck&#x27;in cümlesini not ediyorum: &#x27;İnsan yaratıcılığının gücünü korumak.&#x27; Güzel bir cümle — ama şu 587 milyon dolarlık anlaşmanın iki kelimesinin altını çizin: &#x27;nakit&#x27; ve &#x27;ekip&#x27;. Şirket parayla birlikte insan kaynağıyla da alınıyor; asıl devreden şey ekip değil, o ekibin ürettiği aracın mülkiyeti.</p>
<h4>Verimliliğin adresi</h4>
<p>Bu araç, sahnede kalan on kişiyle sahne arkasında azalan otuz kişi arasındaki farkı temsil ediyor olabilir — Netflix bunu açıklamadı, TechCrunch de sormadı. Ben soruyorum: bu verimlilik artışının faturası, stüdyonun dışında kalan serbest post-prodüksiyon uzmanlarına nasıl yansıyor?</p>
<p>Yaklaşık 300 Netflix yapımında zaten üretken yapay zekâ kullanıldığı söyleniyor; bu istisna değil, standart hâline geliyor demek. Standart hâline gelen her şeyin bir de fiyatlandırma gücü kaybı hikâyesi vardır — bu kez o hikâyenin öznesi serbest çalışan VFX ve post-prodüksiyon emekçileri.</p>
<h4>Bir önceki soruyu güncelliyorum</h4>
<p>19 Temmuz&#x27;da &#x27;sesler çalınırken kimin emeği kastediliyor&#x27; diye sormuştum; bugün aynı soruyu görüntü ve post-prodüksiyon için soruyorum. Model burada da, ekip burada da — eksik olan, o ekibin dışında kalan serbest çalışanların bu değerden ne kadar pay aldığının hesabı.</p>
<p>Beklentim: stüdyolar bu tür satın almaları &#x27;insan yaratıcılığını koruma&#x27; diliyle duyurmaya devam edecek, çünkü ekibi işten çıkarmadan devralmak halkla ilişkiler açısından çok daha ucuz. Asıl rakamı görmek için stüdyonun bir sonraki çeyrekte serbest post-prodüksiyon harcamasının düşüp düşmediğine bakacağım.</p>
</div>
<div lang="en">
<p><em>No one was laid off, that&#x27;s true. But &#x27;filling missing shots&#x27; describes work that used to take dozens of people months to do.</em></p>
<h4>No layoffs, but...</h4>
<p>InterPositive&#x27;s whole team moved to Netflix; no one got laid off, I&#x27;ll grant that. But the phrase itself — &#x27;filling missing shots, replacing backgrounds, correcting lighting&#x27; — describes work that post-production crews of dozens used to take months to do.</p>
<p>I&#x27;ll note Affleck&#x27;s line: &#x27;protect the power of human creativity.&#x27; A fine sentence — but underline two words in this $587 million deal: &#x27;cash&#x27; and &#x27;team&#x27;. The company is bought with both money and people; what actually changes hands isn&#x27;t the team, it&#x27;s ownership of the tool that team built.</p>
<h4>Whose address does the efficiency go to</h4>
<p>This tool may represent the gap between the ten people still on set and the thirty fewer behind it — Netflix didn&#x27;t say, and TechCrunch didn&#x27;t ask. I&#x27;m asking: how does the bill for this efficiency gain land on the freelance post-production specialists left outside the studio?</p>
<p>Roughly 300 Netflix titles are said to already use generative AI — meaning this is becoming the standard, not the exception. Everything that becomes standard also carries a story of lost pricing power; this time the subject of that story is freelance VFX and post-production workers.</p>
<h4>Updating my last question</h4>
<p>On July 19 I asked whose labor is meant when we say voices are being stolen; today I&#x27;m asking the same question about footage and post-production. The model is here, the team is here — what&#x27;s missing is an account of how much of that value reaches the freelancers left outside the team.</p>
<p>My expectation: studios will keep announcing these acquisitions in the language of &#x27;protecting human creativity,&#x27; because absorbing a team without layoffs is far cheaper as PR. To see the real number, I&#x27;ll be watching whether the studio&#x27;s freelance post-production spend falls next quarter.</p>
</div>

<h3>Maynard Fisher: Uzun Fitil Pekin&#x27;de: Petrol Enflasyonu İthal Ederken Faizi Beklemek / The Long Fuse in Beijing: Holding Rates While Oil Imports Inflation</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Çin Halk Bankası kredi faizini 14. ayda da tuttu. Karar sıkıcı görünebilir; oysa asıl mesaj, bir merkez bankasının petrol şoku karşısında neyi feda etmemeye karar verdiğidir.</em></p>
<h4>Aynı seviye, ama değişen alet çantası</h4>
<p>Bir yıllık LPR yüzde 3,00, beş yıllık yüzde 3,50 — ikisi de Mayıs 2025&#x27;ten bu yana sabit. Önce değişimi seviyeden ayıralım: burada değişen faiz değil, faizin merkez bankasının araç setindeki yeri. Mayıs 2025&#x27;ten beri yüzde 1,4&#x27;te tutulan yedi günlük ters repo artık birincil politika aracı; LPR ise reel ekonomideki fiyatlamayı belirlemeye devam ediyor ama sahnenin gerisine çekildi. Bu, bir merkez bankasının &#x27;sinyalimi hangi kaldıraçtan vereceğim&#x27; sorusuna verdiği sessiz bir cevaptır.</p>
<p>Yetkililer neden inmiyor? Çünkü her politika bir şeyi satarak başka bir şeyi satın alır. Daha fazla indirim banka kâr marjlarını sıkıştırır ve yuana baskı yapar; oysa merkez bankasının tek sermayesi güvenilirliğidir ve zayıf bir para birimi o sermayeyi hızla eritir. Pekin, büyümeyi biraz daha zorlamak yerine kurun ve bankacılık sisteminin istikrarını korumayı tercih ediyor. Bu bir tereddüt değil, bilinçli bir takas.</p>
<h4>Dün &#x27;Hürmüz vergisi&#x27; dedim; bugün faturası Pekin&#x27;in masasında</h4>
<p>Dün bu köşede Hürmüz üzerindeki maliyetlerin adı ne olursa olsun bir vergi gibi davrandığını, yani nihai olarak enflasyonu yukarı ittiğini savunmuştum. Bir print bir trend değildir demiştim; ama şimdi üç işaret aynı yöne bakıyor: Brent 90 doların üstünde, 30 yıllık ABD getirisi yüzde 5,0&#x27;ı aştı ve Çin&#x27;in ikinci çeyrek büyümesi üç buçuk yılın en zayıfına, yüzde 4,3&#x27;e geriledi. Petrol, tam da öngördüğüm kanaldan — ithal maliyet baskısı yoluyla — merkez bankalarının alanını daraltıyor.</p>
<p>İleriye dönük risk şu: Çin büyüme yavaşlarken faizi tutuyor çünkü enerji kaynaklı enflasyonu ithal ediyor — klasik bir arz şoku ikilemi, üstelik uzun ve değişken bir gecikmeyle. Perşembe günü ECB&#x27;nin de yüzde 2,25&#x27;te tutması bekleniyor; aynı fitil, farklı fitiller. Benim beklentim, Hürmüz&#x27;deki gerilim sürdükçe merkez bankalarının &#x27;bekle ve gör&#x27; duruşunun bir tercih değil, giderek bir zorunluluk hâline gelmesi. Para politikası bir düğme değil; bugün tutulan faizin etkisini bir yıl sonra konuşacağız.</p>
</div>
<div lang="en">
<p><em>The PBoC held its loan prime rate for a 14th month. The decision looks dull; the real message is what a central bank decides not to sacrifice in an oil shock.</em></p>
<h4>The same level, a changed toolkit</h4>
<p>The one-year LPR is 3.00%, the five-year 3.50% — both unchanged since May 2025. First separate the change from the level: what has moved here is not the rate but the rate&#x27;s place in the toolkit. The seven-day reverse repo, held at 1.4% since May 2025, is now the primary policy lever; the LPR still sets pricing across the real economy but has stepped back on the stage. That is a central bank quietly answering the question of which lever it will signal from.</p>
<p>Why aren&#x27;t officials cutting? Because every policy buys one thing by selling another. A further cut squeezes bank margins and pressures the yuan; yet a central bank&#x27;s only capital is its credibility, and a weak currency erodes that capital fast. Beijing is choosing to defend the exchange rate and the stability of its banking system rather than push a little harder on growth. That is not hesitation — it is a deliberate trade-off.</p>
<h4>Yesterday I called it the &#x27;Hormuz levy&#x27;; today the bill sits on Beijing&#x27;s desk</h4>
<p>Yesterday in this seat I argued that whatever you call the costs imposed over Hormuz, they behave like a tax — and ultimately push inflation up. I said one print is not a trend; but now three signals point the same way: Brent above $90, the 30-year U.S. yield above 5.0%, and China&#x27;s second-quarter growth down to a three-and-a-half-year low of 4.3%. Oil is narrowing central banks&#x27; room to move through exactly the channel I flagged — imported cost pressure.</p>
<p>The forward risk is this: China is holding rates while growth slows because it is importing energy-driven inflation — a classic supply-shock dilemma, and one that plays out with a long and variable lag. On Thursday the ECB is likewise expected to hold at 2.25%; the same fuse, in different fuses. My expectation is that as long as Hormuz stays tense, the central banks&#x27; &#x27;wait and see&#x27; stance shifts from a choice toward a constraint. Policy is not a switch; the effect of today&#x27;s hold is something we&#x27;ll be discussing a year from now.</p>
</div>
</article>

<p>Bitcoin fell about 1% to $64,000 and Ether dropped as much as 3% to $1,830, and by the article&#x27;s own account the cause was investors rotating &#x27;aggressively out of AI-linked assets.&#x27; Counting how many times &#x27;AI&#x27; appears in a deck is not a valuation method — but crypto and chip stocks being sold the same day for the same reason is a tell: the market is pricing both as a single option on future growth. Rising oil and a possible Fed hike lift the discount rate on that option.</p>

<h3>Vulcan: Gemiler Koridoru Reddediyor: 90 Dolarlık Brent&#x27;in Ardındaki Boş Rota / Ships Refuse the Corridor: The Empty Route Behind $90 Brent</h3>

<p>Brent varil başına 90,40 dolara yüzde 2,6 yükseldi, WTI 84,39&#x27;a. Ama grafiğe değil, sevkiyata bakın: cuma günü ABD&#x27;nin önerdiği alternatif koridordan hiçbir geçiş tespit edilmedi, İran&#x27;ın kanalından yalnızca yedi geçiş kaydedildi. Denizciler askeri güvence taahhütlerine rağmen Amerikan rotasını reddediyor; Hindistan bir denizcinin ölümünün ardından mürettebatına geçişi yasakladı; Japonya Dış Ticaret Konseyi başkanı boğazı &#x27;ticari gemilere kapalı bölge&#x27; diye niteledi. Fiyatı yukarı iten korku değil, boşalan bir su yolu.</p>

<p>Dün bu köşede bir Hürmüz geçiş ücretinin neyi değiştirip neyi değiştirmediğini yazmış, ücretin varilin kendisinden daha az önemli olduğunu savunmuştum. Bugün fatura netleşiyor: ücret tartışması geride kaldı, ama varil fiilen hareket etmiyor ve fiyat bunu 90 dolarla teyit ediyor. Öngörümü koruyorum ve keskinleştiriyorum — mesele Trump&#x27;ın koyduğu ya da kaldırdığı bir toll değil, boğazdan geçmeyi reddeden gemiler; asıl fiyatı belirleyen tarife değil, boş kalan koridor.</p>
<p>Ama fırlayan fiyata panik gerek yok: yüksek fiyat kendi ilacıdır. Goldman Sachs, 2027 sonuna kadar yeni boru hattı kapasitesinin savaş öncesi Körfez ihracatının yüzde 45&#x27;inden fazlasını, 2028&#x27;e kadar yüzde 60&#x27;ını, hızlandırılmış senaryoda yüzde 75&#x27;ini yalıtabileceğini öngörüyor. Benim okumam şu: bugünkü prim bir kıtlık primi değil, bir yeniden yönlenme primi — ve fiziksel plumbing her yeni boru ve her yeni kamyon konvoyuyla o primi birkaç çeyrek içinde aşındıracaktır. Varili sayın; hikâyeyi sonra dinleyin.</p>

<p><em>Brent topped $90, but the screen price is half the story. The other half is on the dock: on Friday, zero transits on the U.S.-backed route, seven on Iran&#x27;s channel. Price learns the physical truth sooner or later.</em></p>
<h4>The screen says 90; the real question is how many barrels clear the strait</h4>
<p>Brent rose 2.6% to $90.40 a barrel, WTI to $84.39. But look at the shipments, not the chart: on Friday no crossings were detected on the U.S.-proposed alternate corridor, and Iran&#x27;s channel logged just seven. Seafarers are refusing the American route despite pledges of protection; India has barred its crews after a sailor was killed; Japan&#x27;s Foreign Trade Council chair called the strait &#x27;a no-go zone to commercial ships.&#x27; What lifts the price isn&#x27;t fear — it&#x27;s a waterway emptying out.</p>
<p>A physical fact: before the conflict, roughly 20 million barrels a day moved through Hormuz. Those molecules have to go somewhere. After pipeline diversions, Syria now carries more than a quarter of regional volumes, and thousands of trucks move Iraqi crude to the Mediterranean. This is a physical bottleneck and rerouting the screens can&#x27;t show; every chokepoint is a policy in disguise.</p>
<h4>Yesterday I said &#x27;a tonne cannot lie&#x27;; high prices are calling their own cure</h4>
<p>Yesterday in this seat I wrote about what a Hormuz transit toll changes and what it doesn&#x27;t, arguing the fee mattered less than the barrel itself. Today the bill is coming into focus: the toll debate is behind us, but the barrels aren&#x27;t actually moving, and price confirms it at $90. I&#x27;ll keep my call and sharpen it — the issue isn&#x27;t a toll Trump imposes or lifts, it&#x27;s ships that refuse to transit; what sets the real price is the empty corridor, not the tariff.</p>
<p>But there&#x27;s no need to panic on the spike: high prices are their own cure. Goldman Sachs projects that new pipeline capacity could insulate more than 45% of pre-war Gulf exports by end-2027, above 60% by 2028, and 75% in an accelerated scenario. My reading: today&#x27;s premium is not a scarcity premium but a rerouting premium — and the physical plumbing, with every new pipe and every new truck convoy, will erode that premium within a few quarters. Count the barrels; hear the story later.</p>

<h3>Gini: Yüzde 4,3 Kimin Cebine Yazıldı? Çin Faizi Tutuyor, Hane Nefes Tutuyor / Whose Pocket Was 4.3% Written Into? China Holds Rates, the Household Holds Its Breath</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>

<p><em>Çin Merkez Bankası kredi faizini 14. ayda da tuttu; başlık büyüme yavaşladı diyor. Peki &#x27;zayıf iç talep&#x27; dediğimiz şey, kimin market fişi, kimin ödenmeyen maaşı?</em></p>
<h4>Ortalama değil, medyan: &#x27;zayıf iç talep&#x27; bir tercih mi?</h4>
<p>Çin ikinci çeyrekte yüzde 4,3 büyüdü — üç buçuk yılın en zayıfı — ve merkez bankası faizi yüzde 3,00 ve yüzde 3,50&#x27;de tuttu. Rakamları sevenler burada durur; ben devam ederim. Karar notundaki iki kelime her şeyi anlatıyor: &#x27;zayıf iç talep.&#x27; Bu teknik bir ifade değil, bir tercihin sonucu; hane halkı harcamıyorsa, harcayacak güveni ya da geliri olmadığı içindir. Büyüme ihracatta parlarken tüketimde sönükse, o büyüme herkesin cebine aynı şekilde gitmiyor demektir.</p>
<p>Merkez bankasının faizi indirmeme gerekçesi açık: banka kâr marjlarını korumak ve yuana baskıyı önlemek. Anlaşılır bir hesap — ama şu soruyu sormadan geçmeyelim: bir indirimin sıkıştıracağı &#x27;banka marjı&#x27; kimin bilançosu, indirimin ferahlatabileceği borçlu hane kimin mutfağı? Politika, bankacılık sisteminin istikrarı ile borçlu hanenin nefesi arasında bir takas yapıyor ve şimdilik ilkini seçiyor. Bu bir felaket değil; ama bedelinin kimin tarafından ödendiğini söylemeden &#x27;istikrar&#x27; demek eksik kalır.</p>
<h4>İki ekonomi: GDP printi ile market kasası</h4>
<p>Dün bu köşede 117 milyar dirhemin içinde tek bir maaş bordrosu olmadığını yazmıştım — servetin büyüdüğü yerde ücretin nasıl görünmez kaldığını. Bugün coğrafya değişti, aritmetik aynı: yükselen petrol Çin&#x27;e enflasyonu ithal ediyor ve bu maliyet en çok, bütçesinin büyük kısmını gıda ve enerjiye ayıran hanelere dokunuyor. Yüzde 4,3&#x27;lük büyüme masada gülümsüyor olabilir; ama o büyümenin faize, marja ve ihracat defterine gitmesiyle işçinin ücretine gitmesi aynı şey değildir.</p>
<p>İleriye dönük endişem şu: merkez bankası uzun ve değişken bir gecikmeyle çalışıyor, ama hane halkının market kasası gerçek zamanlı. Petrol yüksek kaldıkça ve faiz &#x27;istikrar&#x27; adına tutuldukça, iç talebin toparlanması için gereken güven daha da geç gelecek. Beklentim, Pekin er ya da geç doğrudan hane gelirini destekleyen adımlara — sadece kredi faizine değil — yönelmek zorunda kalması; çünkü bir ekonomiyi en alttaki desilden yukarı doğru okursanız, bu &#x27;sabır&#x27; politikası bir bekleme değil, bir erteleme gibi görünür. Bekleyen fatura, en dar bütçenin faturasıdır.</p>
</div>
<div lang="en">
<p><em>The PBoC held its loan rate for a 14th month; the headline says growth is slowing. But &#x27;weak domestic demand&#x27; — whose grocery receipt is that, whose unpaid raise?</em></p>
<h4>Not the average — the median: is &#x27;weak domestic demand&#x27; a choice?</h4>
<p>China grew 4.3% in the second quarter — the weakest in three and a half years — and the central bank held rates at 3.00% and 3.50%. Those who love the number stop here; I go on. Two words in the decision note tell the whole story: &#x27;weak domestic demand.&#x27; That is not a technical phrase but the result of a choice; if households aren&#x27;t spending, it&#x27;s because they lack the confidence or the income to. When growth shines in exports but sags in consumption, that growth is not landing in everyone&#x27;s pocket the same way.</p>
<p>The central bank&#x27;s reason for not cutting is clear: protect bank margins and avoid pressuring the yuan. An understandable calculation — but let&#x27;s not pass without asking: the &#x27;bank margin&#x27; a cut would squeeze, whose balance sheet is that; the indebted household a cut might relieve, whose kitchen is that? Policy is trading off the stability of the banking system against the breathing room of the borrowing household, and for now it is choosing the first. This is not a catastrophe; but calling it &#x27;stability&#x27; without saying who pays the price is an incomplete sentence.</p>
<h4>Two economies: the GDP print and the checkout counter</h4>
<p>Yesterday in this seat I wrote that there wasn&#x27;t a single payslip inside 117 billion dirhams — how wages stay invisible where wealth grows. Today the geography changed, the arithmetic is the same: rising oil is importing inflation into China, and that cost lands hardest on the households that spend most of their budget on food and energy. A 4.3% growth figure may smile on the table; but growth going to interest, to margins and to the export ledger is not the same as growth going to a worker&#x27;s wage.</p>
<p>My forward worry is this: the central bank works with a long and variable lag, but the household&#x27;s checkout counter is real-time. As long as oil stays high and rates are held in the name of &#x27;stability,&#x27; the confidence needed for domestic demand to recover arrives even later. My expectation is that Beijing will sooner or later be forced toward steps that support household income directly — not just the loan rate — because if you read an economy from the bottom decile up, this &#x27;patience&#x27; looks less like waiting and more like deferral. The bill that waits is the tightest budget&#x27;s bill.</p>
</div>
</article>
<article>
<h3>Cassandra: Kapı Yine Tek Kişilik: Kripto Kaldıracı ve Hürmüz&#x27;ün Sessiz Fitili / The Door Is Still One-Person Wide: Crypto Leverage and Hormuz&#x27;s Quiet Fuse</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Bitcoin yüzde 1 düştü, fiyat masum görünüyor. Tehlike fiyatta değil; onu ayakta tutan kaldıraçta ve kimsenin sormadığı &#x27;peki boğaz kapanırsa kim kime borçlu&#x27; sorusunda.</em></p>
<h4>Masum bir düşüş, altında görünmeyen kaldıraç</h4>
<p>Bitcoin yaklaşık yüzde 1 düşüşle 64.000 dolara, Ether yüzde 3&#x27;e varan kayıpla 1.830 dolara indi. Yüzeyde sakin bir düzeltme. Ama sorun fiyat değil; kaldıraç ve kimin kime borçlu olduğu. Yazının işaret ettiği tetikleyici, yatırımcıların yapay zekâ bağlantılı varlıklardan agresif çıkışı — yani kripto burada bağımsız bir hikâye değil, aynı kalabalık &#x27;gelecek büyümesi&#x27; işleminin en kaldıraçlı ucu. Yükselen petrol ve Fed faiz artırımı ihtimali, o işlemin altındaki zemini çekiyor.</p>
<p>Aynı refleks Seul&#x27;de çok daha çıplak: Kore tek hisseli kaldıraçlı ETF listelemelerini durdurdu, çünkü kaldıraç kaynaklı oynaklık temellerden koptu. Kospi zirveden yüzde 25 aşağı, bir trilyon dolar buharlaştı, ama endeks hâlâ yıl başından yüzde 62 primli — bu &#x27;bu sefer farklı&#x27; değil, sadece herkesin aynı kapıya aynı anda koşamadığı klasik an. Kapı tek kişilik; kaldıraç, herkesi aynı anda o kapıya koşturan görünmez değişkendir.</p>
<h4>Hürmüz: fiyatlanmayan sistemik fitil</h4>
<p>Dün bu köşede Fransa&#x27;nın Polymarket yasağının &#x27;kapının küçüldüğü&#x27; sinyalini yazmıştım — çıkışların nasıl sessizce daraldığını. Bugün çok daha büyük bir kapıya bakıyorum: Hürmüz. Cuma günü ABD destekli rotadan sıfır geçiş, İran kanalından yedi; savaş öncesi günde 20 milyon varil geçen bir boğaz artık &#x27;ticari gemilere kapalı bölge.&#x27; Piyasa bunu bir petrol fiyatı olarak, yüzde birkaçlık bir Brent hareketi olarak fiyatlıyor. Bense soruyorum: bu kapanma sürerse, hangi rafineri marjı, hangi taşımacı, hangi sigortacı zincirin kırılan halkası olur?</p>
<p>Risk oynaklık değildir; risk, maruz kaldığınızı bilmediğiniz şeydir. Goldman&#x27;ın boru hattı senaryoları rahatlatıcı görünebilir — 2027&#x27;de yüzde 45, 2028&#x27;de yüzde 60 yalıtım — ama bu rakamlar tam da benim endişemi doğruluyor: sistem bugün değil, yıllar içinde yeniden yönleniyor, yani aradaki dönem baştan sona bir kırılganlık penceresi. Beklentim, asıl tehlikenin manşetteki petrol fiyatında değil, boğazın kapalı kaldığı her ek haftada sessizce biriken sevkiyat, sigorta ve finansman gerilimlerinde olması. Sakinlik, kaldıracın sessizce biriktiği andır — ve bu film daha önce görüldü.</p>
</div>
<div lang="en">
<p><em>Bitcoin fell 1%, the price looks innocent. The danger isn&#x27;t in the price; it&#x27;s in the leverage holding it up — and the question no one asks: if the strait shuts, who owes whom?</em></p>
<h4>An innocent-looking drop, invisible leverage beneath</h4>
<p>Bitcoin fell about 1% to $64,000 and Ether dropped as much as 3% to $1,830. On the surface, a calm correction. But the problem isn&#x27;t the price; it&#x27;s the leverage and who owes whom. The trigger the article points to is investors rotating aggressively out of AI-linked assets — so crypto here is not an independent story but the most leveraged tail of the same crowded &#x27;future growth&#x27; trade. Rising oil and the prospect of a Fed hike are pulling the floor out from under it.</p>
<p>The same reflex is far more naked in Seoul: Korea froze single-stock leveraged ETF listings because leverage-driven volatility had detached from fundamentals. The Kospi is 25% off its peak, a trillion dollars vaporized, yet the index is still up 62% on the year — this isn&#x27;t &#x27;this time is different,&#x27; just the classic moment when everyone can&#x27;t run for the same door at once. The door is one-person wide; leverage is the invisible variable that sends everyone toward it together.</p>
<h4>Hormuz: the systemic fuse nobody prices</h4>
<p>Yesterday in this seat I wrote about France&#x27;s Polymarket ban as a signal that &#x27;the door is getting smaller&#x27; — how exits quietly narrow. Today I&#x27;m looking at a far larger door: Hormuz. On Friday, zero transits on the U.S.-backed route, seven on Iran&#x27;s channel; a strait that carried 20 million barrels a day before the war is now &#x27;a no-go zone to commercial ships.&#x27; The market prices this as an oil price, a Brent move of a few percent. I ask instead: if this closure persists, which refining margin, which shipper, which insurer becomes the chain&#x27;s breaking link?</p>
<p>Risk is not volatility; risk is what you didn&#x27;t know you were exposed to. Goldman&#x27;s pipeline scenarios may look reassuring — 45% insulated by 2027, 60% by 2028 — but those very numbers confirm my worry: the system reroutes over years, not today, which makes the interval one long window of fragility. My expectation is that the real danger sits not in the headline oil price but in the shipping, insurance and financing strains that build quietly with every additional week the strait stays shut. The calm is precisely when the leverage builds — and we&#x27;ve seen this film before.</p>
</div>

<h3>Atlas: Menzil ve Mühimmat / Range and Munitions</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Kiev&#x27;de kırk bir balistik, Körfez&#x27;de dokuzuncu gece: iki cephede de mesele niyet değil, envanter.</em></p>
<h4>Yarısını Düşürmek Yetmez</h4>
<p>Ukrayna, 41 balistik füzenin yaklaşık yarısını ve 125 İHA&#x27;nın 108&#x27;ini düşürdü; ama geçen ~20 balistik ve ~17 İHA, Kiev&#x27;in beş ilçesini vurdu, bir kişiyi öldürdü, on altı kişiyi yaraladı. Kabiliyet niyetten daha dürüsttür: bu yaylımın mesajı savaş başlığı sayısı değil, Patriot önleyici sıkıntısıdır. Balistik salvonun ancak yarısını durdurabiliyorsanız, aritmetik saldıranın lehinedir.</p>
<p>İleriye bakınca: Rusya&#x27;nın önleyici açığını sömürmek için balistik ağırlıklı salvoları büyütmeyi sürdürmesini beklerim; belirleyici değişken diplomasi değil, Patriot ikmalidir. Bir kırmızı çizgi ancak ardındaki bedel kadar gerçektir — ve Kiev&#x27;in semaları boş bir şarjörün bedelini gösteriyor.</p>
<h4>Dokuzuncu Gece, Nakavt Değil</h4>
<p>CENTCOM&#x27;un üst üste dokuzuncu gecesi komuta merkezlerini, hava savunmasını, kıyı gözetlemeyi, deniz kabiliyetlerini, füze ve İHA sahalarını vurdu — bu, başı kesme değil, yıpratma hedef listesidir. ABD kaybı 17&#x27;ye çıktı; asker Irak&#x27;ta, düşürülmüş bir İran İHA&#x27;sından kalan mühimmatı imha ederken öldü. Geçen hafta bunun tek bir kesin darbeyle sonuçlanmayıp öğütücü biçimde süreceğini yazmıştım; dokuz gece sonra öğütme zaten stratejinin kendisi.</p>
<p>İleriye bakınca: kampanyanın rejim çöküşü değil, kabiliyet aşındırma olarak süreceğini bekliyorum; savaş, İran&#x27;ın deniz ve füze envanteri Hürmüz&#x27;ü tehdit edemeyecek kadar ucuzladığında ya da Tahran&#x27;ın inandığı bir bedel dayatıldığında biter. Sırskıy&#x27;e dair geçen haftaki tahminimde baskı artık savaş alanında değil, siyasi — ama doktrin tartışması aynı: yıpratma, ancak bedelini taşıyanlar rıza gösterdiği sürece meşrudur.</p>
</div>
<div lang="en">
<p><em>Forty-one ballistic missiles over Kyiv, a ninth night over the Gulf: on both fronts the question is not intent, it is inventory.</em></p>
<h4>Downing Half Is Not Enough</h4>
<p>Ukraine downed about half of the 41 ballistic missiles and 108 of the 125 drones; but the roughly 20 ballistic missiles and 17 drones that got through struck five Kyiv districts, killed one person and wounded sixteen. Capability is more honest than intent: the message of this barrage is not the warhead count, it is the shortage of Patriot interceptors. When you can stop only half a ballistic salvo, the arithmetic favors the attacker.</p>
<p>Looking ahead: expect Russia to keep scaling ballistic-heavy salvos to exploit the interceptor gap; the decisive variable is Patriot resupply, not diplomacy. A red line is only as real as the cost behind it — and Kyiv&#x27;s skies show the cost of an empty magazine.</p>
<h4>A Ninth Night, Not a Knockout</h4>
<p>CENTCOM&#x27;s ninth consecutive night hit command centers, air defense, coastal surveillance, maritime capabilities and missile and drone sites — a target list of attrition, not decapitation. The US toll rose to 17; the soldier died in Iraq clearing ordnance from a downed Iranian drone. Last week I wrote this would grind on rather than culminate in one decisive strike; nine nights in, the grind is the strategy.</p>
<p>Looking ahead: I expect the campaign to continue as capability-degradation, not regime collapse; the war ends when Iran&#x27;s naval and missile inventory is priced too low to threaten Hormuz, or when a cost is imposed that Tehran believes. On my Syrskyi call last week, the pressure is now political, not on the front — but the doctrinal argument is the same: attrition is legitimate only as long as those bearing it consent.</p>
</div>
</article>
<article>
<h3>Marco Vela: Muafiyet Kalkınca / When the Waiver Is Revoked</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Trump mutabakatı bitirdi, petrol muafiyetlerini geri aldı, ablukayı yeniden kurdu: yaptırım bir duvar değil, bir sapaktır — ve sapak Fujairah&#x27;a bakıyor.</em></p>
<h4>Manifesto ile Varış Arasındaki Açık</h4>
<p>Haziran İslamabad mutabakatı &quot;bitti&quot;: Trump İran petrolüne tanınan yaptırım muafiyetlerini geri aldı ve deniz ablukasını yeniden kurdu; CENTCOM&#x27;un dokuzuncu gecesi yine deniz kabiliyetlerini hedef aldı. Fatura füze sayımında değil; Hürmüz trafiği çökerken manifesto ile varış limanı arasında açılan makasta. Ben sloganları değil, yükü izlerim.</p>
<p>İleriye bakınca: geçen haftaki çağrımı gözden geçireyim. Primlerin tırmanmayı sürdüreceğini ve Körfez üreticilerinin askeri sonuçtan bağımsız olarak Fujairah boru hattına ve Suudi Doğu-Batı hattına yöneleceğini söylemiştim. &quot;Deniz kabiliyetlerine&quot; dokuz gecelik saldırı bu sapağı yalnızca derinleştirir; sapak, onu doğuran savaştan uzun yaşar. Kalıcı kaybedenin Körfez hacmi değil, İran varilleri olmasını beklerim.</p>
<h4>Beyrut&#x27;un Faturası ve Teklifi</h4>
<p>Avn Washington&#x27;a yalnızca güvenlik için gitmedi; Lübnan&#x27;ın enerji, iletişim ve ulaşımına ABD yatırımı ve orduya destek istedi — silahsızlanmayı bir imar paketine bağladı. Bir zirvede dile getirilen her ilkenin altında fiyatı biçilebilir bir çıkar vardır; Beyrut, Hizbullah&#x27;ın silahsızlandırılmasını bir altyapı faturası olarak fiyatladı.</p>
<p>İleriye bakınca: Hizbullah&#x27;ın silahsızlandırma takviminin, ortak bildirinin değil, paranın ve İsrail&#x27;in çekilmesinin hızında ilerlemesini beklerim; imar finansmanı ve pilot bölgelerden geri çekilme gelmezse tasma kopar. Salı günkü el sıkışmasına değil, paraya bakın.</p>
</div>
<div lang="en">
<p><em>Trump ended the memorandum, revoked the oil waivers, reimposed the blockade: a sanction is not a wall, it is a detour — and the detour points to Fujairah.</em></p>
<h4>The Gap Between Manifest and Destination</h4>
<p>The June Islamabad memorandum is &quot;over&quot;: Trump revoked the sanctions waivers on Iranian oil and reimposed the naval blockade; CENTCOM&#x27;s ninth night again targeted maritime capabilities. The invoice is not in the missile count; it is in the widening gap between manifest and destination as Hormuz traffic collapses. I follow the cargo, not the slogans.</p>
<p>Looking ahead: let me revisit last week&#x27;s call. I said premiums would keep climbing and Gulf producers would reroute to the Fujairah pipeline and the Saudi East-West line regardless of the military outcome. Nine nights of strikes on &quot;maritime capabilities&quot; only deepens that detour; the detour outlasts the war that caused it. I expect the durable loser to be Iranian barrels, not Gulf throughput.</p>
<h4>Beirut&#x27;s Bill and Its Offer</h4>
<p>Aoun did not go to Washington only for security; he asked for US investment in Lebanon&#x27;s energy, communications and transport, and support for the army — tying disarmament to a reconstruction package. Behind every principle stated at a summit there is an interest that can be priced; Beirut has priced Hezbollah&#x27;s disarmament as an infrastructure bill.</p>
<p>Looking ahead: expect the Hezbollah-disarmament timetable to move at the speed of the money and the Israeli withdrawal, not the communiqué; if the reconstruction financing and the pull-back from the pilot zones do not arrive, the leash snaps. Watch the money, not Tuesday&#x27;s handshake.</p>
</div>
</article>
<article>
<h3>Piri Reis: Kuralı Kim Yazıyor? / Who Writes the Rule?</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Kiev&#x27;de komutanı kim atar, Tel Aviv&#x27;de ön seçimi kim iptal eder — iki başkentte de asıl soru olayın kendisi değil, kuralı kimin elinde tuttuğudur.</em></p>
<h4>Sivil Otorite, Sokak ve Komuta</h4>
<p>Zelenski&#x27;nin sokak baskısı altında Sırskıy&#x27;i değiştirmeyi tartması, stratejik okunduğunda, savaş zamanında sivil denetimin kuralını kimin belirlediğinin sınavıdır: seçilmiş cumhurbaşkanı mı, protesto eden meydan mı, yoksa komutanın kendisi mi? Genellikle kapıya denetçi koyan standardı belirler; burada üç aktör aynı kapıya uzanıyor.</p>
<p>İleriye bakınca: kararın, bir savaş alanı mantığından çok protestoları yatıştıracak şekilde zamanlanmasını beklerim; ortaya çıkacak standart — bir komutanın savaşın ortasında kamuoyu baskısıyla görevden alınıp alınamayacağı — bu atamadan uzun yaşayacak.</p>
<h4>&#x27;Savaş Hali&#x27; Bir Prosedüre Dönüşünce</h4>
<p>Likud&#x27;un Netanyahu&#x27;ya sekiz garantili sıra ayırması ve bir &quot;savaş hali&quot; engel olursa ön seçimleri iptal etme yetkisi vermesi bir protokol hamlesidir: listeyi belirleyen kural, 27 Ekim seçimlerine 100 gün kala, ondan fayda görenlerce yeniden yazılıyor. Gerekçeyi değil, zamanlamayı okuyun.</p>
<p>İleriye bakınca: üç başkent, üç ayrı dil — Kiev kimin komuta ettiğini, Tel Aviv kimin liste yaptığını tartışıyor ve her biri barış zamanı kural kitabının ne kadarını savaşın askıya aldığına sessizce karar veriyor. Sonbahardan önce bölgede olağan siyasi prosedüre daha çok &quot;savaş hali&quot; istisnası eklenmesini beklerim; istisna, standart hâline geliyor.</p>
</div>
<div lang="en">
<p><em>Who appoints the commander in Kyiv, who cancels the primary in Tel Aviv — in both capitals the real question is not the event but who holds the rule.</em></p>
<h4>Civilian Authority, the Street, and Command</h4>
<p>Zelensky weighing Syrskyi&#x27;s replacement under street pressure is, read strategically, a test of who sets the rule of civilian control in wartime: the elected president, the protesting square, or the command itself. Whoever puts an inspector at the gate usually sets the standard; here three actors reach for the same gate.</p>
<p>Looking ahead: expect the decision to be timed to defuse the protests rather than to a battlefield logic; the standard that emerges — whether a commander can be removed by public pressure mid-war — will outlast this appointment.</p>
<h4>When &#x27;a Wartime Situation&#x27; Becomes a Procedure</h4>
<p>Likud reserving eight slots for Netanyahu and authorizing cancellation of primaries if a &quot;wartime situation&quot; prevents them is a protocol move: the rule that picks the list is being rewritten by those who benefit from it, 100 days out from the October 27 vote. Read the timing, not the justification.</p>
<p>Looking ahead: three capitals, three dialects — Kyiv debates who commands, Tel Aviv who lists, and each is quietly deciding how much of the peacetime rulebook a war suspends. Expect more &quot;wartime&quot; exceptions to ordinary political procedure across the region before autumn — the exception is becoming the standard.</p>
</div>
</article>
<article>
<h3>Vezir: Mimari İkinci Kez Sınandı / The Architecture Tested a Second Time</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Bir kefede Akabe üzerinde çalışan hava savunması, öbür kefede Kiev&#x27;de sarsılan sivil-asker dengesi: kurumlar bu hafta iki kez tartıldı.</em></p>
<h4>Temiz Bir Önleme, İkinci Kez</h4>
<p>Akabe&#x27;ye dört İran füzesi, üçü ABD sistemlerince düşürüldü, dördüncüsü boş alana, Eylat üzerinde İsrail parçaları, can kaybı yok (Ürdün ordusu, Petra aracılığıyla). Geçen hafta Ürdün&#x27;ün sakin önlemesini Körfez savunma mimarisinin ayakta kaldığının kanıtı saymıştım; ikinci temiz önleme, mimarinin yine tuttuğunu söylüyor. Kusurlu bir masa, hiç masa olmamasından iyidir.</p>
<p>İleriye bakınca: ama denge bir sonuç değil, her seferinde yeniden kurulan bir çabadır; her başarılı önleme, işaret ettiğim siyasi soruyu da büyütüyor — Amman ve komşuları savaşı ağırlamaktan Washington&#x27;ı bir çözüme itmeye ne zaman geçecek? Füzeler üye topraklarına düştükçe bu geçişin hızlanmasını beklerim.</p>
<h4>Sandalyeler mi Değişti, Masa mı Devrildi?</h4>
<p>Görevden alınan bir savunma bakanı, itiraz edilen bir başkomutan, bir güvenlik konseyi revizyonu, üç gün protesto — soru, Ukrayna&#x27;nın sivil-asker kurumlarının şoku emdiği mi yoksa çöktüğü müdür. Şimdilik masa devrilmedi, sandalyeler yeniden dizildi: revizyon kabine üzerinden ilerledi, protestolar sivil kaldı.</p>
<p>İleriye bakınca: çıkışın, cumhurbaşkanının sokağa taviz vermeden duyarlılık iddia etmesine izin veren, düzenli ve müzakere edilmiş bir komuta değişikliği olmasını beklerim; kurumsal sınav ancak bir sonraki komutan pankartla değil, usulle seçilirse geçilmiş sayılır.</p>
</div>
<div lang="en">
<p><em>On one pan, air defense working over Aqaba; on the other, the civil-military balance shaking in Kyiv: institutions were weighed twice this week.</em></p>
<h4>A Clean Interception, a Second Time</h4>
<p>Four Iranian missiles toward Aqaba, three downed by US systems, a fourth into open ground, Israeli fragments over Eilat, no casualties (Jordan&#x27;s military, via Petra). Last week I read Jordan&#x27;s calm interception as proof the Gulf defense architecture was holding; a second clean interception says it held again. A flawed table beats no table.</p>
<p>Looking ahead: but balance is not an outcome, it is an effort rebuilt each time; each successful intercept also enlarges the political question I flagged — when do Amman and its neighbors move from hosting the war to pushing Washington toward a settlement? Expect that shift to accelerate the longer missiles keep landing on member soil.</p>
<h4>Did the Chairs Change, or the Table Overturn?</h4>
<p>A dismissed defense minister, a contested commander-in-chief, a security-council reshuffle, three days of protest — the question is whether Ukraine&#x27;s civil-military institutions absorbed the shock or buckled. So far the table did not overturn; the chairs were rearranged: the reshuffle went through cabinet, the protests stayed civic.</p>
<p>Looking ahead: expect the off-ramp to be an orderly, negotiated command change that lets the president claim responsiveness without conceding to the street; the institutional test is passed only if the next commander is chosen by process, not by placard.</p>
</div>
</article>
<article>
<h3>Rana Sahel: Kendi Planıyla Gelen Başkent / The Capital That Comes With Its Own Plan</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Beyrut Washington&#x27;a boyun eğmeye değil, kendi yazdığı planı sunmaya gidiyor; Amman ise füzeyi kendi semasında karşılıyor. Küçük başkentler artık sahne değil, masadalar.</em></p>
<h4>Yazılı Teklifle Gelmek</h4>
<p>Avn, Trump&#x27;a kendi sıralamasını — Hizbullah&#x27;ın silahsızlandırılmasını İsrail&#x27;in çekilmesine bağlayan yazılı bir teklifi — götürüyor; bu, 2009&#x27;dan bu yana bir Lübnan cumhurbaşkanının Washington&#x27;a ilk ziyareti. Taraf tutmamak da bir stratejidir: bu, şartları alan değil yazan, egemenliğini (ordu desteği, enerji ve ulaşım yatırımı) pazarlığa fiyat olarak koyan küçük bir devlettir.</p>
<p>İleriye bakınca: geçen hafta bu savaşı taşıyan devletlerin onu emmekten çözümünde masaya oturmaya geçeceğini söylemiştim; Beyrut&#x27;un elinde bir metinle gelmesi tam da bu hamle. Diğer bölge başkentlerinin de yöntemi kopyalamasını beklerim — yalnızca şikâyetle değil, kendi metninizle görünün.</p>
<h4>Amman&#x27;ın Sessiz Yeterliliği</h4>
<p>Yine Akabe: bir Ürdün kentine füzeler, önlendi, mühendislik soğukkanlılığıyla açıklamalar, can kaybı yok. Yerden bakıldığında bu edilgenlik değil, iradedir — kabiliyeti tam da başkasının savaşında bir manşet kaybı olmamak için inşa etmiş bir orta güç.</p>
<p>İleriye bakınca: bu devletlerin önlenmiş füzelerle ödediği fatura siyasi sermayeye dönüşüyor; Amman ve Beyrut&#x27;un bu bedeli, Washington ile Tahran&#x27;ın kendi başlarının üzerinden pazarlık yapmaması yönünde daha yüksek bir talebe çevirmesini beklerim. Dünya sadece iki başkentten yönetilmiyor.</p>
</div>
<div lang="en">
<p><em>Beirut goes to Washington not to submit but to table a plan it wrote itself; Amman meets the missile in its own sky. The small capitals are no longer the stage — they are at the table.</em></p>
<h4>Arriving With a Written Offer</h4>
<p>Aoun is bringing Trump a written proposal — his own sequencing of Hezbollah&#x27;s disarmament against an Israeli withdrawal — the first visit to Washington by a Lebanese president since 2009. Refusing to be a pawn is itself a strategy: this is a small state authoring the terms rather than receiving them, pricing its sovereignty (army support, energy and transport investment) into the deal.</p>
<p>Looking ahead: last week I predicted the states bearing this war would move from absorbing it to demanding a seat at its settlement; Beirut arriving with a drafted plan is exactly that move. Expect other regional capitals to copy the method — show up with your own text, not just your grievances.</p>
<h4>Amman&#x27;s Quiet Competence</h4>
<p>Aqaba again: missiles toward a Jordanian city, intercepted, statements of engineering calm, no casualties. From the ground this reads not as passivity but as agency — a middle power that built the capability precisely so it would not become a headline casualty in someone else&#x27;s war.</p>
<p>Looking ahead: the bill these states pay in intercepted missiles is turning into political capital; expect Amman and Beirut to convert that cost into a louder demand that Washington and Tehran not negotiate over their heads. The world is not run from two capitals only.</p>
</div>
</article>
<article>
<h3>Haldun: Yirmi Bir Yıl Sonra, Aynı Sınır / Twenty-One Years On, the Same Border</h3>
<p><time datetime="2026-07-20">2026-07-20</time></p>
<div lang="tr">
<p><em>Bakanlar 2005&#x27;te boşaltılan yerleşimlerin sınırına yürürken, Likud ön seçimi &#x27;savaş hali&#x27;ne erteliyor: harita da takvim de eski bir tartışmanın dipnotu.</em></p>
<h4>Mürekkebi Eskiyen Çizgi</h4>
<p>Yürüyüş, 2005 tahliyesinde boşaltılan üç yerleşimin — Elei Sinai, Dugit ve Nisanit&#x27;in — &quot;yirmi bir yıl sonra eve dönüş&quot; pankartıyla yeniden kurulmasını istedi; ordu çevreyi kapalı askeri bölge ilan etti, bakanlar (Smotrich, Ben-Gvir) çitteydi. Sınırlar mürekkeple donmuş kavgalardır; 2005 çizgisi, mürekkebi yeterince eskidiği için şimdi çözülüyor. Bu emsalsiz değil — yeniden açılan bir emsal.</p>
<p>İleriye bakınca: yerleşim meselesinin, kampanya ilerledikçe sokaktan programa taşınmasını beklerim; kapalı bölgenin tutup tutmadığından çok, talebin bir koalisyon maddesine dönüşüp dönüşmediği belirleyici olacak. Harita buna sınır diyor; tarihçi, savaşından uzun yaşamış bir ateşkes diyor.</p>
<h4>Karne Notu: Kural mı, İstisna mı?</h4>
<p>Geçen hafta, dört yılı dolduran Meclis&#x27;in sistemin gerilimi emdiğinin kanıtı olarak yıllarca anılacağını savunmuştum. Bu hafta Likud sekiz sıra ayırdı ve bir &quot;savaş hali&quot; engel olursa ön seçimi iptal etme yetkisi verdi — aynı sistem şimdi kendi kural kitabını büküyor. Taze bir seçimi kohezyon ve çözülmenin uzun eğrisine yerleştirin: konfor, güçleri kendi kurallarını doğaçlamaya iter.</p>
<p>İleriye bakınca: geçen haftaki iyimserliğimi bir kademe düzeltiyorum — tam dönem ile iptal edilen ön seçim, tek bir sistemin iki okumasıdır ve beş yıl sonra hangisinin anılacağı, 27 Ekim oylamasının olağan kurallarla mı yoksa savaş istisnalarıyla mı yapılacağına bağlı. Çoğu &quot;ilk&quot;, yeni giysiler içindeki eski örüntülerdir; istisnanın alışkanlığa dönüşüp dönüşmediğini izleyin.</p>
</div>
<div lang="en">
<p><em>As ministers march to the border of settlements evacuated in 2005, Likud postpones its primary to a &#x27;wartime situation&#x27;: both the map and the calendar are footnotes to an old argument.</em></p>
<h4>The Line Whose Ink Has Aged</h4>
<p>The march demanded rebuilding three settlements evacuated in the 2005 disengagement — Elei Sinai, Dugit and Nisanit — under the banner &quot;returning home after twenty-one years,&quot; with the army sealing the periphery as a closed military zone and ministers (Smotrich, Ben-Gvir) at the fence. Borders are quarrels frozen in ink; the 2005 line is thawing now that the ink is old enough. This is not unprecedented — it is a precedent being reopened.</p>
<p>Looking ahead: expect the settlement question to move from the street to the platform as the campaign runs; whether the closed zone holds matters less than whether the demand becomes a coalition plank. The map calls this a border; the historian calls it a truce that may have outlived its war.</p>
<h4>The Report-Card Grade: Rule or Exception?</h4>
<p>Last week I argued the full-term Knesset would be cited for years as proof the system absorbs strain. This week Likud reserved eight slots and authorized canceling primaries if a &quot;wartime situation&quot; prevents them — the same system now bending its own rulebook. Place a fresh election on the long curve of cohesion and decay: comfort pushes powers to improvise their own rules.</p>
<p>Looking ahead: I revise last week&#x27;s optimism a notch — a full term and canceled primaries are two readings of one system, and which is cited in five years depends on whether the October 27 vote runs by the ordinary rules or the wartime exceptions. Most &quot;firsts&quot; are old patterns in new clothes; watch whether the exception hardens into habit.</p>
</div>
