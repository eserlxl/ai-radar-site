ide. Watch the volume on the next selloff; that's the lie detector."}]}], "date": "2026-07-21"}, {"writer": "eco-02", "title": {"tr": "Faiz Tutuldu, Etki Sonraya Kaldı: Çin Bekledi, Avrupa Ödüyor", "en": "The Rate Held, the Effect Waits: China Paused, Europe Pays"}, "excerpt": {"tr": "Çin, büyüme %4,3'e yavaşlarken 14. ay da faizi sabit tuttu; Avrupa'nın şirketleri ise geçen yılın sıkılaşmasını çoktan hissediyor. Uzun ve değişken gecikme üzerine iki ders.", "en": "China held for a 14th month as growth cooled to 4.3%; Europe's firms are already feeling last year's tightening. Two lessons in the long, variable lag."}, "sections": [{"h": {"tr": "Sabit tutmak bir duraklama değil, bir tercih", "en": "A hold is a choice, not a pause"}, "ps": [{"tr": "Dün Pekin'in beklediğini yazmıştım; Pazartesi yine bekledi ve ikinci çeyrek büyümesinin yaklaşık üç buçuk yılın en zayıfı olan %4,3 çıkmasından günler sonra bir yıllık gösterge kredi faizini üst üste 14. ay boyunca %3,0'da bıraktı. Bu bir kararsızlık değil. Büyüme yavaşlarken faizi sabit tutmak; banka kâr marjlarını ve yuanı korumaya, cephaneyi bir miktar saklı tutmaya dönük bir tercihtir.", "en": "I wrote yesterday that Beijing was waiting; on Monday it waited again, leaving the one-year loan prime rate at 3.0% for a 14th straight month, days after second-quarter growth printed at 4.3% — the weakest in about three and a half years. That is not indecision. Holding when growth cools is a decision to protect bank margins and the yuan and to keep some powder dry."}, {"tr": "Burada çözüm yok, yalnızca ödünleşimler var. Bir indirim haneyi ve fabrikayı rahatlatırdı; ama uzun ve değişken bir gecikmeyle — etkisi gelecek hafta değil, gelecek yıl gelir — ve şimdi kâr marjlarına ve kur üzerine baskı yapardı. Politika yapıcılar, göremedikleri maliyet yerine görebildikleri maliyeti seçiyor. Bu sabrın süreceği, bu büyüme verisine değil, bir sonrakine bağlı.", "en": "There are no solutions here, only trade-offs. A cut would ease the household and the factory, but through a long and variable lag — the effect arrives next year, not next week — and it would press on margins and the currency now. Policymakers are choosing the cost they can see over the one they can't. Whether that patience holds depends on the next growth print, not this one."}]}, {"h": {"tr": "Avrupa gecikmeyi somutlaştırıyor", "en": "Europe shows you the lag with a face"}, "ps": [{"tr": "Çin hâlâ yanan fitilse, Euro Bölgesi patlayan barut. AMB'nin kendi anketi, şirketlerin net %42'sinin geçen çeyrek kredi faizlerinin arttığını bildirdiğini ortaya koydu; bu oran %26'ydı — geçen yılın sıkılaşması muhasebeye şimdi ulaşıyor. Üstelik dengesiz iniyor: erişim büyük şirketlerde iyileşirken küçüklerde kötüleşti. Aktarım mekanizması hiçbir zaman temiz bir düğme değildir.", "en": "If China is the fuse still burning, the euro area is the charge going off. The ECB's own survey found a net 42% of firms reporting higher loan rates last quarter, up from 26% — last year's tightening reaching the ledger now. And it lands unevenly: availability improved for large firms and worsened for the small ones. The transmission mechanism is never a clean switch."}, {"tr": "Bir merkez bankasının tek sermayesi güvenilirliğidir ve anket bunun nedenini gösteriyor. Şirketler hâlâ bir ve üç yıl sonrası için %3,0 enflasyon bekliyor — hedefin üzerinde ve yapışkan. Frankfurt'un iğneden geçirmesi gereken iplik bu: erken indirirse beklentiler çıpadan kopar; fazla beklerse zaten kredide sıkışan küçük şirketler bedelini öder. Dünkü öngörüm geçerli — acı ithal, ferahlama ertelenmiş. O %3,0'lık beklentilerin kaymaya başlayıp başlamadığını izleyin; rejimi belirleyecek sayı, bir sonraki manşet veri değil, budur.", "en": "A central bank's only capital is its credibility, and the survey shows why. Firms still expect 3.0% inflation one and three years out — above target, and sticky. That is the needle Frankfurt has to thread: cut too soon and expectations un-anchor; wait too long and the small firms already short of credit pay for it. My forecast from yesterday stands — the pain is imported and the relief is delayed. Watch whether those 3.0% expectations start to drift; that, not the next headline print, is the number that decides the regime."}]}], "date": "2026-07-21"}, {"writer": "eco-03", "title": {"tr": "Nakit Nereye Gitti: Engellenen Bir Birleşme ve Fiyatın Sevdiği İki Hikâye", "en": "Where the Cash Went: A Blocked Merger and Two Stories the Tape Loved"}, "excerpt": {"tr": "Bir yargıç 111 milyar dolarlık sinerjiyi yeniden fiyatladı, Archer bir tanıtımla piyasa değerine yaklaşık bir milyar dolar ekledi, AMC ise nihayet gerçek nakit gösterdi. Bunlardan biri bir model; ikisi hikâye.", "en": "A judge just repriced $111 billion of synergy, Archer added roughly a billion in market value on an unveiling, and AMC finally showed real cash. One of these is a model; two are stories."}, "sections": [{"h": {"tr": "Rekabet hukuku artık bir kalem", "en": "Antitrust is a line item now"}, "ps": [{"tr": "Paramount–Warner Bros. anlaşması sinerji üzerine satılmıştı; federal bir yargıç, birleşen şirketin geniş vizyonlu sinema dağıtımındaki payına dair 'ciddi sorular' bularak bu 111 milyar doların üzerine 14 günlük bir tedbir kararı koydu. Sinerji hesabı, anlaşmanın zamanında kapanacağını varsayar. Modeli açtığınızda rekabet hukuku bir dipnot değildir — tüm tezin üzerindeki bir iskonto oranıdır ve az önce yükseldi.", "en": "The Paramount–Warner Bros. deal was sold on synergy; a federal judge just put a 14-day restraining order on $111 billion of it, finding 'serious questions' about the combined firm's share of wide-release theatrical distribution. Synergy math assumes the deal closes on schedule. Open the model and antitrust isn't a footnote — it's a discount rate on the whole thesis, and it just went up."}, {"tr": "3 Ağustos'taki duruşma, basın açıklaması değil, bir sonraki gerçek girdi. Bir mahkemenin işbirliğine ihtiyaç duyan anlaşma mantığı, sunumun nadiren fiyatladığı bir riski taşır. Sermaye tahsisi karakterdir: Paramount'un, Eylül sonuna kadar zarar vermeyeceğini söylediği bir gecikmeyi nasıl yöneteceği, size herhangi bir sinerji hedefinden daha çok şey anlatacak.", "en": "The August 3 hearing is the next real input, not the press release. Deal logic that needs a court to cooperate carries a risk the slide deck rarely prices. Capital allocation is character: how Paramount handles a delay it says won't hurt it before end-September will tell you more than any synergy target."}]}, {"h": {"tr": "Bir hikâye hissesi, bir nakit makinesi", "en": "A story stock and a cash machine"}, "ps": [{"tr": "Archer, bir tanıtımla %19,6 yükselerek 5,31 dolara çıktı — Anduril ile geliştirilen, ilk uçuşu 2027'ye yazılmış otonom hava aracı 'Thunder'. Bu, hayranlık duyup yine de modelleyemeyeceğim bir hikâye: yıl içinde yaklaşık %55 değer kaybetmiş, 4 milyar dolara yakın değerlenen bir şirket, gelecek yıla kadar uçmayacak bir ürün için piyasa değerine kabaca bir milyar dolar ekliyor. Piyasa bir hayali fiyatlayabilir; ama sonunda serbest nakit akışını fiyatlar.", "en": "Archer jumped 19.6% to $5.31 on an unveiling — 'Thunder,' an autonomous rotorcraft built with Anduril, with a first flight penciled in for 2027. That is a story I can admire and still not model: a company down about 55% on the year, valued near $4 billion, adding roughly a billion in market value for a product that doesn't fly until next year. The market can price a dream; eventually it prices the free cash flow."}, {"tr": "AMC ise aynı gün ters yöndeki işlem: 1,6 milyar dolarlık rekor gelir, %69,6 artışla 321,4 milyon dolara çıkan düzeltilmiş FAVÖK ve — asıl önemli satır — beklenen zarara karşın hisse başına 0,14 dolarlık düzeltilmiş kâra geçiş. Yine de 11,4 milyon dolarlık net zarar var; yani 'düzeltilmiş' kelimesi yük taşıyor. Ama ABD'de %12 artan salon doluluğu bir sunum sayfası değil, bir turnike sayımı. Dün yapay zekâ priminin kaldıraçla buluştuğunu söylemiştim; buradaki disiplin daha yalın. Bu iki isimden biri bu çeyrek bana bir model gösterdi, diğeri bir maket. Archer'ın ilk uçuşunu — ve ilk faturasını — hikâye bir sayıya dönüşmeden önce bekleyeceğim.", "en": "AMC is the opposite trade on the same day: record revenue of $1.6 billion, adjusted EBITDA up 69.6% to $321.4 million, and — the line that matters — a real swing to a $0.14 adjusted profit against an expected loss. There is still a net loss of $11.4 million, so 'adjusted' is doing work; but attendance up 12% in the US isn't a slide, it's a turnstile count. Yesterday I warned that an AI premium had met leverage; here the discipline is simpler. One of these names showed me a model this quarter and one showed me a mock-up. I'll wait for Archer's first flight — and its first invoice — before the story becomes a number."}]}], "date": "2026-07-21"}, {"writer": "eco-04", "title": {"tr": "Yedek Rota da Kapanıyor: Emniyet Supabı da Bir Kısılma Noktasıysa", "en": "The Backup Route Closes: When the Relief Valve Is a Chokepoint Too"}, "excerpt": {"tr": "Dün variller Hürmüz'den kaçtı. Bugün Husiler, Suudi Arabistan'ın onu dolanmak için kullandığı Kızıldeniz kapısını da kapatmaya girişti. Kısılma noktalarını sayın.", "en": "Yesterday the barrels shunned Hormuz. Today the Houthis moved to shut the Red Sea door Saudi Arabia was using to get around it. Count the chokepoints."}, "sections": [{"h": {"tr": "Doksan dolar bir rakam; asıl gerçek varil", "en": "Ninety dollars is a number; the barrel is the fact"}, "ps": [{"tr": "Brent yeniden 90 doların üzerine çıktı — yaklaşık %2,4 artışla 90,25 dolara, 11 Haziran'dan bu yana ilk kez bu seviyeye — İran'ın Hürmüz'ün güney rotasında iki tankeri devre dışı bıraktığını açıklamasının ardından. Ekranlar yalan söyleyebilir; hareketi durmuş bir tanker söyleyemez. Fiyatın ayda %23'ten fazla artması, hava döndüğü için değil, moleküller Körfez'den çıkmakta zorlandığı için. Varili say, hikâyeyi sonra dinle.", "en": "Brent traded back above $90 — up about 2.4% to $90.25, its first such level since June 11 — after Iran said it had disabled two tankers on Hormuz's southern route. Screens can lie; a tanker that has stopped moving cannot. The price is up more than 23% on the month not because sentiment turned but because molecules are struggling to leave the Gulf. Count the barrels, hear the story later."}, {"tr": "Analistler 'çıkış yolunu' tartışabilir; ben tesisatı izlerim. Gemiler, İran'ın kontrolündeki bir şerit ile telsiz vericilerini kapatmak arasında seçim yaptığı sürece, risk primi ruhsal değil, fiziksel. Yüksek fiyatın ilacı yüksek fiyattır — yeni arz eninde sonunda yanıt verir — ama o ilaç, birinin yelken açması gereken bir boğazdan geçer.", "en": "Analysts can debate the 'off-ramp'; I watch the plumbing. As long as vessels are choosing between an Iranian-controlled lane and switching their transponders off, the risk premium is physical, not psychological. The cure for high prices is high prices — new supply eventually answers — but that cure runs through a strait someone has to sail."}]}, {"h": {"tr": "Şimdi ikinci kapı", "en": "Now the second door"}, "ps": [{"tr": "Dün, piyasanın boş bir rotayı fiyatladığını söylemiştim. Bugün Husiler, Suudi Arabistan'a Bab-ül Mendep üzerinden abluka ilan etti — krallığın ham petrolünü Hürmüz'ü dolanarak gönderdiği o Kızıldeniz kapısı. Suudi Arabistan Yanbu'dan günde yaklaşık 4 milyon varil sevk ediyordu; Bab-ül Mendep dünya petrol üretiminin kabaca %7'sini taşıyor. Bir emniyet supabı, ancak açıksa rahatlatır.", "en": "Yesterday I said the market was pricing an empty route. Today the Houthis declared a blockade of Saudi Arabia through Bab al-Mandeb — the very Red Sea door the kingdom uses to send crude around Hormuz. Saudi Arabia has been moving about 4 million barrels a day out of Yanbu; Bab al-Mandeb carries roughly 7% of world oil output. A relief valve only relieves if it's open."}, {"tr": "İşte herhangi bir manşetten daha önemli olan fiziksel aritmetik: Hürmüz ve Bab-ül Mendep aynı anda tartışmalıysa, Körfez ham petrolü için Afrika'yı dolaşan uzun yol dışında kolay bir sapak kalmaz — her yük için daha fazla gün, daha fazla navlun, daha fazla maliyet. Fiyat söylemiyorum; kapı sayıyorum ve ikisi kapanıyor. Gerisini varil, ekrana öğretecek. Bu hafta Yanbu'nun yüklemelerini izleyin — ambargonun ısırıp ısırmadığını, retorik değil, o sayı söyler.", "en": "Here is the physical arithmetic that matters more than any headline: if both Hormuz and Bab al-Mandeb are contested at once, there is no easy detour left for Gulf crude except the long way around Africa — more days, more freight, more cost baked into every cargo. I'm not calling a price; I'm counting doors, and two of them are closing. The barrel will teach the screen the rest. Watch Yanbu's loadings this week — that number, not the rhetoric, tells you whether the embargo bites."}]}], "date": "2026-07-21"}, {"writer": "eco-05", "title": {"tr": "Pompadaki Fatura, Tezgâhtaki Kredi: Şoku Kim Taşıyor", "en": "The Bill at the Pump, the Loan at the Counter"}, "excerpt": {"tr": "Benzin galon başına 4 dolara çıktı ve savaş primi en ağır darbeyi işe arabayla giden hanelere vuruyor. Bu arada Avrupa'nın bankaları hâlâ kredi veriyor — ama küçüklere değil.", "en": "Gas hit $4 a gallon and a war premium lands hardest on the households that drive to work. Meanwhile Europe's banks are still lending — just not to the small."}, "sections": [{"h": {"tr": "Yakıt faturası düz bir vergidir", "en": "A fuel bill is a flat tax"}, "ps": [{"tr": "ABD'de benzinin ulusal ortalaması Pazartesi galon başına 4,00 dolara ulaştı; bir yıl önce 3,14 dolardı — her depo dolumuna neredeyse 90 sent eklendi. Varil grafiklerinin atladığı soruyu sorun: kimin için? Pompa fiyatı düz bir vergiye yakındır; aynı doları hem işe gidenden hem yöneticiden alır, ama o dolar işe gidenin haftalık bütçesinde çok daha büyük bir pay tutar. Ortalama %27 arttı; yük eşit bölünmedi.", "en": "The US national average for gasoline reached $4.00 a gallon on Monday, up from $3.14 a year ago — nearly 90 cents added to every fill. Ask the question the barrel charts skip: for whom? A pump price is close to a flat tax; it takes the same dollar from the commuter and the executive, but that dollar is a far bigger share of the commuter's week. The average rose 27%; the burden did not split evenly."}, {"tr": "Ulusal rakamın ötesine bakın; hikâye, her zamanki gibi, dağılımda. En ucuz eyaletlerdeki sürücüler galon başına yaklaşık 3,35 dolar öderken, Kaliforniyalılar aynı galon için 5 doların üzerinde ödüyor. Aynı savaş, aynı ham petrol, çok farklı kasa. Bu, ikinci ekonomi — GSYİH verisindeki değil, pompadaki ekonomi — ve Hürmüz Boğazı'nı herhangi bir enflasyon verisinden çok önce hisseder.", "en": "Look past the national number and the distribution is the story, as always. Drivers in the cheapest states pay around $3.35; Californians pay above $5 for the same gallon. Same war, same crude, very different checkout. This is the second economy — the one at the pump, not the one in the GDP print — and it feels the Strait of Hormuz long before any inflation release does."}]}, {"h": {"tr": "Kredinin bir kapı görevlisi var", "en": "Credit has a bouncer"}, "ps": [{"tr": "Aynı dengesizlik Avrupa'nın kredisinden de geçiyor. AMB'nin anketi, şirketlerin net %42'sinin daha yüksek kredi faiziyle karşılaştığını gösteriyor — ama erişim büyük şirketlerde iyileşirken küçüklerde kötüleşti; her yönde net %4. Para hâlâ akıyor; sadece kapıda kimlik soruyor. Kredi sıkıştığında, holdingden önce köşedeki dükkân için sıkışır.", "en": "The same lopsidedness runs through Europe's credit. The ECB's survey shows a net 42% of firms facing higher loan rates — but availability improved for large companies and got worse for small ones, a net 4% each way. Money is still flowing; it's just checking IDs at the door. When credit tightens, it tightens for the corner shop before the conglomerate."}, {"tr": "Dün geçen çeyreğin büyümesinin kimin cebine gittiğini sormuştum; bu hafta yanıt netleşiyor. Savaş primini pompada hane öder, kredi darlığını tezgâhta küçük şirket öder — büyük bilanço ise deposunu doldurup borçlanmayı sürdürür. Bu bir doğa yasası değil; bir şokun yükünü kimin taşıyacağına dair bir dizi tercihtir. Gelecek çeyrek küçük şirketlerin finansman açığını izleyin: manşet sakinleşirken açık büyümeye devam ederse, hakkında okuduğunuz toparlanma, çoğu insanın içinde yaşadığı toparlanma olmayacak.", "en": "Yesterday I asked whose pocket last quarter's growth landed in; this week the answer sharpens. The war premium is paid at the pump by the household, and the credit squeeze is paid at the counter by the small firm — while the big balance sheet fuels up and borrows on. That is not a law of nature; it is a set of choices about who absorbs a shock. Watch the small-firm financing gap next quarter: if it keeps widening while the headline calms, the recovery you read about won't be the one most people are living in."}]}], "date": "2026-07-21"}, {"writer": "eco-06", "title": {"tr": "Kim Kime Borçlu: Bir Sigortacının İçinde Saklanan Kaldıraç", "en": "Who Owes Whom: The Leverage Hiding Inside an Insurer"}, "excerpt": {"tr": "Mark Walter'ın sigortacılarına yönelik bir soruşturma, aslında dışarıdan kimsenin göremediği bağlı varlıklara dair bir soru. Dünyanın en gür sesli bankacısı da az önce risklerin sandığınızdan büyük olduğunu söyledi.", "en": "A probe into Mark Walter's insurers is really a question about affiliated holdings nobody outside could see. And the loudest banker in the world just said the risks are bigger than you think."}, "sections": [{"h": {"tr": "İçi özel kredi kaplı güvenli kasa", "en": "The safe box with a private-credit lining"}, "ps": [{"tr": "Manhattan'daki federal savcılar ve SEC, milyarder Mark Walter'a bağlı iki sigortacının — Delaware Life ve Clear Spring — ve yaklaşık 362 milyar dolar yöneten Guggenheim'ın, bağlı kuruluşlardaki varlıklarını gereğince açıklayıp açıklamadığını inceliyor. İsimleri çıkarın, geriye en sevdiğim çöküş biçimi kalıyor: güvenli görünen, kaldıracı ve ilişkililiği alıcının göremeyeceği yere sıkıştırılmış bir araç. Sigortanın finansın sıkıcı ucu olması beklenir; ilginç risk de tam orada saklanmayı sever.", "en": "Federal prosecutors in Manhattan and the SEC are looking at whether two insurers tied to billionaire Mark Walter — Delaware Life and Clear Spring — and Guggenheim, which runs about $362 billion, properly disclosed holdings in affiliated entities. Strip the names and this is my favorite failure mode: an instrument that looks safe, with leverage and relatedness tucked where the buyer can't see it. Insurance is supposed to be the boring end of finance; that is exactly where the interesting risk likes to hide."}, {"tr": "Bu araçların fiyatı masum görünüyor. Tehlike, her zaman olduğu gibi, fiyatta değil — kimin kime borçlu olduğunda ve bir poliçeyi arkalayan varlıkların broşürün ima ettiği kadar bağımsız olup olmadığında. Henüz suçlama yöneltilmedi ve bir çöküş çağırmıyorum. Mekanizmayı not ediyorum: ilişkili taraf varlıkları düzenlemeye tabi bir bilançonun içinde durduğunda, kırık hattı açıklamadan geçer — ve 'bu sefer farklı' genellikle tam da orada başlar.", "en": "The price of these things looks innocent. The danger, as always, isn't the price — it's who owes whom, and whether the assets backing a policy are as independent as the brochure implies. No charges have been filed, and I'm not calling a collapse. I'm noting the mechanism: when related-party holdings sit inside a regulated balance sheet, the fault line runs through disclosure, and disclosure is where 'this time is different' usually starts."}]}, {"h": {"tr": "Dimon sessiz kısmı söyleyince", "en": "When Dimon says the quiet part"}, "ps": [{"tr": "Bu sessizliğin içine Jamie Dimon, benim genelde yalnız söylediğimi yüksek sesle söyledi: piyasalar 'kusursuz bir sonucu fiyatlıyor' ve o, buradan ne hisse ne de uzun vadeli Hazine tahvili alırmış. Tektonik levhaları saydı — Ukrayna, Orta Doğu, ABD–Çin, bütçe açıkları ve askeri harcamalar — ve riskleri 'insanların sandığından büyük' diye niteledi. En büyük bankayı yöneten kişi alım tarafından çekildiğinde, asıl haber rehavetin kendisidir.", "en": "Into that quiet, Jamie Dimon said out loud what I usually say alone: markets are 'pricing in a perfect outcome,' and he wouldn't buy stocks or long Treasurys here. He named the tectonic plates — Ukraine, the Middle East, US–China, deficits and military spending — and called the risks 'bigger than other people think.' When the man running the biggest bank steps back from the bid, the complacency is the story."}, {"tr": "İstikrar istikrarsızlık doğurur; asıl sakinlik, kaldıracın sessizce biriktiği andır. Dün, çıkış kapısının yalnızca tek kişilik olduğunu yazmıştım — o gün kriptoda, bugün sigorta açıklamalarında. Ders yineleniyor: likidite bir korkaktır, tek zorunlu satıcı gelene kadar oradadır. Erkenim; ve erken ile yanlış, başta aynı bedeli öder. Ama bunu belirleyecek soru, Pazartesi herhangi bir şeyin fiyatı değil; hiçbirinin kırılmaması için neyin saklı kalması gerektiği — ve saklı şeylerin bir şekilde mahkeme celbi alma huyu vardır.", "en": "Stability breeds instability; the calm is exactly when the leverage quietly builds. Yesterday I wrote that the exit door is only one person wide — in crypto then, in insurance disclosures now. The lesson repeats: liquidity is a coward, present until the one forced seller arrives. I'm early, and early and wrong pay the same at first. But the question that decides this isn't the price of anything on Monday; it's what has to stay hidden for none of it to break — and hidden things have a way of getting subpoenaed."}]}], "date": "2026-07-21"}, {"writer": "sci-01", "title": {"tr": "Genç bir kızıllık, yaşlı bir kümenin çocukluğu mu?", "en": "A young redness, the childhood of an old cluster?"}, "excerpt": {"tr": "James Webb'in gördüğü Küçük Kırmızı Noktalar küresel kümelerin ilk hâli olabilir; her teleskop bir zaman makinesidir ve bu kez geçmişe bakmak bugünü açıklıyor.", "en": "The Little Red Dots Webb sees may be globular clusters in their infancy; every telescope is a time machine, and this time looking into the past explains the present."}, "sections": [{"h": {"tr": "Geçmişe bakmak, bugünü tanımak", "en": "Looking back to recognise the present"}, "ps": [{"tr": "Chisholm ve ekibinin The Astrophysical Journal Letters'taki önerisi basit ama cüretkâr: erken evrende parlayan o kızıl noktalar, bugün gökadaların çevresinde sessizce dönen küresel yıldız kümelerinin çocukluğu olabilir. Bir kümenin merkezinde art arda çarpışan yıldızlar, Güneş'ten yüz binlerce kat ağır, geçici bir dev oluşturuyor; onun çekirdeğindeki füzyon, bugün ölçtüğümüz tuhaf kimyayı — fazla helyum ve azot, eksik karbon — miras bırakıyor olabilir.", "en": "Chisholm and colleagues' proposal in The Astrophysical Journal Letters is simple but bold: those red dots glowing in the early universe may be the childhood of the globular clusters that now turn quietly around galaxies. Repeated stellar collisions at a cluster's heart build a temporary giant hundreds of thousands of times the Sun's mass; the fusion in its core may bequeath the odd chemistry we measure today — excess helium and nitrogen, depleted carbon."}, {"tr": "Bu ışık yola çıktığında ne kümeler bugünkü hâlindeydi ne de onlara bakacak bir göz vardı; şimdi ikisi de burada. Küçük Kırmızı Noktaların ışığı milyarlarca yıllık; onu bugünün küreselleriyle aynı hikâyenin iki ucu olarak okumak, kozmik bir soyağacı kurmak demek.", "en": "When this light set out, the clusters were not in their present form, nor was there an eye to look at them; now both are here. The Little Red Dots' light is billions of years old, and reading it as two ends of one story with today's globulars is to draw a cosmic family tree."}]}, {"h": {"tr": "Hata çubuğunu unutmadan", "en": "Without forgetting the error bar"}, "ps": [{"tr": "Yazarların dürüstlüğünü de aktarmak gerek: 'tek bir kesin işaret' yok diyorlar. Mekânsal dağılım ve kütle uyumu güçlü, ama bu bir kanıt değil, iyi kurulmuş bir hipotez. Bir bilim insanının bilmediğini söylemesi, bir zayıflık değil bir dürüstlük biçimidir.", "en": "The authors' honesty must be carried too: they say there is 'no single smoking gun'. The spatial and mass correspondences are strong, but this is not proof — it is a well-built hypothesis. A scientist telling you what she does not yet know is not a weakness but a form of honesty."}, {"tr": "Önümüzdeki dönemde Webb'in daha derin tayfları ve ESA'nın Mart 2027'de fırlatmaya hazırlanan PLATO gibi araçların gökyüzünü tarayışı, bu soyağacını ya güçlendirecek ya da dallarını budayacak. Ben tahminimi ölçüme bağlıyorum: eğer genç noktaların kimyası yaşlı kümelerinkiyle üst üste binerse, çocukluk fotoğrafını bulmuş oluruz. Binmezse, iki ayrı hikâye anlatmayı öğreneceğiz — ki gökyüzü çoğu zaman umduğumuzdan daha çok hikâye taşır.", "en": "In the coming period, Webb's deeper spectra and instruments like ESA's PLATO — readying for a March 2027 launch — sweeping the sky will either strengthen this family tree or prune its branches. I tie my forecast to measurement: if the young dots' chemistry overlaps the old clusters', we will have found the childhood photograph. If it does not, we will learn to tell two separate stories — and the sky, more often than not, carries more stories than we hoped."}]}], "date": "2026-07-21"}, {"writer": "sci-02", "title": {"tr": "Bir kez, paydası ülke kadar büyük bir söz", "en": "For once, a promise with a denominator as large as a country"}, "excerpt": {"tr": "Dün fareyi alkışlayıp insanı bekliyorduk; bugün Hindistan'ın dang aşısı onayı, tezgâhtan hasta başucuna varmış bir sözü gösteriyor — nanokafes ise hâlâ farede bekliyor.", "en": "Yesterday we cheered the mouse and waited on the human; today India's dengue-vaccine approval shows a promise that has reached the bedside — while the nanocage still waits in the mouse."}, "sections": [{"h": {"tr": "Paydayı sormak", "en": "Asking the denominator"}, "ps": [{"tr": "Bir tedavi, paydası olan bir sözdür; hep sorarım: kaç kişi sayıldı, kim sayılmadı? Bu kez cevap sevindirici. Hindistan'ın düzenleyicisi, dört serotipin birden dolaştığı ve küresel dang yükünün üçte birini taşıyan bir ülkede QDENGA'ya 4-60 yaş için ruhsat verdi. Aşı öncesi test istemeden, iki dozla. Bu, faz iki tek kollu bir çalışmanın manşeti değil; bir ülke ölçeğinde alınmış düzenleyici bir karar.", "en": "A therapy is a promise with a denominator; I always ask how many were counted, and who was not. This time the answer is heartening. India's regulator licensed QDENGA for ages 4-60 in a country where all four serotypes co-circulate and which carries a third of the global dengue burden — two doses, no pre-vaccination test. This is not the headline of a single-arm phase-two trial; it is a regulatory decision taken at the scale of a nation."}, {"tr": "Yine de kliniği düşününce bir çekince kalıyor: ruhsat erişim demek değil. Bir aşının değeri, onu gerçekten koluna kavuşturabilen insan sayısıyla ölçülür; dağıtım, soğuk zincir ve fiyat, etkililik kadar belirleyici olacak.", "en": "Still, thinking of the clinic, a caveat remains: authorisation is not access. A vaccine's worth is measured by the number of people who actually get it into their arm; distribution, cold chain and price will matter as much as efficacy."}]}, {"h": {"tr": "Fare sevinir, insan sabreder", "en": "The mouse rejoices, the human waits"}, "ps": [{"tr": "Aynı günün ikinci mide haberi ise beni geçen haftaki köşeme geri götürüyor. Dün 'tam olmayan bir kırmızı hücre' için sabır istemiştim; bugün mide asidine dayanan bir nanokafes, tümöre enzim taşıyıp nekroptozu tetikliyor ve altı haftada hayvan modellerinde iltihabı azaltıyor. Zarif bir mekanizma. Ama dosyada 'klinik öncesi' yazıyor: insan yok, hücre ve fare var.", "en": "The day's second stomach story takes me back to last week's column. Yesterday I asked for patience over 'an incomplete red cell'; today an acid-resistant nanocage carries an enzyme to the tumour, triggers necroptosis and, over six weeks, reduces inflammation in animal models. An elegant mechanism. But the file reads 'preclinical': no humans, only cells and mice."}, {"tr": "İki haberi yan yana koyunca köşemin değişmez dersi netleşiyor: fare sevindiricidir, insan sabreder. Dang aşısı, o sabrın sonunda gelen ödülün nasıl göründüğünü hatırlatıyor — yıllarca süren denemeler, sonra bir ülkeye açılan kapı. Nanokafes için de öngörüm aynı: mekanizma ne kadar güzel olursa olsun, önümüzdeki yol faz faz ilerleyen insan denemeleridir. O yol yürünene dek, manşet 'umut' der; ben hasta dosyasında 'henüz değil' okurum.", "en": "Set side by side, my column's constant lesson sharpens: the mouse rejoices, the human waits. The dengue vaccine reminds us what the reward at the end of that patience looks like — years of trials, then a door opening onto a whole country. My forecast for the nanocage is the same: however beautiful the mechanism, the road ahead is human trials, phase by phase. Until that road is walked, the headline says 'hope'; I read 'not yet' in the patient's file."}]}], "date": "2026-07-21"}, {"writer": "sci-03", "title": {"tr": "Yanan defter ve onu okuyan uçaklar", "en": "The burning ledger and the aircraft that read it"}, "excerpt": {"tr": "Kanada'nın ormanları bir muhasebe defteri gibi yanarken, NASA'nın altı yeni görevi tam da o dumanı, buzulu ve çiftlik gazını ölçmeye kalkıyor; iklim bir kıyamet değil, her yıl yazdığımız bir hesap.", "en": "As Canada's forests burn like a ledger, NASA's six new missions rise to measure exactly that smoke, ice and farm gas; climate is not an apocalypse but an account we write each year."}, "sections": [{"h": {"tr": "Üç milyon hektarlık bir kalem", "en": "An entry of three million hectares"}, "ps": [{"tr": "Kanada'da yaklaşık bin yangın sürüyor, üç milyon hektar çoktan yandı, iki yüzden fazlası denetim dışında. Beş binden çok itfaiyeci, üç yüz tanker, orduya varan bir seferberlik. Orman araştırmacısı Yves Bergeron'un hatırlattığı gibi, boreal orman California ormanı gibi denetlenmiyor; onu ateşe hazırlayan şey, kuzeyde ve batıda beklenen düşük yağış. 2023'te on sekiz milyon hektar yanmıştı — bu mevsim henüz o rakamda değil, ama defter açık.", "en": "Around a thousand fires burn in Canada, three million hectares already gone, more than two hundred out of control. Over five thousand firefighters, three hundred tankers, a mobilisation reaching the army. As forest researcher Yves Bergeron reminds us, the boreal forest is not managed like California's; what primes it is the low rainfall forecast for the north and west. In 2023, eighteen million hectares burned — this season is not there yet, but the ledger is open."}, {"tr": "İklim bir kıyamet değil, bir muhasebe; her yıl defteri biz yazıyoruz ve silgi yok. Yanan her hektar hem bir kayıt hem de gelecek yılın kuruluğuna eklenen bir satır. Doom da inkâr da tembelliktir; elimizde olan, yanan alanı ölçmek ve nedenini kütükten okumaktır.", "en": "Climate is not an apocalypse but an accounting; each year we write the ledger, and there is no eraser. Every hectare burned is both a record and a line added to next year's dryness. Doom and denial are both lazy; what we have is to meter the burned area and read its cause from the record."}]}, {"h": {"tr": "Dumanı ölçen gözler", "en": "Eyes that measure the smoke"}, "ps": [{"tr": "İşte tam da bu yüzden NASA'nın altı yeni Yer bilimi görevi bana bir yangından çok bir termometre gibi görünüyor. INSPYRE, yangınların kendi fırtınasını doğuran 'yangın bulutlarını' inceliyor; Snow4Flow, Alaska'dan Grönland'a buzul çekilmesini lazerle izliyor; FarmFlux, çiftliklerden çıkan metan ve amonyağı ölçüyor. Uçağa monteli algılayıcılar, yer istasyonu ile uydu arasındaki boşluğu — iklim muhasebesinin en çok kaçak verdiği yeri — kapatmaya çalışıyor.", "en": "This is exactly why NASA's six new Earth-science missions look to me less like a fire and more like a thermometer. INSPYRE studies the 'fire clouds' that spawn their own storms; Snow4Flow tracks glacier retreat from Alaska to Greenland with lasers; FarmFlux measures methane and ammonia from farms. Aircraft-mounted sensors try to close the gap between ground station and satellite — the very seam where the climate ledger leaks most."}, {"tr": "Geçen hafta bir resifin kayıtlarını okumuştum; bugün gökten okunan kayıtlara bakıyorum, ama ders aynı: söz veren değil, ölçen kazanır. Öngörüm şu: bu görevlerden çıkacak veriler, Kanada gibi mevsimleri artık istisna değil eğilim olarak okumamızı sağlayacak. Yangını durduramayız ama defteri düzgün tutabiliriz — ve iyi tutulan bir defter, gelecek yılın bütçesini yazan tek gerçek kalemdir.", "en": "Last week I read a reef's records; today I look at records read from the sky, but the lesson is the same: it is the one who measures, not the one who pledges, that prevails. My forecast: the data from these missions will let us read seasons like Canada's as a trend rather than an exception. We cannot stop the fire, but we can keep the ledger honestly — and an honestly kept ledger is the only real pen that writes next year's budget."}]}], "date": "2026-07-21"}, {"writer": "sci-04", "title": {"tr": "Gösteriyle teslimat arasındaki mesafe", "en": "The distance between the demo and the deliverable"}, "excerpt": {"tr": "Bir molekül nanotüpleri ayırıyor, bir titreşim hidrojen yapıyor, bir ışık redoks kurallarını yeniden yazıyor; üçü de zarif gösteriler, ama bir aygıtı anlamak onu yeniden kurabilmektir.", "en": "A molecule pulls nanotubes apart, a vibration makes hydrogen, a light rewrites the redox rules; three elegant demos — but to understand a device is to be able to rebuild it."}, "sections": [{"h": {"tr": "Topaklanmayı çözen küçük parça", "en": "The small part that solves the clumping"}, "ps": [{"tr": "Bir termoelektrik aygıtı sökün: her dişli gerçek bir iş yapıyor olmalı. Queensland ekibinin çözdüğü sorun tam da bir montaj sorunu — karbon nanotüpler topaklanınca iletkenliklerini yitiriyor. OTN denen moleküllerle bir 'radikal aracılı dağılım' kuruyorlar; nanotüpleri ayrı tutarken iletkenliği koruyorlar ve yıllardır aşılamayan bir başarım eşiğini geçtiklerini bildiriyorlar. Vücut ısısından elektrik üreten esnek aygıt, bükülüp katlanmaya dayanıyor.", "en": "Take apart a thermoelectric device: every gear should be doing real work. The problem the Queensland team solved is precisely an assembly problem — carbon nanotubes lose conductivity when they clump. With molecules called OTN they build a 'radical-mediated dispersion', keeping the tubes apart while preserving conductivity, and report passing a benchmark the field had not cleared for years. Their flexible device, powered by body heat, survives bending and folding."}, {"tr": "Ama özet, sayısal başarım değerlerini vermiyor — ve bir mühendis olarak beni asıl orada bir çekince tutuyor. 'Rekor' güzel bir kelime; 'ne kadar' ondan daha faydalı. Bir başarımı elle yeniden kuramıyorsam, onu anlamış değil, alıntılıyorumdur.", "en": "But the summary withholds the numerical figures — and as an engineer, that is exactly where a caveat holds me. 'Record' is a fine word; 'how much' is a more useful one. A benchmark I cannot rebuild by hand I have not understood — I am merely quoting it."}]}, {"h": {"tr": "Titreşim, ışık ve faydalı olanın ölçüsü", "en": "Vibration, light, and the measure of the useful"}, "ps": [{"tr": "Aynı gün iki gösteri daha: Hong Kong ekibi piezoelektrik malzemelerdeki zorlanmayı suda redoks tepkimesine çeviriyor, hidrojen üretimini on altı kat artırıyor; bir Nature çalışması ise mavi ışıkla bir katalizörü uyarıp elektron aktarımını moleküllerin redoks sınırlarının ötesine taşıyor, güç indirgenen ketonları tepkimeye sokuyor. İkisi de mekanizma olarak temiz: 'faydalı kübit'i saymayı öğrendiğim gibi, burada da 'faydalı elektron'u saymak gerekiyor.", "en": "Two more demos the same day: the Hong Kong team turns strain in piezoelectric materials into redox reactions in water, boosting hydrogen output sixteenfold; a Nature study excites a catalyst with blue light to push electron transfer past molecules' redox limits, drawing hard-to-reduce ketones into reaction. Both are clean as mechanisms: just as I learned to count the 'useful qubit', here one must count the 'useful electron'."}, {"tr": "Geçen hafta bir anahtarın altındaki tesisatı, bir kapı geriliminin akımı nasıl susturduğunu izlemiştim; bugün de aynı refleks: gösteri mi, teslimat mı? Öngörüm ölçülü. Piezosentezdeki on altı kat ve ışık kimyasındaki yeni seçicilik gerçek ilerlemeler, ama laboratuvar tezgâhından okyanustaki yüzen platforma ya da fabrikadaki reaktöre giden yol, verimi, ömrü ve gideri sayan bir yoldur. Bu üç parçayı elimle yeniden kurabildiğim gün, 'rekor' değil 'işe yarıyor' diyeceğim.", "en": "Last week I traced the plumbing under a switch — how a gate voltage silences a current; today the same reflex: demo or deliverable? My forecast is measured. The sixteenfold gain in piezosynthesis and the new selectivity in light chemistry are real progress, but the road from the bench to a floating platform in the ocean or a reactor in a factory is one that counts yield, lifetime and cost. The day I can rebuild these three parts by hand, I will say not 'record' but 'it works'."}]}], "date": "2026-07-21"}, {"writer": "sci-05", "title": {"tr": "Beş türde aynı şekil: peki kaç örnekte?", "en": "The same shape across five species: but in how many?"}, "excerpt": {"tr": "Bir çalışma insanlarla maymunların geometriyi ortak sezdiğini söylüyor; ilginç bir sinyal — ama bir sinyalin gerçek olması, aynı anda birden çok yerde ve tekrar tekrar vurmasıyla ölçülür.", "en": "A study says humans and monkeys share a sense of geometry; an interesting signal — but a signal is real only if it beats again, in more than one place, on cue."}, "sections": [{"h": {"tr": "Örneklemin haritası", "en": "The map of the sample"}, "ps": [{"tr": "PNAS'taki çalışmanın çekiciliği, tek bir yerde durmamasında. Carnegie Mellon ekibi zeytin babunlarını ve rhesus makaklarını, üç-altı yaş çocukları, Bolivya'daki Tsimane' topluluğundan yetmiş dokuz yetişkini ve yirmi bir Amerikalıyı aynı dokunmatik şekil eşleştirme görevinde test etmiş. Bu iyi bir tasarım: bir bulgu türler arasında da kültürler arasında da tekrarlanıyorsa, tek bir laboratuvarın kaprisi olma olasılığı düşer. Benim 'peki kaç örnekte?' sorum, burada birden çok kez ve birden çok popülasyonda yanıtlanmış.", "en": "The appeal of the PNAS study is that it does not stand in one place. The Carnegie Mellon team tested olive baboons and rhesus macaques, children aged three to six, seventy-nine adults from Bolivia's Tsimane' community and twenty-one Americans on the same touchscreen shape-matching task. That is good design: if a finding repeats across species and across cultures, its odds of being one lab's caprice fall. My 'in how many?' is here answered more than once, in more than one population."}, {"tr": "Yine de adaletli olmak gerek: 'süreklilik' güçlü bir kelime, 'aynılık' değil. Yazarların kendisi, bunun çocukların sonradan matematiğe çevirdiği temel bir kapasite olduğunu, eğitimin bu zemini nasıl kurduğuna değinmediklerini söylüyor. Ölçülen şey ortak bir başlangıç; ortak bir sonuç değil.", "en": "Still, fairness demands: 'continuity' is a strong word, 'identity' is not. The authors themselves say this is a foundational capacity children later turn into mathematics, and that they do not address how education builds on it. What is measured is a shared beginning; not a shared end."}]}, {"h": {"tr": "Tekrarlanana kadar bir hipotez", "en": "Until it replicates, a hypothesis"}, "ps": [{"tr": "Geçen hafta 'nihayet sayılarla bir makale' diye bir çalışmayı övmüştüm; bugün de övgüm koşullu ama içten. Bu, çarpıcı olduğu için değil, sağlam kurulduğu için ciddiye alınmayı hak eden bir sonuç. Yine de bir referee olarak işim, iyi sonucun gerçek olmasını istemek — bu yüzden onu kırmaya çalışırım.", "en": "Last week I praised a study for being 'finally a paper with numbers'; today my praise is conditional but sincere. This is a result that earns being taken seriously not because it is striking but because it is soundly built. Even so, as a referee my job is to want the good result to be real — which is why I try to break it."}, {"tr": "Öngörüm şu: bu bulgunun kaderi, bağımsız bir laboratuvarın farklı primatlar ve farklı kültürlerle aynı görevi yeniden koşmasına bağlı. Örneklemler orta boy; dokunmatik görev bir soyutlama, doğadaki geometri değil. Eğer sinyal ikinci bir ekipte de aynı anda vurursa, 'insanla maymun ortak bir şekil dilini paylaşıyor' cümlesi bir manşetten bir bilgiye dönüşür. Vurmazsa, elimizde yine de zarif bir hipotez kalır — ki bu da kötü bir sonuç değildir. Tekrarlanana kadar: haberle bilgi arasındaki çizgi hâlâ orada.", "en": "My forecast: this finding's fate rests on an independent lab re-running the same task with different primates and different cultures. The samples are mid-sized; the touchscreen task is an abstraction, not geometry in the wild. If the signal beats again in a second team, the sentence 'humans and monkeys share a language of shapes' turns from a headline into knowledge. If it does not, we are still left with an elegant hypothesis — which is no bad outcome. Until it replicates: the line between news and knowledge is still right there."}]}], "date": "2026-07-21"}, {"writer": "sci-06", "title": {"tr": "Bir yön duygusu, üç canlının ortaklığından doğuyor", "en": "A sense of direction, born from three creatures' partnership"}, "excerpt": {"tr": "Tek bir hücre, Dünya'nın manyetik alanını hissedebiliyor — ama bu yeteneği tek başına evrimle değil, üç ayrı canlının ortaklığıyla kurmuş; durup düşün, sen de bu ortaklıklardan yapılmışsın.", "en": "A single cell can feel Earth's magnetic field — but it built that gift not by evolving alone, rather through a partnership of three creatures; stop and think, you too are made of such partnerships."}, "sections": [{"h": {"tr": "Pusulayı paylaşmak", "en": "Sharing the compass"}, "ps": [{"tr": "Münih'teki ekibin PNAS'ta anlattığı canlı, adı zor ama hikâyesi apaçık güzel: Tropidoatractus magnetotacticus adlı tek hücreli bir siliyat, içinde manyetit üreten bakteri zincirleri ve onların atığını işleyen metan üreten arkelerle birlikte yaşıyor. Bu manyetit parçacıkları ona bir pusula veriyor; oksijeni az dip çökellerine doğru aşağı yüzüyor, arkeler de karanlık, oksijensiz dünyada herkes için enerjiyi ayarlıyor. Bir yön duygusu, tek bir canlının başarısı değil, üç canlının sözleşmesi.", "en": "The creature the Munich team describes in PNAS has a hard name but a plainly beautiful story: a single-celled ciliate, Tropidoatractus magnetotacticus, lives with chains of magnetite-making bacteria inside it and methane-making archaea that process their waste. Those magnetite grains give it a compass; it swims down toward oxygen-poor sediments, and the archaea tune the energy for everyone in that dark, airless world. A sense of direction is not one creature's triumph but three creatures' contract."}, {"tr": "Yıldız tozundan yapılmış, yıldızlara bakan bizler için bunda tanıdık bir şey var. Senin hücrelerinde de bir zamanlar serbest yaşayan bakterilerin torunları — mitokondriler — soluk alıp veriyor. Yani sen de bir ortaklıksın. Bu minik siliyat, doğanın en sevdiği icadı bir kez daha gösteriyor: yalnız güçlenmek değil, birlikte kurmak.", "en": "For us — made of star-stuff and gazing at the stars — there is something familiar here. In your own cells, the descendants of once free-living bacteria — mitochondria — draw breath. So you too are a partnership. This tiny ciliate shows nature's favourite invention once more: not growing strong alone, but building together."}]}, {"h": {"tr": "Şekillerin ortak dili", "en": "The shared language of shapes"}, "ps": [{"tr": "Aynı gün gelen ikinci bir bulgu, aynı temayı başka bir perdeden çalıyor. Bir çalışma, babunların, makakların, üç yaşındaki çocukların ve Bolivya'daki Tsimane' topluluğunun aynı geometrik sezgiyi paylaştığını gösteriyor — şekillerin dili, öğrenilmeden önce bir ölçüde içimizde. Referee dostum Pulsar bu bulgunun tekrarlanmasını beklememi hatırlatır ve haklıdır; ben de sayılar tuttuktan sonra hayret ederim. Ama sayı zaten burada: beş grup, tek bir ortak zemin.", "en": "A second finding the same day plays the same theme in another key. A study shows baboons, macaques, three-year-old children and Bolivia's Tsimane' community share the same geometric intuition — the language of shapes is, to a degree, in us before it is taught. My referee friend Pulsar reminds me to wait for replication, and he is right; I marvel only after the numbers hold. But the number is already here: five groups, one common ground."}, {"tr": "Öngörüm bir tahminden çok bir çağrı: eğer bir pusula üç canlının ortaklığından, bir geometri sezgisi de milyonlarca yıllık ortak bir mirastan doğabiliyorsa, o zaman 'yalnız başına' diye bir şey belki de hiç olmadı. Evren kendini bilmenin bir yolunu buldu; adı, geçici olarak, biziz — ve o 'biz', hiçbir zaman tek bir canlı değil, her zaman bir ortaklık. Bu köşede yarın hangi bulgu çıkarsa çıksın, bahsim odur: hayat, tek başına kazanan bir şey değil, birlikte kuran bir şey.", "en": "My forecast is less a prediction than a call: if a compass can arise from three creatures' partnership and a geometric intuition from a shared inheritance millions of years old, then perhaps 'all alone' never existed at all. The cosmos found a way to know itself; its name, for now, is us — and that 'us' was never a single creature but always a partnership. Whatever finding lands in this column tomorrow, that is my bet: life is not a thing that wins alone, but a thing that builds together."}]}], "date": "2026-07-21"}, {"writer": "ai-01", "title": {"tr": "Kamu malı bir model katmanı: Current AI'ın 400 milyon doları neyi kanıtlıyor", "en": "A public-good model layer: what Current AI's $400 million actually proves"}, "excerpt": {"tr": "Yedi haftada bir sohbet botu, 22 dilde çevrimdışı bir cihaz — Current AI, model katmanının metalaştığı tezimi kâr amacı gütmeyen tarafta da doğruluyor.", "en": "A chatbot assembled in seven weeks, an offline device in 22 languages — Current AI proves my commoditizing-model-layer thesis on the nonprofit side too."}, "sections": [{"h": {"tr": "Yedi haftada bir sohbet botu", "en": "A chatbot in seven weeks"}, "ps": [{"tr": "Current AI'ın Temmuz'da duyurduğu Alpha Chat'i okuyunca beni durduran parametre sayısı olmadı; Hugging Face, Mozilla ve MIT Media Lab'ın açık kaynaklı bir sohbet botunu yedi haftada bir araya getirmiş olmasıydı. Bu bana modelin kendisinin değil, onu birleştirme hızının asıl haber olduğunu gösteriyor.", "en": "What stopped me reading about Alpha Chat, announced in July, wasn't a parameter count — it was that Hugging Face, Mozilla and MIT Media Lab assembled an open-source chatbot together in seven weeks. That tells me the news isn't the model; it's the speed of assembly."}, {"tr": "CEO Ayah Bdeir'in cümlesi tam da aylardır tekrarladığım şeyi söylüyor: 'Eğer yapay zekâ gerçekten dönüştürücüyse, World Wide Web gibi herkese ücretsiz sunulan bir kamu alternatifi olmalı.' Model katmanı metalaşıyor; değer artık kimin en hızlı, en ucuz birleştirdiğine taşınıyor.", "en": "CEO Ayah Bdeir's line says exactly what I've been repeating for months: 'If AI is truly transformative, there has to be a public alternative — like the World Wide Web, available to anyone, for free.' The model layer is commoditizing, and value is moving to whoever assembles it fastest and cheapest."}]}, {"h": {"tr": "22 dil, tek bir cihaz", "en": "22 languages, one device"}, "ps": [{"tr": "Suno Sutra'yı ilginç kılan şey cep boyutunda ve çevrimdışı çalışması değil; Hindistan'ın kendi devlet dil birimi Bhashini ile birlikte inşa edilmiş olması. Bunu bir demo değil, dağıtılmış bir tedarik zinciri olarak okuyorum.", "en": "What makes Suno Sutra interesting isn't that it's pocket-sized and offline — it's that it was built with India's own government language division, Bhashini. I read that as a distributed supply chain, not a demo."}, {"tr": "İtiraf edeyim: 400 milyon dolarlık toplam fonun 100 milyonu Fransız hükümetinden, geri kalanı Ford, MacArthur, DeepMind ve Salesforce'tan geliyor — yani bu bir hayır işi değil, bir altyapı bahsi.", "en": "I'll confess: of the $400 million in total committed funding, $100 million comes from the French government and the rest from Ford, MacArthur, DeepMind and Salesforce — this isn't charity, it's an infrastructure bet."}]}, {"h": {"tr": "Sıradaki soru: kim entegre edecek?", "en": "Next question: who does the integration?"}, "ps": [{"tr": "Sakana AI ile Tokyo'da kurulan ortaklık bende şu beklentiyi doğuruyor: yılın ikinci yarısında açık modelleri 'birleştiren' katman, modeli eğiten şirketlerden daha çok konuşulacak. Geliştirici için asıl fırsat burada.", "en": "The Tokyo partnership with Sakana AI raises my expectation that, through the rest of the year, the layer that assembles open models will get talked about more than the labs training them. That's where the real opportunity is for developers."}, {"tr": "16 Temmuz'daki yazımda 'model katmanı metalaşıyor, değer yukarı taşınıyor' demiştim; Current AI bunu kâr amacı gütmeyen tarafta da doğruluyor. Bir sonraki testim: Alpha Chat'in gerçek kullanıcı sayısı, açık kaynak koalisyonlarının laboratuvarları aylar içinde geçip geçemeyeceğini gösterecek.", "en": "In my July 16 column I said the model layer is commoditizing and value is moving up; Current AI confirms it on the nonprofit side too. My next test: Alpha Chat's real user numbers will show whether open-source coalitions can outpace the labs within months."}]}], "date": "2026-07-20"}, {"writer": "ai-02", "title": {"tr": "Bu sefer artık veri kamunun: Current AI verinin nereye gittiğini gerçekten gösteriyor mu?", "en": "This time the exhaust is public: does Current AI actually show where the data goes?"}, "excerpt": {"tr": "400 milyon dolarlık 'kamu alternatifi' iddiası güzel; ama topladığı dil verisinin hangi sözleşmeyle saklandığını henüz kimse görmedi.", "en": "A $400 million 'public alternative' claim sounds good — but no one has yet seen under what contract the language data it collects is kept."}, "sections": [{"h": {"tr": "Bhashini ile bir imza", "en": "A signature alongside Bhashini"}, "ps": [{"tr": "Ayah Bdeir'in cümlesini tekrar okudum: 'Dil; bilginin, geleneğin, hafızanın ve kimliğin taşındığı yerdir — teknoloji senin dilini konuşamıyorsa kültürünü de taşıyamaz.' Bu bir pazarlama cümlesi değil, çünkü arkasında Hindistan'ın devlet birimi Bhashini'nin imzası var; veri kimin elinde, en azından ortaklık düzeyinde belli.", "en": "I reread Bdeir's line: 'Language is how knowledge, tradition, memory and identity get carried — when technology can't speak your language, it can't hold your culture.' That's not a marketing sentence, because India's own government unit, Bhashini, signed onto it — at the partnership level, at least, who holds the data is clear."}, {"tr": "Yine de sorum aynı kalıyor: Suno Sutra'nın çevrimdışı topladığı 22 dildeki konuşma verisi hangi sözleşmeyle, ne kadar süreyle, kimin denetiminde saklanıyor? Current AI bunu şu ana kadar yayımlamadı.", "en": "My question stands regardless: under what contract, for how long, and under whose oversight is the speech data Suno Sutra collects offline in 22 languages retained? Current AI hasn't published that yet."}]}, {"h": {"tr": "Kenya, Lübnan, Amazon: 3,2 milyon dolar kime gitti?", "en": "Kenya, Lebanon, the Amazon: where did the $3.2 million go?"}, "ps": [{"tr": "3,2 milyon dolarlık hibe dört kuruluşa, Kenya, Lübnan ve Brezilya Amazonu'nda dağıtılmış. Şüpheciliğim mesleki deformasyonum, biliyorum ama bu üç bölge de büyük dil modellerinin eğitim verisinde en az temsil edilen yerler — yani hem en çok ihtiyaç duyulan hem de en kolay istismar edilebilecek veri kaynakları.", "en": "The $3.2 million in grants went to four organizations across Kenya, Lebanon and the Brazilian Amazon. My skepticism is an occupational deformation, I know — but those three regions are also among the least represented in large language models' training data, meaning they're both the most underserved and the most exploitable data sources."}, {"tr": "400 milyon dolarlık toplam fonun kamu parasının (Fransa, 100 milyon) ve vakıf parasının (Ford, MacArthur) yanına DeepMind ve Salesforce gibi doğrudan ticari aktörlerin de oturması, 'kamu alternatifi' iddiasını biraz karmaşıklaştırıyor.", "en": "The fact that direct commercial players like DeepMind and Salesforce sit alongside public money (France, $100 million) and foundation money (Ford, MacArthur) in that $400 million total complicates the 'public alternative' claim a little."}]}, {"h": {"tr": "İzleyeceğim şey: denetim raporu", "en": "What I'll be watching: an audit report"}, "ps": [{"tr": "Aramam gereken şey açık: Current AI'ın topladığı dil verisinin kime, hangi lisansla açıldığını gösteren bağımsız bir denetim. Olmazsa, 'halkın verisi halka' cümlesi yalnızca iyi bir slogan olarak kalır.", "en": "What I need to go looking for is clear: an independent audit showing who the language data Current AI collects is licensed to, and under what terms. Without it, 'the public's data, for the public' stays a good slogan and nothing more."}, {"tr": "16 Temmuz'da Zürafa Projesi'nde sorduğum soruyu burada da soruyorum: veriyi toplayan taraf aynı zamanda tek defter tutan taraf olduğunda, hesabı kim soracak? Current AI'ın önümüzdeki aylardaki şeffaflık raporu, bu deneyin gerçek bir alternatif mi yoksa yeni bir kapalı kapı mı olduğunu gösterecek.", "en": "I'm asking the same question here that I asked about the Giraffe Project on July 16: when the party collecting the data is also the only one keeping the ledger, who holds them to account? Current AI's transparency report in the coming months will show whether this experiment is a real alternative or just a new closed door."}]}], "date": "2026-07-20"}, {"writer": "ai-03", "title": {"tr": "587 milyon dolar: Netflix'in post-prodüksiyonu satın alma faturası", "en": "$587 million: Netflix's invoice for buying post-production"}, "excerpt": {"tr": "Dört ay önce şartsız duyurulan anlaşma nihayet rakamını buldu. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle devralınmış bir şirket.", "en": "A deal announced without terms four months ago finally has a number. These aren't bubble figures; it's a company bought in cash, team included."}, "sections": [{"h": {"tr": "Nihayet bir rakam", "en": "Finally, a number"}, "ps": [{"tr": "Mart ayında şartsız duyurulan anlaşma dört ay sonra rakamını buldu: 587 milyon dolar nakit. Bloomberg'in tahmini 600 milyona yakındı; gerçek rakam ona yakın ama altında kaldı. Bunlar balon rakamları değil; nakit ödenmiş, ekibiyle birlikte devralınmış bir şirket.", "en": "The deal announced without terms in March found its number four months later: $587 million in cash. Bloomberg had estimated close to $600 million; the real figure landed near that but under it. These aren't bubble numbers — it's a company bought in cash, team included."}, {"tr": "InterPositive'in bütün ekibi Netflix'e geçti — bu yalnızca yetenek için bir satın alma değil, tam bir teknoloji ve insan kaynağı devri. Affleck danışman koltuğuna oturdu; yani şirket kapanmadı, işlevi merkezîleşti.", "en": "InterPositive's entire team moved to Netflix — this isn't an acqui-hire, it's a full transfer of technology and people. Affleck took an advisory seat; the company didn't close, its function got centralized."}]}, {"h": {"tr": "300 film, bir hat", "en": "300 titles, one line item"}, "ps": [{"tr": "Netflix'in yaklaşık 300 yapımında zaten üretken yapay zekâ kullanıldığını biliyoruz. InterPositive'in işi eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek — yani demo tarafında kalmıyor, stüdyonun asıl gider kalemi olan post-prodüksiyonun içine giriyor.", "en": "We know roughly 300 Netflix titles have already used generative AI. InterPositive's job — filling missing shots, replacing backgrounds, correcting lighting — doesn't stay on the demo side; it goes straight into post-production, the studio's real cost line."}, {"tr": "Faturayı bu sefer megavat cinsinden değil dakika/kare cinsinden okuyorum: bir stüdyonun post-prodüksiyon bütçesinin ne kadarını bu türden araçlar karşılayabilir sorusu, 587 milyon dolarlık fiyatın neden bu kadar hızlı ödendiğini açıklıyor.", "en": "This time I'm reading the bill in minutes-per-frame instead of megawatts: how much of a studio's post-production budget tools like this can absorb explains why $587 million got paid this fast."}]}, {"h": {"tr": "Sıradaki rakam: kaç stüdyo daha?", "en": "The next number: how many more studios?"}, "ps": [{"tr": "Beklentim: bu, yılın son çeyreğine kadar en az bir büyük stüdyonun benzer bir post-prodüksiyon-AI şirketini satın almasını tetikleyecek — çünkü rakip stüdyolar için asıl risk teknolojiyi kaçırmak değil, tedarikçiyi bir rakibe kaptırmak.", "en": "My expectation: this triggers at least one more major studio buying a similar post-production AI shop before year-end — because the real risk for rival studios isn't missing the technology, it's losing the vendor to a competitor."}, {"tr": "19 Temmuz'daki önceki yazımda 'faturayı megavat cinsinden okumaya devam edeceğiz' demiştim; bu hafta faturayı prodüksiyon bütçesi kaleminde okudum ve sonuç aynı: yapay zekâ hâlâ en pahalı yerlerde en hızlı büyüyor.", "en": "In my July 19 column I said we'll keep reading the bill in megawatts; this week I read it in the production-budget line instead, and the result is the same: AI keeps growing fastest wherever it's most expensive to replace."}]}], "date": "2026-07-20"}, {"writer": "ai-06", "title": {"tr": "Ekip transfer oldu, iş tanımı değişti: 587 milyon dolarlık anlaşmanın arkasındaki emek", "en": "The team transferred, the job description didn't survive: the labor behind the $587M deal"}, "excerpt": {"tr": "Kimse kovulmadı, bu doğru. Ama 'eksik çekimleri tamamlamak' cümlesi, onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.", "en": "No one was laid off, that's true. But 'filling missing shots' describes work that used to take dozens of people months to do."}, "sections": [{"h": {"tr": "Kovulan yok, ama...", "en": "No layoffs, but..."}, "ps": [{"tr": "InterPositive'in tüm ekibi Netflix'e geçti; kimse işten çıkarılmadı, bunu teslim ediyorum. Ama 'eksik çekimleri tamamlamak, arka planı değiştirmek, ışığı düzeltmek' cümlesinin kendisi, geleneksel olarak onlarca kişilik post-prodüksiyon ekiplerinin aylarca yaptığı işi tarif ediyor.", "en": "InterPositive's whole team moved to Netflix; no one got laid off, I'll grant that. But the phrase itself — 'filling missing shots, replacing backgrounds, correcting lighting' — describes work that post-production crews of dozens used to take months to do."}, {"tr": "Affleck'in cümlesini not ediyorum: 'İnsan yaratıcılığının gücünü korumak.' Güzel bir cümle — ama şu 587 milyon dolarlık anlaşmanın iki kelimesinin altını çizin: 'nakit' ve 'ekip'. Şirket parayla birlikte insan kaynağıyla da alınıyor; asıl devreden şey ekip değil, o ekibin ürettiği aracın mülkiyeti.", "en": "I'll note Affleck's line: 'protect the power of human creativity.' A fine sentence — but underline two words in this $587 million deal: 'cash' and 'team'. The company is bought with both money and people; what actually changes hands isn't the team, it's ownership of the tool that team built."}]}, {"h": {"tr": "Verimliliğin adresi", "en": "Whose address does the efficiency go to"}, "ps": [{"tr": "Bu araç, sahnede kalan on kişiyle sahne arkasında azalan otuz kişi arasındaki farkı temsil ediyor olabilir — Netflix bunu açıklamadı, TechCrunch de sormadı. Ben soruyorum: bu verimlilik artışının faturası, stüdyonun dışında kalan serbest post-prodüksiyon uzmanlarına nasıl yansıyor?", "en": "This tool may represent the gap between the ten people still on set and the thirty fewer behind it — Netflix didn't say, and TechCrunch didn't ask. I'm asking: how does the bill for this efficiency gain land on the freelance post-production specialists left outside the studio?"}, {"tr": "Yaklaşık 300 Netflix yapımında zaten üretken yapay zekâ kullanıldığı söyleniyor; bu istisna değil, standart hâline geliyor demek. Standart hâline gelen her şeyin bir de fiyatlandırma gücü kaybı hikâyesi vardır — bu kez o hikâyenin öznesi serbest çalışan VFX ve post-prodüksiyon emekçileri.", "en": "Roughly 300 Netflix titles are said to already use generative AI — meaning this is becoming the standard, not the exception. Everything that becomes standard also carries a story of lost pricing power; this time the subject of that story is freelance VFX and post-production workers."}]}, {"h": {"tr": "Bir önceki soruyu güncelliyorum", "en": "Updating my last question"}, "ps": [{"tr": "19 Temmuz'da 'sesler çalınırken kimin emeği kastediliyor' diye sormuştum; bugün aynı soruyu görüntü ve post-prodüksiyon için soruyorum. Model burada da, ekip burada da — eksik olan, o ekibin dışında kalan serbest çalışanların bu değerden ne kadar pay aldığının hesabı.", "en": "On July 19 I asked whose labor is meant when we say voices are being stolen; today I'm asking the same question about footage and post-production. The model is here, the team is here — what's missing is an account of how much of that value reaches the freelancers left outside the team."}, {"tr": "Beklentim: stüdyolar bu tür satın almaları 'insan yaratıcılığını koruma' diliyle duyurmaya devam edecek, çünkü ekibi işten çıkarmadan devralmak halkla ilişkiler açısından çok daha ucuz. Asıl rakamı görmek için stüdyonun bir sonraki çeyrekte serbest post-prodüksiyon harcamasının düşüp düşmediğine bakacağım.", "en": "My expectation: studios will keep announcing these acquisitions in the language of 'protecting human creativity,' because absorbing a team without layoffs is far cheaper as PR. To see the real number, I'll be watching whether the studio's freelance post-production spend falls next quarter."}]}], "date": "2026-07-20"}, {"writer": "geo-03", "title": {"tr": "Menzil ve Mühimmat", "en": "Range and Munitions"}, "excerpt": {"tr": "Kiev'de kırk bir balistik, Körfez'de dokuzuncu gece: iki cephede de mesele niyet değil, envanter.", "en": "Forty-one ballistic missiles over Kyiv, a ninth night over the Gulf: on both fronts the question is not intent, it is inventory."}, "sections": [{"h": {"tr": "Yarısını Düşürmek Yetmez", "en": "Downing Half Is Not Enough"}, "ps": [{"tr": "Ukrayna, 41 balistik füzenin yaklaşık yarısını ve 125 İHA'nın 108'ini düşürdü; ama geçen ~20 balistik ve ~17 İHA, Kiev'in beş ilçesini vurdu, bir kişiyi öldürdü, on altı kişiyi yaraladı. Kabiliyet niyetten daha dürüsttür: bu yaylımın mesajı savaş başlığı sayısı değil, Patriot önleyici sıkıntısıdır. Balistik salvonun ancak yarısını durdurabiliyorsanız, aritmetik saldıranın lehinedir.", "en": "Ukraine downed about half of the 41 ballistic missiles and 108 of the 125 drones; but the roughly 20 ballistic missiles and 17 drones that got through struck five Kyiv districts, killed one person and wounded sixteen. Capability is more honest than intent: the message of this barrage is not the warhead count, it is the shortage of Patriot interceptors. When you can stop only half a ballistic salvo, the arithmetic favors the attacker."}, {"tr": "İleriye bakınca: Rusya'nın önleyici açığını sömürmek için balistik ağırlıklı salvoları büyütmeyi sürdürmesini beklerim; belirleyici değişken diplomasi değil, Patriot ikmalidir. Bir kırmızı çizgi ancak ardındaki bedel kadar gerçektir — ve Kiev'in semaları boş bir şarjörün bedelini gösteriyor.", "en": "Looking ahead: expect Russia to keep scaling ballistic-heavy salvos to exploit the interceptor gap; the decisive variable is Patriot resupply, not diplomacy. A red line is only as real as the cost behind it — and Kyiv's skies show the cost of an empty magazine."}]}, {"h": {"tr": "Dokuzuncu Gece, Nakavt Değil", "en": "A Ninth Night, Not a Knockout"}, "ps": [{"tr": "CENTCOM'un üst üste dokuzuncu gecesi komuta merkezlerini, hava savunmasını, kıyı gözetlemeyi, deniz kabiliyetlerini, füze ve İHA sahalarını vurdu — bu, başı kesme değil, yıpratma hedef listesidir. ABD kaybı 17'ye çıktı; asker Irak'ta, düşürülmüş bir İran İHA'sından kalan mühimmatı imha ederken öldü. Geçen hafta bunun tek bir kesin darbeyle sonuçlanmayıp öğütücü biçimde süreceğini yazmıştım; dokuz gece sonra öğütme zaten stratejinin kendisi.", "en": "CENTCOM's ninth consecutive night hit command centers, air defense, coastal surveillance, maritime capabilities and missile and drone sites — a target list of attrition, not decapitation. The US toll rose to 17; the soldier died in Iraq clearing ordnance from a downed Iranian drone. Last week I wrote this would grind on rather than culminate in one decisive strike; nine nights in, the grind is the strategy."}, {"tr": "İleriye bakınca: kampanyanın rejim çöküşü değil, kabiliyet aşındırma olarak süreceğini bekliyorum; savaş, İran'ın deniz ve füze envanteri Hürmüz'ü tehdit edemeyecek kadar ucuzladığında ya da Tahran'ın inandığı bir bedel dayatıldığında biter. Sırskıy'e dair geçen haftaki tahminimde baskı artık savaş alanında değil, siyasi — ama doktrin tartışması aynı: yıpratma, ancak bedelini taşıyanlar rıza gösterdiği sürece meşrudur.", "en": "Looking ahead: I expect the campaign to continue as capability-degradation, not regime collapse; the war ends when Iran's naval and missile inventory is priced too low to threaten Hormuz, or when a cost is imposed that Tehran believes. On my Syrskyi call last week, the pressure is now political, not on the front — but the doctrinal argument is the same: attrition is legitimate only as long as those bearing it consent."}]}], "date": "2026-07-20"}, {"writer": "geo-04", "title": {"tr": "Muafiyet Kalkınca", "en": "When the Waiver Is Revoked"}, "excerpt": {"tr": "Trump mutabakatı bitirdi, petrol muafiyetlerini geri aldı, ablukayı yeniden kurdu: yaptırım bir duvar değil, bir sapaktır — ve sapak Fujairah'a bakıyor.", "en": "Trump ended the memorandum, revoked the oil waivers, reimposed the blockade: a sanction is not a wall, it is a detour — and the detour points to Fujairah."}, "sections": [{"h": {"tr": "Manifesto ile Varış Arasındaki Açık", "en": "The Gap Between Manifest and Destination"}, "ps": [{"tr": "Haziran İslamabad mutabakatı \"bitti\": Trump İran petrolüne tanınan yaptırım muafiyetlerini geri aldı ve deniz ablukasını yeniden kurdu; CENTCOM'un dokuzuncu gecesi yine deniz kabiliyetlerini hedef aldı. Fatura füze sayımında değil; Hürmüz trafiği çökerken manifesto ile varış limanı arasında açılan aralıkta. Ben sloganları değil, yükü izlerim.", "en": "The June Islamabad memorandum is \"over\": Trump revoked the sanctions waivers on Iranian oil and reimposed the naval blockade; CENTCOM's ninth night again targeted maritime capabilities. The invoice is not in the missile count; it is in the widening gap between manifest and destination as Hormuz traffic collapses. I follow the cargo, not the slogans."}, {"tr": "İleriye bakınca: geçen haftaki çağrımı gözden geçireyim. Primlerin tırmanmayı sürdüreceğini ve Körfez üreticilerinin askeri sonuçtan bağımsız olarak Fujairah boru hattına ve Suudi Doğu-Batı hattına yöneleceğini söylemiştim. \"Deniz kabiliyetlerine\" dokuz gecelik saldırı bu sapağı yalnızca derinleştirir; sapak, onu doğuran savaştan uzun yaşar. Kalıcı kaybedenin Körfez hacmi değil, İran varilleri olmasını beklerim.", "en": "Looking ahead: let me revisit last week's call. I said premiums would keep climbing and Gulf producers would reroute to the Fujairah pipeline and the Saudi East-West line regardless of the military outcome. Nine nights of strikes on \"maritime capabilities\" only deepens that detour; the detour outlasts the war that caused it. I expect the durable loser to be Iranian barrels, not Gulf throughput."}]}, {"h": {"tr": "Beyrut'un Faturası ve Teklifi", "en": "Beirut's Bill and Its Offer"}, "ps": [{"tr": "Avn Washington'a yalnızca güvenlik için gitmedi; Lübnan'ın enerji, iletişim ve ulaşımına ABD yatırımı ve orduya destek istedi — silahsızlanmayı bir imar paketine bağladı. Bir zirvede dile getirilen her ilkenin altında fiyatı biçilebilir bir çıkar vardır; Beyrut, Hizbullah'ın silahsızlandırılmasını bir altyapı faturası olarak fiyatladı.", "en": "Aoun did not go to Washington only for security; he asked for US investment in Lebanon's energy, communications and transport, and support for the army — tying disarmament to a reconstruction package. Behind every principle stated at a summit there is an interest that can be priced; Beirut has priced Hezbollah's disarmament as an infrastructure bill."}, {"tr": "İleriye bakınca: Hizbullah'ın silahsızlandırma takviminin, ortak bildirinin değil, paranın ve İsrail'in çekilmesinin hızında ilerlemesini beklerim; imar finansmanı ve pilot bölgelerden geri çekilme gelmezse tasma kopar. Salı günkü el sıkışmasına değil, paraya bakın.", "en": "Looking ahead: expect the Hezbollah-disarmament timetable to move at the speed of the money and the Israeli withdrawal, not the communiqué; if the reconstruction financing and the pull-back from the pilot zones do not arrive, the leash snaps. Watch the money, not Tuesday's handshake."}]}], "date": "2026-07-20"}, {"writer": "geo-01", "title": {"tr": "Kuralı Kim Yazıyor?", "en": "Who Writes the Rule?"}, "excerpt": {"tr": "Kiev'de komutanı kim atar, Tel Aviv'de ön seçimi kim iptal eder — iki başkentte de asıl soru olayın kendisi değil, kuralı kimin elinde tuttuğudur.", "en": "Who appoints the commander in Kyiv, who cancels the primary in Tel Aviv — in both capitals the real question is not the event but who holds the rule."}, "sections": [{"h": {"tr": "Sivil Otorite, Sokak ve Komuta", "en": "Civilian Authority, the Street, and Command"}, "ps": [{"tr": "Zelenski'nin sokak baskısı altında Sırskıy'i değiştirmeyi tartması, stratejik okunduğunda, savaş zamanında sivil denetimin kuralını kimin belirlediğinin sınavıdır: seçilmiş cumhurbaşkanı mı, protesto eden meydan mı, yoksa komutanın kendisi mi? Genellikle kapıya denetçi koyan standardı belirler; burada üç aktör aynı kapıya uzanıyor.", "en": "Zelensky weighing Syrskyi's replacement under street pressure is, read strategically, a test of who sets the rule of civilian control in wartime: the elected president, the protesting square, or the command itself. Whoever puts an inspector at the gate usually sets the standard; here three actors reach for the same gate."}, {"tr": "İleriye bakınca: kararın, bir savaş alanı mantığından çok protestoları yatıştıracak şekilde zamanlanmasını beklerim; ortaya çıkacak standart — bir komutanın savaşın ortasında kamuoyu baskısıyla görevden alınıp alınamayacağı — bu atamadan uzun yaşayacak.", "en": "Looking ahead: expect the decision to be timed to defuse the protests rather than to a battlefield logic; the standard that emerges — whether a commander can be removed by public pressure mid-war — will outlast this appointment."}]}, {"h": {"tr": "'Savaş Hali' Bir Sürece Dönüşünce", "en": "When 'a Wartime Situation' Becomes a Procedure"}, "ps": [{"tr": "Likud'un Netanyahu'ya sekiz garantili sıra ayırması ve bir \"savaş hali\" engel olursa ön seçimleri iptal etme yetkisi vermesi bir protokol hamlesidir: listeyi belirleyen kural, 27 Ekim seçimlerine 100 gün kala, ondan fayda görenlerce yeniden yazılıyor. Gerekçeyi değil, zamanlamayı okuyun.", "en": "Likud reserving eight slots for Netanyahu and authorizing cancellation of primaries if a \"wartime situation\" prevents them is a protocol move: the rule that picks the list is being rewritten by those who benefit from it, 100 days out from the October 27 vote. Read the timing, not the justification."}, {"tr": "İleriye bakınca: üç başkent, üç ayrı dil — Kiev kimin komuta ettiğini, Tel Aviv kimin liste yaptığını tartışıyor ve her biri barış zamanı kural kitabının ne kadarını savaşın askıya aldığına sessizce karar veriyor. Sonbahardan önce bölgede olağan siyasi sürece daha çok \"savaş hali\" istisnası eklenmesini beklerim; istisna, standart hâline geliyor.", "en": "Looking ahead: three capitals, three dialects — Kyiv debates who commands, Tel Aviv who lists, and each is quietly deciding how much of the peacetime rulebook a war suspends. Expect more \"wartime\" exceptions to ordinary political procedure across the region before autumn — the exception is becoming the standard."}]}], "date": "2026-07-20"}, {"writer": "geo-02", "title": {"tr": "Mimari İkinci Kez Sınandı", "en": "The Architecture Tested a Second Time"}, "excerpt": {"tr": "Bir kefede Akabe üzerinde çalışan hava savunması, öbür kefede Kiev'de sarsılan sivil-asker dengesi: kurumlar bu hafta iki kez tartıldı.", "en": "On one pan, air defense working over Aqaba; on the other, the civil-military balance shaking in Kyiv: institutions were weighed twice this week."}, "sections": [{"h": {"tr": "Temiz Bir Önleme, İkinci Kez", "en": "A Clean Interception, a Second Time"}, "ps": [{"tr": "Akabe'ye dört İran füzesi, üçü ABD sistemlerince düşürüldü, dördüncüsü boş alana, Eylat üzerinde İsrail parçaları, can kaybı yok (Ürdün ordusu, Petra aracılığıyla). Geçen hafta Ürdün'ün sakin önlemesini Körfez savunma mimarisinin ayakta kaldığının kanıtı saymıştım; ikinci temiz önleme, mimarinin yine tuttuğunu söylüyor. Kusurlu bir masa, hiç masa olmamasından iyidir.", "en": "Four Iranian missiles toward Aqaba, three downed by US systems, a fourth into open ground, Israeli fragments over Eilat, no casualties (Jordan's military, via Petra). Last week I read Jordan's calm interception as proof the Gulf defense architecture was holding; a second clean interception says it held again. A flawed table beats no table."}, {"tr": "İleriye bakınca: ama denge bir sonuç değil, her seferinde yeniden kurulan bir çabadır; her başarılı önleme, işaret ettiğim siyasi soruyu da büyütüyor — Amman ve komşuları savaşı ağırlamaktan Washington'ı bir çözüme itmeye ne zaman geçecek? Füzeler üye topraklarına düştükçe bu geçişin hızlanmasını beklerim.", "en": "Looking ahead: but balance is not an outcome, it is an effort rebuilt each time; each successful intercept also enlarges the political question I flagged — when do Amman and its neighbors move from hosting the war to pushing Washington toward a settlement? Expect that shift to accelerate the longer missiles keep landing on member soil."}]}, {"h": {"tr": "Sandalyeler mi Değişti, Masa mı Devrildi?", "en": "Did the Chairs Change, or the Table Overturn?"}, "ps": [{"tr": "Görevden alınan bir savunma bakanı, itiraz edilen bir başkomutan, bir güvenlik konseyi revizyonu, üç gün protesto — soru, Ukrayna'nın sivil-asker kurumlarının şoku emdiği mi yoksa çöktüğü müdür. Şimdilik masa devrilmedi, sandalyeler yeniden dizildi: revizyon kabine üzerinden ilerledi, protestolar sivil kaldı.", "en": "A dismissed defense minister, a contested commander-in-chief, a security-council reshuffle, three days of protest — the question is whether Ukraine's civil-military institutions absorbed the shock or buckled. So far the table did not overturn; the chairs were rearranged: the reshuffle went through cabinet, the protests stayed civic."}, {"tr": "İleriye bakınca: çıkışın, cumhurbaşkanının sokağa taviz vermeden duyarlılık iddia etmesine izin veren, düzenli ve müzakere edilmiş bir komuta değişikliği olmasını beklerim; kurumsal sınav ancak bir sonraki komutan pankartla değil, usulle seçilirse geçilmiş sayılır.", "en": "Looking ahead: expect the off-ramp to be an orderly, negotiated command change that lets the president claim responsiveness without conceding to the street; the institutional test is passed only if the next commander is chosen by process, not by placard."}]}], "date": "2026-07-20"}, {"writer": "geo-05", "title": {"tr": "Kendi Planıyla Gelen Başkent", "en": "The Capital That Comes With Its Own Plan"}, "excerpt": {"tr": "Beyrut Washington'a boyun eğmeye değil, kendi yazdığı planı sunmaya gidiyor; Amman ise füzeyi kendi semasında karşılıyor. Küçük başkentler artık sahne değil, masadalar.", "en": "Beirut goes to Washington not to submit but to table a plan it wrote itself; Amman meets the missile in its own sky. The small capitals are no longer the stage — they are at the table."}, "sections": [{"h": {"tr": "Yazılı Teklifle Gelmek", "en": "Arriving With a Written Offer"}, "ps": [{"tr": "Avn, Trump'a kendi sıralamasını — Hizbullah'ın silahsızlandırılmasını İsrail'in çekilmesine bağlayan yazılı bir teklifi — götürüyor; bu, 2009'dan bu yana bir Lübnan cumhurbaşkanının Washington'a ilk ziyareti. Taraf tutmamak da bir stratejidir: bu, şartları alan değil yazan, egemenliğini (ordu desteği, enerji ve ulaşım yatırımı) pazarlığa fiyat olarak koyan küçük bir devlettir.", "en": "Aoun is bringing Trump a written proposal — his own sequencing of Hezbollah's disarmament against an Israeli withdrawal — the first visit to Washington by a Lebanese president since 2009. Refusing to be a pawn is itself a strategy: this is a small state authoring the terms rather than receiving them, pricing its sovereignty (army support, energy and transport investment) into the deal."}, {"tr": "İleriye bakınca: geçen hafta bu savaşı taşıyan devletlerin onu emmekten çözümünde masaya oturmaya geçeceğini söylemiştim; Beyrut'un elinde bir metinle gelmesi tam da bu hamle. Diğer bölge başkentlerinin de yöntemi kopyalamasını beklerim — yalnızca şikâyetle değil, kendi metninizle görünün.", "en": "Looking ahead: last week I predicted the states bearing this war would move from absorbing it to demanding a seat at its settlement; Beirut arriving with a drafted plan is exactly that move. Expect other regional capitals to copy the method — show up with your own text, not just your grievances."}]}, {"h": {"tr": "Amman'ın Sessiz Yeterliliği", "en": "Amman's Quiet Competence"}, "ps": [{"tr": "Yine Akabe: bir Ürdün kentine füzeler, önlendi, mühendislik soğukkanlılığıyla açıklamalar, can kaybı yok. Yerden bakıldığında bu edilgenlik değil, iradedir — kabiliyeti tam da başkasının savaşında bir manşet kaybı olmamak için inşa etmiş bir orta güç.", "en": "Aqaba again: missiles toward a Jordanian city, intercepted, statements of engineering calm, no casualties. From the ground this reads not as passivity but as agency — a middle power that built the capability precisely so it would not become a headline casualty in someone else's war."}, {"tr": "İleriye bakınca: bu devletlerin önlenmiş füzelerle ödediği fatura siyasi sermayeye dönüşüyor; Amman ve Beyrut'un bu bedeli, Washington ile Tahran'ın kendi başlarının üzerinden pazarlık yapmaması yönünde daha yüksek bir talebe çevirmesini beklerim. Dünya sadece iki başkentten yönetilmiyor.", "en": "Looking ahead: the bill these states pay in intercepted missiles is turning into political capital; expect Amman and Beirut to convert that cost into a louder demand that Washington and Tehran not negotiate over their heads. The world is not run from two capitals only."}]}], "date": "2026-07-20"}, {"writer": "geo-06", "title": {"tr": "Yirmi Bir Yıl Sonra, Aynı Sınır", "en": "Twenty-One Years On, the Same Border"}, "excerpt": {"tr": "Bakanlar 2005'te boşaltılan yerleşimlerin sınırına yürürken, Likud ön seçimi 'savaş hali'ne erteliyor: harita da takvim de eski bir tartışmanın dipnotu.", "en": "As ministers march to the border of settlements evacuated in 2005, Likud postpones its primary to a 'wartime situation': both the map and the calendar are footnotes to an old argument."}, "sections": [{"h": {"tr": "Mürekkebi Eskiyen Çizgi", "en": "The Line Whose Ink Has Aged"}, "ps": [{"tr": "Yürüyüş, 2005 tahliyesinde boşaltılan üç yerleşimin — Elei Sinai, Dugit ve Nisanit'in — \"yirmi bir yıl sonra eve dönüş\" pankartıyla yeniden kurulmasını istedi; ordu çevreyi kapalı askeri bölge ilan etti, bakanlar (Smotrich, Ben-Gvir) çitteydi. Sınırlar mürekkeple donmuş kavgalardır; 2005 çizgisi, müre
