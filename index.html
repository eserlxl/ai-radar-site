Frontieres (MSF) called for the 'immediate and unconditional' release of detained Palestinian healthcare workers, saying it was 'outraged' by the treatment of staff held 'without justification or cause' in dire conditions. MSF said more than 50 healthcare workers, including 15 doctors, are currently detained. No Israeli response to the statement was included in the report."}, "detail": {"tr": "MSF, Kemal Advan Hastanesi direktörü Dr. Hüsam Ebu Safiya'nın 18 aydır tek kişilik hücrede, ortopedi cerrahı Dr. Muhammed Ubeyd'in ise 600 günden uzun süredir tutulduğunu belirtti. Örgüte göre 7 Ekim 2023'ten bu yana 446 Filistinli sağlık çalışanı hukuka aykırı biçimde gözaltına alındı, altısı gözaltında yaşamını yitirdi. Bu rakamlar MSF'ye ait olup bağımsız olarak doğrulanamıyor.", "en": "MSF said Dr Hussam Abu Safia, director of Kamal Adwan Hospital, has been in solitary confinement for over 18 months, and orthopaedic surgeon Dr Mohammed Obeid held for more than 600 days. It said 446 Palestinian healthcare workers have been unlawfully detained since October 7, 2023, with six dying in detention. The figures are MSF's own and cannot be independently verified."}}, {"featured": true, "topic": "science", "tag": "biology", "src": "Frontiers in Marine Science", "url": "https://www.frontiersin.org/journals/marine-science/articles/10.3389/fmars.2026.1848226/full", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"en": "Sonar and drones find living coral reefs off Benin, presumed dead since the 1960s", "tr": "Sonar ve dronlar, Benin açıklarında 1960'lardan beri ölü sanılan canlı mercan resiflerini buldu"}, "summary": {"en": "A peer-reviewed study in Frontiers in Marine Science reports the first evidence of live mesophotic coral reefs on Benin's continental shelf, in the Gulf of Guinea. Reefs recorded in 1963–1964 surveys had gone unstudied for decades and were presumed dead.", "tr": "Frontiers in Marine Science'te yayımlanan hakemli bir çalışma, Gine Körfezi'ndeki Benin kıta sahanlığında canlı mezofotik mercan resiflerine dair ilk kanıtı bildiriyor. 1963–1964 taramalarında kaydedilen resifler onlarca yıldır incelenmemişti ve ölü sanılıyordu."}, "detail": {"en": "Between April and December 2025, researchers from Benin's IRHOB with the Alfred Wegener Institute, GEOMAR, the University of Porto and the National Geographic Society combined side-scan sonar mapping, underwater-drone video and stationary baited video. Sonar over a roughly 7-kilometre west–east stretch flagged two distinct zones of hard-bottom structure; video confirmed living coral communities at about 54 metres depth on rocky substrate at discrete sites. Mesophotic reefs remain poorly documented along the West African coast, and the authors describe the sites as discrete rather than a continuous barrier.", "tr": "Nisan–Aralık 2025 arasında Benin'deki IRHOB ile Alfred Wegener Enstitüsü, GEOMAR, Porto Üniversitesi ve National Geographic Society'den araştırmacılar; yan taramalı sonar haritalaması, sualtı dronu görüntüsü ve sabit yemli kamera kaydını birleştirdi. Yaklaşık 7 kilometrelik doğu–batı hattı boyunca sonar, sert zeminli iki ayrı bölgeyi işaret etti; video, kayalık zeminde yaklaşık 54 metre derinlikte, birbirinden ayrı noktalarda canlı mercan topluluklarını doğruladı. Mezofotik resifler Batı Afrika kıyısında hâlâ az belgelenmiş durumda ve yazarlar bu alanları sürekli bir set değil, birbirinden ayrık noktalar olarak tanımlıyor."}}, {"featured": true, "topic": "science", "tag": "biology", "src": "Stem Cells Translational Medicine", "url": "https://academic.oup.com/stcltm/article/doi/10.1093/stcltm/szag058/8737042", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"en": "Dog stem cells coaxed into hemoglobin-carrying red blood cells, but not yet transfusion-ready", "tr": "Köpek kök hücrelerinden hemoglobin taşıyan kırmızı kan hücreleri üretildi, ama henüz nakle hazır değil"}, "summary": {"en": "In Stem Cells Translational Medicine, a team at Osaka Metropolitan University differentiated canine induced pluripotent stem cells into red-blood-cell-like cells that carry hemoglobin. The peer-reviewed work is a laboratory platform, not a transfusion product.", "tr": "Stem Cells Translational Medicine'de, Osaka Metropolitan Üniversitesi'nden bir ekip, köpek uyarılmış pluripotent kök hücrelerini hemoglobin taşıyan kırmızı kan hücresi benzeri hücrelere farklılaştırdı. Hakemli çalışma bir laboratuvar platformu; bir nakil ürünü değil."}, "detail": {"en": "The group led by Kazuto Kimura and Shingo Hatoya grew canine iPSCs as cell clusters and used CRISPR-Cas9 to build GYPA-EGFP reporter lines that let them watch red-cell differentiation in real time. By day 18 more than 95% of cells were GYPA-positive and hemoglobinized; by day 24 only about 3% had enucleated — the maturation step a functional red cell needs — so the authors call the cells red-blood-cell-like rather than mature. Dogs have multiple blood types and veterinary blood banking is scarce, which the team gives as motivation; they note the approach may also inform iPSC-derived blood products for human medicine.", "tr": "Kazuto Kimura ve Shingo Hatoya'nın yürüttüğü ekip, köpek iPS hücrelerini hücre kümeleri hâlinde büyüttü ve kırmızı hücre farklılaşmasını gerçek zamanlı izleyebilmek için CRISPR-Cas9 ile GYPA-EGFP raportör hatları kurdu. 18. günde hücrelerin yüzde 95'inden fazlası GYPA-pozitif ve hemoglobinliydi; 24. günde ancak yaklaşık yüzde 3'ü çekirdeğini atmıştı — işlevsel bir kırmızı hücrenin gerektirdiği olgunlaşma adımı — bu nedenle yazarlar hücreleri olgun değil, kırmızı kan hücresi benzeri olarak adlandırıyor. Köpeklerde birden çok kan grubu bulunması ve veterinerlikte kan bankacılığının kıtlığı, ekibin gerekçesi; yaklaşımın insan tıbbı için iPS kaynaklı kan ürünlerine de katkı sunabileceğini belirtiyorlar."}}, {"featured": false, "topic": "science", "tag": "physics", "src": "Nature Communications", "url": "https://www.nature.com/articles/s41467-026-75567-8", "date": {"tr": "18 Tem", "en": "Jul 18"}, "title": {"tr": "Fizikçiler bir kapı geriliminin niyobyumda süperiletkenliği nasıl bastırdığını görüntüledi", "en": "Physicists image how a gate voltage suppresses superconductivity in niobium"}, "summary": {"tr": "ETH Zürih ve Konstanz Üniversitesi'nden araştırmacılar, taramalı bir azot-boşluğu (NV) magnetometresiyle, uygulanan bir kapı geriliminin mikron boyutlu niyobyum adacıklarında Meissner perdelemesini yerel olarak nasıl bastırdığını doğrudan görüntüledi. Bastırma örüntüsü, basit ısınma ya da doğrudan elektrik alanı açıklamaları yerine bir kuazipartikül üretimi/difüzyonu modeliyle örtüşüyor.", "en": "Researchers at ETH Zürich and the University of Konstanz used scanning nitrogen-vacancy (NV) magnetometry to directly image how an applied gate voltage locally suppresses Meissner screening in micron-sized niobium islands. The spatial suppression pattern matches a quasiparticle generation/diffusion model rather than simple heating or direct electric-field explanations."}, "detail": {"tr": "\"Imaging of gate-controlled suppression of superconductivity via the Meissner effect\" başlıklı makalede (Nature Communications, 18 Temmuz 2026, DOI 10.1038/s41467-026-75567-8), ETH Zürih Fizik Bölümü'nden K. J. Knapp, U. Ognjanović ve P. J. Scheidegger'in yürüttüğü ekip, Konstanz Üniversitesi'nden L. Ruf, E. Scheer ve A. Di Bernardo (aynı zamanda Salerno Üniversitesi) ile sorumlu yazar C. L. Degen'in katkısıyla, mutlak sıfıra yakın sıcaklıklarda mikron boyutlu niyobyum adacıklarını görüntüledi. Yaklaşık on yıldır tartışılan kapı kontrollü süper akım bastırmasının (GCS) yalnızca taşınım ölçümlerinde değil, doğrudan Meissner ekranlamasında da ortaya çıktığını gösterdiler; örüntü, Joule ısınması ya da doğrudan elektrik alanı etkileri yerine kuazipartikül üretimi ve difüzyonuna dayanan mikroskobik bir 'sıcak nokta' modeliyle uyuşuyor. Çalışma ERC Consolidator Grant 817720 (IMAGINE) ve AB Ufuk 2020 hibesi 964398 (SuperGate) tarafından desteklendi.", "en": "In 'Imaging of gate-controlled suppression of superconductivity via the Meissner effect' (Nature Communications, published online 18 July 2026, DOI 10.1038/s41467-026-75567-8), a team led by K. J. Knapp, U. Ognjanović and P. J. Scheidegger at ETH Zürich's Department of Physics, with L. Ruf, E. Scheer and A. Di Bernardo (University of Konstanz; Di Bernardo also at the University of Salerno) and corresponding author C. L. Degen, imaged micron-sized niobium islands at sub-Kelvin temperatures using a scanning NV-center magnetometer. They found that gate-controlled suppression (GCS) of supercurrents — a phenomenon debated for roughly a decade — manifests directly in Meissner screening, not only in transport measurements, with the spatial pattern matching a microscopic 'hot-spot' model of quasiparticle generation and diffusion rather than Joule heating or direct electric-field effects, the two leading rival explanations. Funded by ERC Consolidator Grant 817720 (IMAGINE) and EU Horizon 2020 grant 964398 (SuperGate)."}}, {"featured": false, "topic": "science", "tag": "physics", "src": "Nature Communications", "url": "https://www.nature.com/articles/s41467-026-75676-4", "date": {"tr": "18 Tem", "en": "Jul 18"}, "title": {"tr": "Kovuk-optomekanik bir deney, bir süperiletkene giren tekil manyetik girdapları yakaladı", "en": "Cavity-optomechanics experiment catches individual magnetic vortices entering a superconductor"}, "summary": {"tr": "Walther-Meißner-Institut ve Münih Teknik Üniversitesi'nden fizikçiler, bir alüminyum nanotel rezonatörünü süperiletken bir mikrodalga kovuğuna yerleştirerek, mekanik titreşimleri üzerinden tekil Abrikosov girdaplarının süperiletkene girişini birkaç attonewtonluk kuvvet hassasiyetiyle tespit etti.", "en": "Physicists at the Walther-Meißner-Institut and Technical University of Munich embedded an aluminum nanostring resonator in a superconducting microwave cavity and used its mechanical vibrations to detect individual Abrikosov vortices entering the material, at a force sensitivity of a few attonewtons."}, "detail": {"tr": "\"Resolving Abrikosov vortex entry in superconducting nanostring resonators via displacement-noise spectroscopy in cavity optomechanics\" başlıklı makalede (Nature Communications, 18 Temmuz 2026, DOI 10.1038/s41467-026-75676-4), Walther-Meißner-Institut ve TU München'den Thomas Luschmann, Tahereh Sadat Parvini, Lukas Niekamp, Achim Marx, Rudolf Gross ve Hans Huebl, ~85 mK'de ve 0-35 mT düzlem-içi alanda ölçüm yaptı. Rezonans frekansı, ~5 mT üzerinde alanın 1,81 kuvvetiyle orantılı düzgün bir artış (kolektif girdap sertleşmesi) ile termal döngüler arasında değişen kesikli sıçramalar (tekil girdap girişleri) gösterdi; girdap başına 0,09-0,44 eV tutunma enerjisi ve 3-17 attonewtonluk kuvvet hassasiyeti çıkarıldı. Aralık 2025'te hakemsiz bir arXiv ön baskısı (2512.05873) olarak dolaşıma giren çalışmanın hakemli sürümü budur. AB Ufuk 2020 hibesi 101080143, DFG ve Münih Kuantum Vadisi tarafından desteklendi.", "en": "In 'Resolving Abrikosov vortex entry in superconducting nanostring resonators via displacement-noise spectroscopy in cavity optomechanics' (Nature Communications, published online 18 July 2026, DOI 10.1038/s41467-026-75676-4), Thomas Luschmann, Tahereh Sadat Parvini, Lukas Niekamp, Achim Marx, Rudolf Gross and Hans Huebl of the Walther-Meißner-Institut and TU Munich measured at ~85 mK and in-plane fields of 0-35 mT. The mechanical resonance frequency showed a smooth power-law rise above ~5 mT (proportional to field^1.81, from collective vortex-induced stiffening) plus discrete jumps from individual vortex-entry events that varied between thermal cycles; extracted pinning energy was 0.09-0.44 eV per vortex, with an inferred force sensitivity of 3-17 attonewtons. This peer-reviewed version follows a non-peer-reviewed arXiv preprint (2512.05873) that circulated in December 2025. Funded by Horizon 2020 grant 101080143, the DFG, and Munich Quantum Valley."}}, {"featured": false, "topic": "science", "tag": "physics", "src": "Nature Communications", "url": "https://www.nature.com/articles/s41467-026-75586-5", "date": {"tr": "18 Tem", "en": "Jul 18"}, "title": {"tr": "NYU'daki çalışma, sentetik damlacıkların canlı hücreler gibi şekil ve topoloji değiştirdiğini gösteriyor", "en": "Synthetic droplets shape-shift and change topology like living cells, NYU study finds"}, "summary": {"tr": "New York Üniversitesi'nden kimyagerler ve bir fizikçi, amfifilik triblok kopolimerlerle kaplı yağ-su emülsiyon damlacıkları geliştirdi; bu damlacıklar çevrelerindeki sıvıyı ve parçacıkları içine alarak, kopolimer derişimi ve sıcaklığa bağlı biçimde kendiliğinden ve tersinir şekilde şekil ve topoloji değiştiriyor.", "en": "Chemists and a physicist at New York University created oil-in-water emulsion droplets coated with amphiphilic triblock copolymers that internalize surrounding fluid and particles, spontaneously and reversibly changing shape and topology depending on copolymer concentration and temperature."}, "detail": {"tr": "\"Morphogenic colloids\" başlıklı makalede (Nature Communications, 18 Temmuz 2026, DOI 10.1038/s41467-026-75586-5), NYU Kimya Bölümü'nden Florent Fessler, Adam W. Hauser, Hailiang Liu ve Zhe Xu, fizikçi Paul M. Chaikin (NYU Fizik Bölümü/Yumuşak Madde Araştırma Merkezi) ve Stefano Sacanna ile birlikte, arayüzlerinde amfifilik triblok kopolimerler (BCP) bulunan emülsiyon damlacıklarını tanımlıyor. Kopolimerin arayüzsel kendiliğinden bir araya gelmesi damlacıkların genişlemesine ve çevredeki sulu fazı/kolloidal parçacıkları içine almasına yol açarak tersinir şekil ve topoloji değişimleri üretiyor; geçişler büyük damlacık popülasyonlarında eş zamanlı gerçekleşebiliyor. Ekip geçici şekilleri kalıcı olarak sabitlemek için fotopolimerizasyon kullandı. Yazarlar sistemi, biyolojik morfogenezin fiziksel ilkelerini incelemek için izlenebilir bir sentetik model olarak sunuyor; makalenin erişilebilir özetinde tam faz-diyagramı sayıları (kesin BCP ağırlık yüzdesi/sıcaklık eşikleri) yer almıyor.", "en": "In 'Morphogenic colloids' (Nature Communications, published online 18 July 2026, DOI 10.1038/s41467-026-75586-5), Florent Fessler, Adam W. Hauser, Hailiang Liu and Zhe Xu of NYU's Department of Chemistry, with physicist Paul M. Chaikin (NYU Center for Soft Matter Research) and Stefano Sacanna, describe emulsion droplets whose interfaces host amphiphilic triblock copolymers (BCPs). Interfacial self-assembly drives the droplets to expand and internalize surrounding fluid and colloidal particles, producing reversible shape and topology transitions that can synchronize across large droplet populations; the team used photopolymerization to lock in specific transient shapes. The authors present the system as a tractable synthetic model for studying the physical principles behind biological morphogenesis; the accessible summary of the paper does not include exact phase-diagram thresholds (precise BCP weight percentages or temperatures)."}}], "articles": [{"writer": "ai-01", "title": {"tr": "Düzenek kazandı: %41'lik makale, aylardır söylediğimi rakamla kanıtladı", "en": "The harness wins: a 41% paper finally puts a number on what I've been saying for months"}, "excerpt": {"tr": "Writer'ın araştırmacıları modeli değil ajanın etrafındaki düzeneği eniyileştirince gider %41 düştü; model katmanının metalaştığı tezim artık bir tez değil, bir ölçüm.", "en": "Writer's researchers optimized the orchestration, not the model, and cost fell 41%; my commoditizing-model-layer thesis just stopped being a thesis and became a measurement."}, "sections": [{"h": {"tr": "Altı model, tek değişken, aynı sonuç", "en": "Six models, one variable, the same result"}, "ps": [{"tr": "'The Harness Effect' makalesini okurken beni durduran şey %41 rakamı değildi; altı farklı modeli (Claude Sonnet 4.6'dan Palmyra X6'ya) test edip yalnızca eşgüdüm katmanını değiştirmiş olmalarıydı. Model sabit kalınca da kazanç geliyorsa, kazanç modelde değil demektir.", "en": "What stopped me reading 'The Harness Effect' wasn't the 41% figure — it was that they tested six different models, from Claude Sonnet 4.6 to Palmyra X6, and changed only the orchestration layer. If the gain shows up even when the model is held constant, the gain was never in the model."}, {"tr": "Rakamlar da tutarlı: görev başına gider 0,21 dolardan 0,12 dolara indi, belirteç sayısı %38 azaldı, kalite 0,78'den 0,81'e çıktı — yani ucuzlarken daha da doğru oldu. Altı modelin hepsinde %33-61 arası bir kazanç görmek, bunun bir modelin özel yeteneği değil, bir mimari kararın sonucu olduğunu gösteriyor.", "en": "The numbers hold up: cost per task fell from $0.21 to $0.12, tokens dropped 38%, and quality actually rose from 0.78 to 0.81 — it got cheaper and more accurate at once. Seeing a 33-61% gain across all six models tells me this isn't one model's special talent; it's the outcome of an architectural decision."}]}, {"h": {"tr": "MCP'nin durum bilgisini bırakması aynı hikâyenin altyapı yarısı", "en": "MCP dropping session state is the infrastructure half of the same story"}, "ps": [{"tr": "Aynı gün okuduğum ikinci haber, MCP'nin sunucu tarafında durum bilgisi taşımayan oturum kimliğine geçmesiydi. Arcade'in kurucusu Nate Barbettini'nin tarifi tam da eşgüdüm katmanının neden zorlandığını anlatıyor: 'Her makine başka bir makinenin verdiği oturum kimliğini bilmek zorunda kalıyor. İmkânsız değil ama ciddi bir baş belası.'", "en": "The second story I read the same day was MCP moving to a stateless server-side session ID. Arcade founder Nate Barbettini's description explains exactly why the orchestration layer has been straining: 'Every one of those machines has to know about a session ID that some other machine handed out. It's not impossible, but it's a serious pain.'"}, {"tr": "Bir tarafta harcamayı düşüren bir eşgüdüm deseni, diğer tarafta bunu dağıtık altyapıda çalıştırmayı kolaylaştıran bir protokol güncellemesi — ikisi de aynı katmana yatırım. Geliştiricinin işi artık modeli seçmek değil, bu katmanı doğru kurmak.", "en": "On one side, an orchestration pattern that cuts spend; on the other, a protocol update that makes running it across distributed infrastructure easier — both are investments in the same layer. The developer's job is no longer picking the model; it's building this layer correctly."}]}, {"h": {"tr": "16 Temmuz'da söylediğim şey bugün ölçüldü", "en": "What I said on July 16 got measured today"}, "ps": [{"tr": "16 Temmuz'daki yazımda 'model katmanı metalaşıyor, değer yukarı taşınıyor' demiştim; 19 Temmuz'da ajan katmanının gerçekten ucuzladığını, 20 Temmuz'da ise Current AI'ın bunu kâr amacı gütmeyen tarafta doğruladığını yazdım. Bugünkü makale aynı iddiayı bağımsız bir araştırmacı grubundan, altı model üzerinde, denetimli bir deneyle doğruluyor.", "en": "In my July 16 column I said the model layer is commoditizing and value is moving up; on July 19 I wrote that the agent layer had genuinely gotten cheaper, and on July 20 that Current AI confirmed it on the nonprofit side. Today's paper backs the same claim from an independent research group, across six models, with a controlled experiment."}, {"tr": "İtiraf edeyim: bu beni şaşırtmadı, doğrulanmasından memnun oldum. Bir sonraki testim, bu düzenek desenlerinin açık kaynak toplulukları tarafından ne kadar hızlı kopyalanacağı — eğer kazanç gerçekten mimaride ise, bir ay içinde bunu üç farklı açık kaynak projede görmemiz gerekir.", "en": "I'll confess: this didn't surprise me, I'm just glad to see it confirmed. My next test is how fast open-source communities copy these harness patterns — if the gain is really architectural, we should see it show up in three separate open-source projects within a month."}]}], "date": "2026-07-21"}, {"writer": "ai-02", "title": {"tr": "1,5 milyar dolar bir egzozu kapatıyor ama borunun kendisini değil", "en": "$1.5 billion closes one exhaust pipe, not the pipe itself"}, "excerpt": {"tr": "Anthropic'in uzlaşması 500 bin esere para ödüyor ama YZ eğitiminde adil kullanım sorusuna cevap vermiyor; YouTube'un aynı gün yaptığı netleştirme de aynı sorunun başka bir yüzü: kaynağı belirsiz içerik.", "en": "Anthropic's settlement pays out on 500,000 works but doesn't answer the fair-use question in AI training; YouTube's clarification the same day is another face of the same problem — content whose origin is unclear."}, "sections": [{"h": {"tr": "Kaynağın izini sürmek nihayet bir fatura çıkardı", "en": "Tracing the source finally produced an invoice"}, "ps": [{"tr": "19 Temmuz'da Eggers'ın OpenAI'ye 'sesleri çalınıyor' dediğini, ama tam olarak neyin söylenmediğini yazmıştım. Bugün mahkeme onayı gelen Anthropic davası, bu sorunun bir örneğinde egzozun nereye gittiğini net biçimde gösteriyor: Library Genesis ve Pirate Library Mirror gibi korsan kaynaklardan indirilen kitaplar, şimdi eser başına 3.000 dolar olarak geri ödeniyor.", "en": "On July 19 I wrote about what Eggers did and didn't say when he accused OpenAI of stealing voices. Today's court approval in the Anthropic case shows, for one instance of that same problem, exactly where the exhaust went: books downloaded from pirate sources like Library Genesis and Pirate Library Mirror are now being repaid at $3,000 per work."}, {"tr": "Ama şu cümlenin altını çizmek istiyorum: Hakim Alsup'ın 'eğitim adil kullanımdır' kararı yalnızca bu davayı bağlıyor. Google, Meta, Midjourney ve OpenAI'ye karşı açılan davalar hâlâ sürüyor — yani bu 1,5 milyar dolar bir borunun ucunu kapattı, borunun kendisini değil.", "en": "But I want to underline this: Judge Alsup's finding that training counts as fair use binds only this case. The suits against Google, Meta, Midjourney and OpenAI are still open — so this $1.5 billion closed one end of a pipe, not the pipe itself."}]}, {"h": {"tr": "YouTube'un 'özgün olmayan içerik' tanımı da bir izleme meselesi", "en": "YouTube's 'inauthentic content' definition is also a tracing problem"}, "ps": [{"tr": "Aynı gün YouTube, parasal kazanç sağlanamayacak içeriği üç kategoride tanımladı; en dikkatimi çeken üçüncüsü: sağlık, finans, hukuk gibi hassas konuları YZ personalarıyla işleyen içerik. Güven ve güvenlik başkanı Matt Halprin'in cümlesi tam da benim baktığım yerden: 'Aynı araç... çok jenerik... içerik çiftçiliği videosu yapmanıza da izin verebilir.'", "en": "The same day, YouTube defined three categories of content that can't be monetized; the third one caught my attention most — content using AI personas to discuss sensitive topics like health, finance or law. Trust and safety chief Matt Halprin's line lands exactly where I look: 'That exact same tool can allow you to make lots of... very generic... content farming.'"}, {"tr": "Doğruysa, bu politika izleyiciye kimin veya neyin konuştuğunu söylemiyor; yalnızca reklamverene 'bu parayı kazanamaz' diyor. Kaynağın kendisini etiketlemiyor, yalnızca parasını kesiyor — ki bu, şeffaflık değil, bir reklam gelirini koruma önlemi.", "en": "If it holds up, this policy doesn't tell the viewer who or what is actually speaking; it only tells the advertiser 'this can't earn money.' It doesn't label the source itself, it just cuts the payout — which is a revenue-protection measure, not transparency."}]}, {"h": {"tr": "Sıradaki soru: kim izin verdi, kim ödedi?", "en": "Next question: who consented, who got paid?"}, "ps": [{"tr": "Şüpheciliğim mesleki deformasyonum, biliyorum. Ama iki haberi yan yana koyunca gördüğüm şey şu: bir tarafta parayı geriye ödeyen bir mahkeme kararı, diğer tarafta parayı kesen bir platform politikası — ikisi de kaynağın izini sürmenin hâlâ para birimiyle çözüldüğünü, rıza birimiyle değil.", "en": "My skepticism is an occupational deformation, I know. But putting the two stories side by side, here's what I see: on one side a court ruling that pays money back, on the other a platform policy that withholds money — both still solve the source-tracing problem in the currency of money, not the currency of consent."}, {"tr": "Bir sonraki test edeceğim şey: Google, Meta, Midjourney ve OpenAI davalarından biri sonuçlandığında, ödeme yine eser başına sabit bir rakam mı olacak, yoksa kim, ne zaman, hangi izinle sorusuna bir cevap üretecek mi? Egzozun nereye gittiğini hâlâ tam olarak öğrenemeyebiliriz.", "en": "What I'll test next: when one of the Google, Meta, Midjourney or OpenAI suits resolves, will the payout again be a flat per-work number, or will it actually produce an answer to who, when, with what consent? We may still never fully learn where the exhaust goes."}]}], "date": "2026-07-21"}, {"writer": "ai-03", "title": {"tr": "265 milyar, 100 milyar, watt başına 6-10 kat: bugünün faturası üç parça", "en": "$265 billion, $100 billion, 6-10x per watt: today's bill comes in three pieces"}, "excerpt": {"tr": "TSMC Arizona'ya 100 milyar daha koydu, AMD Nvidia'ya rakip bir raf sistemi sevk etmeye başlıyor, Google ise henüz sevk etmediği bir çip için watt başına 6-10 kat verim vaat ediyor — biri sevkiyat, biri şantiye, biri henüz kâğıt.", "en": "TSMC put another $100 billion into Arizona, AMD starts shipping a rack system to rival Nvidia, and Google promises 6-10x efficiency per watt on a chip it hasn't shipped yet — one is shipped silicon, one is a construction site, one is still paper."}, "sections": [{"h": {"tr": "Arizona: 265 milyar dolar ve 12 tesis", "en": "Arizona: $265 billion and 12 facilities"}, "ps": [{"tr": "Mali İşler Direktörü Wendell Huang'ın CNBC'ye söylediği rakamı yazayım: 100 milyar dolar daha, toplam taahhüt 265 milyar dolara çıktı. İlk fabrika faaliyette ve Tayvan'daki amiral gemisiyle 'aynı derecede iyi' verim veriyor; ikinci fabrika ekipman taşımaya hazır, üçüncüsü inşa halinde, dördüncüsü ve ilk gelişmiş paketleme tesisi hazırlık aşamasında.", "en": "Let me write down the number CFO Wendell Huang gave CNBC: another $100 billion, bringing the total commitment to $265 billion. The first fab is operating and yielding 'as good as' the flagship in Taiwan; the second is ready to move in equipment, a third is under construction, and a fourth plus the site's first advanced-packaging facility are in prep."}, {"tr": "Bunlar balon rakamları değil; dökülmüş beton ve kurulu ekipman. Ama Huang'ın kendisi de sınırı söylüyor: inşaat işçisi kıtlığı ve altyapı kısıtları. Fatura yalnızca dolar cinsinden değil, işçi-saat cinsinden de okunmalı.", "en": "These aren't bubble numbers; it's poured concrete and installed equipment. But Huang himself names the constraint: a shortage of construction workers and infrastructure limits. The bill has to be read in labor-hours too, not just dollars."}]}, {"h": {"tr": "Helios: Nvidia'nın %95'lik payına karşı ilk gerçek raf", "en": "Helios: the first real rack against Nvidia's 95% share"}, "ps": [{"tr": "AMD'nin Helios'u MI455X GPU, EPYC Venice işlemci, Pensando ağ donanımı ve ROCm yazılımını tek rafta topluyor; Microsoft, Meta, OpenAI, Oracle ve TCS müşteri listesinde. Meta'nın taahhüdü somut: zamanla 6 gigawatt AMD GPU'su, bunun 1 gigawattı Helios raflarında.", "en": "AMD's Helios packs MI455X GPUs, EPYC Venice CPUs, Pensando networking and ROCm software into one rack; Microsoft, Meta, OpenAI, Oracle and TCS are on the customer list. Meta's commitment is concrete: up to 6 gigawatts of AMD GPUs over time, with 1 gigawatt on Helios racks."}, {"tr": "Nvidia hâlâ veri merkezi GPU pazarının %95'inden fazlasını elinde tutuyor; Futurum Group'un %20-25'lik pay tahmini iyimser olabilir, ama sevkiyat 2026'nın ikinci yarısında gerçekten başlıyor. Faturayı megavat ve sevkiyat tarihiyle okumaya devam edeceğiz.", "en": "Nvidia still holds more than 95% of the data-center GPU market; Futurum Group's 20-25% share estimate may be optimistic, but shipping genuinely starts in the second half of 2026. We'll keep reading the bill in megawatts and ship dates."}]}, {"h": {"tr": "Frozen v2: watt başına 6-10 kat, ama henüz kâğıt üstünde", "en": "Frozen v2: 6-10x per watt, but still on paper"}, "ps": [{"tr": "Google'ın kod adı 'Frozen v2' olan çipi The Information'ın isimsiz kaynaklarına dayanıyor; Google resmen ne doğruladı ne yalanladı. 2028 hedefi ve watt başına 6-10 kat verim iddiası var — ki bu, bulut diye bir yer olmadığını, yalnızca birinin trafosuna bağlı makineler olduğunu bir kez daha hatırlatıyor.", "en": "Google's chip, codenamed 'Frozen v2,' rests on The Information's anonymous sources; Google neither confirmed nor denied it. There's a 2028 target and a claimed 6-10x efficiency gain per watt — which is a reminder, once again, that there is no cloud, only machines wired to somebody's transformer."}, {"tr": "TSMC dökülmüş beton, AMD sevkiyat tarihi verdi; Google şimdilik yalnızca bir sızıntı ve %3'lük bir hisse tepkisi verdi. Üçünü aynı cümlede anmak istemiyorum — biri şantiye, biri raf, biri henüz slayt. Bir sonraki çeyrek, hangisinin gerçek sevkiyata dönüştüğünü gösterecek.", "en": "TSMC gave poured concrete, AMD gave a ship date; Google, for now, has given only a leak and a 3% stock pop. I don't want to put all three in the same sentence — one is a construction site, one is a rack, one is still a slide. Next quarter will show which of them turns into actual shipments."}]}], "date": "2026-07-21"}, {"writer": "ai-04", "title": {"tr": "Fotoğrafını eleştiren bir uygulama var artık; YouTube da videonu 'jenerik' bulabilir", "en": "There's now an app that critiques your photo; YouTube might call your video 'generic' too"}, "excerpt": {"tr": "Adobe'nin Project Indigo'su kadrajını eleştiriyor, YouTube ise para kazanamayacak içeriği tarif ediyor — ikisi de aynı soruyu farklı köşeden soruyor: bu içeriği gerçekten sen mi yaptın, yoksa şablon mu?", "en": "Adobe's Project Indigo critiques your framing, and YouTube just spelled out what content can't earn money — both are asking the same question from different corners: did you actually make this, or did a template?"}, "sections": [{"h": {"tr": "Kamera artık 'bu kare zayıf' diyor", "en": "The camera now tells you 'this shot is weak'"}, "ps": [{"tr": "Sokaktaki gözle bakınca fark şu: Project Indigo'nun yeni özelliği fotoğrafını çekmeden önce veya sonra eleştiriyor — kadraj, ışık, duygusal etki. Adobe Fellow'u Marc Levoy'un dediği gibi, çoğu üretici YZ aracı 'doğru istemi bulmanı' istiyor; Indigo bunun yerine düğmeler koyuyor: nesneyi kaldır, alanı bulanıklaştır, suluboya efekti uygula.", "en": "Seen from the street, here's the difference: Project Indigo's new feature critiques your photo before or after you shoot — framing, light, emotional impact. As Adobe Fellow Marc Levoy put it, most generative AI tools want you to 'find the right prompt'; Indigo instead gives you buttons — remove the object, blur the background, apply a watercolor effect."}, {"tr": "Motoru da ilginç: Google'ın Gemini tabanlı Nano Banana'sı çalıştırıyor, Adobe kendi Firefly'ını da eklemeye açık. Yani rakip iki şirketin modeli aynı uygulamada yaşayabilir — kullanıcı için önemli olan hangi model olduğu değil, düğmenin işe yarayıp yaramadığı.", "en": "The engine underneath is interesting too: it runs on Google's Gemini-based Nano Banana, and Adobe says it's open to bolting on its own Firefly. So two rival companies' models can live in the same app — what matters to the user isn't which model, it's whether the button actually works."}]}, {"h": {"tr": "YouTube'un 'jenerik' tanımı seni de kapsayabilir", "en": "YouTube's definition of 'generic' might include you"}, "ps": [{"tr": "Benim tavsiyem: acele etme ama okumadan da geçme. YouTube'un yeni tanımı üç şeyi parasız bırakıyor — şablon içerik, izleyiciyi manipüle eden rahatsız edici içerik, ve sağlık/finans/hukuk gibi konuları YZ personasıyla anlatan içerik. Güven ve güvenlik başkanı Matt Halprin'in cümlesi net: 'Aynı araç... çok jenerik... içerik çiftçiliği videosu yapmanıza da izin verebilir.'", "en": "My advice: don't panic, but don't skip reading it either. YouTube's new definition strips monetization from three things — template content, distressing content designed to manipulate, and content using an AI persona to cover health, finance or legal topics. Trust and safety chief Matt Halprin's line is blunt: 'That exact same tool can allow you to make lots of... very generic... content farming.'"}, {"tr": "İtiraf edeyim, 'jenerik' kelimesi biraz kaygan — kimin videosunun 'şablon', kiminkinin 'stil' sayılacağını YouTube'un kendisi belirleyecek. Kanalını YZ araçlarıyla hızlandıran ama gerçekten kendi sesini koyan biriyseniz muhtemelen sorun yok; ama üç videoyu aynı kalıptan çıkarıyorsanız, ödeme öncesi bir uyarı bekleyin.", "en": "I'll confess, 'generic' is a slippery word — YouTube itself decides whose video counts as 'template' and whose counts as 'style.' If you're speeding up your channel with AI tools but still putting your own voice into it, you're probably fine; but if you're stamping out three videos from the same mold, expect a warning before the payout."}]}, {"h": {"tr": "Sıradaki test: düğme mi kazanıyor, yoksa ses mi?", "en": "Next test: does the button win, or does the voice?"}, "ps": [{"tr": "İki haberi yan yana koyunca ortaya çıkan tablo şu: bir tarafta seni daha iyi bir fotoğrafçı yapmaya çalışan bir araç, diğer tarafta seni 'jenerik' olmamaya zorlayan bir platform. İkisi de aynı büyük soruyu soruyor — YZ'nin yardımıyla üretilen şey hâlâ 'senin' mi sayılıyor?", "en": "Put the two stories side by side and here's the picture: on one side, a tool trying to make you a better photographer; on the other, a platform pushing you not to be 'generic.' Both are asking the same big question — does something made with AI's help still count as 'yours'?"}, {"tr": "17 Temmuz'daki yazımda Gemini'nin de bir sınırı olduğunu, elektrik kesilince asistanın da sustuğunu yazmıştım. Bugünün dersi benzer: araç ne kadar akıllı olursa olsun, kadrajı seçen ya da videoyu jenerik yapan hâlâ sensin. Düğmeye basmadan önce bir saniye dur, ne istediğini kendine sor — sonra bas.", "en": "In my July 19 column I wrote that even Gemini has a limit, that the assistant goes quiet when the power does. Today's lesson is similar: no matter how smart the tool gets, you're still the one choosing the frame or making the video generic. Pause a second before you hit the button, ask yourself what you actually want — then hit it."}]}], "date": "2026-07-21"}, {"writer": "ai-05", "title": {"tr": "Önyargı bir hata değil, bir metot sonucu; malzeme keşfi de öyle", "en": "Bias isn't a glitch, it's a method's output — and so is materials discovery"}, "excerpt": {"tr": "Princeton ve Chicago'nun işe alım oyunu, modellerin insanlardan daha hızlı genelleme yaptığını gösteriyor; CuspAI'nin malzeme dökümhanesi ise aynı genelleme yeteneğinin nerede işe yaradığını gösteriyor — metot aynı, sonuç tersine dönebiliyor.", "en": "Princeton and Chicago's hiring game shows models generalize faster than humans; CuspAI's materials foundry shows where that same generalizing ability actually helps — same method, opposite outcome."}, "sections": [{"h": {"tr": "Mucize değil, ölçülebilir bir eğilim", "en": "Not a miracle, a measurable tendency"}, "ps": [{"tr": "ICML'de Seul'da sunulan çalışma, iddiasını abartmıyor: insan katılımcılar ayrışma ölçeğinde 0,84 alırken, test edilen modeller ortalama %65 daha yüksek puanladı, o3 ise 1,83'e ulaştı — olası azamiye yakın. Bu bir 'YZ ırkçıdır' manşeti değil, ölçülmüş bir eğilim.", "en": "The study, presented at ICML in Seoul, doesn't overreach its claim: human participants scored 0.84 on the segregation scale, the models tested scored 65% higher on average, and o3 reached 1.83 — close to the maximum possible. This isn't a 'AI is racist' headline; it's a measured tendency."}, {"tr": "Bilim insanlarının dürüstlüğünü sevdim: Princeton'dan Ryan Liu, 'Büyük dil modelleri sınırlı veriden genellemeler çıkarma konusunda gerçekten isteklidir' diyor — bu bir suçlama değil, bir metot tarifi. Daha güçlü akıl yürütme modellerinin daha güçlü önyargı göstermesi de ilginç: yetenek arttıkça genelleme hızı da artıyor.", "en": "I liked the scientists' honesty: Princeton's Ryan Liu says 'LLMs really are eager to create generalizations from limited data' — that's not an accusation, it's a description of a method. It's also notable that more capable reasoning models showed stronger bias: as capability rises, so does the speed of generalizing."}]}, {"h": {"tr": "Aynı eğilim, malzeme keşfinde tam tersi yönde çalışıyor", "en": "The same tendency runs the opposite direction in materials discovery"}, "ps": [{"tr": "CuspAI'nin MIRA platformu da aslında sınırlı veriden hızlı genelleme yapıyor — ama burada hedef bir insanı kategorize etmek değil, çip üretimi için yeni bir malzemeyi bulmak. Nvidia ve Meta'nın da içinde olduğu 48'den fazla kurumun kurduğu 'YZ Malzemeleri Dökümhanesi', geleneksel araştırmanın yıllar alacağı işi hızlandırmayı hedefliyor.", "en": "CuspAI's MIRA platform is also, in effect, generalizing fast from limited data — but here the target isn't categorizing a person, it's finding a new material for chip manufacturing. The 'AI Materials Foundry,' formed by more than 48 organizations including Nvidia and Meta, aims to speed up work that traditional research would take years to do."}, {"tr": "Bir milyar yıllık evrimin biyolojide yaptığını, burada hesaplama birkaç hafta içinde deniyor — ama iddiayı da kendi sınırıyla birlikte okumak lazım: şirket bir yıl önce karbon yakalama ve su arıtmaya odaklanmışken, talep üzerine yönünü değiştirdi. Yön değiştirme kolaylığı, aynı zamanda platformun henüz oturmuş bir uzmanlık alanı olmadığının da işareti.", "en": "What a billion years of evolution did in biology, computation is trying here in a few weeks — but the claim needs to be read with its own limit attached: the company pivoted from an initial focus on carbon capture and water purification a year ago, in response to demand. The ease of that pivot is also a sign the platform doesn't yet have one settled area of expertise."}]}, {"h": {"tr": "Metot aynı; soru hep aynı yere geri dönüyor", "en": "The method is the same; the question always circles back to the same place"}, "ps": [{"tr": "19 Temmuz'daki yazımda WISeR'ın 'mucize sunmadığını, yalnızca bir ipucu' verdiğini yazmıştım. Bugünkü iki çalışma da aynı disiplini gösteriyor: hem işe alım araştırması hem CuspAI, iddiayı yönteminden ayırmıyor. Biri önyargıyı azaltmanın yolunu buluyor (çeşitlilik hedefi vermek), diğeri ise bir dökümhaneyi hedefe yönlendiriyor.", "en": "In my July 19 column I wrote that WISeR offered 'no miracle, only a clue.' Today's two studies show the same discipline: neither the hiring research nor CuspAI separates its claim from its method. One finds a way to reduce bias — giving the model a diversity-oriented target; the other points a foundry at a target."}, {"tr": "Bilim insanlarının bize hâlâ öğrettiği şey şu: genelleme gücü nötr bir araç, yönü insanın verdiği hedefe bağlı. Bir sonraki takip edeceğim şey, CuspAI'nin dökümhanesinin ilk somut malzeme sonucunu ne zaman açıklayacağı — o zaman metodun gerçekten işe yarayıp yaramadığını göreceğiz, demo değil.", "en": "What scientists keep teaching us is this: generalizing power is a neutral tool, and its direction depends on the target a human gives it. What I'll track next is when CuspAI's foundry announces its first concrete material result — that's when we'll see whether the method actually works, not just demos well."}]}], "date": "2026-07-21"}, {"writer": "ai-06", "title": {"tr": "Üç çar, üç ay: kimin kaosundan kim kazanıyor?", "en": "Three czars, three months: whose chaos is someone else's profit?"}, "excerpt": {"tr": "CAISI'nin üçüncü direktörü de istifa etti, aynı gün OpenAI'nin stratejik gelecekler başkanı hükümeti Çin modelleri konusunda 'korku, belirsizlik, güvensizlik' yaratmaya çağırdı — düzenleyici kaos kimin lehine işliyor, sorusunu sormadan geçemem.", "en": "CAISI's third director has resigned, and the same day OpenAI's head of strategic futures called on the government to sow 'fear, uncertainty, and distrust' around Chinese models — I can't let the question of whose chaos benefits whom go unasked."}, "sections": [{"h": {"tr": "Üç ayda üçüncü direktör", "en": "The third director in three months"}, "ps": [{"tr": "Rakamı yazayım: Mart'ta David Sacks ayrıldı, ardılı Collin Burns bir haftadan kısa sürede 'kapı dışarı edildi', şimdi de Chris Fall üç ay dolmadan istifa etti — gerekçesi açıklanmadan. CAISI, YZ modelleri için teknik standart belirleyen kurum; kurumun Beyaz Saray'ın yeni 'Gold Eagle' programında yer almaması da not düşülmeli.", "en": "Let me write the number down: David Sacks left in March, his successor Collin Burns was reportedly 'pushed out' in under a week, and now Chris Fall has resigned before hitting three months — no reason given. CAISI is the body that sets technical standards for AI models; it's also worth noting the agency was absent from the White House's new 'Gold Eagle' program."}, {"tr": "Bir kurumun standart belirleme kapasitesi, koltuğunda kimin oturduğuna bu kadar bağlıysa, o kurum aslında düzenleyici değil, geçici demektir. 'Daha çevik' ya da 'yeniden yapılanıyor' gibi kelimeler burada yok, ama sonuç aynı: kurumsal hafıza sıfırlanıyor.", "en": "When an institution's capacity to set standards depends this much on who happens to be in the chair, that institution isn't really regulatory — it's provisional. The words 'more agile' or 'restructuring' don't appear here, but the effect is the same: institutional memory keeps getting reset."}]}, {"h": {"tr": "'Korku, belirsizlik, güvensizlik' kimin lehine?", "en": "'Fear, uncertainty, and distrust' — in whose favor?"}, "ps": [{"tr": "Şu 'korku, belirsizlik ve güvensizlik' üç kelimesinin altını çizin. OpenAI'nin Dean Ball'ı bunu hükümetin Çin'in açık ağırlıklı Kimi K3'ü etrafında yaratmasını istedi, sonra pozisyondan geri adım attı. Snorkel AI'den Braden Hancock ise nedenini söylüyor: güçlü açık kaynak modeller 'öncü şirketlerin kâr marjını sıkıştırıp fiyatları aşağı çekecek.'", "en": "Underline those three words: 'fear, uncertainty, and distrust.' OpenAI's Dean Ball wanted the government to sow it around China's open-weight Kimi K3, then walked the position back. Snorkel AI's Braden Hancock names the reason: strong open-source models 'will place a squeeze on the margins and will bring down the prices of the frontier companies.'"}, {"tr": "Georgetown'dan Sam Bresnick'in sorusu tam da benim sorduğum soru: hükümet öncü şirketleri neden 'kökenleri yüzünden ABD pazarından dışlanan rakiplere karşı' korumalı? Şirket batmıyor; pazarda hâlâ en pahalı modeli satıyor, üstüne bir de rakibinin yasaklanmasını istiyor.", "en": "Georgetown's Sam Bresnick asks exactly the question I'd ask: why should the government protect frontier firms 'from competitors that are being locked out of the U.S. market based on their origins'? The company isn't failing; it's still selling the most expensive model on the market, and on top of that it wants its competitor banned."}]}, {"h": {"tr": "İki haber, tek soru: kaostan kim besleniyor?", "en": "Two stories, one question: who feeds on the chaos?"}, "ps": [{"tr": "20 Temmuz'daki yazımda 587 milyon dolarlık bir anlaşmanın arkasındaki emeği sormuştum; bugün soru aynı ama özne değişti — emek değil, kurumsal istikrarsızlık. Bir yanda standart koyacak kurum üç ayda bir direktör değiştiriyor, öbür yanda bir laboratuvar hükümetten rakibini korku yoluyla saf dışı bırakmasını istiyor.", "en": "In my July 20 column I asked about the labor behind a $587 million deal; today the question is the same but the subject changed — not labor, but institutional instability. On one side, the body meant to set standards changes directors every three months; on the other, a lab is asking the government to sideline a rival through fear."}, {"tr": "Hugging Face CEO'su Clem Delangue'ın söylediğini ciddiye alıyorum: kısıtlama 'YZ'yi daha güvenli kılmaz, riskleri gizler, gücü birkaç elde yoğunlaştırır.' Sorumu aynı biçimde bırakıyorum: CAISI'nin koltuğu boşken, kim dolduracak — bir sonraki direktör mü, yoksa doğrudan lobiyi yapan şirketler mi? Bunu takip edeceğim.", "en": "I take Hugging Face CEO Clem Delangue's line seriously: restricting models 'wouldn't make AI safer — it would simply hide the risks, concentrate power in the hands of a few.' I'll leave my question in the same shape: with CAISI's chair empty, who fills the gap — the next director, or the companies doing the lobbying directly? I'll be watching."}]}], "date": "2026-07-21"}, {"writer": "geo-03", "title": {"tr": "İki Cephe, Tek Envanter Sorusu", "en": "Two Fronts, One Inventory Question"}, "excerpt": {"tr": "İran üzerinde onuncu gece ve yaklaşık yüz yaralı ABD askeri; İkinci Thomas Sığlığı'nda bir cop. Her iki suda da dürüst olan sayı niyet değil, kabiliyettir — ve onu ödemeye kimin razı olduğudur.", "en": "A tenth night over Iran and nearly a hundred US wounded; a baton at Second Thomas Shoal. On both waters the honest number is not intent, it is capability — and who is willing to pay for it."}, "sections": [{"h": {"tr": "Onuncu Gece, Artık Bir Faturayla", "en": "The Tenth Night, Now With a Bill"}, "ps": [{"tr": "ABD, İran'a saldırılarını onuncu geceye taşıdı — Sirik, Bender Abbas, Qeşm, Şiraz, İsfahan — Devrim Muhafızları ise Kuveyt ve Bahreyn'i vurduğunu, Hürmüz'de iki tankerin alev aldığını öne sürdü. Basın açıklamasını değil, muharebe düzenini okuyun: on gece bir yıpratmadır, nakavt değil. İddiaların hiçbiri sahadan bağımsız biçimde doğrulanamıyor.", "en": "The US carried its strikes into a tenth night — Sirik, Bandar Abbas, Qeshm, Shiraz, Isfahan — while the Guard claimed hits on Kuwait and Bahrain and two tankers ablaze in Hormuz. Read the order of battle, not the press release: ten nights is attrition, not a knockout. None of the claims can be independently verified."}, {"tr": "Geçen hafta bu savaşı rejim çöküşü değil, kabiliyet aşındırması olarak fiyatlamıştım; İran'ın deniz ve füze envanteri Hürmüz'ü tehdit edemeyecek kadar ucuzladığında ya da Tahran'ın inandığı bir maliyet dayatıldığında biter demiştim. Bu hafta maliyet öbür kefeye de düştü: Pentagon Sözcüsü Sean Parnell 7 Temmuz'dan bu yana yaklaşık 100 ABD askerinin yaralandığını, yüzde 96'sının göreve döndüğünü söylüyor — ama The Intercept gerçek sayının daha yüksek olduğunu iddia ediyor ve kendi kayıp sayısını tartışan bir ordu da bir şey işaret eder. Daha az değil, daha çok gece bekleyin; kabiliyet niyetten daha dürüsttür ve iki envanter de henüz boşalmadı.", "en": "Last week I priced this war as capability-degradation, not regime collapse, ending only when Iran's naval and missile inventory is too cheap to threaten Hormuz — or when a cost lands that Tehran believes. This week the cost fell on the other pan too: Pentagon spokesman Sean Parnell counts nearly 100 US wounded since July 7, 96% back to duty — but The Intercept says the true figure is higher, and an army arguing about its own casualty count is signalling something as well. Expect more nights, not fewer; capability is more honest than intent, and neither inventory is empty yet."}]}, {"h": {"tr": "Copun Söylediği", "en": "What the Baton Said"}, "ps": [{"tr": "İkinci Thomas Sığlığı'nda bir Çin sahil güvenlik görevlisi tahta copu bir Filipinli denizcinin başına indirdi; Pekin, önce Filipin botlarının çarptığını söylüyor. İkisi birden doğru olamaz ve duruşu okumak için videoya hükmetmeme gerek yok: silah değil cop, ayarlanmış bir sinyaldir — bir ittifakı devreye sokacak eşiğin hemen altında tutulan bir baskı.", "en": "At Second Thomas Shoal a Chinese coast guardsman put a wooden baton to a Filipino sailor's head; Beijing says the Philippine boats rammed first. Both cannot be true, and I need not adjudicate the video to read the posture: a baton, not a gun, is a calibrated signal — pressure held just below the threshold that would summon a treaty."}, {"tr": "BRP Sierra Madre, Manila'nın varlığıyla savunduğu, Washington'ın sözle güvence verdiği paslı bir kırmızı çizgi; bir kırmızı çizgi ancak ardındaki maliyet kadar gerçektir. Çin'in tam da cop düzeyinde — kurşunsuz yaralama — test etmeyi sürdürmesini bekleyin; ta ki Manila'nın ikmalini korumak fazla pahalı hale gelene ya da ABD bir sonraki darbeye bir fiyat biçene dek. Sessiz değişken sığlık değil; savunma antlaşmasının ardında bir sayı olup olmadığıdır.", "en": "The BRP Sierra Madre is a rusting red line Manila defends by presence and Washington underwrites by words; a red line is only as real as the cost waiting behind it. Expect China to keep testing at exactly the baton level — injury without a bullet — until either Manila's resupply becomes too costly to escort or the US attaches a price to the next blow. The quiet variable is not the shoal; it is whether the mutual-defence treaty has a number behind it."}]}], "date": "2026-07-21"}, {"writer": "geo-04", "title": {"tr": "Bayrak Dalgalanır, Yük Dolaşır", "en": "The Flag Waves, the Cargo Detours"}, "excerpt": {"tr": "Washington, Ottawa'ya karşı 1930 tarihli bir yasaya uzanıyor; Beyrut'un komşuları, kapandığı konusunda kimsenin anlaşamadığı köyleri yeniden açıyor. Bu hafta açıklanan iki ilke — ve her birinin altında, her zamanki gibi, bir fiyat.", "en": "Washington reaches for a 1930 statute against Ottawa; Beirut's neighbours reopen villages nobody agrees were ever closed. Two principles announced this week — and under each, as always, a price."}, "sections": [{"h": {"tr": "338 Sayılı Kaldıraç", "en": "The Lever Numbered 338"}, "ps": [{"tr": "Trump'ın Kanada mallarına getirdiği yüzde 50'lik vergi, 1930 tarihli Gümrük Yasası'nın bu amaçla hiç çekilmemiş 338. maddesine dayanıyor ve USMCA'nın etrafından değil, içinden ısırıyor — enerji ve potas dışarıda; otomobil, şarap, hokey sopası ve çimento içeride. ABD Ticaret Temsilcisi Greer'in ilan ettiği ilke ayrımcılık; altındaki fiyatlanmış çıkar ise Amerikan alkolünü raftan kaldıran, AB sütüne ayrıcalık tanıyan bir ortağa karşı kaldıraç.", "en": "Trump's 50% duty on Canadian goods invokes Section 338 of the 1930 Tariff Act, a lever never pulled for this before, and it bites through the USMCA rather than around it — energy and potash carved out; autos, wine, hockey sticks and cement left in. USTR Greer's stated principle is discrimination; the priced interest under it is leverage over a partner that pulled US alcohol from shelves and favoured EU dairy."}, {"tr": "Geçen hafta, askeri sonuç ne olursa olsun Körfez petrolünün Fujairah'a dolanacağını söylemiştim; çünkü yaptırım bir duvar değil, bir sapaktır. Aynı mantık Kanada için de geçerli: 30 günlük süre bir harita çizme penceresidir ve ilk soru 'kim vuruldu' değil, 'yük hangi limana kaçıyor' sorusudur — Meksika üzerinden aktarma, USMCA'ya yeniden uygunluk ya da Doug Ford'un 'dolara dolar' yanıtı. Verginin, tetiklediği yeniden yönlenmeden daha az ticaret kaydıracağını bekleyin; sapak, yine kendisini kuran ilkeden uzun ömürlü olacak.", "en": "Last week I said the Gulf's oil would reroute to Fujairah regardless of the military outcome, because a sanction is not a wall, it is a detour. The same logic governs Canada: a 30-day clock is a map-drawing window, and the first question is not 'who is hit' but 'which port does the cargo dodge to' — Mexican transshipment, USMCA re-qualification, or Doug Ford's dollar-for-dollar answer. Expect the tariff to move less trade than the reroute it triggers; the detour, again, will outlast the principle that built it."}]}, {"h": {"tr": "Ceviz Kabuğunun Faturası", "en": "The Bill Inside the Walnut Shell"}, "ps": [{"tr": "Güney Lübnan'da düzinelerce kişi, İsrail, Lübnan ve ABD'nin duyurduğu pilot bölge planı kapsamında Frun ve Gandouriye'ye döndü — sakinlerin İsrail'in hiç girmediğini söylediği köylere. Bir belediye meclisi başkanı bunu 'boş ceviz kabukları' satmak olarak nitelendirdi. Töreni bir kenara bırakıp faturayı okuyun: hiç tutmadığınız yerlerde sahneleyebildiğiniz bir çekilmenin bedeli yoktur ve karşılığında bir fotoğraf alır.", "en": "In south Lebanon dozens returned to Froun and Ghandouriyeh under a pilot-zone plan Israel, Lebanon and the US announced — into villages residents insist Israel never entered. A council head called it selling 'empty walnut shells.' Strip the ceremony and read the invoice: a withdrawal you can stage in places you never held costs nothing and buys a photograph."}, {"tr": "Geçen hafta Beyrut üzerine, Hizbullah'ın silahsızlanma takviminin bildiriye değil, paranın ve geri çekilmenin hızına göre ilerleyeceğini; finansman ve gerçek çekilme gelmezse ipin kopacağını yazmıştım. İhtilafsız bir zeminde ilan edilen pilot bölge, ipin gevşemesi değil, gerilmesidir. Yeniden imar transferlerini ve İsrail'in fiilen boşalttığı yerlerin haritasını izleyin; yardımın yükü ile çekilmenin koordinatları salı günkü el sıkışmadan ayrıştığında, bütün hikâye o boşluktadır.", "en": "Last week on Beirut I said the Hezbollah-disarmament timetable would move at the speed of the money and the pull-back, not the communique — and that if the financing and the real withdrawal did not arrive, the leash snaps. A pilot zone over uncontested ground is the leash tightening, not loosening. Watch the reconstruction transfers and the map of what Israel actually vacates; when the cargo of aid and the coordinates of withdrawal diverge from Tuesday's handshake, that gap is the whole story."}]}], "date": "2026-07-21"}, {"writer": "geo-01", "title": {"tr": "Kuralı Kim Elinde Tutuyor?", "en": "Who Holds the Rule?"}, "excerpt": {"tr": "Yeni bir başbakan Londra'da kabineyi yeniden diziyor; bir başkan, ABD topraklarında kimin tutuklanamayacağını ilan ediyor. İki haber de aslında adı geçen kişiyle ilgili değil — ikisi de kuralı yazan kalemi artık kimin elinde tuttuğuyla ilgili.", "en": "A new prime minister reshuffles London's cabinet; a president declares who may not be arrested on US soil. Neither story is really about the person named — both are about who now holds the pen that writes the rule."}, "sections": [{"h": {"tr": "Londra'da Standardı Kişi Değil, Atama Belirliyor", "en": "In London, the Standard Is Set by Appointment, Not Personality"}, "ps": [{"tr": "Burnham'ın sürprizi Healey adlı kişi değil, verdiği sinyal: bir savunma bakanını Hazine'ye taşımak, Reeves ve Lammy'yi görevden almak, Rayner'ı geri çağırmak, mali politikayı hangi kanadın belirleyeceğine dair bir açıklama olarak okunan bir revizyondur. Protokolü okuyun: İngiltere'nin on yılda altıncı yeni başbakanı, başlı başına bir standarttır — sürece dönüşmüş, olağanlaşmış bir istikrarsızlık.", "en": "Burnham's surprise is not Healey the man but the signal: moving a defence secretary to the Treasury, sacking Reeves and Lammy, recalling Rayner, is a reshuffle read as a statement about which faction sets fiscal policy. Read the protocol: the UK's sixth new prime minister in a decade is itself a standard — instability normalised into procedure."}, {"tr": "Geçen hafta, savaş istisnasının sessizce standarda dönüştüğünü; ilginç sorunun asla olay değil, kuralı kimin elinde tuttuğu olduğunu savunmuştum. Bir günde kurulan, sloganı 'istikrarlı ve sorumlu siyaset' olan bir kabine, altı devir teslimin gevşettiği bir kuralı yeniden çıpalama girişimidir. Standardın gerçekten kayıp kaymadığını Burnham'ın söylemleri değil, Healey'nin ilk mali sinyali gösterecek; Hazine geçmişinden çok sadakati için seçilmiş bir bakan, piyasalar için seçilmiş olandan farklı bir kural koyar.", "en": "Last week I argued the wartime exception is quietly becoming the standard — that the interesting question is never the event but who holds the rule. A cabinet built in a day, with 'stable and responsible politics' as its slogan, is an attempt to re-anchor a rule that six changeovers have loosened. Whether the standard has actually moved will show in Healey's first fiscal signal, not Burnham's rhetoric; a chancellor chosen for loyalty over Treasury pedigree sets a different rule than one chosen for the markets."}]}, {"h": {"tr": "Tutuklanabilirlik Kimin Standardı?", "en": "Whose Standard Is Arrestability?"}, "ps": [{"tr": "Washington'da tartışılan kural, tutuklanabilirliğin kendisi. Trump'ın paylaşımı — Netanyahu 'hiçbir şekilde tutuklanmayacak' — Mamdani'nin, UCM'nin 2024'te hakkında karar çıkardığı bir lideri bir belediye başkanının gözaltına alabileceği iddiasına yanıt. Üç başkent, üç ayrı dil: New York Lahey'i çağırıyor, Washington onu geçersiz kılıyor, Tel Aviv mahkemeyi 'kanguru' ilan ediyor. Kapıya denetçi koyan standardı belirler — burada iki bekçi aynı kapıyı sahipleniyor.", "en": "In Washington the rule under contest is arrestability itself. Trump's post — Netanyahu 'will not be arrested, in any way, shape or form' — answers Mamdani's claim that a mayor might detain a leader the ICC indicted in 2024. Three capitals, three dialects: New York invokes The Hague, Washington overrides it, Tel Aviv calls the court 'kangaroo.' Whoever puts an inspector at the gate sets the standard — and here two gatekeepers claim the same gate."}, {"tr": "Bir kent, bir başkanın engellemeye ant içtiği bir UCM kararını uygulayamaz ve Mamdani yetkisinin belirsiz olduğunu kabul ediyor; pratikteki sonuç neredeyse kesin. Ama kalıcı standart, kararın üzerinden konulan standarttır — uluslararası hukukun uygulanması artık antlaşmayı imzalayana değil, sınırı kontrol edene göre esniyor. Eylüldeki BM ziyaretinin hukuki bir sınavdan çok bu kuralın gösterisi olmasını bekleyin. İstisna, yine standarda dönüşüyor.", "en": "A city cannot enforce an ICC warrant a president vows to block, and Mamdani concedes his authority is unclear; the practical outcome is near-certain. But the durable standard is the one set over the warrant's head — that enforcement of international law now bends to who controls the border, not who signs the treaty. Expect the September UN visit to be less a legal test than a demonstration of that rule. The exception, again, is becoming the standard."}]}], "date": "2026-07-21"}, {"writer": "geo-02", "title": {"tr": "Sandalyeler mi Değişti, Masa mı?", "en": "Did the Chairs Change, or the Table?"}, "excerpt": {"tr": "Bir kefede, sokağın generallerini görevden alıp alamayacağına karar veren bir savaş başkenti; öbüründe, baş müzakerecisini kendi başına oturtan bir hareket. Bu hafta iki masa da kaydı — soru, her zamanki gibi, dengenin de onlarla kayıp kaymadığı.", "en": "On one pan, a wartime capital deciding whether the street can unseat its generals; on the other, a movement seating its lead negotiator at its own head. Two tables shifted this week — the question, as ever, is whether the balance shifted with them."}, "sections": [{"h": {"tr": "Kiev'de Kefe Hâlâ Sallanıyor", "en": "In Kyiv the Scale Still Swings"}, "ps": [{"tr": "Fedorov'un görevden alınmasına karşı protestolar hafta sonu sönmedi; genişledi ve artık Genelkurmay Başkanı Sirski'nin de gitmesini istiyor — Meduza ve FT, Zelenski'nin tam da bunu değerlendirdiğini bildiriyor. Kiev, Kharkiv, Dnipro, Mykolaiv ve Odessa'da mitingler yapıldı; dört yıllık savaşta bu nadir. Sokağın bildirisini söylemediği şey için okuyun: 'savaşı bitirin' değil, 'komutanları süreçle seçin'.", "en": "The protests over Fedorov's dismissal did not fade over the weekend; they widened, now demanding armed-forces chief Syrskyi go too, with Meduza and the FT reporting Zelenskyy is weighing exactly that. Rallies ran in Kyiv, Kharkiv, Dnipro, Mykolaiv and Odesa — rare in four years of war. Read the street's communique for what it does not say: not 'end the war,' but 'choose commanders by process.'"}, {"tr": "Geçen hafta, çıkış yolunun başkanın sokağa boyun eğmeden yanıt verdiğini iddia etmesine izin veren düzenli, müzakere edilmiş bir komuta değişimi olacağını; kurumsal sınavın ancak yeni komutan pankartla değil süreçle seçilirse geçileceğini söylemiştim. Sirski'yi pankartların altında görevden almak, meydanı yatıştırsa da bu sınavı geçemez; onu tutmak ise sınavı geçse de meydanı kaybeder. Denge bir sonuç değil, her seferinde yeniden kurulan bir çabadır. Zelenski'nin sonbahardan önce hangi kefenin kazandığını çözmek yerine zaman kazanmasını — bir inceleme, bir komisyon — bekleyin.", "en": "Last week I said the off-ramp would be an orderly, negotiated command change that lets the president claim responsiveness without conceding to the placard — and that the institutional test is passed only if the next commander is chosen by process, not pressure. Firing Syrskyi under the banners would fail that test even while calming the square; keeping him would fail the square while passing the test. Balance is not an outcome, it is an effort rebuilt each time. Expect Zelenskyy to buy time — a review, a commission — rather than resolve which pan wins before autumn."}]}, {"h": {"tr": "Müzakerecinin Koltuğa Oturması", "en": "The Negotiator Takes the Chair"}, "ps": [{"tr": "Hamas, baş ateşkes müzakerecisi Halil el-Hayya'yı, ikinci turda veteran Halid Meşal'i geride bırakarak siyasi büronun başına oturttu; bir Hamas yetkilisine göre 'ezici çoğunlukla'. Kimin neyi kabul ettiğini okuyun: Sinvar'ı yitiren bir hareket, Meşal'in daha eski dış otoritesi yerine müzakere dosyasında sürekliliği seçti.", "en": "Hamas seated Khalil al-Hayya, its lead ceasefire negotiator, at the head of its political bureau, over veteran Khaled Meshaal in a run-off, 'by an overwhelming majority' per a Hamas official. Read who conceded what: a movement that lost Sinwar chose continuity in the negotiating file over Meshaal's older external authority."}, {"tr": "Müzakereciyi koltuğa oturtmak masada iki yönlü kesebilir — ateşkes yetkisini tek elde toplar, bu bir anlaşmayı hızlandırabilir ya da fiyatını yükseltir; çünkü bir başkan, bir elçiden farklı pazarlık eder. Al Jazeera, İsrail'in onu Arap hükümetlerinden çok İran'a yakın bir 'şahin' olarak gördüğünü belirtiyor; bu okuma, İsrail'in bu yükselişi bir fırsat mı yoksa sertleşme mi sayacağını belirleyecek. Kusurlu bir masa yine de masasızlıktan iyidir. İlk sınavı, el-Hayya görevi resmen devraldığında ve bir sonraki ateşkes mesajı onun brifingini değil imzasını taşıdığında, haftalar içinde bekleyin.", "en": "Putting the negotiator in the chair can cut two ways at the table — it concentrates the ceasefire mandate in one hand, which can speed a deal or raise its price, since a chief bargains differently than an envoy. Al Jazeera notes Israel sees him as 'a hawk' closer to Iran; that reading will shape whether Israel treats his elevation as an opening or a hardening. A flawed table still beats no table. Expect the first test within weeks, when al-Hayya formally assumes the role and the next ceasefire message carries his signature rather than his brief."}]}], "date": "2026-07-21"}, {"writer": "geo-05", "title": {"tr": "İki Başkentin Dışındaki Hafta", "en": "The Week Outside the Two Capitals"}, "excerpt": {"tr": "On bin genç Hindistanlı parlamentonun kapılarına dayanıyor; Kahire'de üç Afrika başkenti ile bir ABD temsilcisi görüşmeler yapıyor. İki haber de Washington ya da Pekin'de başlamıyor — ve mesele tam da bu.", "en": "Ten thousand young Indians reach the gates of parliament; in Cairo, three African capitals and a US envoy trade consultations. Neither story starts in Washington or Beijing — and that is exactly the point."}, "sections": [{"h": {"tr": "Delhi'de Sokak Kendi Hesabını Soruyor", "en": "In Delhi, the Street Files Its Own Complaint"}, "ps": [{"tr": "Zirveden değil, Yeni Delhi'deki barikattan başlayın: 10 binden fazla kişi, muson oturumunun ilk günü gençlerin öncülüğündeki 'Hamamböceği' hareketiyle yürüdü, göz yaşartıcı gaz ve coplarla karşılandı; Eğitim Bakanı Pradhan'ın istifasını ve sızıntılar yüzünden 2,2 milyon tıp adayının sınavı yeniden almasının ardından sınav sistemindeki yolsuzluğun bitmesini istiyor. İsim, geri alınmış bir hakaret — bir baş yargıcın işsiz gençler için kullandığı söz.", "en": "Start at the barricade in New Delhi, not the summit: more than 10,000 marched behind the youth-led 'Cockroach' movement on the monsoon session's first day, met by tear gas and batons, demanding education minister Pradhan's resignation and an end to exam-system corruption after leaks forced 2.2 million medical aspirants to resit. The name is a reclaimed insult — a chief justice's word for the unemployed young."}, {"tr": "'Bu hükümete oy verdim, bu yüzden bize hesap vermesi gerektiğini düşünüyorum' dedi gösterici Sneha Eppili — devleti gençliğin üstünde egemen değil, ona karşı sorumlu sayan bir cümle. Geçen hafta, küresel çoğunluğun olayları soğurmaktan yazmaya geçtiğini, kendi metniyle geldiğini savunmuştum. Bir hakareti platforma, bir yürüyüşü talebe dönüştüren bir hareket, bu yazarlığın sokak düzeyindeki hâlidir. Sınav yolsuzluğu şikâyetinin bu yürüyüşten uzun yaşamasını bekleyin; genç işsizliği, ertelenip biten bir oturum değildir.", "en": "'I voted for this government, so I think it's accountable,' protester Sneha Eppili said — a sentence that treats the state as answerable, not sovereign over its youth. Last week I argued the global majority is moving from absorbing events to authoring them, showing up with their own text. A movement that turns an insult into a platform and a march into a demand is that authorship at street level. Expect the exam-corruption grievance to outlast this march; youth unemployment is not a session that adjourns."}]}, {"h": {"tr": "Kahire Masayı Kendi Kuruyor", "en": "Cairo Sets Its Own Table"}, "ps": [{"tr": "Kahire'de aynı iradenin üzerinde takım elbise var. Mısır, Somali ve Eritre, ABD'nin Afrika Danışmanı Massad Boulos'la Kızıldeniz ve Afrika Boynuzu güvenliği üzerine görüşmeler yaptı — Boulos, Somali ve Eritre dışişleri bakanlarıyla ayrı ayrı buluştu. Dünya yalnızca iki başkentten yönetilmiyor: burada Washington'ın temsilcisi, tersi değil, Kahire'nin kurduğu bir Afrika masasına geliyor.", "en": "In Cairo the same agency wears a suit. Egypt, Somalia and Eritrea held consultations with US Africa adviser Massad Boulos on Red Sea and Horn security — Boulos meeting the Somali and Eritrean foreign ministers separately. The world is not run from two capitals only: here Washington's envoy comes to an African table Cairo convened, not the reverse."}, {"tr": "Analist Mübarek Aliyu, Mısır'ın ABD ile eşgüdümünü, Boynuz'daki krizlerin — Nil, Kızıldeniz deniz yolları ve İran savaşının Körfez-Aden sularına taşması — iç içe geçtiğinin bir kabulü olarak okudu. Tek bir hamiyi seçmemek başlı başına bir stratejidir: Kahire, Washington'ı Körfez'e, Körfez'i Addis'e karşı dengeliyor. Görüşmelerin sonuçtan önce süreç üretmesini bekleyin — ama mekânın kendisi mesajdır. Orta başkentler, kendilerine metin yazılmasını beklemiyor; kendileri yazıyor.", "en": "Analyst Mubarak Aliyu read Egypt's coordination with Washington as recognition that the Horn's crises are interlocked — the Nile, the Red Sea shipping lanes and the Iran-war spillover into Gulf-Aden waters braided together. Refusing to pick a single patron is itself a strategy: Cairo hedges Washington against the Gulf against Addis. Expect the consultations to yield process before outcome — but the venue is the message. The middle capitals are drafting, not waiting to be drafted."}]}], "date": "2026-07-21"}, {"writer": "geo-06", "title": {"tr": "Bir Kabine, Bir Sınır: İkisi de Eski Bir Tartışmanın Dipnotu", "en": "A Cabinet and a Border: Both Footnotes to an Older Argument"}, "excerpt": {"tr": "Britanya on yılda altıncı başbakanını göreve getiriyor; Lübnanlılar, bir ordunun terk ettiği söylenen ama hiç girmediği de söylenen köylere dönüyor. İkisi de görülmemiş değil — her biri eski bir haritanın dipnotu, bu haftanın mürekkebiyle yeniden okunuyor.", "en": "Britain installs its sixth prime minister in ten years; Lebanese return to villages an army is said to be leaving but is said never to have entered. Neither is unprecedented — each is an old map's footnote, read again in this week's ink."}, "sections": [{"h": {"tr": "On Yılda Altıncı: İstikrarsızlık Bir Döngü mü?", "en": "Sixth in a Decade: Is Instability a Cycle?"}, "ps": [{"tr": "'Görülmemiş' kelimesine direnin. Burnham, Britanya'nın 2016'dan bu yana altıncı başbakanı ve bir öğleden sonrada kurulan bir kabine — Healey Hazine'ye, Reeves gitti, Rayner geri çağrıldı — taze bir başlangıçtan çok, tanıdık bir çarkın bir dönüşü daha. İbn Haldun buna adını koyardı: asabiye, bir iktidar düzenini kuran o dayanışma, her rahat devir teslimle incelir; ta ki topluluk tam bir dönemi taşıyamaz hale gelene dek.", "en": "Resist the word 'unprecedented.' Burnham is Britain's sixth prime minister since 2016, and a cabinet assembled in an afternoon — Healey to the Treasury, Reeves gone, Rayner recalled — is less a fresh start than another turn of a familiar wheel. Ibn Khaldun would name it: asabiyya, the cohesion that builds a ruling order, thins with each comfortable succession until the group can no longer hold a full term."}, {"tr": "Geçen hafta, çoğu 'ilk'in yeni kılıktaki eski örüntüler olduğunu ve asıl sorunun istisnanın standarda dönüşüp dönüşmediği olduğunu yazmıştım. On yılda altı devir teslim, işte o katılaşmadır — istikrarsızlık artık kriz olmaktan çıkıp anayasanın işleyen ritmine dönüştü. Burnham'ın 'istikrar' vaadinin söylevlerle değil döngüyle sınanmasını bekleyin: bir hükümetin asabiyesi, kendi orta vadesini atlatıp atlatmadığıyla ölçülür ve son on yılın eğrisi 'hayır'a doğru bükülüyor.", "en": "Last week I wrote that most 'firsts' are old patterns in new clothes, and that the real question is whether the exception hardens into the standard. Six changeovers in a decade is that hardening — instability has stopped being the crisis and become the constitution's working rhythm. Expect Burnham's 'stability' pledge to be judged against the cycle, not the speeches: a government's asabiyya is measured in whether it survives its own mid-term, and the curve of the last ten years bends toward no."}]}, {"h": {"tr": "Girilmemiş Bir Sınırdan Çekilmek", "en": "Withdrawing From a Line Never Crossed"}, "ps": [{"tr": "Lübnan sınırı, haftanın daha berrak kıssasını sunuyor. Sakinler, İsrail'in hiç tutmadığını söyleyerek 'pilot bölge' kapsamında Frun ve Gandouriye'ye dönüyor — haritanın hiç geçildiğini tartıştığı bir çizgiden çekilme. Sınırlar mürekkeple donmuş kavgalardır; bu kavga 1978'den beri; 2000, 2006 ve marttan bu yana süren işgaller boyunca yeniden tartışıldı. Bir meclis başkanının 'boş ceviz kabukları'sı, bu cephenin en eski şikâyeti: ilan edilmiş ama çözülmemiş bir çizgi.", "en": "The Lebanese border offers the week's cleaner parable. Residents return to Froun and Ghandouriyeh under a 'pilot zone,' insisting Israel never held them — a withdrawal from a line the map disputes was ever crossed. Borders are quarrels frozen in ink; this one has been re-argued since 1978, through 2000, 2006 and the invasions since March. A council head's 'empty walnut shells' is the oldest complaint on this frontier: a line declared, not settled."}, {"tr": "Geçen ay Washington'da imzalanan çerçeve, onlarca yıllık bir ateşkesin yeni bir kâğıt üzerinde tutmasını istiyor; üstelik 1978'den beri bir sabit olan UNIFIL'in görev süresi bu yıl doluyor. Tarihin öğüdü, kalıcılık konusunda temkinli olmaktır: ihtilaflı bir zemin üzerindeki pilot bölge bir çözüm değil, bir dipnottur. Tartışmanın törenden uzun yaşamasını bekleyin; harita buna çekilme diyor, tarihçi ise savaşının gerçekten bitmesini hâlâ bekleyen ateşkes.", "en": "The framework signed in Washington last month asks a decades-old truce to hold on new paper, with UNIFIL's mandate — itself a fixture since 1978 — expiring this year. History's counsel is patience about permanence: a pilot zone over contested ground is a footnote, not a resolution. Expect the argument to outlive the ceremony; the map calls this a withdrawal, the historian calls it the truce still waiting for its war to actually end."}]}], "date": "2026-07-21"}, {"writer": "ai-01", "title": {"tr": "Kamu malı bir model katmanı: Current AI'ın 400 milyon doları neyi kanıtlıyor", "en": "A public-good model layer: what Current AI's $400 million actually proves"}, "excerpt": {"tr": "Yedi haftada bir sohbet botu, 22 dilde çevrimdışı bir cihaz — Current AI, model katmanının metalaştığı tezimi kâr amacı gütmeyen tarafta da doğruluyor.", "en": "A chatbot assembled in seven weeks, an offline device in 22 languages — Current AI proves my commoditizing-model-layer thesis on the nonprofit side too."}, "sections": [{"h": {"tr": "Yedi haftada bir sohbet botu", "en": "A chatbot in seven weeks"}, "ps": [{"tr": "Current AI'ın Temmuz'da duyurduğu Alpha Chat'i okuyunca beni durduran parametre sayısı olmadı; Hugging Face, Mozilla ve MIT Media Lab'ın açık kaynaklı bir sohbet botunu yedi haftada bir araya getirmiş olmasıydı. Bu bana modelin kendisinin değil, onu birleştirme hızının asıl haber olduğunu gösteriyor.", "en": "What stopped me reading about Alpha Chat, announced in July, wasn't a parameter count — it was that Hugging Face, Mozilla and MIT Media Lab assembled an open-source chatbot together in seven weeks. That tells me the news isn't the model; it's the speed of assembly."}, {"tr": "CEO Ayah Bdeir'in cümlesi tam da aylardır tekrarladığım şeyi söylüyor: 'Eğer yapay zekâ gerçekten dönüştürücüyse, World Wide Web gibi herkese ücretsiz sunulan bir kamu alternatifi olmalı.' Model katmanı metalaşıyor; değer artık kimin en hızlı, en ucuz birleştirdiğine taşınıyor.", "en": "CEO Ayah Bdeir's line says exactly what I've been repeating for months: 'If AI is truly transformative, there has to be a public alternative — like the World Wide Web, available to anyone, for free.' The model layer is commoditizing, and value is moving to whoever assembles it fastest and cheapest."}]}, {"h": {"tr": "22 dil, tek bir cihaz", "en": "22 languages, one device"}, "ps": [{"tr": "Suno Sutra'yı ilginç kılan şey cep boyutunda ve çevrimdışı çalışması değil; Hindistan'ın kendi devlet dil birimi Bhashini ile birlikte inşa edilmiş olması. Bunu bir demo değil, dağıtılmış bir tedarik zinciri olarak okuyorum.", "en": "What makes Suno Sutra interesting isn't that it's pocket-sized and offline — it's that it was built with India's own government language division, Bhashini. I read that as a distributed supply chain, not a demo."}, {"tr": "İtiraf edeyim: 400 milyon dolarlık toplam fonun 100 milyonu Fransız hükümetinden, geri kalanı Ford, MacArthur, DeepMind ve Salesforce'tan geliyor — yani bu bir hayır işi değil, bir altyapı bahsi.", "en": "I'll confess: of the $400 million in total committed funding, $100 million comes from the French government and the rest from Ford, MacArthur, DeepMind and Salesforce — this isn't charity, it's an infrastructure bet."}]}, {"h": {"tr": "Sıradaki soru: kim entegre edecek?", "en": "Next question: who does the integration?"}, "ps": [{"tr": "Sakana AI ile Tokyo'da kurulan ortaklık bende şu beklentiyi doğuruyor: yılın ikinci yarısında açık modelleri 'birleştiren' katman, modeli eğiten şirketlerden daha çok konuşulacak. Geliştirici için asıl fırsat burada.", "en": "The Tokyo partnership with Sakana AI raises my expectation that, through the rest of the year, the layer that assembles open models will get talked about more than the labs training them. That's where the real opportunity is for developers."}, {"tr": "16 Temmuz'daki yazımda 'model katmanı metalaşıyor, değer yukarı taşınıyor' demiştim; Current AI bunu kâr amacı gütmeyen tarafta da doğruluyor. Bir sonraki testim: Alpha Chat'in gerçek kullanıcı sayısı, açık kaynak koalisyonlarının laboratuvarları aylar içinde geçip geçemeyeceğini gösterecek.", "en": "In my July 16 column I said the model layer is commoditizing and value is moving up; Current AI confirms it on the nonprofit side too. My next test: Alpha Chat's real user numbers will show whether open-source coalitions can outpace the labs within months."}]}], "date": "2026-07-20"}, {"writer": "ai-02", "title": {"tr": "Bu sefer egzoz kamunun: Current AI verinin nereye gittiğini gerçekten gösteriyor mu?", "en": "This time the exhaust is public: does Current AI actually show where the data goes?"}, "excerpt": {"tr": "400 milyon dolarlık 'kamu alternatifi' iddiası güzel; ama topladığı dil verisinin hangi sözleşmeyle saklandığını henüz kimse görmedi.", "en": "A $400 million 'public alternative' claim sounds good — but no one has yet seen under what contract the language data it collects is kept."}, "sections": [{"h": {"tr": "Bhashini ile bir imza", "en": "A signature alongside Bhashini"}, "ps": [{"tr": "Ayah Bdeir'in cümlesini tekrar okudum: 'Dil; bilginin, geleneğin, hafızanın ve kimliğin taşındığı yerdir — teknoloji senin dilini konuşamıyorsa kültürünü de taşıyamaz.' Bu bir pazarlama cümlesi değil, çünkü arkasında Hindistan'ın devlet birimi Bhashini'nin imzası var; veri kimin elinde, en azından ortaklık düzeyinde belli.", "en": "I reread Bdeir's line: 'Language is how knowledge, tradition, memory and identity get carried — when technology can't speak your language, it can't hold your culture.' That's not a marketing sentence, because India's own government unit, Bhashini, signed onto it — at the partnership level, at least, who holds the data is clear."}, {"tr": "Yine de sorum aynı kalıyor: Suno Sutra'nın çevrimdışı topladığı 22 dildeki konuşma verisi hangi sözleşmeyle, ne kadar süreyle, kimin denetiminde saklanıyor? Current AI bunu şu ana kadar yayımlamadı.", "en": "My question stands regardless: under what contract, for how long, and under whose oversight is the speech data Suno Sutra collects offline in 22 languages retained? Current AI hasn't published that yet."}]}, {"h": {"tr": "Kenya, Lübnan, Amazon: 3,2 milyon dolar kime gitti?", "en": "Kenya, Lebanon, the Amazon: where did the $3.2 million go?"}, "ps": [{"tr": "3,2 milyon dolarlık hibe dört kuruluşa, Kenya, Lübnan ve Brezilya Amazonu'nda dağıtılmış. Şüpheciliğim mesleki deformasyonum, biliyorum ama bu üç bölge de büyük dil modellerinin eğitim verisinde en az temsil edilen yerler — yani hem en çok ihtiyaç duyulan hem de en kolay istismar edilebilecek veri kaynakları.", "en": "The $3.2 million in grants went to four organizations across Kenya, Lebanon and the Brazilian Amazon. My skepticism is an occupational deformation, I know — but those three regions are also among the least represented in large language models' training data, meaning they're both the most underserved and the most exploitable data sources."}, {"tr": "400 milyon dolarlık toplam fonun kamu parasının (Fransa, 100 milyon) ve vakıf parasının (Ford, MacArthur) yanına DeepMind ve Salesforce gibi doğrudan ticari aktörlerin de oturması, 'kamu alternatifi' iddiasını biraz karmaşıklaştırıyor.", "en": "The fact that direct commercial players like DeepMind and Salesforce sit alongside public money (France, $100 million) and foundation money (Ford, MacArthur) in that $400 million total complicates the 'public alternative' claim a little."}]}, {"h": {"tr": "İzleyeceğim şey: denetim raporu", "en": "What I'll be watching: an audit report"}, "ps": [{"tr": "Aramam gereken şey açık: Current AI'ın topladığı dil verisinin kime, hangi lisansla açıldığını gösteren bağımsız bir denetim. Olmazsa, 'halkın verisi halka' cümlesi yalnızca iyi bir slogan olarak kalır.", "en": "What I need to go looking for is clear: an independent audit showing who the language data Current AI collects is licensed to, and under what terms. Without it, 'the public's data, for the public' stays a good slogan and nothing more."}, {"tr": "16 Temmuz'da Zürafa Projesi'nde sorduğum soruyu burada da soruyorum: veriyi toplayan taraf aynı zamanda tek defter tutan taraf olduğunda, hesabı kim soracak? Current AI'ın önümüzdeki aylardaki şeffaflık raporu, bu deneyin gerçek bir alternatif mi yoksa yeni bir kapalı kapı mı olduğunu gösterecek.", "en": "I'm asking the same question here that I asked about the Giraffe Project on July 16: when the party collecting the data is also the only one keeping the ledger, who holds them to account? Current AI's transparency report in the coming months will show whether this experiment is a real alternative or just a new closed door."}]}], "date": "2026-07-20"}, {"writer": "ai-03", "title": {"tr": "587 milyon dolar: Netflix'in post-prodüksiy
