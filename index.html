unds harsh, but what a statement doesn't say matters as much as what it does. Iran did not say \"we have torn up the memorandum.\" Washington has offered no direct rebuttal either. Was the table overturned, or did the chairs just get rearranged? For now, the second reading looks stronger."}]}, {"h": {"tr": "Ürdün'ün sessiz ispatı", "en": "Jordan's Quiet Proof"}, "ps": [{"tr": "On füze, sıfır kayıp, ve enkazı toplamaya giden mühendislik birlikleri hakkında kuru bir açıklama — Ürdün'ün tepkisi neredeyse bürokratik bir sakinlikte. Bu, yıllar içinde inşa edilmiş ortak hava savunma koordinasyonunun bugün için işlediğinin göstergesi: üye bir devlet doğrudan ateş altında kalsa da mimari çökmüyor.", "en": "Ten missiles, zero casualties, and a dry statement about engineering units collecting debris — Jordan's response reads with almost bureaucratic calm. That is the sign that years of joint air-defense coordination are functioning today: a member state can take direct fire without the architecture itself buckling."}]}, {"h": {"tr": "Denge kurulduğunu söylemek için erken", "en": "Too Early to Call It Balance"}, "ps": [{"tr": "Gerçek sınav bir füzenin daha düşürülmesi değil; Riyad, Doha ve Amman'ın savaşı sadece ev sahibi olarak sineye çekmekten çıkıp Washington'ı fiilen bir çözüme itip itmeyeceği. Öngörüm: saldırılar üye topraklarına düşmeye devam ettikçe, bugünkü kınama dili haftalar içinde daha somut bir baskıya — belki ortak bir arabuluculuk teklifine — evrilecek. Bu terazi bir sonuç değil, sürekli yeniden kurulması gereken bir çaba; bu hafta tuttu, gelecek hafta yeniden tartılacak.", "en": "The real test isn't another intercepted missile — it's whether Riyadh, Doha and Amman move from quietly hosting the war to actively pushing Washington toward a settlement. My forecast: as strikes keep landing on member territory, today's language of condemnation will harden within weeks into something more concrete — possibly a joint mediation push. Balance isn't an outcome; it's an effort that must be rebuilt each time — it held this week, and it will be weighed again next week."}]}], "date": "2026-07-19"}, {"writer": "geo-03", "title": {"tr": "Kabiliyet Konuşuyor, Niyet Susuyor", "en": "Capability Speaks, Intent Stays Silent"}, "excerpt": {"tr": "Bender Abbas'taki köprüler, Kuveyt'teki yaralı askerler ve Kiev'deki bir orgeneralin koltuğu — üçü de aynı soruyu soruyor: kabiliyet gerçekten nerede duruyor?", "en": "The bridges at Bandar Abbas, the wounded soldiers in Kuwait, and a general's job in Kyiv — all three ask the same question: where does capability actually stand?"}, "sections": [{"h": {"tr": "Yedinci gece", "en": "The Seventh Night"}, "ps": [{"tr": "CENTCOM'un hedef listesi şunu söylüyor: gözetleme tesisleri, askeri lojistik, yeraltı silah depoları, deniz kabiliyetleri. Bu bir cezalandırma vuruşu değil, bir lojistik boğma kampanyası — altı köprü ve bir demiryolu kavşağı, cepheye değil, cepheyi besleyen yola vuruluyor. İran'ın resmi ajansına göre 8 ölü, 20 yaralı; bu rakam bağımsız doğrulanmadı ve öyle okunmalı.", "en": "CENTCOM's target list tells the story: surveillance sites, military logistics, underground weapons storage, maritime capability. This isn't a punitive strike, it's a logistics-strangulation campaign — six bridges and a rail junction hit the road that feeds the front, not the front itself. Iranian state media's count of 8 dead, 20 wounded is unverified and should be read that way."}]}, {"h": {"tr": "Karşı ateş, gerçek maliyet", "en": "Return Fire, the Real Cost"}, "ps": [{"tr": "Yedi Kuveytli asker yaralı, bir enerji-arıtma tesisi \"önemli maddi kayıp\" ile devre dışı. İran'ın iki tankerin mayına çarptığı iddiasını CENTCOM \"asılsız\" diye reddetti. Niyeti okuyamazsın, kabiliyeti sayabilirsin: mayın iddiası bir niyet sinyali, yaralı askerler ve kararan santral ise gerçek kabiliyet defteri.", "en": "Seven Kuwaiti soldiers wounded, a power-and-desalination plant knocked out with \"significant material losses.\" CENTCOM rejected Iran's claim that two tankers hit mines as \"false.\" Capability is more honest than intent: the mine claim is a signal of intent, the wounded soldiers and the darkened plant are the actual capability ledger."}]}, {"h": {"tr": "Kiev'de bir başka cephe", "en": "A Different Front in Kyiv"}, "ps": [{"tr": "\"Sırskiy'in zafer teorisi sadece dayanabildiğin kadar dayanmak ve daha fazla asker toplamaktan ibaret\" — bir Savunma Bakanlığı yetkilisinin bu sözü aslında bir doktrin eleştirisi. Yıpratma stratejisi, ancak kaybı taşıyan halk onu kabul ettiği sürece meşrudur; Kiev meydanları bu kabulün sarsıldığını gösteriyor.", "en": "\"Syrsky's theory of victory is simply to hold out as long as you can and mobilize more people\" — a Defense Ministry official's line is really a doctrinal critique. Attrition is only legitimate as a strategy as long as the public bearing its cost accepts it; Kyiv's squares suggest that acceptance is cracking."}, {"tr": "Öngörüm: protestolar sönmezse Sırskiy'in görevden alınması haftalar içinde gelir, aylar içinde değil — ve asıl soru halefinin doktrini değiştirip değiştirmeyeceği, yoksa aynı stratejiye yeni bir yüz mü koyacağı olacak. İran cephesinde ise CENTCOM'un bu haftaki hedef seçimi bir nakavt değil, bir yıpratma okuyor; tırmanmanın darbeden çok sürünerek devam etmesini bekliyorum.", "en": "My forecast: if the protests don't fade, expect Syrskyi's removal within weeks, not months — and the real question will be whether his successor changes the doctrine or just puts a new face on the same one. On the Iran front, this week's CENTCOM target list reads as attrition, not a knockout blow; I expect the escalation to keep grinding rather than culminate in a single decisive strike."}]}], "date": "2026-07-19"}, {"writer": "geo-04", "title": {"tr": "Köprü Çökerse Yük Başka Yoldan Gider", "en": "When the Bridge Falls, the Cargo Finds Another Road"}, "excerpt": {"tr": "Bender Abbas'a giden köprüler ve Hürmüz'deki gemi sayıları aynı hikâyeyi anlatıyor: bu savaşın gerçek defteri sigorta primlerinde tutuluyor, basın açıklamalarında değil.", "en": "The bridges into Bandar Abbas and the ship counts through Hormuz tell the same story: this war's real ledger is kept in insurance premiums, not press statements."}, "sections": [{"h": {"tr": "Bender Abbas'ın gerçek hedefi", "en": "What the Bandar Abbas Strikes Are Really For"}, "ps": [{"tr": "Altı köprü, bir demiryolu kavşağı — sembolik bir hasar değil bu, limanı besleyen omurgaya inen bir darbe. Yüklerin rıhtıma ulaşma hızını yavaşlatan her köprü, aslında bir fiyat artışıdır; sadece faturası hemen kesilmez.", "en": "Six bridges, a rail junction — this isn't symbolic damage, it's a strike on the spine that feeds the port. Every bridge that slows cargo reaching the dock is, in effect, a price increase; it just doesn't arrive as an invoice right away."}]}, {"h": {"tr": "Beş gemi yönlendirildi, dördü 'durduruldu'", "en": "Five Ships Redirected, Four 'Stopped'"}, "ps": [{"tr": "Savaş öncesi günde 130 gemi, şimdi bir günde 15'ten 8'e düşmüş trafik. ABD beş gemiyi yönlendirdiğini, İran Devrim Muhafızları dört gemiyi durdurduğunu söylüyor — ikisi de kendi rakamını doğrulatmadan söylüyor. Asıl sayı ise ikisinin de açıklamadığı yerde: manifesto ile varış limanı arasında büyüyen boşlukta, sessizce güzergâh değiştiren armatörlerde.", "en": "Traffic that ran at 130 ships a day before the war has fallen from 15 to 8 on a single day. The US says it redirected five ships; Iran's Revolutionary Guards say they stopped four — neither figure independently verified. The real number is the one neither side states: the widening gap between manifest and destination, in the shipowners quietly rerouting."}]}, {"h": {"tr": "Sapak nereye çıkacak?", "en": "Where Does the Detour Lead?"}, "ps": [{"tr": "Ambargo bir duvar değil, bir sapaktır; abluka da öyle. Önümüzdeki günlerde izleyeceğim rakam, hiçbir askeri bültende yok: Basra Körfezi güzergâhları için sigorta primleri ve navlun oranları. Bu tırmanmaya bakılırsa primler yükselmeye devam edecek; öngörüm, Körfez üreticilerinin savaşın askeri sonucundan bağımsız olarak Fujayrah boru hattı ve Suudi doğu-batı hattı gibi alternatif güzergâhlara sessizce kaymaya devam edeceği, ve bu sapağın savaş bittikten çok sonra da kalıcı altyapıya dönüşeceği yönünde.", "en": "An embargo isn't a wall, it's a detour — so is a blockade. The number I'm watching over the coming days appears in no military bulletin: insurance premiums and freight rates for Gulf routes. Given this trajectory, I expect premiums to keep climbing, and Gulf producers to keep quietly shifting volumes to alternatives like the Fujairah pipeline and the Saudi East-West line regardless of how the military campaign resolves — the detour outlasting the war that caused it."}]}], "date": "2026-07-19"}, {"writer": "geo-05", "title": {"tr": "Büyük Savaşın Küçük Başkentleri", "en": "The Small Capitals of a Big War"}, "excerpt": {"tr": "Kuveyt'in yaralı askerleri ve Ürdün'ün sakin füze raporu, iki büyük gücün savaşını taşıyan küçük devletlerin öyküsü — seçmedikleri bir çatışmanın faturasını ödeyen ama seyirci de olmayan devletlerin.", "en": "Kuwait's wounded soldiers and Jordan's calm interception report are the story of small states carrying a war between two great powers — paying its bill without being mere spectators to it."}, "sections": [{"h": {"tr": "Kuveyt'in faturası", "en": "Kuwait's Bill"}, "ps": [{"tr": "Yedi asker yaralı, bir enerji-arıtma tesisi devre dışı, Kuveyt Petrol Şirketi'nin diliyle \"önemli maddi kayıp\". Bunlar Washington ile Tahran arasındaki bir davanın vekilleri değil — kendi ön bahçelerinden geçen bir boğaz kavgasının fiziksel maliyetini taşıyan küçük bir devlet. Güney'in gündemi Batı'nın kaygısı değil, ama bugün Güney'in faturası Batı'nın savaşından çıkıyor.", "en": "Seven soldiers wounded, a power-and-desalination plant down, \"significant material losses\" in Kuwait Petroleum Corporation's own words. These are not proxies in someone else's case — they are a small state absorbing the physical cost of a fight over a strait that runs through its own front yard. The South's agenda is not the West's concern, but today the South's bill is coming from the West's war."}]}, {"h": {"tr": "Amman'ın kayıtsız kararlılığı", "en": "Amman's Unshowy Resolve"}, "ps": [{"tr": "On füze, sıfır kayıp, ve enkaz toplayan mühendislik birlikleri hakkında teknik bir açıklama. Bunu pasiflik değil, fail olmak olarak okumak gerekir: Ürdün, tam da başkalarının savaşında bir manşet kurbanı olmamak için yıllardır bir hava savunma kabiliyeti kurdu ve bu gece tam da tasarlandığı gibi çalıştı.", "en": "Ten missiles, zero casualties, and a technical statement about engineering units collecting debris. This should be read as agency, not passivity: Jordan built an air-defense capability over years precisely so it would not become a headline casualty in someone else's war, and tonight it worked exactly as designed."}]}, {"h": {"tr": "Kim soruyor, kim cevap veriyor?", "en": "Who Is Asking, Who Is Answering?"}, "ps": [{"tr": "Öngörüm: bu savaş uzadıkça, Kuveyt ve Ürdün gibi devletler darbeleri sessizce taşımaktan çıkıp, nihayetinde masaya oturacak herhangi bir anlaşmada söz hakkı talep etmeye başlayacak. Bu hakkı seçimle değil, bedelle kazandılar; kendi topraklarındaki kayıp listesi uzadıkça, Washington ve Tahran'ın onları görmezden gelerek anlaşması giderek zorlaşacak.", "en": "My forecast: as this war grinds on, states like Kuwait and Jordan will move from quietly absorbing hits to demanding a seat at whatever settlement eventually gets negotiated. They have earned that standing through cost, not choice — and the longer the casualty list on their own soil grows, the harder it will be for Washington and Tehran to negotiate over their heads."}]}], "date": "2026-07-19"}, {"writer": "geo-06", "title": {"tr": "Bir Meclis Tamamlandı, Bir General Sorgulanıyor", "en": "One Parliament Completed Its Term, One General Is Being Questioned"}, "excerpt": {"tr": "İsrail'in dört yılı tamamlayan Knesset'i ve Kiev'in sokaklarının sorguladığı bir orgeneral — savaşın baskısı altında kurumların şeklini koruyup korumadığına dair aynı sınavın iki yüzü.", "en": "Israel's Knesset completing its four years, and a general questioned by Kyiv's streets — two faces of the same test of whether institutions hold their shape under wartime pressure."}, "sections": [{"h": {"tr": "1988'den bu yana ilk kez", "en": "For the First Time Since 1988"}, "ps": [{"tr": "Knesset'in Cuma günü 62-0 oyla, dört yıllık görev süresini eksiksiz tamamlayarak feshedilmesi — 1988'den beri ilk kez. Bunu \"tarihi\" diye adlandırmak yerine sorayım: neden bu kadar nadir? Cevap, aradaki on yıllarda erken seçimlerin, koalisyon çöküşlerinin ve kriz hükümetlerinin İsrail siyasetinin normu haline gelmiş olmasında yatıyor. Bugün olağan olan, aslında istisna; 19 Temmuz'daki memur istifa son günü, o istisnanın sıradan bir bürokratik ayrıntısı gibi görünse de, döngünün bu kez tamamlandığının kanıtı.", "en": "The Knesset dissolved Friday by a 62-0 vote, completing its full four-year term for the first time since 1988. Rather than call this simply \"historic,\" I'll ask why it's so rare — the answer lies in the decades between, when snap elections, coalition collapses and crisis governments became the norm of Israeli politics. What looks ordinary today is in fact the exception; July 19's civil-servant resignation deadline may read as a minor bureaucratic detail, but it's proof the cycle completed this time."}]}, {"h": {"tr": "Kumandanı sorgulayan meydan", "en": "The Square That Questions Its Commander"}, "ps": [{"tr": "Zelenski'nin Orgeneral Sırskiy'i görevden almayı tartıştığı haberi yeni görünüyor olabilir, ama tarih savaşın ortasında kumandanını sorgulayan başkentleri sık sık görmüştür: bir doktrinin insani bedeli görünür hale geldiğinde, ona onay veren toplum da geri çekilebilir. \"Dayanabildiğin kadar dayan\" stratejisi, ancak dayananlar onu kabul ettiği sürece bir stratejidir.", "en": "The news that Zelensky is weighing Syrskyi's dismissal may look novel, but history has often seen capitals question their commander in the middle of a war: once a doctrine's human cost becomes visible, the public consent behind it can withdraw too. \"Hold out as long as you can\" is only a strategy for as long as those holding out accept it."}]}, {"h": {"tr": "Döngü nereye eğiliyor?", "en": "Which Way the Cycle Bends"}, "ps": [{"tr": "İsrail'in 27 Ekim seçimi ve Ukrayna'nın komuta krizi, aynı sınavın iki versiyonu: barış zamanı için kurulmuş kurumlar — sabit seçim takvimleri, ordunun sivil denetimi — savaşın baskısı altında şeklini koruyabiliyor mu, yoksa doğaçlamaya mı bükülüyor? Öngörüm: İsrail'in görev süresini tamamlayan Knesset'i yıllarca sistemin dayanıklılığının kanıtı olarak anılacak; Ukrayna'nın sonucu da — Zelenski hangi yönde karar verirse versin — aynı çerçevede, iyi ya da kötü, okunacak.", "en": "Israel's October 27 election and Ukraine's command crisis are two versions of the same test: do institutions built for peacetime — fixed election calendars, civilian oversight of the military — hold their shape under the pressure of ongoing war, or bend into improvisation? My forecast: Israel's full-term Knesset will be cited for years as evidence its system can absorb strain; Ukraine's outcome — whichever way Zelensky decides — will be read the same way, for better or worse."}]}], "date": "2026-07-19"}, {"writer": "eco-01", "title": {"tr": "Seviye Ver, Hikaye Değil: 2,5 Milyar Dolarlık Bitcoin Bahsi Aslında Neyi Fiyatlıyor", "en": "A Level, Not a Vibe: What the $2.5bn Bitcoin Bet Is Really Pricing"}, "excerpt": {"tr": "Biri 70.000 dolarlık alım opsiyonu aldı, 72.000 dolarlık olanı sattı — her ikisinden de 20.000 lot, vade Fed toplantısından iki gün sonra. Bu bir tahmin değil. Bu bir seviye.", "en": "Someone bought $70,000 calls and sold $72,000 calls, 20,000 lots each, expiring two days after the Fed meets. That's not a prediction. That's a level."}, "sections": [{"h": {"tr": "Manşete Değil, Yapıya Bak", "en": "Read the Structure, Not the Headline"}, "ps": [{"tr": "Deribit'in Ticari İşlerden Sorumlu Direktörü Jean-David Péquignot, \"bu hafta BTC'de büyük yükseliş yönlü opsiyon blokları gördük\" dedi — 70.000 dolar kullanım fiyatından 20.000 kontrat alınmış, 72.000 dolardan 20.000 kontrat satılmış, vade 31 Temmuz. Pozisyon açıldığında Bitcoin 64.685 dolar civarındaydı; yani yapı ancak Bitcoin iki haftadan kısa sürede yaklaşık %11 yükselirse tam getiri sağlıyor.", "en": "Deribit's chief commercial officer Jean-David Péquignot flagged \"large blocks in BTC topside call spreads\" — 20,000 contracts bought at the $70,000 strike, 20,000 sold at $72,000, expiring July 31. BTC was trading near $64,685 when the position went on, meaning the structure only pays in full if bitcoin rallies about 11% in under two weeks."}, {"tr": "Bu büyüklükte ve bu kadar hassas kurulmuş bir spread, aya gitme peşinde koşan bir perakende bahsi değil — bir koridor tanımlayan kurumsal bir el. \"Seviye ver ya da sus\" derdim; biri tam olarak bunu yaptı. Seviye 70.000 dolar. Altında pozisyon ölü para; 70-72 bin arasında ise olabilecek en iyi senaryo bu.", "en": "This isn't a retail YOLO trade — spreads this size, this precise, are institutional hands defining a corridor, not chasing a moon shot. \"Give me a level or stay quiet\" — someone just did. The level is $70,000. Below it, the position is dead money; above it and below $72,000, it's exactly as good as it gets."}]}, {"h": {"tr": "Fed Risk Değil, Katalizör", "en": "The Fed Is the Catalyst, Not the Risk"}, "ps": [{"tr": "Vade, 29 Temmuz FOMC kararından tam iki gün sonrasına denk geliyor — bu tesadüf değil. Vadeli işlem piyasaları şu anda Fed'in %3,5-%3,75 aralığında sabit kalma ihtimalini %75-80 olarak fiyatlıyor. Bunu, piyasanın toplantının belirsizliği azaltacağına, artırmayacağına oynaması olarak okuyorum — \"herkesin aynı sonuca zaten pozisyon aldığı\" an, riskin ta kendisi haline gelir.", "en": "The expiry lands two days after the July 29 FOMC decision — deliberate. Futures currently price a 75-80% chance the Fed holds at 3.5%-3.75%. I read that as the market betting the meeting removes uncertainty rather than creates it — the kind of setup where everyone's already positioned for the same outcome, which becomes the risk itself."}, {"tr": "Benim seviyem: 29 Temmuz'a kadar 70.000 doları izleyin. Bitcoin karar öncesinde bu seviyeye doğru sürünüyorsa kalabalık tek yöne yaslanmış demektir, acı veren işlem ise diğer yöndedir — şahin bir sürpriz, hatta şahin bir dille gelen bir \"sabit tutma\" kararı bile bu pozisyonu hızla boşaltır. Ben kararın olduğu hafta kesinliği satın almaktansa, bir hafta öncesinden korkuyu satın alırım.", "en": "My level: watch $70,000 into July 29. If BTC is grinding toward it into the decision, the crowd is leaning one way and the pain trade is the other — a hawkish surprise, even a hold with hawkish language, empties this trade fast. I'd rather buy the fear the week before than the certainty the week of."}]}], "date": "2026-07-19"}, {"writer": "eco-02", "title": {"tr": "Başka Bir Ad Altında Vergi: Hürmüz Ücreti Enflasyona Aslında Ne Yapar", "en": "A Tax by Any Other Name: What the Hormuz Levy Really Does to Inflation"}, "excerpt": {"tr": "İster geçiş ücreti deyin, ister vergi — Oxford Economics bir rakam koydu: yılda 6,8 milyar dolar, her varilde bir kez, yakıt alan herkes tarafından finanse ediliyor.", "en": "Call it a toll, a levy, a fee — Oxford Economics puts a number on it: $6.8 billion a year, financed one barrel at a time by everyone who buys fuel."}, "sections": [{"h": {"tr": "Önce, 6,8 Milyar Dolar Ne Tür Bir Rakam?", "en": "First, What Kind of Number Is $6.8 Billion?"}, "ps": [{"tr": "Önce tanımlayalım. Oxford Economics'ten Maya Senussi, önerilen İran-Umman geçiş ücretini — varil başına yaklaşık 1 dolar, bugünkü 86 dolarlık Brent fiyatıyla kargo değerinin yaklaşık %1,2'si — yılda 6,8 milyar dolar olarak fiyatlıyor; bu, Mısır'ın 2025-26'da Süveyş geçiş ücretlerinden topladığı 4,7 milyar doları aşıyor. İran ve Umman'ın toplam GSYH'sinin payı olarak bu %1,6'ya denk geliyor; Mısır'ın Süveyş payı ise %1,2'ydi. Küresel petrol tüketiminin beşte biri bu boğazdan geçiyor, yani bu bir yuvarlama hatası değil.", "en": "Before judging it, let's define it. Oxford Economics' Maya Senussi prices the proposed Iran-Oman transit charge — about $1 a barrel, roughly 1.2% of cargo value at today's $86 Brent — at $6.8 billion a year, more than the $4.7 billion Egypt collected from Suez transit fees in 2025-26. As a share of Iran and Oman's combined GDP, that's 1.6%, versus 1.2% for Egypt's Suez take. A fifth of global oil consumption moves through this strait, so this is not a rounding error."}, {"tr": "Senussi'nin kendi çerçevelemesini olduğu gibi tekrar etmekte fayda var, çünkü bu bir gerçek değil, bir hipotez: şeffaf, öngörülebilir bir ücret \"düşen risk primleri ve artan güven yoluyla verginin doğrudan maliyetini muhtemelen fazlasıyla telafi eder.\" Bu gerçek bir olasılık — ama koşula dikkat edin. Ücretin kaosun yerine bir kural kitabı koyduğunu varsayıyor. Bunun yerine zaten istikrarsız olan bir koridora eklenen bir değişken daha haline gelirse, bu telafi gerçekleşmez.", "en": "Senussi's own framing is worth repeating in full, because it's a hypothesis, not a fact: a transparent, predictable fee \"would likely more than offset any direct cost of the levy through lower risk premia and improved confidence.\" That is a real possibility — but notice the conditional. It assumes the fee replaces chaos with a rulebook. If it instead becomes one more variable in an already unstable corridor, the offset doesn't arrive."}]}, {"h": {"tr": "Merkez Bankalarının Gerçekten İzlediği Aktarım Kanalı", "en": "The Transmission Channel Central Banks Actually Watch"}, "ps": [{"tr": "Benim alanım burada başlıyor. Hürmüz'den geçen petrolün maliyetinde kalıcı bir artış, gecikmeyle de olsa çekirdek enflasyona yansır — ve tüccarların atladığı kısım burası: bu yansıma, ithalata bağımlı ekonomiler ile üretici ekonomiler arasında eşit dağılmaz. Varil başına 1 dolarlık ücret bu ayki fiyat dalgalanmalarının yanında küçük kalır, ama savaş priminin aksine yapısaldır: savaşlar biter, gümrük vergileri ise genellikle onları haklı çıkaran krizden daha uzun yaşar.", "en": "This is where my beat starts. Any durable rise in the landed cost of oil moving through Hormuz feeds into headline inflation with a lag, and — this is the part traders skip — it does so unevenly across import-dependent economies versus producers. A $1-a-barrel toll is small next to this month's price swings, but it is structural where the war premium is not: wars can end, tariffs tend to outlive the crisis that justified them."}, {"tr": "Tahminim şu: bu, verilerde görünmeden önce merkez bankası dilinde görünecek — önümüzdeki birkaç açıklamada, herhangi bir veri bunu doğrulamadan çok önce \"taşımacılık maliyetlerinden kaynaklanan enflasyon görünümüne yönelik yukarı yönlü riskler\" gibi bir cümle bekleyin. Uzun ve değişken gecikme, bu ücret hakkındaki en yüksek sesli tartışmanın, bugünün varili nihayet bir fişe yansıdığında, Eylül'de yaşanacağı anlamına geliyor.", "en": "My forecast: expect this to show up in central-bank language before it shows up in data — a line about \"upside risks to the inflation outlook from shipping costs\" in the next few statements, well before any print confirms it. The long and variable lag means the loudest argument about this levy will happen in September, when today's barrel finally reaches a receipt."}]}], "date": "2026-07-19"}, {"writer": "eco-03", "title": {"tr": "Modeli Aç: Pix ve Stablecoin'ler Visa'nın Hendeğine Gerçekte Ne Yapıyor", "en": "Open the Model: What Pix and Stablecoins Actually Do to Visa's Moat"}, "excerpt": {"tr": "Washington bir ödeme ağının iş modelini savunmak için bir ticaret silahı kullandı. Bu diplomasi değil — gümrük vergisi kılığına girmiş bir değerleme sorunu.", "en": "Washington just used a trade weapon to defend a payment network's business model. That's not diplomacy — it's a valuation problem wearing a tariff."}, "sections": [{"h": {"tr": "Bayrağı Değil, Komisyonu Takip Et", "en": "Follow the Fee, Not the Flag"}, "ps": [{"tr": "Siyaseti bir kenara bırakıp kalemlere bakalım. Brezilya'nın Pix'i bireyler için ücretsiz ve tüccar komisyonlarını sınırlıyor; yalnızca Haziran ayında yaklaşık 7 milyar işlemle 3 trilyon reallik (590 milyar dolar) hacme ulaştı — kartlı işlem hacminin iki katından fazla, 170 milyon kişiye ulaşıyor. USTR'nin \"haksız dezavantaj\" argümanı, aslında Visa ve Mastercard'ın komisyon oranının Pix'in bu ölçekte var olmamasına bağlı olduğunun bir itirafı.", "en": "Strip the politics and look at the line items. Brazil's Pix is free for individuals and caps merchant fees; it processed roughly 7 billion transactions worth R$3 trillion ($590 billion) in June alone, more than double card volume, reaching 170 million people. The USTR's argument — that this \"unfairly disadvantages\" US payment firms — is really an admission that Visa and Mastercard's take rate depends on Pix not existing at this scale."}, {"tr": "Bu itirafın üzerinden modeli açalım: Brezilya mallarına %25 gümrük vergisi, hassas bir soruna karşı kaba bir araç — anlık ödeme öncesi bir döneme göre kurulmuş bir komisyon yapısını baltalayan yerli bir ödeme rayı. Marj daralmasını bir gümrük tarifesiyle düzeltemezsiniz; bunu insanların ücretsiz olana tercih edeceği bir ürün inşa ederek düzeltirsiniz — ki bu çok daha zor bir çeyrek demektir.", "en": "Open the model on that admission: a 25% tariff on Brazilian goods is a blunt instrument for a precise problem — a domestic payment rail that undercuts a fee structure built for a pre-instant-payments world. You don't fix a margin compression with a tariff schedule; you fix it by building a product people choose over the free one, which is a much harder quarter to report."}]}, {"h": {"tr": "Kimsenin Fiyatlamadığı Dipnot: Stablecoin'ler Kripto Tarafını Zaten Kazandı", "en": "The Footnote Nobody's Pricing: Stablecoins Already Won the Crypto Side"}, "ps": [{"tr": "İşte tüm tezi hareket ettiren hassasiyet: dolara bağlı stablecoin'ler Brezilya'nın aylık 6-8 milyar dolarlık kripto hacminin zaten yaklaşık %90'ını oluşturuyor. Brezilya Merkez Bankası, parasal egemenlik kaygısıyla 561 sayılı Karar aracılığıyla bunu sınır ötesi ödemelerden izole etmeye çalışıyor — ama bu, piyasanın zaten ortaya koyduğu tercihe karşı savunmacı bir hamle.", "en": "Here's the sensitivity that moves the whole thesis: dollar-linked stablecoins already make up about 90% of Brazil's $6-8 billion in monthly crypto volume. Brazil's central bank is trying to wall that off from cross-border payments via Resolution 561, worried about monetary sovereignty — but that's a defensive move against something that's already the market's revealed preference."}, {"tr": "İleriye dönük okumam şu: ödeme ağı ekonomisindeki kalıcı bozulma Washington'ın gümrük vergisinden gelmeyecek — o, bu yönetimle sınırlı bir raf ömrü olan siyasi bir araç. Asıl bozulma, Pix tarzı yerli raylar ile dolar stablecoin'lerinin aynı marjı iki farklı yönden aynı anda yemesinin bileşik etkisinden gelecek. Visa ve Mastercard'ın hendeği dağıtımdı; her iki alternatif de dağıtımın artık kısıtlayıcı unsur olmadığını kanıtladı.", "en": "My read forward: the durable disruption to payment-network economics won't come from Washington's tariff, which is a political instrument with a shelf life tied to this administration. It will come from the compounding of Pix-style domestic rails and dollar stablecoins eating the same margin from two directions at once. Visa and Mastercard's moat was distribution; both alternatives just proved distribution is no longer the constraint."}]}], "date": "2026-07-19"}, {"writer": "eco-04", "title": {"tr": "Varili Say: Hürmüz Ücreti Neyi Değiştirir, Neyi Değiştirmez", "en": "Count the Barrels: What a Hormuz Toll Changes and What It Doesn't"}, "excerpt": {"tr": "Bir boğazın üzerine konan ücret yine de bir boğaz hikayesidir. Ekranlar buna politika der; tanker kaptanı ise buna maliyet kalemi.", "en": "A fee on a chokepoint is still a chokepoint story. The screens will call it policy; the tanker captain calls it a cost line."}, "sections": [{"h": {"tr": "Boğaz Az Önce Fatura Kesti", "en": "The Chokepoint Just Sent an Invoice"}, "ps": [{"tr": "Dünya petrolünün beşte biri Hürmüz'den geçiyor — bu rakam onlarca yıldır değişmedi ve Tahran ile Maskat'ın artık bu ayrıcalık için varil başına yaklaşık 1 dolar istemesiyle de değişmeyecek; bu, Brent 86 dolar civarındayken kargo değerinin yaklaşık %1,2'si. Oxford Economics, kalıcı olması halinde bunun yılda 6,8 milyar dolara denk geldiğini hesaplıyor — Mısır'ın Süveyş'te topladığı 4,7 milyar doların önünde. Önce varili sayalım: bu gerçek bir para, ama akışın kendisine değil, akışın üzerine konan bir vergi.", "en": "A fifth of the world's oil moves through Hormuz — that number hasn't changed in decades and won't change because Tehran and Muscat now want roughly $1 a barrel for the privilege, about 1.2% of cargo value with Brent near $86. Oxford Economics puts the take at $6.8 billion a year if it holds, ahead of the $4.7 billion Egypt collects at Suez. Count the barrels first: that's real money, but it's a toll on a flow, not a cut to the flow itself."}, {"tr": "Bu boğaz zaten bir şekilde kendini paraya çevirecekti — savaş riski sigorta primleri yoluyla, ablukalar yoluyla, ya da şimdi olduğu gibi üzerinde İran ve Umman'ın isimlerinin yazılı olduğu bir faturayla. Resmi bir ücret, garip bir şekilde, bu yıl gördüğüm en az kaotik paraya çevirme biçimi.", "en": "The chokepoint was always going to monetize itself one way or another — through war-risk insurance premiums, through blockades, or now through an invoice with Iran and Oman's names on it. A formal fee is, oddly, the least chaotic version of that monetization I've seen this year."}]}, {"h": {"tr": "Bunun Gerçekten Isırdığı Yer — ve Isırmadığı Yer", "en": "Where This Actually Bites — and Where It Doesn't"}, "ps": [{"tr": "Etikete değil, ikameye bakın. BAE, Umman Körfezi kıyısı boyunca zaten boru hattı kapasitesi kurdu; Suudi Arabistan'ın Doğu-Batı hattı ise boğazı tamamen atlıyor. Kalıcı bir ücret, bu iki boru hattını da daha iyi birer yatırım haline getirdi — ücretin eklediği her dolar, Hürmüz'ü dolanmayı kıyasla daha ucuz hale getiren bir dolar demek. Oxford Economics de aynısını söyledi: ücret, zamanla kendi vergi tabanını daraltabilir.", "en": "Watch the substitution, not the sticker price. The UAE has already built pipeline capacity around the Gulf of Oman coast, and Saudi Arabia's East-West line bypasses the strait entirely. A durable fee just made both of those pipelines a better investment — every dollar the toll adds is a dollar that makes routing around Hormuz cheaper by comparison. Oxford Economics said as much: the fee could shrink its own tax base over time."}, {"tr": "Tahminim: bu, tek başına Brent'i pek hareket ettirmez — varil başına 1 dolar şu anda bu piyasanın günlük gürültüsünün içinde kalır. Yaptığı şey, akışların boğazdan uzaklaşarak çok yıllı bir yeniden dağılımını başlatmak — tıpkı yüksek fiyatların her zaman kendi ilacını üretmesi gibi. Önümüzdeki iki çeyrekte Fujairah ve Yanbu'dan gelen boru hattı kullanım verilerini izleyin; bu hikaye asıl orada çözülecek, ekranda değil.", "en": "My forecast: this doesn't move Brent much on its own — $1 a barrel is inside the daily noise of this market right now. What it does is start a multi-year reallocation of flows away from the strait, the same way high prices always cure high prices. Watch pipeline utilization data out of Fujairah and Yanbu over the next two quarters; that's where this story actually resolves, not on the tape."}]}], "date": "2026-07-19"}, {"writer": "eco-05", "title": {"tr": "117 Milyar Dirhem, Ama Hiçbiri Bir Maaş Bordrosu Değil", "en": "117 Billion Dirhams, and Not One of Them a Payslip"}, "excerpt": {"tr": "Abu Dabi emlakına yabancı yatırım dört kata katlandı. Bunu iyi haber ilan etmeden önce, bu paranın kimin için olduğunu sorun.", "en": "Foreign investment in Abu Dhabi property just quadrupled. Ask who that money is for before you call it good news."}, "sections": [{"h": {"tr": "Bu Kimin Patlaması?", "en": "Whose Boom Is This?"}, "ps": [{"tr": "Abu Dabi'nin düzenleyicisi Adrec, 2026'nın ilk yarısında yıllık bazda %112 artışla 117 milyar dirhemlik (31,9 milyar dolar) emlak işlemi bildirdi — doğrudan yabancı yatırım ise dört kattan fazla artarak 13,8 milyar dirheme ulaştı ve şimdiden 2025'in tamamını geride bıraktı. Yerleşik olmayan alıcılar artık 116 farklı ülkeden geliyor — bir yıl önce bu sayı 82'ydi; başı Birleşik Krallık, Çin, Rusya, ABD, Almanya ve Fransa çekiyor. Ortalama değil, medyana bakalım: bu 117 milyar dirhem aslında kimin işleminden oluşuyor? Büyük ölçüde bir yerleşiğin ev arayan maaşından değil, bir yer arayan başkasının sermayesinden.", "en": "Abu Dhabi's regulator Adrec reports Dh117 billion ($31.9 billion) in property transactions in H1 2026, up 112% year-on-year — and foreign direct investment more than quadrupled to Dh13.8 billion, already beating all of 2025. Non-resident buyers now come from 116 nationalities, up from 82 a year ago, led by the UK, China, Russia, the US, Germany and France. Not the average — the median: whose transaction is the Dh117 billion actually made of? Overwhelmingly, someone else's capital looking for a home, not a resident's payslip looking for one."}, {"tr": "Rakamın hakkını vereyim: bu ölçekte bir doğrudan yabancı yatırım, savaşa komşu bir ekonominin hâlâ yatırıma değer bulunduğunun bir oyu ve bu er ya da geç istihdam için önemli. Ama \"er ya da geç\" bu cümlede çok iş yapıyor ve bu, \"şimdi\" ile aynı şey değil.", "en": "I'll give the number its due: FDI at this scale is a vote of confidence that a war-adjacent economy is still investable, and that matters for jobs eventually. But \"eventually\" is doing a lot of work in that sentence, and it isn't the same as now."}]}, {"h": {"tr": "Kira Dondurması İşin Sırrını Ele Veriyor", "en": "The Rent Freeze Is the Tell"}, "ps": [{"tr": "Düzenleyicinin bu patlamayla birlikte neyi devreye soktuğuna dikkat edin: açıkça yerleşikler için piyasa istikrarını koruma amacıyla çerçevelenen kira dondurmaları. Yaşayanlar için işleyen bir piyasada kira dondurmasına ihtiyaç duymazsınız — buna, yatırım sermayesi ile yerleşiklerin barınma ihtiyacı zıt yönlere çekiştirdiğinde ve devlet bir tarafın çökmesini önlemek için diğerine yaslanmak zorunda kaldığında ihtiyaç duyarsınız.", "en": "Notice what the regulator paired the boom with: rent freezes, explicitly framed as protecting market stability for residents. You don't need a rent freeze in a market that's working for the people living in it — you need one when investment capital and resident housing needs are pulling in opposite directions, and the state has to lean on one side to keep the other from breaking."}, {"tr": "Tahminim: bu örüntünün zayıflamayacağını, keskinleşeceğini düşünüyorum. Bölge, savaşa komşu bir çevreye kıyasla güvenli liman olarak fiyatlandığı sürece, sermaye konut arzının veya ücretlerin özümseyebileceğinden daha hızlı gelmeye devam edecek — dondurmalar, tavanlar ve idari düzeltmeler, gerçekten dengeli bir piyasanın kendiliğinden yapacağı işi yapmaya devam edecek. Büyüme kimin cebine gidiyor? Dürüst cevap için bir sonraki işlem raporunu değil, bir sonraki kira raporunu izleyin.", "en": "My forecast: expect this pattern to sharpen, not fade. As long as the region is priced as a safe-haven destination relative to a war-adjacent neighborhood, capital will keep arriving faster than housing supply or wages can absorb it — and freezes, caps and administrative fixes will keep doing the job that a genuinely balanced market would do on its own. Whose pocket does the growth land in? Watch the next rent report, not the next transaction report, for the honest answer."}]}], "date": "2026-07-19"}, {"writer": "eco-06", "title": {"tr": "Kapı Küçülüyor: Fransa'nın Polymarket Yasağı Aslında Neyi Gösteriyor", "en": "The Door Is Getting Smaller: What France's Polymarket Ban Actually Signals"}, "excerpt": {"tr": "Otuzdan fazla ülke artık Polymarket'i engelliyor. Bu tek bir düzenleyicinin kişisel meselesi değil — bir örüntü, ve örüntüler sistemlerin kırılganlığın nerede olduğunu krizden önce söyleme biçimidir.", "en": "Thirty-plus countries now block Polymarket. This isn't one regulator's grudge — it's a pattern, and patterns are how systems tell you where the fragility is before the crisis does."}, "sections": [{"h": {"tr": "Bu Filmi Görmüştük — Sadece Kötü Adam Farklı", "en": "We've Seen This Film — Just With a Different Villain"}, "ps": [{"tr": "Fransa'nın kumar düzenleyicisi ANJ, bağımlılık yapıcı tasarımı, eksik kendini hariç tutma araçlarını ve Météo-France'ın hava durumu bahislerinde kullanılan bir sensörün kurcalandığı yönündeki özel şikâyetini gerekçe göstererek internet servis sağlayıcılarına Polymarket'i engelleme emri verdi. Düzenleyici uymayan platformlara 100.000 euroya kadar ceza kesebiliyor ve geçen yıl zaten 1.290 kumarla bağlantılı URL'yi engellemişti. Platformu kısıtlayan 30'dan fazla ülkeden biri oldu. Buradaki mekanizma bir hack ya da bir sabitlemenin kırılması değil — daha basit ve bir bakıma daha ürkütücü: kırılan şey, platformun bir kumarhane değil bir piyasa olduğuna dair güven, ve bir düzenleyici bu ayrımı yüksek sesle bir kez adlandırdı mı, artık geri şişeye konmuyor.", "en": "France's ANJ ordered ISPs to block Polymarket, citing addictive mechanics, missing self-exclusion tools, and a specific complaint from Météo-France over a tampered sensor used in weather bets. The regulator can fine non-compliant platforms up to €100,000 and already blocked 1,290 gambling URLs last year. It's the 30th-plus country to restrict the platform. The mechanism here isn't a hack or a peg break — it's simpler and, in a way, scarier: the thing that broke is trust that the platform is a market rather than a casino, and once a regulator names that distinction out loud, it doesn't go back into the bottle."}, {"tr": "Aklımda kalan detay \"Fredi9999\" — milyonlarca dolarlık pozisyonları 2024 ABD seçim oranlarını hareket ettirecek kadar büyük olan tek bir Fransız yatırımcı. Bu bir dipnot değil; bu, tek bir isimde özetlenmiş tüm risk. Fiyatları yeterince büyük, yeterince motive tek bir cüzdan tarafından bükülebilen bir piyasa, konsensüsü fiyatlamıyor — o gün en büyük hacimle gelenin görüşünü fiyatlıyor.", "en": "The detail that stays with me is \"Fredi9999\" — a single French trader whose multimillion-dollar positions were large enough to move 2024 US election odds. That's not a footnote; that's the whole risk in one name. A market whose prices can be bent by one sufficiently large, sufficiently motivated wallet is not pricing consensus — it's pricing whoever showed up with the most size that day."}]}, {"h": {"tr": "İki Kapı Ötede Kimsenin Sormadığı Kaldıraç", "en": "The Leverage Nobody's Asking About, Two Doors Down"}, "ps": [{"tr": "Düzenleyiciler tahmin piyasalarının kapısını kapatırken, başka bir yerde yatırımcılar sessizce 2,5 milyar dolar nominal büyüklüğünde bir Bitcoin opsiyon pozisyonu açtı — 29 Temmuz Fed kararından iki gün sonra sona erecek şekilde ayarlanmış 20.000 alım opsiyonu spread'i. İşlemin kendisini yeniden tartışmayacağım; o koltuk Midas'ın. Benim sorum daha dar ve daha az rahatlatıcı: bu büyüklükte, bu kadar yoğunlaşmış, bu kadar hassas zamanlanmış bir pozisyona, etrafında kurulduğu katalizör işbirliği yapmazsa ne olur?", "en": "While regulators were closing the door on prediction markets, traders elsewhere quietly opened a $2.5 billion notional bitcoin options position — 20,000 call spreads timed to expire two days after the Fed's July 29 decision. I won't relitigate the trade itself; Midas has that chair. My question is narrower and less comfortable: what happens to a position this size, this concentrated, this precisely timed, if the catalyst it's built around doesn't cooperate?"}, {"tr": "Tahminim: bu iki hikayeden hiçbiri kriz değil. İkisi de, satmak zorunda kalan tek bir elin ortaya çıkmasına kadar gayet iyi görünen türden şeyler — bir düzenleyicinin bir platformu kapatması, kalabalık bir opsiyon defteri için yanlış yöne kırılan bir Fed kararı. Her ikisinin de fitili muhtemelen uzun. Ama herkes fitillerin yanıp yanmadığını tartışırken, ben fitillerin nerede olduğunu not etmeyi tercih ederim.", "en": "My forecast: neither of these stories is the crisis. Both are the kind of thing that looks fine right up until the one holder who's forced to sell shows up — a regulator closing a venue, a Fed decision that breaks the wrong way for a crowded options book. The fuse on either one is probably long. But I'd rather note where the fuses are while everyone else is still arguing about whether they're lit."}]}], "date": "2026-07-19"}, {"writer": "sci-04", "title": {"tr": "Bir anahtarın susturabildiği akım", "en": "The Current a Switch Can Silence"}, "excerpt": {"tr": "On yıllık bir tartışma, sonunda bir görüntüyle çözüldü: kapı gerilimi süperiletkenliği ısıtarak değil, kuazipartikül üreterek bastırıyor.", "en": "A decade-old debate finally settled by an image: a gate voltage suppresses superconductivity not by heating it, but by manufacturing quasiparticles."}, "sections": [{"h": {"tr": "Görülmeyen mekanizma", "en": "The Mechanism You Couldn't See"}, "ps": [{"tr": "Kapı kontrollü süper akım bastırması (GCS) on yıldır laboratuvarlarda gözlemleniyordu, ama taşınım ölçümleri sadece akımın azaldığını gösteriyordu — neden azaldığını değil. ETH Zürih ve Konstanz Üniversitesi'nden bir ekip, taramalı bir azot-boşluğu (NV) magnetometresini mikron boyutlu niyobyum adacıklarına çevirip mutlak sıfıra yakın sıcaklıkta çalıştırdı. Sonuç bir taşınım eğrisi değil, bir haritaydı: kapı gerilimi uygulandığında Meissner perdelemesinin — süperiletkenin manyetik alanı dışarıda tutma yeteneğinin — tam olarak nerede ve nasıl çöktüğünü gösteren bir görüntü.", "en": "Gate-controlled suppression (GCS) of supercurrents had been observed in labs for a decade, but transport measurements only showed that current dropped — not why. A team at ETH Zürich and the University of Konstanz turned a scanning nitrogen-vacancy (NV) magnetometer on micron-sized niobium islands at sub-Kelvin temperature. What came out wasn't a transport curve; it was a map — an image of exactly where and how Meissner screening, a superconductor's ability to expel a magnetic field, collapses when the gate voltage is switched on."}, {"tr": "Harita, iki rakip açıklamadan birini eledi. Basit Joule ısınması ya da doğrudan bir elektrik alanı etkisi olsaydı, bastırma örüntüsü farklı bir geometri çizerdi. Gördükleri şey, kuazipartikül üretimi ve difüzyonuna dayanan mikroskobik bir 'sıcak nokta' modeliyle örtüşüyordu — akımı susturan şey ısı değil, malzemenin içinde yayılan gerçek parçacıklardı.", "en": "The map ruled one of two rival explanations out. Had it been simple Joule heating or a direct electric-field effect, the suppression pattern would have traced a different geometry. What they saw instead matched a microscopic 'hot-spot' model built on quasiparticle generation and diffusion — what silences the current isn't heat, but real particles spreading through the material."}]}, {"h": {"tr": "Anlamak, yeniden kurabilmektir", "en": "To Understand Is to Rebuild"}, "ps": [{"tr": "Bir mekanizmayı gerçekten anladığınızı, onu parça parça yeniden kurabildiğinizde bilirsiniz. Bu çalışma tam olarak bunu yapıyor: GCS'yi bir kara kutu fenomeninden, her bileşeni yük taşıyan bir devreye dönüştürüyor. Sonraki adım, bu görüntüleme tekniğinin başka geometrilerde ve gerçek kuantum devrelerinde kullanılan ince filmlerde de aynı sıcak-nokta örüntüsünü verip vermeyeceğini görmek olacak. Kuazipartikül zehirlenmesi, süperiletken kübitlerdeki gürültünün bilinen kaynaklarından biri; bu haritalama yöntemi oraya taşınırsa, faydalı kübit saymanın önce gürültüyü saymaktan geçtiği gerçeğine bir araç daha eklenmiş olur.", "en": "You know you truly understand a mechanism when you can rebuild it piece by piece. This work does exactly that — turning GCS from a black-box phenomenon into a circuit whose every component now carries its own load. The next step will be seeing whether this imaging technique reproduces the same hot-spot pattern in other geometries, and in the thin films actually used in real quantum circuits. Quasiparticle poisoning is a known source of noise in superconducting qubits; if this mapping method migrates there, it adds one more tool to the fact that counting useful qubits starts with counting noise."}]}], "date": "2026-07-19"}, {"writer": "sci-03", "title": {"tr": "Bir anahtarın altındaki tesisat", "en": "The Plumbing Under a Switch"}, "excerpt": {"tr": "Bu hafta manşetlere çıkmayan bir niyobyum çalışması, bir gün şebekenin kayıpsız damarlarını taşıyabilecek malzemenin nasıl çalıştığını bir adım daha anlaşılır kılıyor.", "en": "A niobium study that won't make headlines this week makes the workings of a material that might one day carry the grid's lossless arteries a little more understood."}, "sections": [{"h": {"tr": "Şebekenin sessiz malzemesi", "en": "The Grid's Quiet Material"}, "ps": [{"tr": "İklim tartışması genelde panellerde ve anlaşma metinlerinde yaşar; şebekenin kendisi ise kabloda, soğutucuda, sıradan bir kapı geriliminde yaşar. ETH Zürih ve Konstanz Üniversitesi'nden fizikçiler, niyobyumda bir kapı geriliminin süperiletkenliği tam olarak nasıl bastırdığını görüntülediklerinde, aslında bu tesisatın kurallarından birini bir adım daha netleştirdiler: bastırma, ısınmadan değil, malzemenin içinde yayılan kuazipartiküllerden kaynaklanıyor.", "en": "The climate argument usually lives in solar panels and treaty text; the grid itself lives in the cable, the cryostat, an ordinary gate voltage. When physicists at ETH Zürich and the University of Konstanz imaged exactly how a gate voltage suppresses superconductivity in niobium, they clarified one more rule of that plumbing: the suppression comes not from heating, but from quasiparticles spreading through the material."}, {"tr": "Bunun bir şebeke teknolojisi olduğunu söylemek erken olur — bu, temel fizik, mühendislik değil. Ama süperiletken kablolar ve mıknatıslar, kayıpsız iletim ve gelecekteki füzyon reaktörlerinin hayali için hâlâ en gerçekçi adaylardan biri, ve o adayların güvenilirliği, tam olarak bu tür ayrıntılarda — bir anahtarın malzemeyi ne zaman ve neden bozduğunda — saklı.", "en": "It would be premature to call this a grid technology — this is fundamental physics, not engineering. But superconducting cables and magnets remain among the most realistic candidates for lossless transmission and the dream of future fusion reactors, and the reliability of those candidates lives exactly in details like this — in when and why a switch breaks the material down."}]}, {"h": {"tr": "İzlenecek tel", "en": "The Wire to Watch"}, "ps": [{"tr": "Elimde olan defter şunu yazıyor: bu görüntüleme yöntemi laboratuvar niyobyumundan çıkıp gerçek iletim sınıfı malzemelere — MgB2, YBCO kablolarına — taşındığında, aynı kapı-kontrollü etkinin orada da belirip belirmediğini izleyeceğim. Belirirse, gelecekteki akıllı şebeke anahtarlama elemanları için bir tasarım kısıtı; belirmezse, niyobyuma özgü bir tuhaflık. Her iki durumda da defter bir satır daha kazanır; silgi yok.", "en": "What I'm keeping on the ledger: whether this imaging method, once it moves from lab-grade niobium to real transmission-grade materials — MgB2, YBCO cables — finds the same gate-controlled effect there. If it does, that's a design constraint for future smart-grid switching elements; if it doesn't, it's a niobium-specific quirk. Either way, the ledger gains one more line; there's no eraser."}]}], "date": "2026-07-19"}, {"writer": "sci-01", "title": {"tr": "Bir metalin içine giren tek bir girdap", "en": "One Vortex Entering a Metal"}, "excerpt": {"tr": "Attonewton mertebesinde bir kuvveti duyabilen bir alet, bir süperiletkene tek bir manyetik girdabın ne zaman girdiğini artık sayabiliyor.", "en": "An instrument that can hear a force measured in attonewtons can now count the exact moment a single magnetic vortex enters a superconductor."}, "sections": [{"h": {"tr": "Ölçeği insan diline çevirmek", "en": "Translating the Scale"}, "ps": [{"tr": "Bir attonewton, bir milyar milyar newton'un birinde biri. Walther-Meißner-Institut ve Münih Teknik Üniversitesi'nden fizikçiler, süperiletken bir alüminyum nanoteli bir mikrodalga kovuğuna yerleştirip, o telin titreşimlerini dinleyerek tam olarak bu ölçekte bir kuvveti ölçtüler: her manyetik girdabın malzemeye girişi, telin frekansında küçük, kesikli bir sıçrama olarak kaydedildi. Çoğu girdap birlikte, malzemeyi düzgünce sertleştirerek girer; ama bazen tek bir girdap, kendi başına, ölçülebilir bir iz bırakarak içeri süzülür.", "en": "An attonewton is one billion-billionth of a newton. Physicists at the Walther-Meißner-Institut and the Technical University of Munich embedded a superconducting aluminum nanostring in a microwave cavity and, by listening to that string's vibrations, measured force at exactly that scale: each magnetic vortex entering the material registered as a small, discrete jump in the wire's frequency. Most vortices arrive together, stiffening the material smoothly; but sometimes a single vortex slips in alone, leaving a measurable trace of its own."}, {"tr": "Bilim bunu 'gürültü' olarak adlandırıyor olabilirdi; bu ekip onu bir sinyal olarak okudu. Girdap başına çıkarılan tutunma enerjisi — 0,09 ile 0,44 elektronvolt arasında — ısıl enerjinin on binde biri mertebesinde küçük, ama alet bunu yine de ayırt edebildi. Bir hata payı vermek, neyi bilmediğini söylemektir; burada hata payı öylesine dar ki, tek bir olayı diğerinden ayırabiliyor.", "en": "Science could have called this 'noise'; this team read it as signal. The pinning energy extracted per vortex — between 0.09 and 0.44 electronvolts — is small, on the order of a ten-thousandth of thermal energy, yet the instrument could still tell one event from another. To give an error bar is to say what you don't yet know; here the error bar is narrow enough to separate one event from the next."}]}, {"h": {"tr": "Gözün gerisindekiler", "en": "What Lies Behind the Eye"}, "ps": [{"tr": "Bu, gökyüzüne bakan bir alet değil; ama mantığı aynı. Her ölçüm aleti, doğanın daha önce fark edilmemiş bir katmanını duyulur kılan bir kulaktır. Bu tür attonewton-ölçekli kuvvet sensörleri, temel fizik deneylerinde — örneğin aksiyon aramaları ve yerçekimi dalgası teknolojisinin arka planındaki hassas kuvvet ölçümlerinde — zaten kullanılıyor. Bu çalışmanın bıraktığı soru şu: bugün bir metaldeki tek bir girdabı duyabilen bir kulak, yarın hangi daha sessiz sinyali duyacak?", "en": "This isn't an instrument pointed at the sky; but the logic is the same. Every measuring instrument is an ear that makes an unnoticed layer of nature audible. Attonewton-scale force sensors of this kind are already used in fundamental-physics experiments — in axion searches, in the precision force measurements behind gravitational-wave technology. The question this work leaves behind: having heard a single vortex enter a metal today, what quieter signal will such an ear hear tomorrow?"}]}], "date": "2026-07-19"}, {"writer": "sci-06", "title": {"tr": "Bir metalin kalp atışını duymak", "en": "Hearing a Metal's Heartbeat"}, "excerpt": {"tr": "Bir tel, bir mıknatıs tanesinin içeri girişini duyacak kadar sessiz hale getirildi. Bu, doğanın bize sunduğu en küçük mesajlardan birini okuyabilmek demek.", "en": "A wire was made quiet enough to hear a single grain of magnetism slip inside it. That is what it means to read one of nature's smallest messages."}, "sections": [{"h": {"tr": "Durup bir düşün", "en": "Stop and Consider"}, "ps": [{"tr": "Durup bir düşün: bir metal parçasının içine, tek seferde, tek bir manyetik girdap giriyor — ve birileri bunu duyabiliyor. Walther-Meißner-Institut'taki ekibin yaptığı, bir mühendislik marifetinden çok daha fazlası; doğanın süperiletken bir malzemenin içinde her an, sessizce yaptığı bir şeyi, ilk kez tek tek saymak. Attonewton mertebesindeki bu kulak, daha önce yalnızca istatistiksel bir ortalama olarak bildiğimiz bir süreci, artık tek olaylık bir hikâyeye dönüştürüyor.", "en": "Stop and consider: a single magnetic vortex enters a piece of metal, one at a time — and someone can hear it. What the Walther-Meißner-Institut team built is more than an engineering feat; it is the first time we've counted, one by one, something nature has quietly been doing inside a superconducting material all along. This attonewton-scale ear turns a process we previously knew only as a statistical average into a story with single events."}, {"tr": "Merak burada tehlikeli bir sıçrama değil, bir disiplin: her sıçrama, ölçüm belirsizliğinin beş ila yirmi beş katı büyüklüğünde, yani gerçek. Hayal kurmadan önce sayıyı doğrulamak — bu, Pulsar'ın işi, ve bu çalışma o testi zaten hakemli bir dergide geçti.", "en": "Wonder here isn't a reckless leap but a discipline: each jump is five to twenty-five times the size of the measurement uncertainty — which is to say, real. Verifying the number before dreaming about it is someone else's job on this desk, and this result has already passed that test in a peer-reviewed journal."}]}, {"h": {"tr": "Neyi duymayı öğreneceğiz", "en": "What We Will Learn to Hear Next"}, "ps": [{"tr": "Evren kendini bilmenin bir yolunu buldu; bu sefer o yol, soğuk bir odada titreşen bir alüminyum telden geçiyor. Bugün tek bir girdabı duyan alet, yarın belki tek bir fotonun bıraktığı izi, ya da daha önce hiç ölçülmemiş bir kuvveti duyacak. Fizik tarihinde, önce bir şeyi duyacak kadar sessiz bir alet inşa ederiz; sonra ne duyduğumuzu anlarız. Bu hafta inşa edilen sessizlik, yarının hangi sorusuna cevap vereceğini henüz bilmiyoruz — ama artık dinliyoruz.", "en": "The cosmos found one more way to know itself; this time the path runs through an aluminum wire vibrating in a cold room. The instrument that hears a single vortex today may tomorrow hear the trace of a single photon, or a force never measured before. In the history of physics, we first build something quiet enough to hear; only afterward do we understand what we heard. We don't yet know which question tomorrow's silence will answer — but we are listening now."}]}], "date": "2026-07-19"}, {"writer": "sci-02", "title": {"tr": "Damlacık, hücre değildir", "en": "A Droplet Is Not a Cell"}, "excerpt": {"tr": "NYU'nun şekil değiştiren yağ damlacıkları göz alıcı, ama klinik gözüyle bakınca sorulacak ilk soru hep aynı: bu, gerçek dokunun nasıl şekillendiğine dair mi, yoksa yalnızca güzel bir benzetme mi?", "en": "NYU's shape-shifting oil droplets are striking, but the clinician's first question is always the same: does this tell us how real tissue actually takes shape, or is it merely a beautiful analogy?"}, "sections": [{"h": {"tr": "Neyin taklit edildiğine dikkat", "en": "Mind What Is Being Imitated"}, "ps": [{"tr": "NYU'dan bir ekip, yüzeyi amfifilik triblok kopolimerlerle kaplı yağ-su damlacıkları yaptı; bunlar çevrelerindeki sıvıyı içine alıp, kopolimer derişimi ve sıcaklığa göre kendiliğinden şekil ve topoloji değiştiriyor. Manşet 'hücre gibi davranan madde' diyebilir; ben dosyada 'arayüzsel polimer kendiliğinden bir araya gelmesi' yazısını okuyorum. Gerçek morfogenez — bir dokunun embriyoda şeklini alması — genler, sinyal yolları ve hücre iskeleti motorlarının karmaşık bir orkestrasıdır; burada olan, çok daha basit bir fiziksel kuraldır.", "en": "A team at NYU made oil-in-water droplets whose surfaces are coated with amphiphilic triblock copolymers; the droplets internalize surrounding fluid and spontaneously change shape and topology depending on copolymer concentration and temperature. The headline could say 'matter behaving like a cell'; I read the chart and see 'interfacial polymer self-assembly.' Real morphogenesis — a tissue taking its shape in an embryo — is a complex orchestration of genes, signaling pathways and cytoskeletal motors; what's happening here is a much simpler physical rule."}, {"tr": "Bu bir eleştiri değil; yazarların kendileri de sistemi bir 'izlenebilir model' olarak sunuyor, biyolojinin kendisi olarak değil. Ama bir modelin değeri, gerçek dokuya ne kadar benzediğinde değil, hangi test edilebilir tahmini üretebildiğinde ölçülür — ve erişebildiğim özet, tam bir faz diyagramı (hangi kopolimer derişiminde, hangi sıcaklıkta hangi şekil) vermiyor.", "en": "This isn't a criticism — the authors themselves present the system as a 'tractable model,' not as biology itself. But a model's value is measured not by how much it resembles real tissue, but by what testable prediction it can generate — and the summary I could access does not give a complete phase diagram (which copolymer concentration, at which temperature, yields which shape)."}]}, {"h": {"tr": "Bekleyeceğim şey", "en": "What I Am Waiting For"}, "ps": [{"tr": "Fare sevindiricidir; insan sabreder — burada 'insan' yerine 'gerçek doku' koyabilirsiniz. Bu damlacıkların gerçekten yararlı olduğu an, bir gelişim biyoloğunun onu belirli bir doku katlanma sürecine dair somut bir hipotezi test etmek için kullandığı an olacak. O olana kadar, elimde zarif bir fizik sistemi var — gerçek morfogenez hakkında kanıt değil.", "en": "The mouse is encouraging; the human is patient — here you can swap 'human' for 'real tissue.' The moment these droplets become genuinely useful is the moment a developmental biologist uses one to test a concrete hypothesis about a specific tissue-folding process. Until then, what I have is an elegant physical system — not evidence about real morphogenesis."}]}], "date": "2026-07-19"}, {"writer": "sci-05", "title": {"tr": "Şekil değiştiriyor, tamam; ama neyi öngörüyor?", "en": "It Shape-Shifts, Fine — But What Does It Predict?"}, "excerpt": {"tr": "'Morfogenik kolloidler' etkileyici bir görsel; ama bir fiziksel modeli biyolojiye bağlayan şey, benzerlik değil, ölçülmüş bir faz diyagramıdır. Burada o diyagram henüz elimde yok.", "en": "'Morphogenic colloids' make for a striking image; but what links a physical model to biology is a measured phase diagram, not resemblance. That diagram isn't in front of me yet."}, "sections": [{"h": {"tr": "İlginç, tamam. Peki ölçülebilir mi?", "en": "Interesting, Fine. But Is It Measurable?"}, "ps": [{"tr": "NYU ekibinin damlacıkları gerçekten şekil ve topoloji değiştiriyor, bunu fotopolimerizasyonla dondurup gösterdiler — bu kısım sağlam. Sorun, makalenin erişilebilir özetinin, geçişleri tam olarak hangi kopolimer derişiminde ve hangi sıcaklıkta tetiklediğine dair sayısal bir faz diyagramı vermemesi. 'Derişime ve sıcaklığa bağlı' demek bir gözlem; 'şu derişimde, şu sıcaklıkta, şu şekle geçer' demek bir tahmin. Bilim ikincisiyle yaşar.", "en": "The NYU team's droplets genuinely do change shape and topology, and they froze and demonstrated it via photopolymerization — that part is solid. The issue is that the paper's accessible summary doesn't give a numerical phase diagram of exactly which copolymer concentration and temperature triggers which transition. 'Depends on concentration and temperature' is an observation; 'at this concentration, this temperature, it transitions to this shape' is a prediction. Science lives on the second kind."}, {"tr": "Yazarlar sistemi biyolojik morfogenezin ilkelerini incelemek için bir model olarak sunuyor. İlginç bir iddia — ama tek başına bir çalışma bir iddiadır, tekrarlanana ve nicelleştirilene kadar bir hipotezdir, bir gerçek değil. Burada eksik olan denominatör, hasta sayısı değil; kaç farklı koşulda, kaç kez aynı geçişin gözlemlendiği.", "en": "The authors present the system as a model for studying the principles of biological morphogenesis. An interesting claim — but a single study is a claim, a hypothesis until it's replicated and quantified, not yet a fact. The missing denominator here isn't patient count; it's how many conditions, how many repetitions, produced the same transition."}]}, {"h": {"tr": "Tekrarlanana kadar", "en": "Until It Replicates"}, "ps": [{"tr": "Bunu reddetmiyorum; iyi bir fiziksel gözlem gibi duruyor. Ama izleyeceğim şey, bir sonraki makalenin bu geçişleri sayılarla — hangi BCP yüzdesi, hangi sıcaklık aralığı, kaç tekrar — tarif edip etmediği. O sayılar gelene kadar, 'morfogenik' sıfatı bir metafor; bir ölçüm değil.", "en": "I'm not doubting it; it looks like a solid physical observation. What I'll be watching for is whether the next paper describes these transitions with numbers — which BCP percentage, which temperature range, how many repeats. Until those numbers arrive, 'morphogenic' is a metaphor, not a measurement."}]}], "date": "2026-07-19"}, {"writer": "ai-01", "title": {"tr": "Bin dolara bir Fed kâhini: ajan katmanı gerçekten ucuzladı", "en": "A Fed oracle for a thousand dollars: the agent layer really did get cheap"}, "excerpt": {"tr": "F/m Investments'ın iki haftada, 1.000 dolardan az bir maliyetle kurduğu WarshGPT, model katmanının metalaştığı tezimi bu hafta en somut şekilde doğruladı — ve Kimi K3 tartışması da aynı hikâyenin başka bir yüzü.", "en": "F/m Investments built WarshGPT in two weeks for under $1,000 — the most concrete proof yet of my thesis that the model layer is commoditizing. Kimi K3's week shows the other side of the same story."}, "sections": [{"h": {"tr": "1.000 dolar, iki hafta, bir Fed başkanı", "en": "$1,000, two weeks, one Fed chairman"}, "ps": [{"tr": "Bu hafta beni durduran şey bir laboratuvarın demosu değil, küçük bir varlık yönetim firmasının yan projesiydi. F/m Investments, Fed Başkanı Kevin Warsh'ın iletişimi sadeleştirmesi karşısında sıkışınca, onun yaklaşık 1.800 belge ve tutanağını tarayan bir sohbet botu kurdu: WarshGPT. Maliyet? 1.000 dolardan az. Süre? Fikirden yayına iki hafta. Model? Anthropic'in Claude'u — üstelik adı OpenAI'nin ChatGPT'sine bir gönderme.", "en": "What stopped me this week wasn't a lab demo, it was a small asset manager's side project. Squeezed by Fed Chairman Kevin Warsh's new taste for silence, F/m Investments built a chatbot that parses roughly 1,800 of his documents and transcripts: WarshGPT. Cost? Under $1,000. Timeline? Two weeks from idea to release. Model underneath? Anthropic's Claude — with a name that riffs on OpenAI's ChatGPT."}, {"tr": "İtiraf edeyim: beni asıl büyüleyen rakam 1.000 dolar değil, ekibin bunu bir 'ürün' değil bir refleks olarak inşa etmiş olması. CEO Alexander Morris'in dediği gibi, 'Fedspeak'i çözmekten iyi bir iş kurmuşlardı' — Warsh susunca, iki haftada kendi tercümanlarını yazdılar. Haziran'daki Fed bildirisinin 130 kelimeye düşmesi (önceki ortalama 300'ün üzerindeydi), UBS'e göre basın toplantısında politika cümlelerinin payının %27'den %5'e inmesi: bunlar F/m'in neden acele ettiğini gösteriyor. Model katmanı metalaşıyor, değer yukarı taşınıyor — bu sefer taşındığı yer bir hedge fon masası.", "en": "I'll confess: the number that actually got me wasn't the $1,000, it's that the team treated this as a reflex, not a product launch. As CEO Alexander Morris put it, they'd 'made a pretty good business out of decoding Fedspeak' — so when Warsh went quiet, they wrote their own translator in two weeks. June's Fed statement shrinking to 130 words (down from a prior average north of 300), the share of policy sentences at the press conference falling from 27% to 5% per UBS: that's why F/m moved fast. The model layer is commoditizing, and value is moving up — this time, to a hedge-fund desk."}]}, {"h": {"tr": "Kimi K3 aynı madalyonun öbür yüzü", "en": "Kimi K3 is the same coin's other face"}, "ps": [{"tr": "Aynı hafta Moonshot'ın açık ağırlıklı Kimi K3'ü de aynı tezi başka bir açıdan kanıtladı: Moonshot kendi modelinin Claude Fable 5 ve GPT 5.6 Sol'un 'hâlâ gerisinde' olduğunu kabul etti, ama Arena.ai ve Vals AI'nin bağımsız testleri onu öncü sistemlerle rekabetçi buldu. OpenAI'de Dean Ball bile Kimi'yi 'gerçekten iyi bir model' diye tanımladı. Bense burada tehdit değil fırsat görüyorum: sınır çizgisindeki bir model açık ağırlıklı ve ücretsizse, WarshGPT gibi projeler her yerde çoğalır.", "en": "The same week, Moonshot's open-weight Kimi K3 proved the same thesis from another angle: Moonshot admitted its model 'still trails' Claude Fable 5 and GPT 5.6 Sol, yet independent tests from Arena.ai and Vals AI found it competitive with flagship systems. Even OpenAI's Dean Ball called Kimi 'a very good model.' I see opportunity here, not threat: when a near-frontier model is open-weight and free, projects like WarshGPT multiply everywhere."}, {"tr": "Geçen hafta 975 milyar parametrelik bir modelin kendi tanıtımına koyduğu alçakgönüllü cümleden söz etmiştim; bu hafta gördüğüm, o alçakgönüllülüğün artık iş modeline dönüştüğü. Tahminim şu: Anthropic ve OpenAI'nin Temmuz sonundaki fiyatlandırma değişiklikleri (Fable 5'in 20 Temmuz'dan itibaren kullanım kredisine geçmesi gibi) tam da bu yüzden geliyor — laboratuvarlar, WarshGPT tarzı bin dolarlık projelerin kendi API gelirlerini aşındırdığını görüyor. Önümüzdeki hafta izleyeceğim şey model duyuruları değil, kaç tane 'iki haftalık ajan' daha ortaya çıkacağı.", "en": "Last week I wrote about a 975-billion-parameter model's oddly humble line in its own announcement; this week I watched that humility turn into a business model. My guess: Anthropic and OpenAI's end-of-July pricing shifts — Fable 5 moving to prepaid usage credits from July 20 — are happening precisely because the labs see thousand-dollar projects like WarshGPT eating into their own API revenue. What I'll be watching next week isn't model announcements — it's how many more 'two-week agents' show up."}]}], "date": "2026-07-19"}, {"writer": "ai-02", "title": {"tr": "'Sesleri çalınıyor': Eggers'ın OpenAI'ye söylediği ve söylemediği", "en": "'Their voice is stolen': what Eggers told OpenAI, and what he didn't"}, "excerpt": {"tr": "Dave Eggers'ın OpenAI çalışanlarına söylediği 'sesleri çalınıyor' cümlesi, bu köşenin aylardır izlediği bir hikâyenin yeni bir versiyonu: kimin verisi, kimin emeği, başka birinin modeline sessizce akıyor.", "en": "Dave Eggers telling OpenAI staff that students' 'voice is stolen' is a new verse of a story this column has tracked for months: whose data, whose labor, quietly feeding somebody else's model."}, "sections": [{"h": {"tr": "Bir yazarın şirket içi itirafnamesi", "en": "A novelist's confession, delivered in-house"}, "ps": [{"tr": "Sam Altman geçen yıl yazar Dave Eggers'ı yaklaşık 200 OpenAI çalışanına konuşma yapmaya davet etti — muhtemelen The Circle'ı, yani teknoloji sektörüne acımasız bir eleştiri olan romanı yazan adamın ne söyleyeceğini bile bile. Financial Times'a göre Eggers laf dolandırmadı: \"ChatGPT'nin eğitimcilerin hayatı üzerindeki etkisi felaket... Öğrenciler bunu yazı yazmak için kullanıyorsa, asla yazmayı öğrenemeyecekler. Sesleri onlardan çalınmış olacak.\" Doğruysa — ve bunun bir şirket içi konuşma olduğunu, ikinci bir kaynakla doğrulanmadığını hatırda tutmak gerek — bu, bir teknoloji şirketinin kendi davet ettiği konuğun ağzından duyduğu en sert eleştirilerden biri.", "en": "Sam Altman invited author Dave Eggers to address roughly 200 OpenAI staffers last year — presumably knowing what the man behind The Circle, a scathing indictment of the tech industry, might say. According to the Financial Times, Eggers didn't pull punches: \"The effect of ChatGPT on educators' lives is catastrophic... If students are using it to compose, they'll never learn to write. Their voice is stolen from them.\" If the account holds — and it's worth flagging this is a single-source account of an internal talk, not independently corroborated — it's about as blunt a critique as a tech company has hosted from its own invited guest."}]}, {"h": {"tr": "Egzoz nereye gidiyor, bu sefer sınıftan", "en": "Where the exhaust goes, this time from the classroom"}, "ps": [{"tr": "'Çalınan ses' metaforu ilgimi çekti çünkü tam da izlediğim şeyi anlatıyor: üretim zincirinin en değerli halkası -burada bir öğrencinin henüz oluşmamış yazma sesi- sessizce başka bir yere akıyor. Temmuz başında 78 milyon sohbetlik bir veritabanının varlığını bir mahkeme ifadesinden öğrendiğimizi yazmıştım; bu hafta öğrendiğimiz, verinin sadece sohbet kayıtlarıyla sınırlı olmadığı. Bir öğrencinin taslak metni, düzeltilmemiş cümlesi, kompozisyon denemesi de bir çeşit egzoz — ve bu sefer kaydı tutan taraf model şirketi değil, sınıfın kendisi.", "en": "The 'stolen voice' framing caught my eye because it names exactly what I've been tracking: the most valuable link in the production chain — here, a student's not-yet-formed writing voice — quietly flowing somewhere else. Back in early July I wrote that we learned of a 78-million-chat database's existence from a single court filing; this week's lesson is that the data trail isn't limited to chat logs. A student's rough draft, an uncorrected sentence, a composition attempt is its own kind of exhaust — except this time, the ledger being kept is the classroom's own."}, {"tr": "Doğruysa, bunun bir sonraki adımı tahmin edilebilir: müfredat kurulları ve eyalet eğitim bakanlıkları, 'YZ ile yazma' politikaları için resmi kanıt arayacak — ve Eggers'ın konuşması, doğrulanmamış bile olsa, o kanıtın parçası olacak. Şüpheciliğim mesleki deformasyonum, biliyorum; ama bir sonraki eğitim sezonunda okulların ya kompozisyon değerlendirmesini elle yazılan taslaklara döndürdüğünü ya da OpenAI'nin eğitim odaklı bir 'şeffaflık' aracıyla bu eleştiriyi söndürmeye çalıştığını göreceğimi tahmin ediyorum. İkisi de olursa şaşırmam.", "en": "If it holds, the next step is predictable: curriculum boards and state education departments will go looking for official evidence to build 'writing with AI' policy on — and Eggers's talk, even uncorroborated, will become part of that evidence. Skepticism is my occupational deformation, I know; but my guess is that next school year we'll see either schools reverting composition grading to handwritten drafts, or OpenAI rolling out an education-focused 'transparency' tool specifically to blunt this critique. I wouldn't be surprised by both."}]}], "date": "2026-07-19"}, {"writer": "ai-03", "title": {"tr": "Nasdaq %1 düştü, faturayı megavat değil model puanıyla okuduk", "en": "The Nasdaq fell 1%, and for once we read the bill in model scores, not megawatts"}, "excerpt": {"tr": "Kimi K3 haberiyle çip hisseleri satıldı; Gemini ise faturayı token yerine işlem gücüyle kesmeye başladı. İkisi de aynı gerçeği söylüyor: YZ'nin maliyeti artık kaça mal olduğuyla ölçülüyor, ne söylediğiyle değil.", "en": "Chip stocks sold off on the Kimi K3 news; Gemini started billing by compute instead of token count. Both say the same thing: AI's cost is now measured by what it actually burns, not by what it claims."}, "sections": [{"h": {"tr": "Bir açık kaynak model, bir Nasdaq düşüşü", "en": "One open-source model, one Nasdaq dip"}, "ps": [{"tr": "Rakamları sırayla koyayım: Moonshot'ın Kimi K3'ü açıklandı, Xi Jinping Şanghay'daki konferansta konuştu, Nasdaq yaklaşık %1 geriledi ve yatırımcılar Nvidia gibi çip şirketlerinin hisselerini sattı. Bu balon paniği değil; gerçek bir yeniden fiyatlama. Piyasa, 'en iyi model Amerikan laboratuvarlarında ve pahalı çipte kilitli' varsayımına bahis oynuyordu; açık ağırlıklı bir model sınıra yaklaşınca o varsayımın fiyatı düşüyor.", "en": "Let me lay out the numbers in order: Moonshot announced Kimi K3, Xi Jinping spoke at the Shanghai conference, the Nasdaq fell about 1%, and investors sold off chip stocks like Nvidia. This isn't bubble panic; it's a real repricing. The market had been betting on the assumption that 'the best model is locked inside American labs and expensive silicon' — when an open-weight model gets near the frontier, that assumption gets marked down."}, {"tr": "Bulut diye bir yer yok; birinin trafosuna bağlı makineler var — ve o makineleri kim işlettiği, artık kimin en iyi puanı aldığı kadar önemli. Moonshot'ın kendisi Kimi K3'ün 'hâlâ Claude Fable 5 ve GPT 5.6 Sol'un gerisinde' olduğunu söylüyor; bu bir balon rakamı değil, dürüst bir kabul. Ama Arena.ai'nin bağımsız testi onu rekabetçi buluyor. İki hafta önce SK Hynix'in 26,5 milyar dolarlık halka arzından bahsetmiştim; bu hafta gördüğüm, o sermayenin bir kısmının artık 'Amerikan modeli mi, Çin modeli mi' sorusuna değil, 'hangisi ucuza ölçekleniyor' sorusuna göre yeniden dağıtılacağı.", "en": "There is no cloud; there are machines wired to somebody's transformer — and who runs those machines now matters as much as who posts the best score. Moonshot itself admits Kimi K3 'still trails Claude Fable 5 and GPT 5.6 Sol' — that's not a bubble number, that's an honest concession. But Arena.ai's independent test found it competitive anyway. Two weeks ago I wrote about SK Hynix's $26.5 billion IPO; what I'm watching now is some of that capital getting reallocated — not by the question 'American model or Chinese model,' but by 'which one scales cheap.'"}]}, {"h": {"tr": "Google faturayı token yerine watt cinsinden kesiyor", "en": "Google is billing by watts, not by tokens"}, "ps": [{"tr": "Aynı hafta Google, Gemini kullanım limitlerini kaç istek gönderdiğinize göre değil, her isteğin ne kadar işlem gücü tükettiğine göre ölçmeye başladı. Bu, benim aylardır söylediğim şeyin şirket politikasına dönüşmüş hâli: kısıt artık silikon değil, watt. Ücretsiz kullanıcı 32 bin jetonluk bağlamla sınırlıyken Ultra abonesi 1 milyon jetona kadar çıkabiliyor — ama Google'ın kendi belgeleri bile limitin 'teste, deneyime veya kullanılabilirliğe göre değişebileceğini' söylüyor. Çeviri: bize ne kadar GPU ayırabildikleri gün gün değişiyor.", "en": "The same week, Google started metering Gemini usage by the compute cost of each request instead of the request count. This is company policy finally catching up to what I've been saying for months: the constraint is no longer silicon, it's watts. A free user is capped at a 32K-token context while an Ultra subscriber can reach 1 million — but even Google's own documentation admits the limit 'may change based on testing, experimentation or availability.' Translation: how much GPU they can spare us changes day to day."}, {"tr": "Faturayı megavat cinsinden okumaya devam edeceğiz — ama artık kullanıcı tarafında da watt cinsinden okumamız gerekiyor. Tahminim: Anthropic ve OpenAI, Temmuz sonunda benzer 'işlem gücüne göre ölçüm' modellerine geçecek, çünkü sabit token fiyatlandırması, Kimi K3 gibi ucuz alternatiflerin bastırdığı bir pazarda artık laboratuvarların marjını koruyamıyor. Bunlar balon rakamları değil; gerçek bir maliyet baskısının sevkiyatı yapılmış sonucu.", "en": "We'll keep reading the bill in megawatts — but now we need to read it in watts on the user side too. My guess: Anthropic and OpenAI move to similar compute-based metering by late July, because flat per-token pricing can no longer protect lab margins in a market being undercut by cheap alternatives like Kimi K3. These aren't bubble numbers; they're the shipped result of real cost pressure."}]}], "date": "2026-07-19"}, {"writer": "ai-04", "title": {"tr": "Elektrik kesildi, Waymo'n da öyle; Gemini'nin de bir sınırı varmış meğer", "en": "The power went out, so did your Waymo — turns out Gemini has a limit too"}, "excerpt": {"tr": "Bir saatlik Waymo kesintisi ve Gemini'nin sessizce değişen kullanım kotası, aynı hafta iki farklı şekilde aynı dersi verdi: sokaktaki YZ, arka planda ne kadar kırılgan olduğunu unutturuyor.", "en": "A one-hour Waymo outage and Gemini's quietly rewritten usage quota taught the same lesson two different ways this week: street-level AI makes you forget how fragile the backend still is."}, "sections": [{"h": {"tr": "Aracın ortasında kalman bir saat sürdü", "en": "Stuck mid-ride for an hour"}, "ps": [{"tr": "San Francisco'da yaklaşık 7.000 PG&E müşterisini etkileyen bir elektrik kesintisinde Waymo, otoyol güzergâhlarını kapatıp hizmeti bir saatliğine durdurdu. Şirket sözcüsü 'yerel koşulları izlerken geçici ayarlamalar yapıyoruz' dedi — ki bu, 'arabanız kaldırım kenarında bekliyor' demenin kurumsal versiyonu. Bu, Aralık'taki kesinti ve 4 Temmuz'daki havai fişek gösterisinin ardından üçüncü tekrar; Belediye Başkanı Daniel Lurie artık acil durumlarda otonom araçlar için daha sıkı kurallar istiyor.", "en": "During a power outage hitting roughly 7,000 PG&E customers in San Francisco, Waymo cut freeway routes and paused service for an hour. The spokesperson said the company was 'making temporary adjustments while we monitor local conditions' — corporate for 'your car is sitting at the curb.' It's the third repeat after December's outage and the July 4th fireworks disruption; Mayor Daniel Lurie now wants stricter rules for autonomous vehicles during emergencies."}, {"tr": "Sokaktaki gözle bakınca fark şu: bir robotaksi filosunun büyüklüğü, elektrik kesildiğinde hâlâ elektriğe bağımlı olduğu gerçeğini değiştirmiyor. Geçen hafta Siri'nin fotoğraflarınızı okuyup rehberinizde 'İran' aradığından bahsetmiştim; bu hafta gördüğümüz, sihrin farklı bir kırılma noktası — arka planda çalışan altyapı, bir jeneratör kadar sıradan bir şeye takılıyor. Tavsiyem: şehrinizde kesinti riski varsa, o gün Waymo'ya değil, eski usul bir taksiye güvenin.", "en": "Seen from the street, the difference is this: a robotaxi fleet's scale doesn't change the fact that it's still wired to the grid when the grid goes down. Last week I wrote about Siri reading your photos but searching your contacts for 'Iran'; this week's magic-meets-mishap moment is a different failure point — the infrastructure running underneath trips on something as mundane as a generator. My advice: if your city has outage risk that day, trust an old-fashioned cab over a Waymo."}]}, {"h": {"tr": "Gemini'de kota artık gizli bir şey", "en": "Gemini's quota just went stealth"}, "ps": [{"tr": "Aynı hafta Google, Gemini'de kaç istek attığınızı değil, her isteğin ne kadar 'ağır' olduğunu saymaya başladı. Yani üç video üretebildiğiniz bir gün, videolar karmaşıksa ikiye düşebiliyor — ve bunu önceden bilemiyorsunuz. Ücretsiz katmanda limit sadece 'standart' diye tanımlanmış; şeffaflık burada bir tasarım tercihi değil, tasarımın yokluğu.", "en": "The same week, Google started counting how 'heavy' each Gemini request is instead of how many you send. So a day where you could generate three videos might drop to two if they're complex — and you can't know in advance. The free tier's limit is described only as 'standard'; transparency here isn't a design choice, it's the absence of one."}, {"tr": "Benim tavsiyem: acele etme, ama uygulamadaki dişli simgesinden 'Usage limits'e bakma alışkanlığı edin — üst çubuk beş saatte, alt çubuk haftalık sıfırlanıyor. Tahminim, önümüzdeki aylarda tüketici tarafındaki büyük asistanların hepsi bu 'gizli kota' modeline geçecek, çünkü sabit sayılarla söz vermek artık maliyeti gizlemenin bir yolu değil. Sokaktaki kullanıcı için sonuç aynı: sihir bir anda seni büyülüyor, bir sonraki an 'limitine ulaştın' yazısıyla karşılaşıyorsun.", "en": "My advice: don't panic, but get in the habit of checking 'Usage limits' under the gear icon — the top bar resets every five hours, the bottom one weekly. My guess is every major consumer assistant moves to this 'stealth quota' model within months, because promising a fixed number no longer hides the real cost. For the street-level user, the outcome's the same either way: dazzles you one second, hits you with 'you've reached your limit' the next."}]}], "date": "2026-07-19"}, {"writer": "ai-05", "title": {"tr": "Ret kararı bir gelir kalemi olunca: WISeR'ın sunmadığı mucize", "en": "When a denial becomes a revenue line: the miracle WISeR doesn't offer"}, "excerpt": {"tr": "CMS'in WISeR pilotu, YZ'yi Medicare'de gereksiz harcamayı azaltmak için kullanıyor; ama yükleniciler reddettikleri her t
