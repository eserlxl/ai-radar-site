<title>Eigen Radar — Günlük haber ve analizler</title>
<!-- Static by necessity: link-preview scrapers do not run the script, so renderChrome's
     title/lang switch never reaches them. Turkish is the boot language. No og:image —
     it needs a hosted image this repo does not ship. -->
<link rel="canonical" href="https://eigenradar.com/">
<meta name="description" content="Her gün güncellenen yapay zekâ, jeopolitik, ekonomi ve piyasalar ile bilim haberleri; 24 köşe yazarının Türkçe ve İngilizce analizleriyle.">

<meta property="og:description" content="Her gün güncellenen yapay zekâ, jeopolitik, ekonomi ve piyasalar ile bilim haberleri; 24 köşe yazarının Türkçe ve İngilizce analizleriyle.">
<meta property="og:locale" content="tr_TR">
<meta property="og:locale:alternate" content="en_US">

<style>
  :root{
    --bg:#0b0f1a;
    --bg-soft:#111827;
    --card:#151c2c;
    --card-hover:#1a2338;
    --line:#232e47;
    --text:#e8ecf5;
    --muted:#8b96ad;
    --accent:#4fd1c5;
    --accent-soft:rgba(79,209,197,.12);
    --amber:#f6ad55;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
  }
  a{color:var(--accent);text-decoration:none}

  /* ---------- header ---------- */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(11,15,26,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .header-inner{
    max-width:1120px;margin:0 auto;padding:14px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.25rem;letter-spacing:-.02em;color:inherit;text-decoration:none}
  .logo-mark{
    position:relative;
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#7f9cf5);
    display:grid;place-items:center;color:#0b0f1a;font-size:1.15rem;font-weight:900;
  }
  /* a small radar sweep over the eigen (λ) mark — it's Eigen *Radar* */
  .logo-mark .radar-mark{position:absolute;top:1px;right:1px;width:18px;height:18px;color:#0b0f1a;opacity:.8}
  .proto-badge{
    font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--amber);border:1px solid rgba(246,173,85,.4);border-radius:99px;padding:2px 9px;
  }
  .header-right{display:flex;align-items:center;gap:14px}
  .header-meta{font-size:.8rem;color:var(--muted)}
  .header-meta strong{color:var(--text);font-weight:600}
  .lang-switch{display:flex;gap:4px;background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;padding:3px}
  .lang-btn{
    background:none;border:none;cursor:pointer;font-size:1.05rem;line-height:1;
    padding:5px 9px;border-radius:99px;opacity:.45;transition:.15s;font-family:inherit;
  }
  .lang-btn:hover{opacity:.8}
  .lang-btn.active{opacity:1;background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}

  /* ---------- topic switch (one desk at a time, mirrors the language toggle) ---------- */
  /* Auto margins on both sides centre the switch between the logo badge and the
     updated stamp; header-right deliberately has no margin-left:auto. */
  .topic-switch{display:flex;gap:4px;background:var(--bg-soft);border:1px solid var(--line);border-radius:99px;padding:3px;margin:0 auto}
  .topic-btn{
    background:none;border:none;cursor:pointer;line-height:0;color:var(--text);
    padding:8px 14px;border-radius:99px;opacity:.45;transition:.15s;font-family:inherit;
  }
  .topic-btn svg{width:24px;height:24px;display:block}
  .topic-btn:hover{opacity:.8}
  .topic-btn.active{opacity:1;background:var(--accent-soft);box-shadow:inset 0 0 0 1px var(--accent)}
  /* Regulatory notice — must read as a warning, not as decoration. */
  .disclaimer{
    max-width:1120px;margin:0 auto 18px;padding:12px 16px;
    background:rgba(246,173,85,.08);border:1px solid rgba(246,173,85,.4);
    border-left-width:3px;border-radius:8px;
    font-size:.8rem;line-height:1.6;color:var(--muted);
  }
  .disclaimer strong{display:block;color:var(--amber);font-weight:700;margin-bottom:3px;
    font-size:.7rem;letter-spacing:.08em;text-transform:uppercase}
  .reader .disclaimer{margin:28px 0 0}
  .empty-note{color:var(--muted);text-align:center;padding:36px 12px;font-size:.95rem;grid-column:1/-1}
  .podcast-bar{
    max-width:1120px;margin:0 auto 18px;padding:12px 16px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--card);border:1px solid var(--line);border-radius:8px;
  }
  .podcast-bar[hidden]{display:none}  /* display:flex would otherwise defeat `hidden` */
  .podcast-bar .podcast-label{font-size:.8rem;color:var(--muted)}
  .podcast-bar .podcast-label strong{display:block;color:var(--accent);font-weight:700;
    font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
  .podcast-bar audio{flex:1;min-width:220px;height:36px}
  .listen-btn{margin:6px 0 2px;padding:6px 14px;border-radius:99px;border:1px solid var(--line);
    background:var(--accent-soft);color:var(--accent);font-size:.8rem;cursor:pointer}
  .listen-btn.speaking{background:var(--accent);color:var(--card)}

  /* ---------- hero ---------- */
  .hero{max-width:1120px;margin:0 auto;padding:42px 20px 10px}
  .hero h1{font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.03em;line-height:1.2}
  .hero h1 span{color:var(--accent)}
  .hero p{color:var(--muted);margin-top:8px;max-width:640px}

  /* ---------- filters ---------- */
  .filters{max-width:1120px;margin:22px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{
    background:var(--bg-soft);border:1px solid var(--line);color:var(--muted);
    border-radius:99px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:.15s;
    font-family:inherit;
  }
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .chip.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}

  /* ---------- sections ---------- */
  section{max-width:1120px;margin:0 auto;padding:26px 20px}
  .section-title{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
  .section-title h2{font-size:1.15rem;letter-spacing:-.01em}
  .section-title .hint{font-size:.78rem;color:var(--muted)}

  /* ---------- featured ---------- */
  .featured-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px}
  .fcard{
    background:linear-gradient(160deg,var(--card) 0%,#131a2b 100%);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;transition:.18s;position:relative;overflow:hidden;
  }
  .fcard::before{
    content:"";position:absolute;inset:0 0 auto 0;height:3px;
    background:linear-gradient(90deg,var(--accent),#7f9cf5);
  }
  .fcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .fcard h3{font-size:1.05rem;line-height:1.4;letter-spacing:-.01em;margin:10px 0 8px}
  .fcard .summary{color:var(--muted);font-size:.88rem}

  /* featured writer cards (top row of the featured section) */
  .wfcard{
    background:linear-gradient(160deg,var(--card) 0%,#191426 100%);
    border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 22px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;
    text-align:left;font-family:inherit;color:var(--text);
  }
  .wfcard::before{
    content:"";position:absolute;inset:0 0 auto 0;height:3px;
    background:linear-gradient(90deg,var(--amber),#ed64a6);
  }
  .wfcard:hover{transform:translateY(-3px);border-color:var(--amber)}
  .wfcard .wtop{margin-bottom:10px}
  .wfcard .avatar{width:38px;height:38px}
  .wfcard h3{font-size:1.02rem;line-height:1.4;letter-spacing:-.01em;margin:2px 0 8px}
  .wfcard .summary{color:var(--muted);font-size:.86rem}
  .kbadge{
    font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--amber);background:rgba(246,173,85,.12);border:1px solid rgba(246,173,85,.4);
    border-radius:6px;padding:2px 8px;
  }
  /* mobile: show only the first featured writer, desktop shows all three */
  @media(max-width:640px){
    #featuredWriters .wfcard:nth-child(n+2){display:none}
  }

  /* ---------- news cards ---------- */
  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 20px;transition:.15s;
  }
  .card:hover{background:var(--card-hover);border-color:#31405f}
  .card h3{font-size:.98rem;line-height:1.45;letter-spacing:-.01em;margin:8px 0 6px}
  .card .summary{color:var(--muted);font-size:.86rem}
  .news-pager{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px}
  .news-pager[hidden]{display:none}
  .news-pager button{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
    background:var(--card);color:var(--text);font:700 1.1rem/1 inherit;cursor:pointer;
  }
  .news-pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .news-pager button:disabled{opacity:.35;cursor:not-allowed}
  .news-page-status{min-width:72px;text-align:center;color:var(--muted);font-size:.8rem}

  .meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .src{
    font-size:.68rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:2px 8px;
  }
  .tag{font-size:.68rem;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .date{font-size:.72rem;color:var(--muted);margin-left:auto}

  /* detail (2nd level) */
  /* visibility (not just max-height) keeps the collapsed source link out of the tab order */
  .detail{max-height:0;overflow:hidden;visibility:hidden;
          transition:max-height .3s ease,visibility 0s .3s}
  .card.open .detail,.fcard.open .detail{max-height:400px;visibility:visible;
          transition:max-height .3s ease,visibility 0s}
  .detail-inner{
    border-top:1px dashed var(--line);margin-top:12px;padding-top:12px;
    font-size:.87rem;color:#c3cbdc;
  }
  .detail-toggle{
    margin-top:12px;background:none;border:0;padding:2px 0;color:var(--accent);
    font:600 .8rem/1.4 inherit;cursor:pointer;
  }
  .detail-toggle:hover{text-decoration:underline}
  .goto{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    background:var(--accent);color:#0b0f1a;font-weight:700;font-size:.82rem;
    border-radius:8px;padding:8px 14px;transition:.15s;
  }
  .goto:hover{filter:brightness(1.12)}

  /* ---------- writers ---------- */
  .writers-strip{display:flex;gap:12px;flex-wrap:wrap}
  .writers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px}
  .wcard{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;cursor:pointer;transition:.15s;font-family:inherit;color:var(--text);text-align:left;
  }
  .wcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .wtitle{font-size:1rem;line-height:1.4;margin-bottom:6px;letter-spacing:-.01em}
  .wexcerpt{font-size:.85rem;color:var(--muted)}
  .read-more{font-size:.8rem;font-weight:600;color:var(--accent);margin-top:12px;display:inline-block}
  .date-select{
    margin-left:auto;background:var(--bg-soft);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:6px 12px;font-family:inherit;font-size:.8rem;cursor:pointer;
  }
  .date-select:hover{border-color:var(--accent)}
  .wchip{
    display:flex;align-items:center;gap:11px;
    background:var(--card);border:1px solid var(--line);border-radius:99px;
    padding:7px 20px 7px 8px;cursor:pointer;transition:.15s;
    font-family:inherit;color:var(--text);
  }
  .wchip:hover{transform:translateY(-2px);border-color:var(--accent)}
  .wchip .avatar{width:40px;height:40px}
  .wchip .wname{font-size:.86rem;line-height:1.3}
  .wchip .wpiece{font-size:.78rem;color:var(--muted);line-height:1.3;max-width:280px}
  .wtop{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;overflow:hidden;
  }
  .avatar svg,.avatar img{width:100%;height:100%;display:block;object-fit:cover}
  .wname{font-weight:700}
  .wrole{font-size:.75rem;color:var(--muted)}
  .ai-badge{
    font-size:.6rem;font-weight:800;letter-spacing:.08em;color:var(--amber);
    border:1px solid rgba(246,173,85,.4);border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:2px;
  }

  /* ---------- writers drawer trigger ---------- */
  .chip.chip-writers{
    background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600;
    margin-left:auto;display:inline-flex;align-items:center;gap:6px;
  }
  .chip.chip-writers:hover{filter:brightness(1.1)}
  @media(max-width:560px){.chip.chip-writers{margin-left:0}}

  /* ---------- writers drawer ---------- */
  .drawer-overlay{
    position:fixed;inset:0;background:rgba(5,8,15,.6);backdrop-filter:blur(3px);
    opacity:0;visibility:hidden;transition:.25s;z-index:110;
  }
  .drawer-overlay.open{opacity:1;visibility:visible}
  .drawer{
    position:fixed;top:0;left:0;height:100%;width:370px;max-width:88vw;
    background:var(--bg-soft);border-right:1px solid var(--line);
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:120;display:flex;flex-direction:column;box-shadow:8px 0 40px rgba(0,0,0,.35);
  }
  .drawer.open{transform:translateX(0)}
  .drawer-head{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:20px 20px 14px;border-bottom:1px solid var(--line);
  }
  .drawer-head h2{font-size:1.05rem;letter-spacing:-.01em}
  .drawer-head .hint{font-size:.74rem;color:var(--muted);flex-basis:100%}
  .drawer-close{
    margin-left:auto;background:var(--card);border:1px solid var(--line);
    color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;
    font-size:.95rem;font-family:inherit;
  }
  .drawer-close:hover{color:var(--text)}
  .drawer-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .drawer-list .wchip{width:100%;padding:9px 14px 9px 9px}
  .drawer-list .wchip:hover{transform:none;background:var(--card);border-color:var(--accent)}
  .drawer-list .wpiece{max-width:none}

  /* ---------- reading pane ---------- */
  /* Articles open in the page, not a modal: full width, no scroll box, shareable via #hash. */
  .reader{display:none;max-width:1020px;margin:0 auto;padding:28px 20px 64px}
  body.reading .hero,
  body.reading .filters,
  body.reading #deskDisclaimer,
  body.reading > section{display:none}
  body.reading .reader{display:grid;grid-template-columns:215px minmax(0,1fr);gap:34px;align-items:start}
  .reader-back{grid-column:1/-1;justify-self:start}
  /* Sidebar: the other columnists on this desk/day, so you can hop between pieces
     without going back to the edition. */
  .reader-nav{position:sticky;top:18px;display:flex;flex-direction:column;gap:2px}
  .reader-nav .nav-head{
    font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin-bottom:8px;
  }
  .reader-nav button{
    background:none;border:0;border-left:2px solid transparent;color:var(--muted);
    font-family:inherit;font-size:.85rem;text-align:left;cursor:pointer;
    padding:7px 10px;border-radius:0 6px 6px 0;line-height:1.35;
  }
  .reader-nav .nm{display:block;color:var(--text);font-weight:600}
  /* The subject line is the hook; two lines is enough to sell the piece. */
  .reader-nav .tl{
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    font-size:.76rem;line-height:1.3;margin-top:2px;
  }
  .reader-nav button:hover{color:var(--text);background:var(--card)}
  .reader-nav button[aria-current="true"]{color:var(--text);font-weight:700;border-left-color:var(--accent)}
  @media(max-width:820px){
    body.reading .reader{grid-template-columns:1fr;gap:18px}
    .reader-nav{position:static;flex-direction:row;flex-wrap:wrap;gap:6px}
    .reader-nav .nav-head{display:none}
    .reader-nav button{border-left:0;border:1px solid var(--line);border-radius:99px;padding:5px 11px}
    .reader-nav .tl{display:none}  /* chips stay chips on mobile */
    .reader-nav button[aria-current="true"]{border-color:var(--accent)}
  }
  .reader-back{
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;
    margin-bottom:26px;
  }
  /* Share sits on the same grid row as Back, pushed to the far edge. */
  .reader-share{justify-self:end}
  body.reading .reader .reader-back,
  body.reading .reader .reader-share{grid-row:1}
  .reader-back:hover{color:var(--text);border-color:var(--accent)}
  .reader h2{font-size:1.55rem;letter-spacing:-.02em;line-height:1.28;margin:16px 0 6px}
  .reader .wrole{margin-bottom:18px}
  .reader .body{font-size:1rem;line-height:1.75;color:#d4dae6;max-width:66ch}
  .reader .body p{margin-bottom:17px}
  .reader .body h4{margin:28px 0 10px;font-size:1.08rem;font-weight:700;letter-spacing:-.01em;color:var(--text)}
  .reader .body .sep{
    text-align:center;color:var(--muted);letter-spacing:.6em;
    margin:24px 0;font-size:.8rem;user-select:none;
  }

  /* ---------- footer ---------- */
  footer{border-top:1px solid var(--line);margin-top:40px}
  .footer-inner{max-width:1120px;margin:0 auto;padding:30px 20px;font-size:.8rem;color:var(--muted)}
  .footer-inner p{margin-bottom:8px}

  .hidden{display:none!important}
  .chip-search{
    background:var(--card);color:var(--text);border:1px solid var(--line);
    width:150px;font:inherit;opacity:1;cursor:text;
  }
  .chip-search::placeholder{color:var(--muted)}
  /* Motion-sensitive readers: kill every transition/animation when the OS asks. */
  @media (prefers-reduced-motion: reduce){
    *,::before,::after{transition:none !important;animation:none !important;
                       scroll-behavior:auto !important}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" id="homeLink" href="./">
      <div class="logo-mark" aria-hidden="true">
        <span class="eigen">λ</span>
        <svg class="radar-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <path d="M12 12 L12 3.5"/>
          <path d="M12 4.5 A7.5 7.5 0 0 1 19.5 12"/>
          <path d="M12 8 A4 4 0 0 1 16 12"/>
          <circle cx="12" cy="12" r="1.9" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span id="siteName">Eigen Radar</span>
      <span class="proto-badge" id="protoBadge">News</span>
    </a>
    <div class="topic-switch" id="topicSwitch" role="tablist" aria-label="Konu / Topic"></div>
    <div class="header-right">
      <div class="header-meta" id="updated"></div>

/* Avatar images are keyed by writer ID: IMAGES['avatar-<id>'] (e.g. avatar-01).
   Fully id-based — a writer's name can change without touching the image. */
function avatarOf(w){
  const src = w && IMAGES['avatar-' + w.id];
  return src ? `<img src="${src}" alt="">` : '';
}

i", "en": "Biology"}, "climate": {"tr": "İklim", "en": "Climate"}, "physics": {"tr": "Fizik", "en": "Physics"}, "tech": {"tr": "Teknoloji", "en": "Technology"}}}, "latestNews": [{"featured": true, "topic": "ai", "tag": "hukuk", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/anthropics-landmark-1-5b-copyright-settlement-is-approved", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Anthropic'in 1,5 milyar dolarlık telif hakkı uzlaşması onaylandı", "en": "Anthropic's $1.5 billion copyright settlement wins final approval"}, "summary": {"tr": "ABD'li yazarların ve yayıncıların açtığı toplu davada Kaliforniya'daki federal mahkeme, Anthropic'in 1,5 milyar dolarlık uzlaşmasına nihai onayı verdi; yaklaşık 500.000 esere karşılık eser başına 3.000 dolar ödenecek.", "en": "A federal court in California gave final approval to Anthropic's $1.5 billion settlement with authors and publishers, covering roughly 500,000 works at $3,000 per work."}, "detail": {"tr": "Kuzey Kaliforniya Bölge Mahkemesi'nden Hakim Araceli Martinez-Olguin, davayı ön onaydan geçiren Hakim William Alsup'ın ardından uzlaşmayı kesinleştirdi. Dava, Anthropic'in modellerini eğitirken Library Genesis ve Pirate Library Mirror gibi korsan kaynaklardan indirilen kitapları kullanmasına dayanıyordu. Alsup, önceki kararında telifli metinlerle bir YZ modelini eğitmenin adil kullanım sayılabileceğine hükmetmişti, ama bu görüş yalnızca bu davayı bağlıyor; Google, Meta, Midjourney ve OpenAI'ye karşı açılan benzer davalar hâlâ sürüyor ve eğitim verisi tartışmasında bağlayıcı bir emsal oluşmuş değil.", "en": "Judge Araceli Martinez-Olguin finalized the settlement after Judge William Alsup granted preliminary approval; the case centered on Anthropic's use of pirated books downloaded from sources like Library Genesis and Pirate Library Mirror to train its models. Alsup had separately ruled that training an AI model on copyrighted text can count as fair use, but that finding binds only this case — similar suits against Google, Meta, Midjourney and OpenAI remain unresolved, so no binding precedent has been set on AI training data."}}, {"featured": true, "topic": "ai", "tag": "etik", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/trumps-latest-ai-czar-has-already-resigned", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Trump'ın son YZ çarı da üç ay dolmadan istifa etti", "en": "Trump's latest AI czar resigns after three months"}, "summary": {"tr": "Ulusal Standartlar ve Teknoloji Enstitüsü bünyesindeki YZ Standartları ve Yenilik Merkezi'nin (CAISI) direktörü Chris Fall, göreve geldikten yaklaşık üç ay sonra istifa etti; gerekçe açıklanmadı.", "en": "Chris Fall, director of the Center for AI Standards and Innovation (CAISI) at NIST, has resigned roughly three months after taking the post; no reason was given."}, "detail": {"tr": "Fall, Trump yönetiminin ilk döneminde Enerji Bakanlığı Bilim Ofisi direktörlüğü yapmıştı. CAISI'deki görevi öncesinde koltuk hızla el değiştirmişti: girişim sermayecisi David Sacks Mart 2026'da ayrılmış, yerine gelen Collin Burns ise Anthropic'teki geçmiş çalışmaları yüzünden 'kapı dışarı edildiği' iddiasıyla bir haftadan kısa sürede görevi bırakmıştı. CAISI, YZ modelleri için teknik standartlar geliştiren birim; kurumun, Beyaz Saray'ın yeni duyurduğu 'Gold Eagle' YZ güvenlik gözetim programında yer almaması dikkat çekti.", "en": "Fall previously directed the Department of Energy's Office of Science during the first Trump administration. The CAISI post had already changed hands twice in rapid succession: venture capitalist David Sacks stepped down in March 2026, and his successor Collin Burns reportedly left in under a week after being 'pushed out' over his past work at Anthropic. CAISI develops technical standards for AI models; notably, it was absent from the White House's newly announced 'Gold Eagle' AI safety oversight program."}}, {"featured": true, "topic": "ai", "tag": "sirket", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/google-is-working-on-a-new-ai-chip-designed-to-make-gemini-more-efficient", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Google, Gemini'yi verimli çalıştıracak yeni bir YZ çipi geliştiriyor", "en": "Google is developing a new AI chip to make Gemini more efficient"}, "summary": {"tr": "The Information'ın isimsiz kaynaklara dayandırdığı habere göre Alphabet, kod adı 'Frozen v2' olan ve mevcut çiplerine göre watt başına 6-10 kat daha verimli olması beklenen yeni bir YZ çipi üzerinde çalışıyor; Google haberi ne doğruladı ne yalanladı.", "en": "Alphabet is reportedly developing a new AI chip, internally codenamed 'Frozen v2,' expected to be six to ten times more power-efficient than its current chips, according to The Information's anonymous sources; Google neither confirmed nor denied the report."}, "detail": {"tr": "Habere göre çipin 2028'de kullanıma girmesi planlanıyor ve verim artışı, güç birimi başına üretilen belirteç sayısıyla ölçülüyor. Google, açıklamasında 'Ekiplerimiz kullanıcılarımız ve müşterilerimiz için en yüksek başarım ve verimliliği sunmak üzere sürekli yeni yenilikler araştırıyor ve deniyor' dedi. Şirket, YZ altyapısına 180-190 milyar dolar harcama planlıyor; haberin ardından Alphabet hisseleri yaklaşık %3 yükseldi.", "en": "The chip is reportedly slated for a 2028 rollout, with the efficiency gain measured in tokens generated per unit of power. Google's only comment was that 'our teams are constantly researching and experimenting with new innovations to deliver maximum performance and efficiency for our users and customers.' The company has earmarked $180-190 billion for AI infrastructure spending; Alphabet shares rose about 3% after the report."}}, {"featured": false, "topic": "ai", "tag": "sirket", "src": "VentureBeat", "url": "https://venturebeat.com/orchestration/writers-ai-harness-cuts-token-spend-nearly-40-without-sacrificing-accuracy", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Writer'ın YZ düzeneği doğruluktan ödün vermeden belirteç harcamasını yaklaşık %40 kısıyor", "en": "Writer's AI harness cuts token spend nearly 40% without sacrificing accuracy"}, "summary": {"tr": "Writer araştırmacılarının yayımladığı yeni bir makale, kurumsal YZ ajanlarında modeli değil ajanı saran düzeneği eniyileştirmenin görev başına gideri önemli ölçüde düşürdüğünü; kazancın hangi modelin kullanıldığından bağımsız olduğunu gösteriyor.", "en": "A new paper from Writer researchers finds that optimizing the orchestration layer — the 'harness' — around an AI agent, rather than the underlying model, cuts per-task cost substantially, with the gains holding regardless of which model is used."}, "detail": {"tr": "'The Harness Effect' başlıklı, 8 Temmuz 2026'da yayımlanan çalışma, altı farklı temel modeli (Claude Sonnet 4.6, Gemini 3.1, Gemini Flash 3.5, Qwen 3.6, GLM 5.1 ve Palmyra X6) yalnızca eşgüdüm tasarımını değiştirerek test etti. Sonuçlar: görev başına harcama 0,21 dolardan 0,12 dolara inerek %41 azaldı, görev başına belirteç sayısı %38 düştü, işlem süresi medyanda %44 kısaldı ve görev tamamlama kalitesi neredeyse sabit kaldı (0,78'den 0,81'e). Verimlilik kazancı altı modelin tamamında %33-61 arasında tutarlı çıktı; araştırmacılar bunu 'token maxing' — modelin değer katmadan giderek daha çok belirteç tüketmesi — sorununa karşı bir çözüm olarak sunuyor.", "en": "The paper, 'The Harness Effect,' published July 8, 2026, tested six foundation models — Claude Sonnet 4.6, Gemini 3.1, Gemini Flash 3.5, Qwen 3.6, GLM 5.1 and Palmyra X6 — changing only the orchestration design around each. Results: blended cost per task fell 41% (from $0.21 to $0.12), tokens per task dropped 38%, median wall-clock time fell 44%, and completion quality held roughly steady (0.78 to 0.81). The efficiency gain was consistent across all six models, ranging 33-61%; the authors frame it as a countermeasure to 'token maxing' — agents consuming ever more tokens without proportional value."}}, {"featured": false, "topic": "ai", "tag": "model", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/ais-most-important-protocol-is-getting-a-little-bit-easier-to-use", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "YZ'nin en önemli protokolü ölçekte çalıştırması kolaylaşacak şekilde güncelleniyor", "en": "AI's most important protocol is getting easier to run at scale"}, "summary": {"tr": "Model Bağlam Protokolü'nün (MCP) sunucu tarafında durum bilgisi taşımayan (stateless) oturum kimliğine geçen yeni sürümü önümüzdeki hafta resmileşiyor; değişiklik, MCP sunucularını dağıtık altyapıda çalıştırmayı kolaylaştırıyor.", "en": "The Model Context Protocol (MCP) is moving to a stateless server-side session ID model, with the updated spec set to become official next week — a change meant to make running MCP servers across distributed infrastructure far simpler."}, "detail": {"tr": "MCP, YZ modellerinin takvim, veritabanı ve dahili araçlar gibi dış kaynaklara güvenli biçimde erişmesini sağlayan protokol. Haziran'da 60 milyon dolar yatırım alan ve iki yıl önce kurulan Arcade'in kurucusu Nate Barbettini, mevcut sistemde her sunucunun başka bir makinenin verdiği oturum kimliğini bilmesi gerektiğini anlatarak şöyle dedi: 'İmkânsız değil ama ciddi bir baş belası.' Yeni yaklaşım, standart web mimarisine benzer biçimde durumsuz çalışacak; bu da MCP sunucularının klasik web sunucuları gibi yatayda ölçeklenmesini kolaylaştıracak.", "en": "MCP lets AI models securely reach outside data sources and tools — calendars, databases, internal systems. Nate Barbettini, founder of Arcade — a two-year-old startup that raised $60 million in June — explained that under the current design, every server has to know about a session ID some other machine handed out: 'It's not impossible, but it's a serious pain.' The new stateless approach mirrors standard web architecture, making it far easier to run MCP servers at scale across distributed infrastructure."}}, {"featured": false, "topic": "ai", "tag": "etik", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/openai-is-scared-of-open-weight-models-should-the-us-be", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Trump yönetimi Çin'in açık ağırlıklı Kimi K3 modelini yasaklamayı tartışıyor", "en": "Trump administration weighs banning China's open-weight Kimi K3 model"}, "summary": {"tr": "Moonshot'ın açık ağırlıklı Kimi K3 modelinin başarımı, Trump yönetimi içinde Çin menşeli ileri düzey modellerin ABD'de yasaklanıp yasaklanmayacağına dair bir tartışma başlattı; OpenAI'nin stratejik gelecekler başkanı Dean Ball, hükümetin yeni modeller etrafında 'korku, belirsizlik ve güvensizlik' yaratmasını savunduktan sonra bu pozisyondan geri adım attı.", "en": "The performance of Moonshot's open-weight Kimi K3 model has triggered a debate inside the Trump administration over whether to ban advanced Chinese-origin models in the US; OpenAI's head of strategic futures, Dean Ball, argued the government should sow 'fear, uncertainty, and distrust' around such models before walking the position back."}, "detail": {"tr": "Snorkel AI'nin ortak kurucusu Braden Hancock, güçlü açık kaynaklı sınır modellerinin 'öncü şirketlerin kâr marjını sıkıştırıp fiyatları aşağı çekeceğini' söylerken, Georgetown Güvenlik ve Yeni Teknolojiler Merkezi'nden Sam Bresnick, hükümetin öncü şirketleri 'kökenleri yüzünden ABD pazarından dışlanan rakiplere karşı' neden koruması gerektiğini sorguladı. Hugging Face CEO'su Clem Delangue ise açık modelleri kısıtlamanın 'YZ'yi daha güvenli kılmayacağını, yalnızca riskleri gizleyip gücü birkaç elde yoğunlaştıracağını' savundu. Habere göre yönetim K3 ve benzeri modelleri yasaklamayı değerlendiriyor; alternatif olarak çip ihracat kontrolleri de gündemde. Açık ağırlıklı modeller, tescilli alternatiflere kıyasla daha ucuz olması nedeniyle ABD'deki lisansüstü araştırma programlarında da giderek daha çok tercih ediliyor.", "en": "Snorkel AI co-founder Braden Hancock said strong frontier-caliber open-source models 'will place a squeeze on the margins and will bring down the prices of the frontier companies,' while Georgetown's Sam Bresnick questioned why the government should protect frontier firms 'from competitors that are being locked out of the U.S. market based on their origins.' Hugging Face CEO Clem Delangue argued that restricting open models 'wouldn't make AI safer — it would simply hide the risks, concentrate power in the hands of a few.' The administration is reportedly weighing a ban on K3 and similar models, with chip export controls floated as an alternative. Open-weight models, being cheaper than proprietary alternatives, are also seeing rising adoption in US graduate research programs."}}, {"featured": false, "topic": "ai", "tag": "sirket", "src": "CNBC", "url": "https://www.cnbc.com/2026/07/20/amd-helios-microsoft-ai-nvidia.html", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "AMD, Nvidia'ya rakip ilk raf ölçekli YZ sistemi Helios'u tanıttı; Microsoft yeni müşteri oldu", "en": "AMD launches Helios, its first rack-scale AI system to rival Nvidia, adding Microsoft as a customer"}, "summary": {"tr": "AMD, Nvidia'nın Grace Blackwell ve Vera Rubin sistemlerine karşı doğrudan rakip olarak konumlandırdığı ilk raf ölçekli YZ sistemi Helios'u duyurdu; Microsoft, Meta, OpenAI, Oracle ve Tata Consultancy Services ile birlikte sistemin müşterileri arasına katıldı.", "en": "AMD unveiled Helios, its first rack-scale AI system positioned as a direct rival to Nvidia's Grace Blackwell and Vera Rubin platforms, with Microsoft joining Meta, OpenAI, Oracle and Tata Consultancy Services as customers."}, "detail": {"tr": "Helios; MI455X GPU'ları, EPYC Venice işlemcileri, Pensando ağ donanımı ve ROCm yazılımını tek bir platformda birleştiriyor. Meta, zamanla 6 gigawatta kadar AMD GPU'su kullanacağını, bunun 1 gigawattının Helios raflarında olacağını açıkladı. AMD, sistemi 2026'nın ikinci yarısında Microsoft ve diğer müşterilere sevk etmeye başlayacağını söyledi. Nvidia hâlâ veri merkezi GPU pazarının %95'inden fazlasını elinde tutuyor; Futurum Group analistleri ise AMD'nin bu pazarda yüzlerce milyar dolarlık gelire karşılık gelecek %20-25'lik bir pay yakalayabileceğini öngörüyor.", "en": "Helios integrates MI455X GPUs, EPYC Venice CPUs, Pensando networking and ROCm software into a single platform. Meta said it would deploy up to 6 gigawatts of AMD GPUs over time, with 1 gigawatt on Helios racks; AMD said it will begin shipping the system to Microsoft and other customers in the second half of 2026. Nvidia still controls more than 95% of the data-center GPU market, but Futurum Group analysts believe AMD could capture a 20-25% share worth hundreds of billions of dollars in revenue."}}, {"featured": false, "topic": "ai", "tag": "sirket", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/adobe-camera-apps-new-feature-will-critique-your-photos-using-ai", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Adobe'nin deneysel kamera uygulaması artık fotoğraflarını YZ ile eleştiriyor", "en": "Adobe's experimental camera app now critiques your photos with AI"}, "summary": {"tr": "Adobe'nin deneysel iOS kamera uygulaması Project Indigo'ya, kadraj, ışık, renk ve duygusal etkiyi değerlendiren bir YZ fotoğraf eleştirisi özelliği eklendi; özellik şimdilik yalnızca sınırlı sayıda kullanıcıda test ediliyor.", "en": "Adobe's experimental iOS camera app, Project Indigo, has added an AI photo-critique feature that evaluates framing, lighting, color and emotional impact — currently in limited testing with a small group of users."}, "detail": {"tr": "Yeni 'YZ oyun alanı' sekmesi altında; çekim ve düzenleme önerileri, insan, çöp, tel, direk, araç gibi nesneleri ayrı ayrı kaldırabilen gelişmiş nesne silme, alan derinliği simülasyonu ve suluboya, mürekkep, tek renkli gibi stil aktarım efektleri de sunuluyor. Görsel işleme için Google'ın Gemini tabanlı Nano Banana modeli kullanılıyor; Adobe'nin kendi Firefly modelini de entegre etmeye açık olduğu belirtiliyor. Adobe Fellow'u Marc Levoy, üretici YZ araçlarının çoğunun istem (prompt) tabanlı düzenleme sunduğunu, doğru istemi bulmanın zor olabileceğini belirterek yeni özelliklerin bunun yerine 'daha belirleyici çıktılar üretebilen düğmeler' kullandığını söyledi.", "en": "The features sit under a new 'AI playground' tab: capture and edit suggestions, advanced object removal with separate toggles for people, trash, wires, poles and vehicles, simulated depth of field, and style-transfer effects like watercolor, pen-and-ink and monochrome. Image processing runs on Google's Gemini-based Nano Banana model, and Adobe says it's open to integrating its own Firefly model too. Adobe Fellow Marc Levoy said most generative AI tools rely on prompt-based editing, where finding the right prompt can be hard — the new features instead use 'buttons that can generate more deterministic outputs.'"}}, {"featured": false, "topic": "ai", "tag": "etik", "src": "TechCrunch", "url": "https://techcrunch.com/2026/07/20/youtube-clarifies-policies-around-ai-slop-and-upsetting-videos", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "YouTube, 'YZ çöplüğü' ve rahatsız edici içerik politikasını netleştirdi", "en": "YouTube clarifies its policy on 'AI slop' and distressing content"}, "summary": {"tr": "YouTube, Ortaklık Programı'nda parasal kazanç sağlanamayacak 'özgün olmayan içerik' tanımını üç kategoriyle netleştirdi: şablona dayalı tekrarcı içerik, izleyiciyi manipüle etmek için tasarlanmış rahatsız edici içerik ve sağlık, finans, hukuk gibi hassas konuları YZ personalarıyla işleyen içerik.", "en": "YouTube clarified its YouTube Partner Program monetization rules, defining three categories of 'inauthentic content' that cannot be monetized: generic template-based repetition, distressing content designed to manipulate viewers, and content using AI personas to discuss sensitive topics like health, finance or legal issues."}, "detail": {"tr": "Politika, 16 Temmuz 2026'da yürürlüğe girdi. YouTube'un güven ve güvenlik başkanı Matt Halprin, YZ'nin hem yaratıcılığı artırabildiğini hem de içerik çiftçiliğini kolaylaştırabildiğini vurgulayarak şöyle dedi: 'YZ insanların çok sayıda video yapmasını sağlayabilir... harika... yaratıcılığı artırır. Ama aynı araç, çok sayıda... çok jenerik... içerik çiftçiliği videosu yapmanıza da izin verebilir.' Şirket, güncellemenin amacının reklam gelirini korumak ve platform kalitesini, geleneksel TV ile yayın hizmetlerine karşı rekabet ederken sürdürmek olduğunu söyledi; YouTube artık rakip yayın platformlarından daha fazla reklam geliri üretiyor ve günlük ortalama küresel izlenmede Netflix'i geride bırakmış durumda.", "en": "The policy took effect July 16, 2026. YouTube's head of trust and safety, Matt Halprin, said AI cuts both ways: 'AI can actually allow people to make a lot of videos... great... enhances creativity. But that exact same tool can allow you to make lots of videos... very generic... content farming.' The company said the clarification is meant to protect ad revenue and platform quality as it competes with traditional TV and streaming for ad dollars; YouTube now generates more ad revenue than rival streamers and has surpassed Netflix in average daily global views."}}, {"featured": false, "topic": "ai", "tag": "yatirim", "src": "CNBC", "url": "https://www.cnbc.com/2026/07/20/tsmc-arizona-fab-capacity-ai-chip-demand.html", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "TSMC, YZ çip talebini karşılamak için Arizona yatırımını 100 milyar dolar artırdı", "en": "TSMC adds $100 billion to its Arizona investment to meet AI chip demand"}, "summary": {"tr": "TSMC Mali İşler Direktörü Wendell Huang, CNBC'ye verdiği demeçte şirketin Arizona'daki fabrika yatırımını 100 milyar dolar daha artırdığını, bunun toplam ABD taahhüdünü 265 milyar dolara çıkardığını söyledi; gerekçe olarak YZ çiplerine yönelik 'çok yıllı, yapısal' talep gösterildi.", "en": "TSMC CFO Wendell Huang told CNBC the company is adding another $100 billion to its Arizona buildout, bringing its total US commitment to $265 billion, citing 'strong, multi-year' structural demand for AI chips."}, "detail": {"tr": "Huang, yeni fonun hem ön uç gofret üretim tesislerini hem de arka uç gelişmiş paketleme tesislerini kapsayacağını belirtti. Arizona'daki ilk fabrika faaliyette ve verimliliği Tayvan'daki amiral gemisi tesisle 'aynı derecede iyi'; ikinci fabrika ekipman taşımaya hazırlanıyor, üçüncü fabrikanın inşaatı sürüyor, dördüncü fabrika ve bölgenin ilk gelişmiş paketleme tesisi için de hazırlık çalışmaları başladı. Tamamlandığında Arizona'daki toplam kapasite 12 üretim/paketleme tesisi ve bir Ar-Ge merkezine ulaşacak. Huang, inşaat işçisi kıtlığı ve altyapı kısıtları gibi fiziksel engelleri de kabul ederek bunları yerel yetkililerle birlikte çözmeye çalışacaklarını söyledi.", "en": "Huang said the new funding covers both front-end wafer fabrication and back-end advanced packaging. TSMC's first Arizona fab is operational and yielding 'as good as' its flagship Taiwan plant; the second fab is preparing to move in equipment, a third is under construction, and preparatory work has begun on a fourth fab and the site's first advanced-packaging facility. Once complete, the Arizona footprint will total 12 fabrication and packaging facilities plus an R\u0026D center. Huang acknowledged physical constraints — a shortage of construction workers and infrastructure limits — and said TSMC would work with government officials to address them."}}, {"featured": false, "topic": "ai", "tag": "yatirim", "src": "CNBC", "url": "https://www.cnbc.com/2026/07/20/bezos-cuspai-new-chip-materials-nvidia.html", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Bezos, çip malzemesi arayan YZ girişimi CuspAI'ye destek verdi; Nvidia ve Meta de ittifaka katıldı", "en": "Bezos backs CuspAI, an AI startup hunting chipmaking materials, as Nvidia and Meta join its alliance"}, "summary": {"tr": "İngiliz girişim CuspAI, Jeff Bezos'un Bezos Expeditions'ının da katıldığı, Kleiner Perkins ve NEA liderliğindeki 450 milyon dolarlık bir turla 2,6 milyar dolar değerlemeye ulaştı; şirket aynı gün Nvidia ve Meta'nın da aralarında bulunduğu 48'den fazla kurumu bir araya getiren 'YZ Malzemeleri Dökümhanesi' ittifakını duyurdu.", "en": "British startup CuspAI raised $450 million at a $2.6 billion valuation in a round led by Kleiner Perkins and NEA with participation from Jeff Bezos's Bezos Expeditions, and on the same day announced an 'AI Materials Foundry' alliance bringing together more than 48 companies and research institutions, including Nvidia and Meta."}, "detail": {"tr": "CuspAI, MIRA adlı kendi YZ platformunu kullanarak yarı iletken, temiz enerji ve ileri üretim gibi alanlar için geleneksel araştırmanın yıllar alacağı yeni malzemeleri hızla belirlemeyi hedefliyor. Şirket 2024'te karbon yakalama ve su arıtma odaklı kurulmuş, son bir yılda çip üretim tedarik zincirinden gelen yoğun talep üzerine yönünü değiştirmişti. İttifak, malzeme keşfini hızlandıracak yazılımlar geliştirmek için katılımcı kurumların hesaplama ve bilimsel kaynaklarını bir havuzda toplamayı amaçlıyor.", "en": "CuspAI uses its own AI platform, MIRA, to rapidly identify promising new materials for semiconductors, clean energy and advanced manufacturing that traditional research would take years to find. Founded in 2024 with an initial focus on carbon capture and water purification, the company pivoted over the past year in response to intense demand from the chip manufacturing supply chain. The alliance aims to pool participants' computing and scientific resources to build software that speeds up materials discovery for chipmakers and other industries."}}, {"featured": false, "topic": "ai", "tag": "etik", "src": "MIT Technology Review", "url": "https://www.technologyreview.com/2026/07/20/1140655/ai-biases-hiring-humans", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "İşe alımda YZ, insanlardan daha kolay önyargı geliştiriyor", "en": "AI is more likely than humans to form biases when hiring"}, "summary": {"tr": "Princeton ve Chicago Üniversitesi araştırmacılarının simüle edilmiş bir işe alım oyununda test ettiği dil modelleri, adayları etnik kökene göre insanlardan belirgin biçimde daha yüksek oranda ayırdı; çalışma Temmuz 2026'da Seul'daki ICML konferansında sunuldu.", "en": "Language models tested by Princeton and University of Chicago researchers in a simulated hiring game segregated candidates by ethnicity at markedly higher rates than human participants; the study was presented at ICML in Seoul in July 2026."}, "detail": {"tr": "İnsan katılımcılar ayrışma ölçeğinde 0,84 puan alırken, test edilen YZ modelleri ortalama yaklaşık %65 daha yüksek puanladı; OpenAI'nin o3 modeli, olası azami ayrışmaya yakın bir skor olan 1,83'e ulaştı. Daha güçlü akıl yürütme modellerinin, önceki daha zayıf modellere göre daha güçlü önyargı sergilediği görüldü. Modellere çeşitliliği teşvik eden işe alım hedefleri verildiğinde önyargı azaldı; adayla ilgili işle doğrudan bağlantılı kişisel bilgiler paylaşıldığında da etnik ayrışma düştü. Princeton doktora öğrencisi Ryan Liu: 'Büyük dil modelleri sınırlı veriden genellemeler çıkarma konusunda gerçekten isteklidir... Sosyal ortamlarda LLM'ler hızlı genelleme yaptığında işler ters gitme eğiliminde.' Cornell'den Angelina Wang ise modellerin 'daha önce deneyimlediği aynı türden davranışlara aşırı bel bağlayabildiğini' söyledi.", "en": "Human participants scored 0.84 on the study's segregation scale, while the AI models tested scored roughly 65% higher on average; OpenAI's o3 model reached 1.83, close to the maximum possible segregation score. More capable reasoning models showed stronger bias than their weaker predecessors. Bias fell when models were given diversity-oriented hiring incentives, and ethnic segregation dropped when candidates' personal information was directly relevant to the job. Princeton PhD student Ryan Liu said: 'LLMs really are eager to create generalizations from limited data... When LLMs rush to generalize in social settings, that's when things tend to go wrong.' Cornell's Angelina Wang added that models can 'over-index on the same kinds of behaviors it's experienced before.'"}}, {"featured": true, "topic": "economics-markets", "tag": "commodities", "src": "Yahoo Finance", "url": "https://finance.yahoo.com/markets/stocks/articles/asia-shares-hesitant-oil-climbs-003525906.html", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Brent bir ayı aşkın sürenin ardından 90 doları geçti; Asya borsaları temkinli", "en": "Brent tops $90 for first time in over a month as Asian markets stay wary"}, "summary": {"tr": "Brent ham petrol, ABD'nin İran'a yönelik saldırılarının dokuzuncu gününde yüzde 2,6 artarak varil başına 90,40 dolara çıktı; ABD ham petrolü (WTI) yüzde 2,3 yükselişle 84,39 dolara ulaştı. Yatırımcılar Hürmüz Boğazı'ndaki sevkiyat riskini fiyatlarken Asya hisseleri karışık seyretti.", "en": "Brent crude rose 2.6% to $90.40 a barrel on the ninth day of U.S. strikes against Iran, while U.S. crude (WTI) gained 2.3% to $84.39. Asian equities were mixed as investors priced the risk to Strait of Hormuz shipments."}, "detail": {"tr": "MSCI'nin Japonya dışı Asya-Pasifik endeksi yüzde 0,3 geriledi, Güney Kore'nin çip ağırlıklı piyasası yüzde 4,2 düştü, Çin ana endeksleri ise yüzde 1,4 yükseldi; Japonya borsası tatil nedeniyle kapalıydı. Altın, artan tahvil getirileri baskısıyla yüzde 0,5 düşüşle 3.998 dolara indi, dolar 40 yılın zirvesine yakın 162,39 yende seyretti ve 30 yıllık ABD Hazine tahvili getirisi psikolojik yüzde 5,0 eşiğini aştı. Avrupa Merkez Bankası perşembe günü toplanıyor ve faizi yüzde 2,25'te tutması bekleniyor.", "en": "MSCI's broadest Asia-Pacific index outside Japan fell 0.3%, South Korea's chip-heavy market dropped 4.2% and Chinese blue chips rose 1.4%, while Japan's market was closed for a holiday. Gold slipped 0.5% to $3,998 under pressure from rising yields, the dollar held near a 40-year peak at 162.39 yen, and the 30-year U.S. Treasury yield pushed above the psychological 5.0% mark. The European Central Bank meets Thursday and is expected to hold rates at 2.25%."}}, {"featured": true, "topic": "economics-markets", "tag": "markets", "src": "Fortune", "url": "https://fortune.com/2026/07/19/korea-ai-stocks-sk-hynix-samsung-kospi-index-global-markets/", "date": {"tr": "19 Tem", "en": "Jul 19"}, "title": {"tr": "Kore'nin 4 trilyon dolarlık borsası küresel yapay zekâ hisselerinin barometresi oldu", "en": "Korea's $4 trillion market has become the barometer for global AI stocks"}, "summary": {"tr": "Kospi haziran zirvesinden bu yana yüzde 25 gerileyerek yaklaşık 1 trilyon dolarlık değeri sildi; SK Hynix ve Samsung en az yüzde 30 kaybetti. Londra, New York ve Tokyo'daki fon yöneticileri artık işlem öncesi Kore hisselerini izliyor.", "en": "The Kospi has tumbled 25% from its June peak, erasing about $1 trillion in value, with SK Hynix and Samsung each losing at least 30%. Fund managers in London, New York and Tokyo now watch Korean equities before their own sessions open."}, "detail": {"tr": "Kospi ile Nasdaq 100 arasındaki 60 günlük korelasyon, beş yıllık ortalaması olan 0,16'nın neredeyse üç katına, 0,46'ya çıktı; Nasdaq 100'ün Kore piyasasındaki zayıflığa duyarlılığı 7 Temmuz'da 1990'dan bu yana en yüksek seviyeye ulaştı. Endeks son düşüşlere rağmen yıl başından bu yana hâlâ yüzde 62 primli. Kaldıraç kaynaklı oynaklığı sınırlamak için Güney Kore, tek hisseye dayalı kaldıraçlı borsa yatırım fonları (ETF) için yeni listelemeleri geçici olarak durdurdu.", "en": "The 60-day correlation between the Kospi and the Nasdaq 100 has reached 0.46, nearly triple its five-year average of 0.16, while the Nasdaq 100's sensitivity to Korean weakness hit its highest since 1990 on July 7. The benchmark remains up 62% for the year despite the recent slide. To curb leverage-driven volatility, South Korea has temporarily halted new listings of single-stock leveraged exchange-traded funds."}}, {"featured": true, "topic": "economics-markets", "tag": "macro", "src": "InvestingLive", "url": "https://investinglive.com/central-banks/china-holds-loan-prime-rates-steady-as-growth-slows-and-yuan-firms-1-year-lpr-at-3-0-5-year-at-3-5", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Çin Merkez Bankası kredi faizlerini büyüme yavaşlarken 14. ayda da sabit tuttu", "en": "China's central bank holds loan prime rates for a 14th month as growth slows"}, "summary": {"tr": "Çin Halk Bankası (PBoC) bir yıllık kredi faizi referansını (LPR) yüzde 3,00'te, mortgage fiyatlamasının dayanağı olan beş yıllığı yüzde 3,50'de tuttu; her iki oran da Mayıs 2025'ten bu yana değişmedi. Karar, ikinci çeyrek büyümesinin üç buçuk yılın en zayıf temposuna gerilediği bir dönemde geldi.", "en": "The People's Bank of China held its one-year loan prime rate (LPR) at 3.00% and the five-year rate, the benchmark for mortgage pricing, at 3.50% — both unchanged since May 2025. The decision came as second-quarter growth cooled to its weakest pace in three and a half years."}, "detail": {"tr": "LPR resmi olarak reel ekonomideki borçlanma maliyetlerini belirlemeye devam etse de, bankanın araç setindeki yeri değişti: Mayıs 2025'ten bu yana yüzde 1,4'te tutulan yedi günlük ters repo faizi artık birincil politika aracı işlevi görüyor. Yetkililer, banka kâr marjlarını sıkıştırmaktan veya yuan üzerinde baskı yaratmaktan kaçındıkları için faizi daha fazla indirmeye isteksiz görünüyor. Çin ekonomisi ilk çeyrekte hedef aralığının üst sınırında yüzde 5 büyümüş, ikinci çeyrekte ise Orta Doğu gerilimlerinin petrol fiyatlarını yükseltip enflasyon ithal ettiği bir ortamda yüzde 4,3'e yavaşlamıştı.", "en": "While the LPR still formally sets borrowing costs across the real economy, its place in the PBoC's toolkit has shifted: the seven-day reverse repo rate, held at 1.4% since May 2025, now serves as the primary policy tool. Officials appear reluctant to cut further, wary of squeezing bank margins or pressuring the yuan. China's economy grew 5% in the first quarter, at the top of its target range, before slowing to 4.3% in the second quarter as Middle East tensions lifted oil prices and imported inflation."}}, {"featured": false, "topic": "economics-markets", "tag": "commodities", "src": "Fortune", "url": "https://fortune.com/2026/07/19/global-oil-market-post-iran-export-offsets-hormuz-new-pipline-capacity/", "date": {"tr": "19 Tem", "en": "Jul 19"}, "title": {"tr": "Gemiler ABD destekli rotayı reddederken petrol piyasası Hürmüz sonrası döneme bakıyor", "en": "Oil market looks past Hormuz as ships reject the U.S.-backed route"}, "summary": {"tr": "Cuma günü ABD'nin önerdiği alternatif koridordan hiçbir geçiş tespit edilmezken İran'ın kanalından yedi geçiş kaydedildi; denizciler askeri güvence taahhütlerine rağmen Amerikan rotasını reddediyor. Hindistan, bir denizcinin ölümünün ardından mürettebatına boğazdan geçişi yasakladı.", "en": "On Friday no crossings were detected on the U.S.-proposed alternate corridor, while Iran's channel saw seven transits, as seafarers refuse the American route despite pledges of protection. India has barred its crews from strait transits after an attack killed a sailor."}, "detail": {"tr": "Japonya Dış Ticaret Konseyi başkanı boğazı çatışma sürdükçe \"ticari gemilere kapalı bölge\" olarak nitelendirdi. Şubat'taki çatışmadan önce Hürmüz'den günde yaklaşık 20 milyon varil petrol geçiyordu. Goldman Sachs analistleri, 2027 sonuna kadar yeterli Orta Doğu boru hattı altyapısının savaş öncesi Körfez ihracatının yüzde 45'inden fazlasını koruyabileceğini, 2028'e kadar bu oranın yüzde 60'ı aşabileceğini, hızlandırılmış bir senaryoda ise yüzde 75'e ulaşabileceğini öngörüyor. Boru hattı yönlendirmeleri sonrası Suriye artık bölgesel hacimlerin dörtte birinden fazlasını taşıyor; binlerce kamyon Irak ham petrolünü Suriye üzerinden Akdeniz limanlarına ulaştırıyor.", "en": "Japan's Foreign Trade Council chair called the waterway \"a no-go zone to commercial ships while the fighting continues.\" Before the February conflict, roughly 20 million barrels of oil moved through Hormuz each day. Goldman Sachs analysts project that by the end of 2027 enough Middle Eastern pipeline infrastructure could insulate more than 45% of pre-war Gulf exports, rising above 60% by 2028 and as high as 75% in an accelerated scenario. Following pipeline diversions, Syria now handles more than a quarter of regional volumes, with thousands of trucks moving Iraqi crude to Mediterranean ports."}}, {"featured": false, "topic": "economics-markets", "tag": "crypto", "src": "Foreign Policy Journal", "url": "https://www.foreignpolicyjournal.com/2026/07/19/bitcoin-crypto-btc-and-crypto-markets-sink-as-tech-selloff-spreads-globally/", "date": {"tr": "19 Tem", "en": "Jul 19"}, "title": {"tr": "Bitcoin ve kripto, küresel teknoloji satışı yayılırken geriledi", "en": "Bitcoin and crypto sink as a global tech selloff spreads"}, "summary": {"tr": "Bitcoin haftayı kapatırken yaklaşık yüzde 1 düşerek 64.000 dolara geriledi; Ether gün içinde yüzde 3'e varan kayıpla 1.830 dolara indi. Yazıya göre yatırımcılar yapay zekâ bağlantılı varlıklardan çıkışa yöneldi.", "en": "Bitcoin fell roughly 1% to $64,000 heading into the weekend, while Ether dropped as much as 3% to $1,830. Investors, the article says, rotated aggressively out of artificial-intelligence-linked assets."}, "detail": {"tr": "Satışa yükselen petrol fiyatları ve olası Federal Rezerv faiz artırımlarına ilişkin endişeler de baskı ekledi; yüksek enerji maliyetleri enflasyonu körükleyerek merkez bankasının daha sıkı bir duruşa yönelme ihtimalini artırıyor. Bu senaryo, kripto para birimleri gibi risk varlıkları için tarihsel olarak olumsuz görülüyor. Düşüş, aynı hafta hisse senedi piyasalarını da vuran teknoloji ağırlıklı satışın bir parçası olarak gerçekleşti.", "en": "The selloff was compounded by rising oil prices and worries about potential Federal Reserve rate hikes: higher energy costs stoke inflation and raise the odds the central bank tilts toward tighter policy, a backdrop historically unfriendly to risk assets like cryptocurrencies. The decline came as part of a tech-led selloff that also weighed on equity markets the same week."}}, {"featured": false, "topic": "economics-markets", "tag": "crypto", "src": "CoinDesk", "url": "https://www.coindesk.com/markets/2026/07/18/massive-bitcoin-call-spreads-target-usd72-000-by-month-end-right-when-the-fed-meets", "date": {"tr": "18 Tem", "en": "Jul 18"}, "title": {"tr": "Yatırımcılar Fed toplantısına denk gelen bir bahisle Bitcoin'in 72.000 dolara çıkacağına 2,5 milyar dolar yatırdı", "en": "Traders wager $2.5bn that bitcoin hits $72,000 right as the Fed meets"}, "summary": {"tr": "Deribit'te büyük blok işlemler, yatırımcıların 31 Temmuz vadeli 70.000 dolarlık alım opsiyonlarını satın alıp 72.000 dolarlık opsiyonları sattığını gösteriyor; Fed'in 29 Temmuz kararından yalnızca iki gün sonrasına denk gelen pozisyonun nominal büyüklüğü 2,5 milyar dolar. Vadeli işlem piyasaları faizin %3,5-%3,75 aralığında sabit kalma ihtimalini %75-80 olarak fiyatlıyor.", "en": "Large block trades on Deribit show traders buying $70,000 bitcoin calls and selling $72,000 calls for July 31 expiry, a notional $2.5 billion bet timed two days after the Fed's July 29 decision, where futures currently price a 75-80% chance rates hold at 3.5%-3.75%."}, "detail": {"tr": "Deribit'in Ticari İşlerden Sorumlu Direktörü Jean-David Péquignot, 'bu hafta BTC'de büyük yükseliş yönlü opsiyon blokları gördük' dedi; her bir kullanım fiyatında 20.000 kontrat işlem gördü. İşlem sırasında Bitcoin yaklaşık 64.685 dolardaydı; bu da pozisyonun tam getiri sağlaması için iki haftadan kısa sürede yaklaşık %11'lik bir yükseliş gerektirdiği anlamına geliyor. Vadenin 29 Temmuz FOMC kararından iki gün sonrasına denk gelmesi, yatırımcıların faiz kararını bir risk unsuru değil bir katalizör olarak fiyatladığını gösteriyor.", "en": "Deribit's chief commercial officer Jean-David Péquignot said \"this week we have seen some large blocks in BTC topside call spreads,\" with 20,000 contracts traded at each strike. Bitcoin traded near $64,685 at the time, meaning the trade needs roughly an 11% rally in under two weeks to pay out in full. The timing — settlement two days after the July 29 FOMC meeting — signals traders are positioning for the rate decision to act as a catalyst rather than a risk event."}}, {"featured": true, "topic": "geopolitics", "tag": "conflict", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/21/us-launches-tenth-consecutive-night-of-attacks-on-iran", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "ABD, İran'a saldırılarını onuncu geceye taşıdı; Tahran Körfez'i hedef aldı", "en": "US extends Iran strikes to a tenth night as Tehran targets the Gulf"}, "summary": {"tr": "ABD ordusu, İran'a yönelik saldırılarını pazartesi gecesi üst üste onuncu geceye taşıdı; Sirik, Bender Abbas, Qeşm, Şiraz ve İsfahan'da patlamalar bildirildi. İran Devrim Muhafızları ise Kuveyt ve Bahreyn'deki ABD askeri sistemlerini vurduğunu, Hürmüz Boğazı'nda iki tankerin ateş aldığını öne sürdü. Çatışan iddiaların hiçbiri sahadan bağımsız biçimde doğrulanamıyor.", "en": "The US military carried its strikes on Iran into a tenth straight night on Monday, with explosions reported in Sirik, Bandar Abbas, Qeshm, Shiraz and Isfahan. Iran's Revolutionary Guard said it had hit US military systems in Kuwait and Bahrain and that two tankers in the Strait of Hormuz were ablaze. The competing claims could not be independently verified."}, "detail": {"tr": "Al Jazeera'ya göre Devrim Muhafızları Bahreyn'de radar ve hava savunma sistemlerini imha ettiğini bildirdi; Umman açıklarında bir tankerin daha vurulduğu öne sürüldü. ABD Başkanı Donald Trump, İran'ın saldırılarının 'kat kat' karşılık göreceğini söyledi. İddiaların hiçbiri bağımsız kaynaklarca teyit edilebilmiş değil.", "en": "Al Jazeera reported the Guard also claimed to have destroyed radar and air-defence systems in Bahrain, with a further tanker said to be hit off Oman. President Donald Trump said Iran's attacks would be repaid 'many times over.' None of the claims could be confirmed by independent sources."}}, {"featured": true, "topic": "geopolitics", "tag": "trade", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/21/trump-imposes-50-us-tariffs-on-some-canadian-goods-citing-discrimination", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Trump, Kanada mallarına yüzde 50 gümrük vergisi getirdi", "en": "Trump imposes 50% tariffs on Canadian goods"}, "summary": {"tr": "ABD Başkanı Donald Trump, Kanada'yı Amerikan otomobil, alkol ve süt ürünlerine karşı ayrımcılık yapmakla suçlayarak birçok Kanada malına yüzde 50 gümrük vergisi uygulama kararı aldı. Vergiler 30 gün içinde yürürlüğe girecek ve USMCA kapsamındaki ürünleri de kapsayacak; enerji ile potas hariç tutuldu. Karar, 1930 tarihli Gümrük Yasası'nın daha önce bu amaçla kullanılmamış 338. maddesine dayandırıldı.", "en": "President Donald Trump ordered 50% tariffs on many Canadian goods, accusing Ottawa of discriminating against American autos, alcohol and dairy. The duties take effect within 30 days and cover products under the USMCA, with energy and potash excluded. The order rests on Section 338 of the 1930 Tariff Act, a provision not previously used for this purpose."}, "detail": {"tr": "ABD Ticaret Temsilcisi Jamieson Greer, Kanada eyaletlerinin Amerikan alkolünü raflardan kaldırmasını ve AB süt ürünlerine ayrıcalık tanımasını gerekçe gösterdi. Kanada Başbakanı Mark Carney adımı USMCA'nın 'doğrudan ihlali' olarak niteleyip görüşmeleri yoğunlaştırmaya hazır olduklarını söyledi; Ontario Eyalet Başbakanı Doug Ford ise 'dolara dolar' misilleme çağrısı yaptı.", "en": "US Trade Representative Jamieson Greer cited Canadian provinces pulling American alcohol from shelves and favouring EU dairy. Prime Minister Mark Carney called the move a 'direct violation' of the USMCA and said Canada was ready to intensify talks; Ontario Premier Doug Ford urged retaliation 'dollar for dollar.'"}}, {"featured": true, "topic": "geopolitics", "tag": "elections", "src": "The Irish Times", "url": "https://www.irishtimes.com/world/uk/2026/07/20/andy-burnham-downing-street-live-updates/", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Yeni İngiltere Başbakanı Burnham, Healey'i Maliye Bakanı yaptı", "en": "New UK PM Burnham names Healey chancellor in cabinet reshuffle"}, "summary": {"tr": "İngiltere'nin yeni Başbakanı Andy Burnham, pazartesi açıkladığı kabinede eski Savunma Bakanı John Healey'i sürpriz biçimde Maliye Bakanı olarak atadı. Rachel Reeves, David Lammy, Peter Kyle ve Liz Kendall görevden alınırken Ed Miliband Dışişleri Bakanı olarak kaldı, Yvette Cooper Sağlık Bakanlığı'na geçti. Burnham, on yılda ülkenin altıncı yeni başbakanı oldu.", "en": "Andy Burnham, the UK's new prime minister, made former Defence Secretary John Healey his surprise choice as chancellor in a cabinet unveiled on Monday. Rachel Reeves, David Lammy, Peter Kyle and Liz Kendall were removed, while Ed Miliband stayed as foreign secretary and Yvette Cooper moved to health. Burnham is the UK's sixth new prime minister in a decade."}, "detail": {"tr": "The Irish Times'a göre Burnham, göreve başlama konuşmasında 'Yeterince iyi olmadık ve daha iyi olmamız gerekiyor. Olacağız' diyerek 'istikrarlı ve sorumlu bir siyaset' sözü verdi. Angela Rayner hükümete döndü, Chris Bryant Kuzey İrlanda Bakanlığı'na getirildi.", "en": "According to The Irish Times, Burnham used his first address to say 'We have not been good enough and we need to be better. We will be,' pledging 'stable and responsible politics.' Angela Rayner returned to government and Chris Bryant took Northern Ireland."}}, {"featured": false, "topic": "geopolitics", "tag": "security", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/21/china-and-philippines-trade-accusations-after-sailor-injured-at-sea", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Manila, Çin sahil güvenliğini Filipinli denizciyi yaralamakla suçladı", "en": "Manila accuses Chinese coast guard of injuring a Filipino sailor"}, "summary": {"tr": "Filipinler ordusu, Güney Çin Denizi'ndeki tartışmalı İkinci Thomas Sığlığı'nda bir Çin sahil güvenlik botunun Filipinli bir denizcinin başına tahta copla vurarak onu yaraladığını açıkladı. Çin sahil güvenliği ise iki Filipin botunun uyarılara rağmen bir devriye gemisine çarptığını öne sürdü. Olay, Manila'nın karaya oturttuğu BRP Sierra Madre karakol gemisi yakınında yaşandı.", "en": "The Philippine military said a Chinese coast guard boat struck a Filipino sailor on the head with a wooden baton, injuring him, at the disputed Second Thomas Shoal in the South China Sea. China's coast guard countered that two Philippine boats had ignored warnings and rammed one of its patrol vessels. The incident occurred near the grounded outpost ship BRP Sierra Madre."}, "detail": {"tr": "Filipin tarafına göre olay diğer denizcilerce videoya kaydedildi ve yaralı personelin tahliye edilip edilmeyeceği değerlendiriliyordu. ABD Dışişleri Bakanlığı, Çin'in 'tehlikeli ve saldırgan' davranışını kınadı. Sığlık, Filipinler'in münhasır ekonomik bölgesi içinde yer alıyor; iki tarafın anlatıları bağımsız olarak doğrulanamıyor.", "en": "The Philippine side said the encounter was filmed by other sailors and that medics were assessing whether the injured man needed evacuation. The US State Department condemned China's 'dangerous and aggressive' conduct. The shoal lies within the Philippines' exclusive economic zone; the two accounts cannot be independently reconciled."}}, {"featured": false, "topic": "geopolitics", "tag": "security", "src": "CBS News", "url": "https://www.cbsnews.com/news/iran-injuries-us-service-members/", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Pentagon: İran saldırılarında iki haftada yaklaşık 100 ABD askeri yaralandı", "en": "Pentagon says nearly 100 US troops injured in two weeks of Iran strikes"}, "summary": {"tr": "Pentagon Sözcüsü Sean Parnell, 7 Temmuz'dan bu yana İran saldırılarında yaklaşık 100 ABD askerinin 'bir dereceye kadar yaralandığını', bunların yüzde 96'sının göreve döndüğünü ve yaralanmaların çoğunun hafif beyin sarsıntısı olduğunu açıkladı. Açıklama, ateşkesin çökmesinin ardından bölgedeki ABD üslerine yönelik İran saldırılarındaki artışa işaret ediyor. Hafta sonu Ürdün'de iki, Irak'ta bir ABD askerinin öldüğü de bildirildi.", "en": "Pentagon spokesman Sean Parnell said nearly 100 US service members had suffered 'some degree of injury' since July 7, that 96% had returned to duty, and that most injuries were minor concussions. The statement underscores an uptick in Iranian strikes on US bases after the ceasefire collapsed. Two US soldiers were reported killed in Jordan and one in Iraq over the weekend."}, "detail": {"tr": "CBS News'e göre Pentagon'un Savunma Kayıp Analiz Sistemi, çatışmanın başından bu yana bu ayki yaralanmalar hariç 413 askerin yaralandığını listeliyor. The Intercept ise bir ABD yetkilisine dayanarak gerçek yaralı sayısının açıklanandan 'çok daha fazla' olduğunu öne sürdü; bu iddia bağımsız biçimde doğrulanamıyor.", "en": "Per CBS News, the Pentagon's Defense Casualty Analysis System lists 413 wounded in action since the conflict began, excluding this month's injuries. The Intercept, citing a US official, alleged the true injury count was 'far more' than disclosed — a claim that cannot be independently verified."}}, {"featured": false, "topic": "geopolitics", "tag": "elections", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/20/hamas-names-khalil-al-hayya-as-new-leader-after-run-off-with-khaled-meshaal", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Hamas, siyasi büro başkanlığına Halil el-Hayya'yı seçti", "en": "Hamas elects Khalil al-Hayya as head of its political bureau"}, "summary": {"tr": "Hamas, pazartesi ikinci tur oylamada Halil el-Hayya'yı siyasi büro başkanı olarak seçtiğini duyurdu; el-Hayya, veteran lider Halid Meşal'i geride bıraktı. 1960 Gazze doğumlu el-Hayya, hareketin 1987'deki kuruluşundan bu yana üyesi ve İsrail'le yürütülen ateşkes görüşmelerinde Hamas'ın baş müzakerecisiydi. Bir Hamas yetkilisi, seçimin 'ezici çoğunlukla' gerçekleştiğini söyledi.", "en": "Hamas announced on Monday that it had elected Khalil al-Hayya as head of its political bureau in a run-off, with al-Hayya defeating veteran leader Khaled Meshaal. Born in Gaza in 1960 and a member since the movement's 1987 founding, al-Hayya has been Hamas's lead negotiator in ceasefire talks with Israel. A Hamas official said he was chosen 'by an overwhelming majority.'"}, "detail": {"tr": "Al Jazeera muhabiri Nour Odeh'e göre İsrail seçime resmi tepki vermedi; ancak el-Hayya İsrail'de 'şahin' ve Arap hükümetlerinden çok İran'a yakın biri olarak tanımlanıyor. El-Hayya'nın görevi önümüzdeki hafta resmen devralması bekleniyor.", "en": "Al Jazeera's Nour Odeh reported Israel had not officially reacted, but that al-Hayya is described in Israel as 'a hawk' seen as closer to Iran than to Arab governments. He is expected to formally assume the role next week."}}, {"featured": false, "topic": "geopolitics", "tag": "conflict", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/21/lebanese-return-to-pilot-zone-villages-they-say-israel-never-occupied", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Güney Lübnanlılar 'pilot bölge' köylerine döndü, İsrail'in oradan hiç çekilmediğini söylüyor", "en": "South Lebanese return to 'pilot zone' villages, saying Israel never left them"}, "summary": {"tr": "İsrail, Lübnan ve ABD'nin pazartesi başlattığını duyurduğu 'pilot bölge' projesi kapsamında Güney Lübnan'ın Bint Cübeyl ilçesindeki Frun ve Gandouriye köylerine düzinelerce kişi geri döndü. Ancak yerel sakinler ve güvenlik kaynakları bu köylerin İsrail işgaline hiç girmediğini, dolayısıyla gerçek bir çekilme yaşanmadığını öne sürüyor. İsrail ise tam çekilme için önce Hizbullah'ın silahsızlandırılması gerektiğinde ısrar ediyor.", "en": "Under a 'pilot zone' project that Israel, Lebanon and the US announced on Monday, dozens of people returned to the villages of Froun and Ghandouriyeh in southern Lebanon's Bint Jbeil district. But residents and security sources say those villages were never under Israeli occupation, meaning no real withdrawal has taken place. Israel insists Hezbollah must be disarmed before any full pull-back."}, "detail": {"tr": "Al Jazeera'ya göre proje, geçen ay Washington'da imzalanan çerçeve anlaşmanın parçası. Belediye meclisi başkanı Mohammed Nader, İsrail'in 'hiç girmediği' yerleri 'boş ceviz kabukları' gibi 'pilot bölge' diye sunmak istediğini söyledi. BM barış gücü UNIFIL bölgede devriye gezmeyi sürdürüyor; görevi yıl sonunda sona eriyor.", "en": "Al Jazeera reported the project stems from a framework agreement signed in Washington last month. Municipal council head Mohammed Nader said Israel wanted to sell 'empty walnut shells' as a pilot zone in places 'they never even entered.' UN peacekeepers (UNIFIL) still patrol the area, with their mandate ending this year."}}, {"featured": false, "topic": "geopolitics", "tag": "diplomacy", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/20/trump-rejects-mamdani-threat-to-arrest-israels-netanyahu-for-war-crimes", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Trump, Mamdani'nin tehdidini reddetti: Netanyahu ABD'de tutuklanmayacak", "en": "Trump rejects Mamdani threat, says Netanyahu won't be arrested in US"}, "summary": {"tr": "ABD Başkanı Donald Trump, İsrail Başbakanı Binyamin Netanyahu'nun eylülde New York'a gelişinde 'hiçbir şekilde' tutuklanmayacağını söyleyerek Belediye Başkanı Zohran Mamdani'nin bu yöndeki tehdidini reddetti. Mamdani, Netanyahu'nun BM Genel Kurulu için gelmesi hâlinde tutuklanıp tutuklanmayacağını değerlendirdiğini ve onun 'Lahey'e ait' olduğunu söylemişti. Uluslararası Ceza Mahkemesi 2024'te Netanyahu hakkında savaş suçları gerekçesiyle yakalama kararı çıkarmıştı.", "en": "President Donald Trump said Israeli Prime Minister Benjamin Netanyahu 'will not be arrested, in any way, shape or form' when he visits New York in September, rejecting a threat by Mayor Zohran Mamdani. Mamdani had said he was weighing whether to arrest Netanyahu if he attends the UN General Assembly, saying the premier 'belongs in The Hague.' The International Criminal Court issued a war-crimes arrest warrant for Netanyahu in 2024."}, "detail": {"tr": "Trump, Truth Social paylaşımında Netanyahu'nun 'İran İslam Cumhuriyeti'ne karşı savaştığını' öne sürdü. Mamdani, bir yabancı lideri gözaltına alma yetkisinin belirsiz olduğunu kabul edip kentin Hukuk Departmanı'yla görüştüğünü söyledi. İsrail, UCM'yi 'kanguru mahkemesi', kararı ise 'sahte' olarak niteledi.", "en": "In a Truth Social post, Trump claimed Netanyahu was 'fighting against the Islamic Republic of Iran.' Mamdani acknowledged uncertainty over his authority to detain a foreign leader and said he was consulting the city's Law Department. Israel dismissed the ICC as a 'kangaroo court' and its warrant as 'bogus.'"}}, {"featured": false, "topic": "geopolitics", "tag": "security", "src": "Meduza", "url": "https://meduza.io/en/news/2026/07/20/protests-over-ukraine-s-new-defense-minister-continue-over-weekend", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Kiev'de savunma bakanının görevden alınmasına karşı protestolar hafta sonu sürdü", "en": "Kyiv protests over defence minister's dismissal continued through the weekend"}, "summary": {"tr": "Ukrayna'da Cumhurbaşkanı Volodimir Zelenski'nin Savunma Bakanı Mihaylo Fedorov'u görevden almasına karşı protestolar, 19 Temmuz akşamı Kiev'deki İvan Franko Tiyatrosu önünde yeniden toplanan yüzlerce kişiyle hafta sonu boyunca devam etti. Göstericiler artık Genelkurmay Başkanı Oleksandr Sirski'nin de istifasını ve askeri reform talep ediyor. Kharkiv, Dnipro, Mykolaiv ve Odessa'da da eylemler yapıldı.", "en": "Protests against President Volodymyr Zelenskyy's dismissal of Defence Minister Mykhailo Fedorov ran through the weekend, with hundreds gathering again outside Kyiv's Ivan Franko Theatre on the evening of July 19. Demonstrators now also demand the resignation of armed forces chief Oleksandr Syrskyi and military reforms. Rallies were also held in Kharkiv, Dnipro, Mykolaiv and Odesa."}, "detail": {"tr": "Meduza'ya göre Fedorov, görevden alınmasını Sirski ile yaşadığı anlaşmazlığa bağladı; yerine 14 Temmuz'daki toplu istifanın ardından Yevheni Khmara getirildi. Financial Times ve Meduza, Zelenski'nin Sirski'yi de görevden almayı değerlendirdiğini bildirdi. Savaşın dört yılı aşkın süresinde bu ölçekte gösteriler nadir görülüyor.", "en": "Per Meduza, Fedorov attributed his removal to friction with Syrskyi; Yevhenii Khmara replaced him after a mass government resignation on July 14. The Financial Times and Meduza reported Zelenskyy was weighing dismissing Syrskyi as well. Demonstrations on this scale have been rare in more than four years of war."}}, {"featured": false, "topic": "geopolitics", "tag": "security", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/20/police-attack-cockroach-activists-as-thousands-march-on-indian-parliament", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Hindistan'da polis, parlamentoya yürüyen 'Hamamböceği' hareketine müdahale etti", "en": "Indian police move against 'Cockroach' marchers heading to parliament"}, "summary": {"tr": "Yeni Delhi'de 10 binden fazla kişi, gençlerin öncülük ettiği 'Hamamböceği' hareketiyle parlamentoya yürürken polis göz yaşartıcı gaz ve cop kullandı. Gösteri, parlamentonun muson dönemi oturumunun ilk gününe denk geldi. Göstericiler, Eğitim Bakanı Dharmendra Pradhan'ın istifasını, sınav sistemindeki yolsuzluğa son verilmesini ve reform yapılmasını talep ediyor.", "en": "Police fired tear gas and used batons as more than 10,000 people marched toward parliament in New Delhi behind the youth-led 'Cockroach' movement. The demonstration coincided with the first day of parliament's monsoon session. Protesters demand the resignation of Education Minister Dharmendra Pradhan, an end to exam-system corruption and reforms."}, "detail": {"tr": "Al Jazeera'ya göre hareket, Yüksek Mahkeme başkanının işsiz gençleri 'hamamböceği'ne benzetmesinin ardından mayısta doğdu ve sosyal medyada milyonlarca takipçiye ulaştı. Sınav sorularının sızması nedeniyle geçen ay yaklaşık 2,2 milyon tıp adayı sınavı yeniden almıştı. Gösterici Sneha Eppili, 'Bu hükümete oy verdim, bu yüzden bize hesap vermesi gerektiğini düşünüyorum' dedi.", "en": "Al Jazeera reported the movement emerged in May after the Supreme Court chief justice likened unemployed youth to 'cockroaches,' drawing millions of followers online. Around 2.2 million medical aspirants had to resit an exam last month after questions leaked. Protester Sneha Eppili said, 'I voted for this government, so I think it's accountable to answer our questions.'"}}, {"featured": false, "topic": "geopolitics", "tag": "diplomacy", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/21/who-is-driving-diplomacy-in-the-horn-of-africa-and-the-red-sea-and-why", "date": {"tr": "21 Tem", "en": "Jul 21"}, "title": {"tr": "Kahire'de Afrika Boynuzu ve Kızıldeniz diplomasisi hızlandı", "en": "Diplomacy over the Horn of Africa and Red Sea intensifies in Cairo"}, "summary": {"tr": "Mısır, Somali, Eritre ve bir ABD temsilcisi Kahire'de Afrika Boynuzu ile Kızıldeniz'deki güvenlik ve istikrar üzerine bir dizi diplomatik görüşme yürüttü. ABD Başkanı'nın Afrika Kıdemli Danışmanı Massad Boulos, Somali ve Eritre dışişleri bakanlarıyla ayrı ayrı bir araya geldi. Görüşmelerin somut sonuçlarından çok eşgüdümün kendisi öne çıktı.", "en": "Egypt, Somalia, Eritrea and a US envoy held a series of consultations in Cairo on security and stability in the Horn of Africa and the Red Sea. Massad Boulos, the US president's senior adviser for Africa, met the foreign ministers of Somalia and Eritrea separately. The coordination itself, rather than concrete outcomes, was the main takeaway."}, "detail": {"tr": "Al Jazeera'ya göre Boulos, Somali dışişleri bakanıyla 'Afrika Boynuzu'nda güvenlik ve istikrarın önemli meselelerini' görüştüğünü, Eritre tarafıyla ise 'bölgesel çatışmaları ele almak için yapıcı biçimde birlikte çalışma' ihtiyacını vurguladıklarını söyledi. Analist Mübarek Aliyu, Mısır'ın ABD ile eşgüdümünü bölgedeki krizlerin iç içe geçtiğinin bir kabulü olarak yorumladı.", "en": "Al Jazeera reported Boulos said he discussed 'important issues of security and stability in the Horn of Africa' with Somalia's foreign minister and, with Eritrea, stressed the need to 'work together constructively to address regional conflicts.' Analyst Mubarak Aliyu read Egypt's coordination with Washington as an acknowledgment that the region's crises have become interconnected."}}, {"featured": false, "topic": "geopolitics", "tag": "conflict", "src": "Al Jazeera", "url": "https://www.aljazeera.com/news/2026/7/20/msf-demands-israel-release-detained-palestinian-healthcare-workers", "date": {"tr": "20 Tem", "en": "Jul 20"}, "title": {"tr": "Sınır Tanımayan Doktorlar, gözaltındaki Filistinli sağlık çalışanlarının serbest bırakılmasını istedi", "en": "MSF demands Israel release detained Palestinian healthcare workers"}, "summary": {"tr": "Sınır Tanımayan Doktorlar (MSF), İsrail'in gözaltında tuttuğu Filistinli sağlık çalışanlarının 'derhal ve koşulsuz' serbest bırakılmasını istedi; örgüt, çoğu 'gerekçesiz biçimde ağır koşullarda' tutulan çalışanların durumundan 'öfke duyduğunu' bildirdi. MSF'ye göre şu anda aralarında 15 doktorun da bulunduğu 50'den fazla sağlık çalışanı alıkonuluyor. İsrail'in bu açıklamaya yönelik bir yanıtı haberde yer almadı.", "en": "Medecins Sans
